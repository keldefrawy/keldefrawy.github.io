schema_version: "1.0"

series:
  title: The R&D Ratchet
  subtitle: How America lost the institutions that could think long—and the narrow window to build what comes next
  description: >-
    A firsthand, evidence-led inquiry into the incentive structures that replaced the American
    industrial research laboratory, what those structures preserve and destroy, and how an
    AI-native public–private successor might be designed.
  updated: "2026-07-23"
  article_count: 12
  published_count: 0

