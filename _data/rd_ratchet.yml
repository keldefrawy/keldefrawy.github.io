brain_nodes:
  - id: core
    position: core
    title: AI-native public–private laboratory
    detail: A durable institution whose objective function is validated knowledge, retained capability, trained people, and transition to public use.
  - id: mission
    position: north
    title: Mission & governance
    detail: A long but reviewable public charter, independent technical governance, transparent conflicts policy, and protection against incumbent capture.
  - id: memory
    position: northeast
    title: Institutional memory
    detail: Versioned hypotheses, decisions, experiments, failures, code, proofs, data provenance, and lessons—not only final publications.
  - id: agents
    position: southeast
    title: Scientific agents
    detail: AI assistance for synthesis, conjectures, software, formal proof, simulation, experimental planning, and anomaly detection under named human accountability.
  - id: physical
    position: south
    title: Physical interface
    detail: Automated laboratories, testbeds, semiconductor and fabrication access, robotics, and measurement that couple models to reality.
  - id: apprenticeship
    position: southwest
    title: Human apprenticeship
    detail: Stable technical teams in which judgment, experimental taste, ethics, and problem selection pass between generations.
  - id: transition
    position: northwest
    title: Transition system
    detail: Product engineers, standards, procurement, manufacturing, licensing, and venture pathways embedded from the beginning.

articles:
  - number: 1
    slug: trillion-dollar-system
    title: The Nearly Trillion-Dollar R&D System That Cannot Think Long
    status: researching
    case: National R&D statistics; IBM/HRL; SRI/PARC
    claim: R&D expenditure is a flow; research capability is accumulated state.
    visuals: [Interactive R&D trend chart, National capability balance sheet, Source-backed argument map]
  - number: 2
    slug: lucent-coming-apart
    title: I Arrived at Bell Labs as Lucent Was Coming Apart
    status: planned
    case: Lucent / Bell Labs, 2001
    claim: Scientific excellence and corporate fragility can coexist.
    visuals: [Memory-versus-document timeline, Corporate horizon diagram, Annotated telecom context]
  - number: 3
    slug: one-heritage-two-incentives
    title: One Heritage, Two Incentive Systems
    status: planned
    case: Lucent and AT&T
    claim: Parent economics determine which parts of a research culture can survive.
    visuals: [Split-lineage map, Side-by-side incentive table, Problem-to-operation pathways]
  - number: 4
    slug: hrl-mission-driven-bargain
    title: HRL and the Bargain of Mission-Driven Research
    status: planned
    case: HRL Laboratories, 2010–2016
    claim: A durable mission customer protects ambitious work while also defining its boundaries.
    visuals: [Funding-and-mission map, Capability-versus-project layers, Patent-to-program network]
  - number: 5
    slug: sri-project-funded-institution
    title: SRI and the Project-Funded Institution
    status: planned
    case: SRI International, 2017–2022
    claim: An institution can persist across projects while its people remain governed by project clocks.
    visuals: [Program portfolio map, Chargeability pressure loop, Collaboration network]
  - number: 6
    slug: darpa-temporary-laboratory
    title: DARPA Can Create a Temporary Laboratory. What Happens When the Program Ends?
    status: planned
    case: RACE, SIEVE, DPRIVE, DHS, and IARPA programs
    claim: The program model coordinates breakthroughs but does not automatically preserve the capability it assembles.
    visuals: [Temporary-lab lifecycle, Program handoff map, Artifact survival ledger]
  - number: 7
    slug: academia-not-missing-laboratory
    title: The University Is Not the Missing Laboratory
    status: researching
    case: Academic basic research, grant cycles, publication incentives, and facilities and administrative costs
    claim: Universities are indispensable to discovery and training, but project grants and publication markets do not fund the complete institutional stack required for durable R&D.
    visuals: [Academic R&D role map, Grant-and-overhead feedback loop, Direct-versus-shared-cost explainer]
  - number: 8
    slug: parc-appropriability-trap
    title: PARC and the Appropriability Trap
    status: planned
    case: PARC, Xerox, and SRI
    claim: Invention, recognition, complementary assets, and value capture are four different capabilities.
    visuals: [Four-capability matrix, IP-and-host timeline, Spillover map]
  - number: 9
    slug: outputs-and-vanishing-capability
    title: Papers, Patents, Prototypes—and Vanishing Capability
    status: planned
    case: Karim’s publication, patent, program, and transition record
    claim: Output metrics can rise while the ability to produce the next generation of work declines.
    visuals: [Output-versus-capability dashboard, Test-of-time timeline, Evidence-quality matrix]
  - number: 10
    slug: startup-not-laboratory
    title: The Startup Is Not a Research Laboratory
    status: planned
    case: Confidencial and research spinouts
    claim: A startup can complete one transition but cannot rationally maintain the research commons.
    visuals: [Paper-to-product work map, Incentive comparison, Missing-middle cost stack]
  - number: 11
    slug: consolidation-as-triage
    title: Consolidation as Triage
    status: planned
    case: SRI/PARC and the announced IBM/HRL transaction
    claim: Preservation should be measured by surviving teams and capabilities, not by the transaction announcement.
    visuals: [Before-and-after capability ledger, Acquisition outcome tree, Five-year scorecard]
  - number: 12
    slug: last-transfer-window
    title: The Last Transfer Window
    status: planned
    case: The remaining mentorship overlap
    claim: Institutional memory is perishable, making delay more costly than budget statistics reveal.
    visuals: [Mentorship-chain model, Capability decay curves, Window indicators]
  - number: 13
    slug: ai-native-public-good
    title: An AI-Native Laboratory for the Public Good
    status: planned
    case: A proposed successor informed by NAIRR, NSTC, FFRDCs, DARPA, and DOE laboratories
    claim: A successor must align capital, careers, infrastructure, AI, transition, and public value in one institutional design.
    visuals: [Interactive lab brain map, Governance and IP tiers, Ten-year pilot roadmap]

