models:
  - id: integrated
    short: Integrated corporate
    name: Vertically integrated corporate laboratory
    cases: Classical Bell Labs
    payer: Regulated and market revenues inside an integrated operating and manufacturing system
    horizon: Decade-scale when the parent system is stable
    reward: Strategic capability, scientific standing, patents, and downstream system advantage
    preserves: Cross-layer teams, apprenticeship, facilities, and patient problem selection
    failure: The research cross-subsidy depends on an economic and regulatory settlement that may not survive restructuring
  - id: equipment
    short: Equipment corporate
    name: Post-breakup equipment-company research
    cases: Lucent-era Bell Labs
    payer: Equipment revenues and capital markets
    horizon: Strategic in principle; exposed to product and industry cycles in practice
    reward: Product relevance, patents, technical differentiation, and reputation
    preserves: Deep hardware and systems expertise near manufacturing and product groups
    failure: Parent-company distress can compress the horizon faster than research culture can adapt
  - id: operator
    short: Operator research
    name: Network-operator research laboratory
    cases: AT&T Labs Research
    payer: Communications-services business
    horizon: Medium to long, with continuing pressure for operational relevance
    reward: Network impact, technical insight, publication, and service advantage
    preserves: Real operational problems, data, and feedback from deployed infrastructure
    failure: Broad spillovers may escape the sponsor while corporate priorities narrow the research surface
  - id: mission
    short: Mission laboratory
    name: Owner-sponsored, mission-driven industrial laboratory
    cases: HRL Laboratories
    payer: Strategic owners and government mission sponsors
    horizon: Program clocks nested inside longer-lived technical capabilities
    reward: Mission milestones, sponsor value, invention, and scientific results
    preserves: Specialized facilities and ambitious applied science beyond consumer-market horizons
    failure: Sponsor boundaries and contract portfolios can turn durable capability into disconnected projects
  - id: nonprofit
    short: Contract nonprofit
    name: Independent nonprofit contract-research institute
    cases: SRI International
    payer: Government and commercial contracts, plus limited internal investment
    horizon: Finite projects carried by an institution intended to persist across them
    reward: Winning and executing programs, technical credibility, and transition
    preserves: Multidisciplinary teams and networks across sponsors and performers
    failure: Chargeability, proposal churn, and funding cliffs can become the institution’s hidden operating system
  - id: program
    short: Agency program
    name: Time-bounded agency program network
    cases: DARPA, DHS, IARPA, ARPA-H programs
    payer: Public mission agencies
    horizon: Finite programs led by empowered program managers
    reward: Aggressive milestones and potentially transformative mission outcomes
    preserves: Urgency, cross-organizational coordination, and permission to attempt high-risk work
    failure: The program can create a temporary laboratory without funding a permanent institutional home for what it learns
  - id: academic
    short: Academic
    name: University research system
    cases: Research universities
    payer: Public grants, tuition, philanthropy, and endowments
    horizon: Grant, degree, and tenure clocks
    reward: Publications, grants, novelty, training, and disciplinary standing
    preserves: Open knowledge, intellectual diversity, and the talent pipeline
    failure: Integration, maintenance, negative results, and long transition work are frequently under-rewarded
  - id: venture
    short: Venture
    name: Venture-backed technology transition
    cases: Research spinouts and startups
    payer: Investors and customers
    horizon: Runway, market adoption, and financing cycles
    reward: Focus, product-market fit, growth, adoption, and exit value
    preserves: Concentrated execution on one transition path
    failure: A startup cannot rationally maintain the broad research commons from which its product emerged
  - id: successor
    short: Proposed successor
    name: AI-native public–private laboratory
    cases: Proposed design; informed by NAIRR, NSTC, FFRDCs, DARPA, and DOE laboratories
    payer: Long-charter public capital, industry membership, mission procurement, and philanthropy
    horizon: Rolling ten- to fifteen-year mission charters with layered review
    reward: Capability formation, public value, validated knowledge, transition, and trained people
    preserves: Shared infrastructure, institutional memory, apprenticeship, and complementary transition assets
    failure: Must be designed against political capture, incumbent capture, bureaucracy, mission drift, and performative metrics

argument_nodes:
  - id: inherited
    lane: Inherited capability
    title: Long-lived laboratories accumulate state
    detail: Teams, facilities, trust, problem-selection judgment, negative results, and apprenticeship compound over time.
    evidence: [M, D, I, A]
  - id: corporate
    lane: Replacement incentives
    title: Corporate horizons contract
    detail: Research must increasingly justify itself against product cycles, capital markets, and reorganizations.
    evidence: [D, I, A]
  - id: projects
    lane: Replacement incentives
    title: Institutions become portfolios of projects
    detail: Finite contracts fund excellent work but rarely pay for all the shared capability between awards.
    evidence: [M, D, I, A]
  - id: metrics
    lane: Replacement incentives
    title: Countable outputs substitute for durable capability
    detail: Papers, patents, milestones, and nominal R&D expenditure are evidence, but they are lossy projections of institutional state.
    evidence: [M, D, A]
  - id: venture
    lane: Replacement incentives
    title: Venture incentives narrow the transition path
    detail: Startups can carry one invention toward customers while rationally abandoning adjacent public goods.
    evidence: [M, I, A]
  - id: fragmentation
    lane: System behavior
    title: No actor owns the whole transition
    detail: Discovery, engineering, procurement, manufacturing, standards, and maintenance sit in different organizations with different clocks.
    evidence: [M, I, A]
  - id: commons
    lane: System behavior
    title: Shared capability is underprovided
    detail: Its costs are local, while its benefits spill across firms, sectors, countries, and future projects.
    evidence: [D, A]
  - id: memory
    lane: Capability loss
    title: Institutional memory becomes perishable
    detail: When teams disperse, later funding can restart activity but cannot instantly restore tacit knowledge or trusted collaboration.
    evidence: [M, I, A]
  - id: paradox
    lane: Observable outcome
    title: High spending can coexist with low persistence
    detail: National R&D flows may rise while the institutions capable of sustaining uncertain work become fewer or more concentrated.
    evidence: [D, A]
  - id: consolidation
    lane: Observable outcome
    title: Consolidation becomes triage
    detail: Stronger hosts may preserve valuable teams and facilities, but preservation must be measured after the transaction, not assumed from it.
    evidence: [D, I, A]
  - id: window
    lane: Design pressure
    title: One institutional generation remains
    detail: The scarce overlap is between veterans carrying tacit laboratory knowledge and researchers building with AI, quantum, and new experimental platforms.
    evidence: [I, A]
  - id: successor
    lane: Design response
    title: Build an incentive-compatible successor
    detail: Combine long-charter public capital, private transition capacity, shared infrastructure, human apprenticeship, and AI-native memory.
    evidence: [D, I, A]

