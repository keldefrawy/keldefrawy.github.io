# Original Cryptography Arcade presentation themes. Game rules and replay data
# never depend on these records. Tokens are inline until dedicated CSS bundles
# are introduced; empty asset/cue arrays explicitly mean no external assets.

- schema_version: 1
  id: paper-lab
  name: Paper Lab
  status: shipped
  direction: High-legibility research notebook with restrained color and diagram-first surfaces.
  layout_preset: clean-lab
  token_source: manifest-inline
  token_file: null
  tokens:
    bg: "#f4f0e6"
    surface: "#fffdf8"
    ink: "#17201c"
    muted: "#505953"
    focus: "#005fcc"
    safe: "#17633a"
    warning: "#8a4d00"
    danger: "#9d1c2f"
    unknown: "#5c5570"
    ciphertext: "#284f8f"
    public_data: "#315f9f"
    secret_data: "#702b70"
    authenticated: "#17633a"
    tampered: "#9d1c2f"
    fresh: "#08717a"
    replayed: "#735c0f"
    verified: "#17633a"
    offline: "#686f6a"
    grid: "#c9c4b8"
    shadow: "0 0.25rem 1rem rgb(23 32 28 / 0.14)"
    radius: "0.25rem"
    motion_fast: "120ms"
  font_stack: [Georgia, Times New Roman, serif]
  asset_pack: {id: paper-lab-core, status: shipped, assets: []}
  audio_pack: {id: paper-lab-audio, status: none, cues: []}
  accessibility_profiles: [reduced-motion, high-contrast, large-text, relaxed-timing, sound-off]
  author: {name: Cryptography Arcade project, role: original theme design}
  license:
    id: LicenseRef-Cryptography-Arcade-Original
    holder: Karim Eldefrawy
    terms: Original project-owned theme tokens; redistribution terms follow the website repository license when one is adopted.
  attribution: Original project theme using only system fonts and CSS-rendered surfaces; no third-party visual or audio assets.
  originality: Original research-notebook art direction; no franchise branding, copied interface, or third-party trade dress.
  review_status: token-reviewed

