  tour:
    ideas:
      - id: tour-capacity-coding
        label: Channel capacity, network coding, and error-correcting codes
        status: Shannon foundation; later coding lineages
        foundation: true
        note: >-
          Shannon's information and coding theory is foundational. Network coding and regenerating
          codes are later research lineages rather than ideas attributed directly to Shannon.

  cipher:
    people:
      - id: science-cipher-elgamal
        label: Taher Elgamal
        relationship: influence
        note: >-
          ElGamal encryption supplies the algebraic and threshold-encryption lineage used in the
          5PM secure-pattern-matching papers and the related overview article.
      - id: science-cipher-chaum
        label: David Chaum
        relationship: influence
        status: Anonymity, digital cash, and distance bounding
        note: >-
          Chaum anchors the mix-network, anonymous-communication, group-signature, and digital-cash
          lineages. Distance bounding is credited to the Brands-Chaum construction rather than to
          Chaum alone.
      - id: science-cipher-shamir
        label: Adi Shamir
        relationship: influence
        status: Secret sharing and identity-based cryptography
        note: >-
          This individual node is intentionally separate from the Rivest-Shamir-Adleman group: it
          represents Shamir secret sharing and the identity-based-encryption proposal used across
          Karim's proactive-security and private-messaging work.
      - id: science-cipher-yao
        label: Andrew Yao
        relationship: influence
        status: Secure-computation lineage
        note: Foundational secure two-party computation and garbled-circuit lineage.
      - id: science-cipher-goldreich
        label: Oded Goldreich
        relationship: influence
        status: General secure-computation lineage
        note: General secure computation with Silvio Micali and Avi Wigderson.
      - id: science-cipher-proactive-security-pioneers
        label: Amir Herzberg, Stanisław Jarecki, Hugo Krawczyk & Moti Yung
        relationship: influence
        status: Proactive-secret-sharing lineage
        note: >-
          The four coauthors of the foundational proactive-secret-sharing work are grouped here to
          preserve complete attribution without overcrowding the people lane.
      - id: science-cipher-peikert
        label: Chris Peikert
        relationship: collaborator
        status: Direct collaborator · F1 and CraterLake
        note: >-
          Direct coauthor on both mapped FHE accelerators; broader dashed links mark Peikert's
          lattice, LWE, Ring-LWE, and FHE research influence rather than additional coauthorship.
      - id: science-cipher-devadas
        label: Srinivas (Srini) Devadas
        relationship: collaborator
        status: Direct collaborator · F1 and CraterLake
        note: >-
          Direct coauthor on both mapped FHE accelerators; broader links capture secure-architecture,
          attestation, formally specified enclave, and strong-anonymity research lineages.
