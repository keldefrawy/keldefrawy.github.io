      - id: science-cipher-paper-64
        publication_id: 64
        label: "#64 · CraterLake FHE accelerator"
        title: "CraterLake: A Hardware Accelerator for Efficient Unbounded Computation on Encrypted Data"
        url: /knowledge/papers/paper-64/
        note: Accelerates bootstrapping so BGV, GSW, and CKKS-style FHE computations can run at unbounded depth.
      - id: science-cipher-paper-74
        publication_id: 74
        label: "#74 · Private identity-based bulletin boards"
        title: "Private Identity-Based Bulletin Boards for Anonymous Messaging and Other Online Services"
        url: /knowledge/papers/paper-74/
        note: Uses searchable hierarchical identity-based encryption, bilinear maps, and private information retrieval.
      - id: science-cipher-paper-62
        publication_id: 62
        label: "#62 · Attribute-based document encryption"
        title: "In-App Cryptographically-Enforced Selective Access Control for Microsoft Office and Similar Platforms"
        url: /knowledge/papers/paper-62/
        note: Uses attribute-based encryption to enforce fine-grained document access cryptographically.
      - id: science-cipher-paper-14
        publication_id: 14
        label: "#14 · Anonymous routing with group signatures"
        title: "ALARM: Anonymous Location-Aided Routing in Suspicious MANETs"
        url: /knowledge/papers/paper-14/
