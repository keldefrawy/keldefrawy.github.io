schema_version: "1.0"

evidence_note: >-
  The collaborators view uses publication authorship on this site for direct-collaboration anchors.
  Conceptual-lineage links record broader research influence identified by Karim; they do not imply
  that every downstream paper was coauthored with the connected person. Karim has not collaborated
  with the scientists in the foundational lane. Blue solid cards mark documented co-authors; violet
  dashed cards mark historical or intellectual influence only.

scenes:
  hotel:
    exclude_node_ids: [hotel-hilbert, hotel-cantor, hotel-foundations]
    exclude_note_kinds: [mathematics]
    people:
      - id: science-hotel-byzantine-pioneers
        label: Leslie Lamport, Robert Shostak & Marshall Pease
        relationship: influence
        status: Byzantine-agreement lineage
        note: >-
          Their Byzantine Generals formulation anchors the consensus and fault-tolerant-replication
          branch. The self-stabilization connection is through Byzantine-resilient distributed
          computation, not a claim that they originated self-stabilization or MPC.
    ideas:
      - id: hotel-formal-methods
        label: Formal systems, machine-checked proofs, and code extraction
      - id: science-hotel-verified-embedded
        label: Computer-aided verification of embedded security systems
        status: Architecture and system verification
      - id: science-hotel-byzantine-agreement
        label: Byzantine agreement and fault-tolerant replication
        status: Consensus lineage
    papers:
      - id: science-hotel-paper-67
        publication_id: 67
        label: "#67 · Formally verified zero knowledge"
        title: "Boosting the Performance of High-Assurance Cryptography: Parallel Execution and Optimizing Memory Access in Formally Verified Line-Point Zero-Knowledge"
        url: /knowledge/papers/paper-67/
        note: EasyCrypt-verified performance work; the paper map records later scrutiny of the represented end-to-end assurance claims.
      - id: science-hotel-paper-50
        publication_id: 50
        label: "#50 · Verified remote attestation"
        title: "VRASED: A Verified Hardware/Software Co-Design for Remote Attestation"
        url: /knowledge/papers/paper-50/
        note: Formally specified and verified hardware/software remote-attestation architecture.
      - id: science-hotel-paper-54
        publication_id: 54
        label: "#54 · Verified proofs of execution"
        title: "APEX: A Verified Architecture for Proofs of Execution on Remote Devices Under Full Software Compromise"
        url: /knowledge/papers/paper-54/
        note: Formally verified architecture for proofs of execution on low-end embedded devices.
      - id: science-hotel-paper-46
        publication_id: 46
        label: "#46 · Verified update, reset, and erasure"
        title: "PURE: Using Verified Remote Attestation to Obtain Proofs of Update, Reset and Erasure in Low-End Embedded Systems"
        url: /knowledge/papers/paper-46/
        note: Extends verified remote attestation with verified recovery services.
      - id: science-hotel-paper-47
        publication_id: 47
        label: "#47 · Formal-verification research agenda"
        title: "Opinion: Advancing Remote Attestation via Computer-Aided Formal Verification of Designs and Synthesis of Executables"
        url: /knowledge/papers/paper-47/
        note: Agenda-setting position paper rather than a verified artifact.
      - id: science-hotel-paper-37
        publication_id: 37
        label: "#37 · HYDRA verified-component attestation"
        title: "HYDRA: Hybrid Design for Remote Attestation Using a Formally Verified Microkernel"
        url: /knowledge/papers/paper-37/
        note: Builds remote attestation from seL4's machine-checked isolation properties; the full composition is not claimed as an end-to-end proof.
      - id: science-hotel-paper-38
        publication_id: 38
        label: "#38 · HYDRA lessons learned"
        title: "Fusing Hybrid Remote Attestation with a Formally Verified Microkernel: Lessons Learned"
        url: /knowledge/papers/paper-38/
        note: Engineering companion on reuse of the formally verified seL4 microkernel.
