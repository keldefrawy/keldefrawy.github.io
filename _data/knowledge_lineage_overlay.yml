  collaborators:
    title: "Collaborators Across Modern Cryptography and Security"
    map_title: "Collaborators Across Modern Cryptography and Security"
    description: >-
      A catalog-checked coauthorship view: collaborators connect only to papers carrying their
      names, while papers connect separately to research ideas. Select a person or idea to reveal
      the relevant papers.
    notes:
      - kind: collaboration
        label: How to read this view
        text: >-
          Blue solid cards mark documented collaborators and co-authors. Violet cards in the separate
          foundations-and-influences lane are not Karim's collaborators. Solid person-to-paper links
          identify shared publications. In this view, collaborators do not connect directly to broad topics;
          each paper connects separately to its research ideas. Dashed links capture broader intellectual or
          tool lineage rather than coauthorship. Individual cards
          cover every catalog coauthor with at least three shared publications, plus selected one- or
          two-paper specialists central to the represented lineages; remaining one-paper project teams
          are grouped rather than presented as an exhaustive author directory.
    people:
      - id: collaborators-danny-dolev
        label: Danny Dolev
        relationship: influence
        status: Senior influence · Byzantine agreement and fault tolerance
        note: >-
          A foundational contributor to Byzantine agreement, fault-tolerant distributed algorithms,
          and self-stabilizing Byzantine agreement. The dashed path to Shlomi Dolev records a senior
          intellectual influence, not collaboration or a claim of doctoral advising.
      - id: collaborators-gilles-barthe
        label: Gilles Barthe
        relationship: influence
        status: Senior tool influence · EasyCrypt
        note: >-
          Coauthor of the paper that introduced EasyCrypt and a leader of its development. The dashed
          path records the tool and proof-method lineage behind Vitor Pereira's shared work, not
          coauthorship or advising.
      - id: collaborators-benjamin-gregoire
        label: Benjamin Grégoire
        relationship: influence
        status: Senior tool influence · EasyCrypt
        note: >-
          Coauthor of the paper that introduced EasyCrypt and one of its main implementors. The dashed
          path records proof-assistant and automation lineage, not coauthorship or advising.
      - id: collaborators-moti-yung
        label: Moti Yung
        relationship: collaborator
        catalog_authors: [Moti Yung]
        status: Direct collaborator · all 11 catalog publications mapped
        note: >-
          Every catalog coauthorship is shown, including the full and short timed-cryptography
          position papers and the full and brief proactive-secret-sharing records.
      - id: collaborators-rafail-ostrovsky
        label: Rafail Ostrovsky
        relationship: collaborator
        catalog_authors: [Rafail Ostrovsky]
        status: Direct collaborator · all 13 catalog publications mapped
        note: >-
          Every catalog coauthorship is shown across proactive security, secure computation,
          verified zero knowledge, private search, resilient systems, and post-quantum obfuscation.
      - id: collaborators-gene-tsudik
        label: Gene Tsudik
        relationship: collaborator
        catalog_authors: [Gene Tsudik]
        status: Direct collaborator · all 21 catalog publications mapped
        note: >-
          Coauthor across ALARM and PRISM anonymous routing, location privacy, group distance bounding,
          confidential and anonymous messaging, secure network coding, web-fraud measurement, remote
          attestation, and verified embedded systems.
      - id: collaborators-nigel-smart
        label: Nigel Smart
        relationship: collaborator
        catalog_authors: [Nigel P. Smart]
        status: Direct collaborator · all 2 catalog publications mapped
        note: Coauthor on registration-based encryption and concurrent group messaging; Karim also identifies Smart's ECC, FHE, and MPC work as an important influence.
      - id: collaborators-juan-garay
        label: Juan Garay
        relationship: collaborator
        catalog_authors: [Juan Garay]
        status: Direct collaborator · 1 catalog publication mapped
        note: Coauthor on secure self-stabilizing computation; Karim also identifies Garay's work in MPC and consensus as an important influence.
      - id: collaborators-prism-overlay-team
        label: Linda Briesemeister, Bob Haley & Tim McCarthy
        relationship: collaborator
        catalog_authors: [Linda Briesemeister, Bob Haley, Tim McCarthy]
        catalog_match: all
        status: Direct collaborators · 1 catalog publication mapped
        note: >-
          Coauthors on paper #76, the later intrusion-resilient anonymous-messaging overlay named PRISM.
          This is distinct from Gene Tsudik's earlier PRISM privacy-friendly routing work in papers #9 and #15.
      - id: collaborators-stanislaw-jarecki
        label: Stanisław Jarecki
        relationship: collaborator
        catalog_authors: [Stanislaw Jarecki]
        status: Direct collaborator · all 2 catalog publications mapped
        note: >-
          Coauthor on covert authenticated key exchange and private identity-based bulletin boards;
          also part of the foundational proactive-secret-sharing lineage.
      - id: collaborators-srdjan-capkun
        label: Srdjan Čapkun
