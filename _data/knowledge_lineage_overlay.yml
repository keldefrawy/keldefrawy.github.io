  collaborators:
    notes:
      - kind: collaboration
        label: How to read this view
        text: >-
          Blue solid person cards mark direct collaborators; violet dashed cards mark historical or
          intellectual influence. Solid links identify documented coauthorship or a directly shared
          research thread. Dashed conceptual-lineage links capture broader influence named by Karim
          rather than claiming coauthorship of every downstream paper.
    people:
      - id: collaborators-moti-yung
        label: Moti Yung
        relationship: collaborator
        status: Direct collaborator · 11 mapped papers
        note: Coauthor across timed cryptography, proactive MPC and secret sharing, secure self-stabilization, and regenerating codes.
      - id: collaborators-rafail-ostrovsky
        label: Rafail Ostrovsky
        relationship: collaborator
        status: Direct collaborator · 13 mapped papers
        note: Coauthor across proactive security, secure computation, verified zero knowledge, private search, resilient systems, and post-quantum obfuscation.
      - id: collaborators-gene-tsudik
        label: Gene Tsudik
        relationship: collaborator
        status: Direct collaborator · 21 mapped papers
        note: Coauthor across remote attestation, verified embedded systems, public-key messaging, network coding, privacy, and authentication.
      - id: collaborators-nigel-smart
        label: Nigel Smart
        relationship: collaborator
        status: Direct collaborator · 2 mapped papers
        note: Coauthor on registration-based encryption and concurrent group messaging; Karim also identifies Smart's ECC, FHE, and MPC work as an important influence.
      - id: collaborators-juan-garay
        label: Juan Garay
        relationship: collaborator
        status: Direct collaborator · secure computation
        note: Coauthor on secure self-stabilizing computation; Karim also identifies Garay's work in MPC and consensus as an important influence.
      - id: collaborators-stanislaw-jarecki
        label: Stanisław Jarecki
        relationship: collaborator
        status: Direct collaborator · 2 mapped papers
        note: >-
          Coauthor on covert authenticated key exchange and private identity-based bulletin boards;
          also part of the foundational proactive-secret-sharing lineage.
      - id: collaborators-srdjan-capkun
        label: Srdjan Čapkun
        relationship: collaborator
        status: Direct collaborator · 2 mapped papers
        note: Coauthor on physical-layer identification attacks and group distance bounding.
      - id: collaborators-athina-markopoulou
        label: Athina Markopoulou
        relationship: collaborator
        status: Direct collaborator · 3 mapped papers
        note: >-
          Coauthor on BotTorrent, optimal DDoS filtering, and blacklist-based source filtering.
          Network coding is shown separately as broader research influence, not coauthorship of
          Karim's mapped network-coding papers.
      - id: collaborators-ahmad-reza-sadeghi
