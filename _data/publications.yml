  tags: ["secure pattern matching", "privacy-preserving search"]
  summary: >-
    5PM lets a client privately test a pattern against a server's private text while supporting wildcards, substring matching, nonbinary alphabets, and richer distance measures even when one party is malicious. Its carefully staged protocol uses eight rounds and can hide the pattern length without increasing asymptotic computation or communication.

- id: 20
  year: 2013
  status: Published · magazine article
  venue: IEEE Computer, Volume 46, Number 12
  topic: secure-encrypted-computation
  labels: [Applied]
  title: "Blindfolded Data Search via Secure Pattern Matching"
  authors: "Karim Eldefrawy and Sky Faber"
  tags: ["secure search", "pattern matching", "privacy"]
  summary: >-
    This article explains how secure pattern matching can support blindfolded searches in which a requester hides its query while a data holder reveals only matching records. It surveys practical constructions and illustrates privacy-preserving uses in law-enforcement and health-data sharing while retaining both input privacy and computational correctness.

- id: 19
  year: 2012
  status: Published · conference version
  venue: 8th Conference on Security and Cryptography for Networks (SCN)
  topic: secure-encrypted-computation
  labels: [Theory]
  title: "5PM: Secure Pattern Matching"
  authors: "Joshua Baron, Karim Eldefrawy, Kirill Minkovich, Rafail Ostrovsky, and Eric Tressler"
  tags: ["secure pattern matching", "homomorphic encryption"]
  summary: >-
    5PM lets a client search a server's text for exact, wildcard, approximate, and substring matches without revealing the query or exposing unrelated text, even against malicious participants. A linear-algebra formulation with additive homomorphic encryption gives sublinear-in-circuit communication, supports arbitrary alphabets and hidden pattern length, and completes in eight rounds in the malicious model.

