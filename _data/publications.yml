  tags: ["fuzzy extractors", "biometrics", "LWE"]
  summary: >-
    The paper studies fuzzy extractors that repeatedly derive stable cryptographic keys from noisy biometric readings without letting multiple public helper strings leak the biometric. It breaks the claimed reusability of an earlier LWE construction, repairs it for weak reuse, and gives both generic and direct strongly reusable constructions, including one without random oracles.

- id: 34
  year: 2017
  status: Published
  venue: 37th IEEE International Conference on Distributed Computing Systems (ICDCS)
  topic: secure-systems-networks
  labels: [Theory, Applied]
  title: "Proactively Secure Cloud-Enabled Storage"
  authors: "Karim Eldefrawy, Sky Faber, and Tyler Kaczmarek"
  tags: ["cloud storage", "proactive secret sharing"]
  summary: >-
    The paper designs and implements PiSCES, a cloud-storage system that periodically refreshes secret shares so data can stay confidential even if an attacker compromises different servers over time. Its evaluation shows that proactive protection can scale beyond tiny cryptographic keys to larger files and tens of commodity cloud servers at practical cost.

- id: 33
  year: 2017
  status: Published
  venue: ACM Asia Conference on Computer and Communications Security (AsiaCCS)
  topic: secure-systems-networks
  labels: [Theory, Applied]
