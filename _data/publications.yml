  authors: "Karim Eldefrawy and Gene Tsudik"
  tags: ["location privacy", "MANET routing"]
  summary: >-
    PRISM replaces identity-centric route discovery with on-demand routing addressed to current locations, protecting participants in hostile or compromised MANETs. Its analysis and evaluation find that the protocol resists insider and outsider attacks while offering better privacy and efficiency than alternative techniques.

