    This paper outlines a framework in which a stranded user's personal-area network buys or barters connectivity through a nearby user's devices under short-term service contracts. It combines policy-based gateway selection with mutual authentication, escrowed anonymity, and micropayments to make resource sharing secure and worthwhile.

- id: 3
  year: 2006
