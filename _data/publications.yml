  year: 2007
  status: Published
  venue: IEEE International Conference on Network Protocols (ICNP)
  topic: privacy-identity
  labels: [Applied]
  title: "ALARM: Anonymous Location-Aided Routing in Suspicious MANETs"
  authors: "Karim Eldefrawy and Gene Tsudik"
