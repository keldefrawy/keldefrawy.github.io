  tags: ["swarm attestation", "IoT", "embedded systems"]
  summary: >-
    The paper brings remote attestation from one embedded device to a mobile swarm by defining Quality of Swarm Attestation, a metric for how much integrity information a protocol reveals. It then designs two lightweight LISA protocols with different assurance and cost tradeoffs, analyzes their security, and validates them with prototypes and experiments.

- id: 32
  year: 2016
  status: Published
  venue: 10th Conference on Security and Cryptography for Networks (SCN)
  topic: secure-encrypted-computation
  labels: [Theory]
  title: "Proactive Secret Sharing with a Dishonest Majority"
  authors: "Shlomi Dolev, Karim Eldefrawy, Joshua Lampkins, Rafail Ostrovsky, and Moti Yung"
  tags: ["proactive secret sharing", "dishonest majority"]
  summary: >-
    The full paper develops proactive secret sharing whose confidentiality can survive a dishonest majority, unlike earlier schemes that fail once half the parties are observed within a refresh period. It combines additive sharing with verifiable polynomial sharing to tolerate up to n−1 passive corruptions in the basic case, while also analyzing recovery, active corruption, and communication costs.

- id: 31
  year: 2016
  status: Published · brief announcement
  venue: ACM Symposium on Principles of Distributed Computing (PODC)
  topic: secure-encrypted-computation
  labels: [Theory]
  title: "Brief Announcement: Proactive Secret Sharing with a Dishonest Majority"
  authors: "Shlomi Dolev, Karim Eldefrawy, Joshua Lampkins, Rafail Ostrovsky, and Moti Yung"
  tags: ["proactive secret sharing", "dishonest majority"]
  summary: >-
    This brief announcement gives the first proactive secret-sharing feasibility result that remains confidential even when passive corruptions form a dishonest majority. It supports nearly all parties being passively compromised under stated fault conditions, allows mixed passive and active adversaries, and reduces batched communication to cubic in the number of parties.

- id: 30
  year: 2016
  status: Published
  venue: IEEE COMPSAC, ADMNET workshop
  topic: ai-machine-learning
  labels: [Applied]
  ai_ml_labels: [AI for security]
  title: "Automated Inference of Dependencies of Network Services and Applications via Transfer Entropy"
  authors: "Karim Eldefrawy, Tiffany Kim, and Pape M. Sylla"
  tags: ["network dependencies", "transfer entropy", "operations"]
  summary: >-
    The paper infers which network services and applications depend on one another by passively applying transfer entropy to time series derived from network interactions. Tests on production traffic show fewer false alarms and efficient runtime compared with correlation-based methods, helping operators diagnose failures, plan maintenance, and spot anomalies.

- id: 29
  year: 2016
  status: Published
  venue: IEEE COMPSAC, MidCCI workshop
  topic: secure-systems-networks
  labels: [Theory, Applied]
  title: "Byzantine Fault Tolerant Software-Defined Networking (SDN) Controllers"
  authors: "Karim Eldefrawy and Tyler Kaczmarek"
  tags: ["software-defined networking", "Byzantine fault tolerance"]
  summary: >-
    The paper replaces the single vulnerable SDN controller with replicated controllers that use Byzantine fault-tolerant state-machine replication to survive malicious behavior in both the control and data planes. Its prototype tolerates one compromised component among four replicas and demonstrates feasibility with roughly a twofold slowdown in the best configuration.

- id: 28
  year: 2015
  status: Published
  venue: International Conference on Applied Cryptography and Network Security (ACNS)
  topic: secure-encrypted-computation
  labels: [Theory]
  title: "Communication-Optimal Proactive Secret Sharing for Dynamic Groups"
  authors: "Joshua Baron, Karim Eldefrawy, Joshua Lampkins, and Rafail Ostrovsky"
  tags: ["proactive secret sharing", "dynamic groups", "communication complexity"]
  summary: >-
    This work protects long-lived secrets even as participants join, leave, or are eventually compromised by periodically refreshing shares and restoring parties. It gives the first dynamic proactive secret-sharing schemes with optimal amortized constant communication per secret, improving on polynomial or exponential prior costs, and extends them to dynamic proactive MPC.

- id: 27
  year: 2015
  status: Published · extended abstract
  venue: Embedded Security in Cars USA (escar USA) Workshop
  topic: secure-systems-networks
  labels: [Applied]
  title: "Remote Attestation of Heterogeneous Cyber-Physical Systems: The Automotive Use Case"
  authors: "Karim Eldefrawy, Gavin Holland, and Gene Tsudik"
  tags: ["remote attestation", "automotive security", "cyber-physical systems"]
  summary: >-
    This extended abstract argues that remote attestation should move from checking one embedded device to checking the many heterogeneous components of a cyber-physical system, using a modern vehicle as the motivating case. It outlines how multiple device attestations could be combined efficiently and identifies open problems for automotive and broader CPS deployments.

- id: 26
  year: 2014
  status: Published
  venue: ACM Conference on Computer and Communications Security (CCS)
  topic: secure-encrypted-computation
  labels: [Theory]
  title: "Founding Digital Currency on Secure Computation"
  authors: "Karim Eldefrawy and Joshua Lampkins"
  tags: ["digital currency", "secure computation", "distributed ledger"]
  summary: >-
    The paper designs a privacy-preserving, proactively secure distributed ledger for a digital currency that sits between a fully centralized bank and a fully decentralized system such as Bitcoin. Secret sharing and secure computation protect account and transaction data over time while still allowing a qualified group of servers to enforce accountability.

- id: 25
  year: 2014
  status: Published
  venue: ACM Symposium on Principles of Distributed Computing (PODC)
  topic: secure-encrypted-computation
  labels: [Theory]
  title: "How to Withstand Mobile Virus Attacks, Revisited"
  authors: "Joshua Baron, Karim Eldefrawy, Joshua Lampkins, and Rafail Ostrovsky"
  tags: ["proactive MPC", "mobile adversaries", "packed secret sharing"]
  summary: >-
    This work revisits proactive MPC, where different machines may be compromised over time, and identifies why standard precomputation and sharing techniques become too costly under mobile faults. It introduces packed proactive secret sharing and UC-secure MPC protocols with near-linear per-step communication while tolerating almost one-third perfect-security or one-half statistical-security moving corruptions.

- id: 24
  year: 2014
  status: Published
  venue: Ninth Workshop on Secure Network Protocols (NPSec), co-located with IEEE ICNP
  topic: privacy-identity
  labels: [Theory, Applied]
  title: "Disincentivizing/Incentivizing Malicious/Honest Behavior on the Internet via Privacy-Preserving AppCoins"
  authors: "Karim Eldefrawy and Joshua Lampkins"
  tags: ["micropayments", "incentives", "privacy"]
  summary: >-
    The paper proposes privacy-preserving digital AppCoins as low-overhead micropayments that make abusive online behavior more expensive and reward cooperative behavior. It gives non-malleable, double-spending-resistant protocols and shows how email and onion routing could use them with practical commodity-hardware costs.

- id: 23
  year: 2013
  status: Published
  venue: IEEE International Conference on Technologies for Homeland Security (HST)
  topic: secure-systems-networks
  labels: [Applied]
  title: "An Architecture for a Resilient Cloud Computing Infrastructure"
  authors: "Joshua Baron, Karim Eldefrawy, Aleksey Nogin, and Rafail Ostrovsky"
  tags: ["cloud resilience", "self-healing systems", "secure computation"]
  summary: >-
    The paper proposes a self-healing control operations plane that separates cloud task supervision from user computations and uses cryptographic protocols plus hardware-assisted reinitialization to recover corrupted nodes. The design aims to keep the cloud operating despite a continuing stream of compromises, provided the corruption rate stays below a configurable threshold within each recovery window.

- id: 22
  year: 2013
  status: Published
  venue: IEEE Global Communications Conference (GLOBECOM)
  topic: algorithms-foundations
  labels: [Theory, Applied]
  title: "Neighborhood Watch: On Network Coding Throughput and Key Sharing"
  authors: "Martin Strohmeier, Ivan Martinovic, Utz Roedig, Karim Eldefrawy, and Jens Schmitt"
  tags: ["network coding", "key sharing", "wireless networks"]
  summary: >-
    The paper exposes a practical tradeoff in wireless network coding: larger link-key groups enable more packet overhearing and throughput, but make each key compromise more damaging. It formulates key assignment as an optimization problem and finds that adding one member to a key-sharing group can improve coding gain by 1.3 to 13.7 percent across tested topologies.

- id: 21
  year: 2013
  status: Published · journal article
  venue: Journal of Computer Security, Volume 21, Number 5
  topic: secure-encrypted-computation
  labels: [Theory]
