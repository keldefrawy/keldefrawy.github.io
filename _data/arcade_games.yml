# Canonical Cryptography Arcade registry.
#
# `catalog_id` preserves the planning identifiers used by the master plan while
# `id` and `slug` are stable URL/module identifiers. Publication metadata is
# resolved from `_data/publications.yml` by `provenance.paper_refs[].paper_id`.

- schema_version: 1
  catalog_id: R00
  id: outrefresh-mobile-adversary
  slug: outrefresh-mobile-adversary
  title: Outrefresh the Mobile Adversary
  category: research
  status: prototype
  size: L
  featured: true
  session_minutes: [2, 5]
  difficulty_levels: [guided, standard, expert]
  mechanics: [graph-routing, proactive-refresh, quorum-management, deterministic-replay]
  renderer: canvas-dom-hybrid
  entry_module: /assets/js/arcade/games/outrefresh-mobile-adversary/index.js
  default_theme: paper-lab
  supported_themes: [paper-lab, classic-cabinet]
  player_promise: >-
    Commit a randomized rejuvenation policy for a toy 4-of-7 proactive network
    before the mobile adversary's path is known, balancing compatible-share
    exposure against live-quorum availability.
  learning_objectives:
    - Distinguish proactive privacy failure from availability failure under recovery.
  limitations:
    - This is an illustrative hybrid, not a protocol simulator; taking parties offline does not erase secrets already learned.
  accessibility:
    input_modes: [keyboard, pointer, touch]
    modes: [reduced-motion, relaxed-timing, text-summary, non-color-cues]
  persistence: {progress: true, resumable_runs: true, save_schema_version: 1}
  provenance:
    kind: paper-derived
    fidelity: illustrative-hybrid
    paper_refs:
      - {paper_id: 25, role: background}
      - {paper_id: 28, role: background}
      - {paper_id: 31, role: primary_mechanic}
      - {paper_id: 32, role: campaign_extension}
      - {paper_id: 44, role: primary_mechanic}
      - {paper_id: 45, role: campaign_extension}
      - {paper_id: 52, role: primary_mechanic}
      - {paper_id: 55, role: campaign_extension}
      - {paper_id: 61, role: campaign_extension}
    model_statement: The game combines proactive-share ideas with an invented randomized recovery policy in a deterministic toy network.
    review_status: rules-draft
  release: {game_version: 0.1.0, rules_version: 1, seed_version: 1, save_schema_version: 1}

