nodes:
  - id: paper-15
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "PRISM"
    summary: "An on-demand, location-addressed MANET routing protocol designed to reduce identity and topology leakage in hostile settings."
    source_anchor_ids: [anchor-paper-15-question]

  - id: paper-15-question
    kind: question
    parent_id: paper-15
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can route discovery reach whichever authorized node occupies a target area without exposing a permanent source or destination identity?"
    source_anchor_ids: [anchor-paper-15-question, anchor-paper-15-model]

  - id: paper-15-answer
    kind: contribution
    parent_id: paper-15
    order: 2
    epistemic_status: analytically_and_empirically_supported
    title: "Central answer"
    summary: "Use group-signed, identity-free route requests to a geographic area, temporary public keys for the reply, and short-lived route/session identifiers for data forwarding."
    source_anchor_ids: [anchor-paper-15-protocol, anchor-paper-15-security]

  - id: paper-15-goals
    kind: scope
    parent_id: paper-15
    order: 3
    epistemic_status: explicitly_scoped
    title: "Design goals"
    summary: "PRISM targets tracking resistance, protection from active and passive outsiders and insiders, and acceptable routing cost in critical mobile networks."
    source_anchor_ids: [anchor-paper-15-question]

  - id: paper-15-assumptions
    kind: assumption_group
    parent_id: paper-15-goals
    order: 1
    epistemic_status: assumed
    title: "Infrastructure and device assumptions"
    summary: "Nodes know their location, have loose time synchronization and public-key capabilities, and receive credentials and a network-wide key from an offline trusted authority; eviction is only supported between deployments."
    source_anchor_ids: [anchor-paper-15-model]

  - id: paper-15-adversary
    kind: threat_model
    parent_id: paper-15-goals
    order: 2
    epistemic_status: defined
    title: "Adversary classes"
    summary: "The analysis separates passive and active outsiders from passive and active insiders; physical-layer time-difference tracking is explicitly outside the model."
    source_anchor_ids: [anchor-paper-15-adversary]

  - id: paper-15-protocol
    kind: protocol
    parent_id: paper-15
    order: 4
    epistemic_status: proposed
    title: "PRISM route discovery"
    summary: "The source broadcasts a request containing the destination area, fresh temporary public key, timestamp, and group signature; nodes flood it while caching only request hashes and reverse-hop state."
    source_anchor_ids: [anchor-paper-15-protocol]

  - id: paper-15-protocol-reply
    kind: protocol_step
    parent_id: paper-15-protocol
    order: 1
    epistemic_status: specified
    title: "Anonymous route reply"
    summary: "A node in the destination area returns a group-signed reply that binds the request hash and encrypts a fresh session key and exact location to the source's temporary key."
    source_anchor_ids: [anchor-paper-15-protocol]

  - id: paper-15-protocol-data
    kind: protocol_step
    parent_id: paper-15-protocol
    order: 2
    epistemic_status: specified
    title: "Data phase"
    summary: "Short-lived route identifiers derived from request material guide forwarding, while the negotiated session key protects the end-to-end payload."
    source_anchor_ids: [anchor-paper-15-protocol]

  - id: paper-15-claim-outsider
    kind: security_claim
    parent_id: paper-15
    order: 5
    epistemic_status: conditional_analysis
    title: "Outsider protection"
    summary: "The network-wide key and cryptographic authentication are intended to exclude outsiders from useful routing traffic and prevent request or reply forgery under the stated assumptions."
    source_anchor_ids: [anchor-paper-15-security]

  - id: paper-15-claim-insider
    kind: privacy_claim
    parent_id: paper-15
    order: 6
    epistemic_status: conditional_analysis
    title: "Passive-insider privacy"
    summary: "Group-signature unlinkability and temporary keys hide durable identities, but an observer still learns the requested destination area and that some node there replied."
    source_anchor_ids: [anchor-paper-15-security]

  - id: paper-15-boundary-active
    kind: limitation
    parent_id: paper-15
    order: 7
    epistemic_status: explicitly_reported
    title: "Active-insider boundary"
    summary: "Base PRISM does not prevent a credentialed insider from location fraud, Sybil behavior, or some man-in-the-middle actions; one-time certificates or tamper-resistant signing/location hardware are proposed extensions."
    source_anchor_ids: [anchor-paper-15-security]

  - id: paper-15-evidence-overhead
    kind: empirical_evidence
    parent_id: paper-15
    order: 8
    epistemic_status: simulation
    title: "Routing-overhead evaluation"
    summary: "Simulations vary 20-100 nodes, query fractions, and three mobility models over repeated 10,000-second runs; overhead rises sharply under an intentionally heavy all-node, five-second query workload and is lower at moderate query rates."
    source_anchor_ids: [anchor-paper-15-simulation]

  - id: paper-15-evidence-privacy
    kind: empirical_evidence
    parent_id: paper-15
    order: 9
    epistemic_status: simulation
    title: "Topology-leakage evaluation"
    summary: "The experiments estimate the fraction of topology exposed by observed route discoveries; leakage depends strongly on query volume and mobility, with group and time-variant mobility revealing less than random waypoint in the tested settings."
    source_anchor_ids: [anchor-paper-15-leakage]

  - id: paper-15-limitations
    kind: limitation_group
    parent_id: paper-15
    order: 10
    epistemic_status: material
    title: "Trusted boundaries and leakage"
    summary: "The destination area and response event remain visible, physical tracking is out of scope, an offline authority and shared network key are trusted, and simulated performance does not establish behavior in a deployed hostile MANET."
    source_anchor_ids: [anchor-paper-15-adversary, anchor-paper-15-security, anchor-paper-15-limitations]

  - id: paper-15-artifacts
    kind: artifact_group
    parent_id: paper-15
    order: 11
    epistemic_status: paper_and_simulation_description
    title: "Artifacts"
    summary: "The complete paper documents protocol formats, security reasoning, simulation parameters, and results; no simulation source, raw trace set, or implementation repository was located."
    source_anchor_ids: [anchor-paper-15-protocol, anchor-paper-15-simulation]

  - id: paper-15-scrutiny
    kind: scrutiny
    parent_id: paper-15
    order: 12
    epistemic_status: journal_reviewed
    title: "External scrutiny and reception"
    summary: "The work appeared in IEEE JSAC and ResearchGate reports 107 citations; this audit did not inspect review reports, citing contexts, corrections, or an independent implementation."
    source_anchor_ids: [anchor-paper-15-publication, anchor-paper-15-citations]

  - id: paper-15-lineage
    kind: lineage
    parent_id: paper-15
    order: 13
    epistemic_status: documented
    title: "Relation to ALARM"
    summary: "PRISM develops an on-demand counterpart to ALARM's proactive location-centric design, reducing routine topology dissemination while introducing query-dependent area leakage."
    source_anchor_ids: [anchor-paper-15-question, anchor-paper-15-leakage]

