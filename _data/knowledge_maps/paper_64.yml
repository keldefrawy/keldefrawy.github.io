nodes:
  - id: paper-64
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: CraterLake
    summary: >-
      A hardware-software co-design for bootstrappable, programmable FHE whose evaluated contribution is efficient execution of workloads that exceed a fixed multiplicative-depth budget.
    source_anchor_ids: [anchor-paper-64-problem]

  - id: paper-64-question
    kind: question
    parent_id: paper-64
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can an FHE accelerator efficiently refresh very large ciphertexts and thereby support general computations of unbounded multiplicative depth?
    source_anchor_ids: [anchor-paper-64-problem]

  - id: paper-64-answer
    kind: contribution
    parent_id: paper-64
    order: 2
    epistemic_status: source_asserted
    title: Central answer
    summary: >-
      The design makes bootstrapping a first-class workload through a compact key-switch method, wide parallel datapath, on-chip specialization, and compiler-controlled reuse; the resulting simulated system executes deep CKKS workloads much faster than the evaluated baselines.
    source_anchor_ids: [anchor-paper-64-boosted, anchor-paper-64-architecture, anchor-paper-64-performance]

  - id: paper-64-model
    kind: model
    parent_id: paper-64
    order: 3
    epistemic_status: defined
    title: Cryptographic and workload model
    summary: >-
      The architecture targets ring-based FHE operations and supports CKKS, BGV, and GSW, with evaluation centered on CKKS. Deep parameter sets contain 64K ring elements and roughly 1,600-bit coefficients, making one ciphertext about 25 MB.
    source_anchor_ids: [anchor-paper-64-fhe-model, anchor-paper-64-problem]

  - id: paper-64-model-security
    kind: assumption
    parent_id: paper-64-model
    order: 1
    epistemic_status: parameter_dependent
    title: Security and correctness are parameter dependent
    summary: >-
      CraterLake accelerates cryptographic computations chosen by the application and compiler; semantic security, numerical precision, circuit correctness, and parameter adequacy remain properties of the selected FHE scheme and parameter set.
    source_anchor_ids: [anchor-paper-64-fhe-model, anchor-paper-64-energy-security]

  - id: paper-64-design
    kind: system
    parent_id: paper-64
    order: 4
    epistemic_status: constructed
    title: Hardware-software construction
    summary: The system integrates algorithmic key-switch compression, a wide vector processor, specialized functional units, memory organization, and static compiler scheduling.
    source_anchor_ids: [anchor-paper-64-boosted, anchor-paper-64-architecture, anchor-paper-64-compiler]

  - id: paper-64-design-boosted
    kind: algorithm
    parent_id: paper-64-design
    order: 1
    epistemic_status: constructed
    title: Boosted key switching
    summary: >-
      The boosted formulation reduces projected auxiliary key material for a deep parameter set from roughly 1.4 GB to about 50 MB, making reuse and movement feasible; KSHGen can generate half of a hint on demand and reduce resident hint storage to about 25 MB.
    source_anchor_ids: [anchor-paper-64-boosted, anchor-paper-64-architecture]

  - id: paper-64-design-datapath
    kind: architecture
    parent_id: paper-64-design
    order: 2
    epistemic_status: constructed
    title: Wide-vector datapath
    summary: >-
      A 2,048-lane uniprocessor, fixed transpose network, and specialized residue-conversion and key-switch-generation units expose the parallelism and data transforms used by large polynomial operations.
    source_anchor_ids: [anchor-paper-64-architecture]

  - id: paper-64-design-compiler
    kind: method
    parent_id: paper-64-design
    order: 3
    epistemic_status: implemented
    title: Compiler-directed scheduling
    summary: >-
      The compiler schedules operations, reuses data, overlaps or decouples movement from computation, and chains kernels so intermediate values need not repeatedly traverse costly memory paths.
    source_anchor_ids: [anchor-paper-64-compiler]

  - id: paper-64-claims
    kind: claim_group
    parent_id: paper-64
    order: 5
    epistemic_status: source_asserted
    title: Principal claims
    summary: The paper claims practical acceleration of unbounded-depth FHE and reports advantages in latency and energy over its evaluated CPU and F1+ baselines.
    source_anchor_ids: [anchor-paper-64-performance, anchor-paper-64-energy-security]

  - id: paper-64-claim-depth
    kind: claim
    parent_id: paper-64-claims
    order: 1
    epistemic_status: supported_by_evaluation
    title: Refresh enables deep workloads
    summary: >-
      Unlike accelerators restricted to circuits within a fixed noise budget, the represented design includes bootstrapping and therefore runs the evaluated deep ResNet, LSTM, and other workloads without a bounded-depth architectural ceiling.
    source_anchor_ids: [anchor-paper-64-problem, anchor-paper-64-performance]

  - id: paper-64-claim-speed
    kind: claim
    parent_id: paper-64-claims
    order: 2
    epistemic_status: measured_in_model
    title: Large modeled speedups on deep workloads
    summary: >-
      Across the paper's deep benchmark set, CraterLake reports an 11.2x geometric-mean speedup over the scaled F1+ baseline and 4,611x over the CPU baseline; reported examples include 249.45 ms for ResNet-20 and 3.91 ms for packed bootstrapping.
    source_anchor_ids: [anchor-paper-64-performance]

  - id: paper-64-claim-energy
    kind: claim
    parent_id: paper-64-claims
    order: 3
    epistemic_status: estimated
    title: Energy advantage
    summary: The modeled deep-workload evaluation reports about 18x lower energy and about 201x higher performance per joule than scaled F1+.
    source_anchor_ids: [anchor-paper-64-energy-security]

  - id: paper-64-evidence
    kind: evidence_group
    parent_id: paper-64
    order: 6
    epistemic_status: documented
    title: Evaluation evidence
    summary: The evidence combines RTL synthesis and cycle-accurate architectural simulation with a 32-core AMD Threadripper CPU and a scaled improved F1+ design as baselines.
    source_anchor_ids: [anchor-paper-64-implementation, anchor-paper-64-performance]

  - id: paper-64-evidence-scaling
    kind: evidence
    parent_id: paper-64-evidence
    order: 1
    epistemic_status: sensitivity_analysis
    title: Security-parameter sensitivity
    summary: >-
      Relative to the base 80-bit parameter evaluation, the paper reports a 1.36x geometric-mean slowdown at 128-bit security and 2.60x at 200-bit security, the latter using a larger 128K-element hardware configuration.
    source_anchor_ids: [anchor-paper-64-energy-security]

  - id: paper-64-boundaries
    kind: limitation_group
    parent_id: paper-64
    order: 7
    epistemic_status: explicitly_bounded
    title: Scope and limitations
    summary: The results establish a simulated and synthesized architecture under selected cryptographic parameters and workloads, not universal FHE performance or deployment readiness.
    source_anchor_ids: [anchor-paper-64-implementation, anchor-paper-64-performance, anchor-paper-64-conclusion]

  - id: paper-64-boundary-silicon
    kind: limitation
    parent_id: paper-64-boundaries
    order: 1
    epistemic_status: evidence_boundary
    title: No fabricated-silicon measurement
    summary: Area, power, timing, energy, and workload latency are derived from synthesis and simulation rather than a fabricated chip, so manufacturing and deployment effects remain unevaluated.
    source_anchor_ids: [anchor-paper-64-implementation]

  - id: paper-64-boundary-generalization
    kind: limitation
    parent_id: paper-64-boundaries
    order: 2
    epistemic_status: benchmark_bounded
    title: Benchmark and baseline dependence
    summary: >-
      Speedups depend on the selected workloads, parameter sets, compiler schedules, and scaled comparison designs; shallow workloads sometimes narrow or reverse the advantage over F1+.
    source_anchor_ids: [anchor-paper-64-performance, anchor-paper-64-energy-security]

  - id: paper-64-resources
    kind: artifact_group
    parent_id: paper-64
    order: 8
    epistemic_status: source_available
    title: Auditable resources
    summary: The complete author copy is checked into this site with page count and SHA-256; official and NSF public-access records establish publication identity and an independent access route.
    source_anchor_ids: [anchor-paper-64-problem, anchor-paper-64-publication]

  - id: paper-64-scrutiny
    kind: scrutiny
    parent_id: paper-64
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: ISCA publication provides venue-level scrutiny. No public review reports, fabricated-hardware reproduction, correction, or independent benchmark replication was located in this audit.
    source_anchor_ids: [anchor-paper-64-publication]

  - id: paper-64-lineage
    kind: lineage
    parent_id: paper-64
    order: 10
    epistemic_status: documented
    title: Architectural lineage
    summary: The evaluation explicitly positions CraterLake against CPU FHE software and the prior F1/F1+ accelerator line, while changing the target from bounded-depth acceleration to refresh-capable deep computation.
    source_anchor_ids: [anchor-paper-64-problem, anchor-paper-64-performance]

