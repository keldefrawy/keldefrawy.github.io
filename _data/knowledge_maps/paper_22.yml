nodes:
  - id: paper-22
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Neighborhood Watch"
    summary: "An optimization-and-evaluation study of how link-key sharing constrains the throughput gains available from wireless network coding."
    source_anchor_ids: [anchor-paper-22-problem]

  - id: paper-22-question
    kind: question
    parent_id: paper-22
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "What throughput is lost when confidentiality policy limits which neighbors can overhear coded packets, and which key assignment best preserves multicast capacity?"
    source_anchor_ids: [anchor-paper-22-problem]

  - id: paper-22-answer
    kind: contribution
    parent_id: paper-22
    order: 2
    epistemic_status: source_asserted
    title: "Central answer"
    summary: "Optimize flows and key membership jointly: the exact ILP quantifies the tradeoff, and the evaluated topologies show that coding gain can reappear well before all nodes share one key."
    source_anchor_ids: [anchor-paper-22-model, anchor-paper-22-evaluation]

  - id: paper-22-scope
    kind: scope
    parent_id: paper-22
    order: 3
    epistemic_status: explicitly_scoped
    title: "Model and optimization scope"
    summary: "The study treats single-source multicast in directed multi-hop wireless graphs with unit-capacity links, multiple streams, relay and sink nodes, and linear network coding."
    source_anchor_ids: [anchor-paper-22-model]

  - id: paper-22-scope-keys
    kind: definition
    parent_id: paper-22-scope
    order: 1
    epistemic_status: defined
    title: "Two key-sharing constraints"
    summary: "A local limit bounds how many adjacent receivers share a sender's key; a global limit bounds the number and membership of keys available across the network."
    source_anchor_ids: [anchor-paper-22-problem, anchor-paper-22-model]

  - id: paper-22-scope-security
    kind: threat_model
    parent_id: paper-22-scope
    order: 2
    epistemic_status: coarse_model
    title: "Security proxy"
    summary: "Security is represented by compromise exposure of shared link keys: smaller groups isolate a leaked key but reduce overhearing. The paper does not model an active attacker or prove a cryptographic security property."
    source_anchor_ids: [anchor-paper-22-problem]

  - id: paper-22-method
    kind: method
    parent_id: paper-22
    order: 4
    epistemic_status: specified
    title: "Integer linear program"
    summary: "Binary flow and key-membership variables maximize aggregate sink flow while enforcing flow conservation, coding capacity, key-sharing eligibility, and optional source/sink quality-of-service constraints."
    source_anchor_ids: [anchor-paper-22-model]

  - id: paper-22-method-data
    kind: component
    parent_id: paper-22-method
    order: 1
    epistemic_status: documented
    title: "Evaluated topologies"
    summary: "The authors solve the model on 100 randomized four-layer feed-forward graphs and on a feed-forward topology derived from Harvard's MoteLab deployment with four sources, 18 relays, and eight sinks."
    source_anchor_ids: [anchor-paper-22-scenarios, anchor-paper-22-evaluation]

  - id: paper-22-claims
    kind: claim_group
    parent_id: paper-22
    order: 5
    epistemic_status: empirically_supported_within_model
    title: "Principal findings"
    summary: "The reported gains are exact ILP optima for the modeled instances, not measurements from a deployed coded network."
    source_anchor_ids: [anchor-paper-22-evaluation]

  - id: paper-22-claim-random
    kind: claim
    parent_id: paper-22-claims
    order: 1
    epistemic_status: computational_experiment
    title: "Random-network coding gain"
    summary: "Across 100 generated networks, unrestricted coding gain averages 7.1%; increasing local group size from 10 to 11 adds at most 1.3 percentage points in the reported setting."
    source_anchor_ids: [anchor-paper-22-evaluation]

  - id: paper-22-claim-motelab
    kind: claim
    parent_id: paper-22-claims
    order: 2
    epistemic_status: computational_experiment
    title: "MoteLab-derived coding gain"
    summary: "The model yields 32 messages with coding versus 26 with routing at the unrestricted optimum (21.4% higher); raising group size from four to five contributes a reported 13.7% additional coding gain."
    source_anchor_ids: [anchor-paper-22-evaluation]

  - id: paper-22-claim-qos
    kind: claim
    parent_id: paper-22-claims
    order: 3
    epistemic_status: computational_experiment
    title: "Constraint feasibility"
    summary: "Under source constraints, network coding can make some modeled instances feasible when edge-disjoint routing cannot; with a 35% per-sink requirement, both methods become infeasible for the smallest groups."
    source_anchor_ids: [anchor-paper-22-evaluation]

  - id: paper-22-evidence
    kind: evidence_group
    parent_id: paper-22
    order: 6
    epistemic_status: documented
    title: "Evidence chain"
    summary: "Evidence consists of an explicit ILP, a named solver, generated-network parameters, a public-testbed-derived topology, reported confidence intervals, and comparative figures."
    source_anchor_ids: [anchor-paper-22-model, anchor-paper-22-evaluation]

  - id: paper-22-evidence-reproducibility
    kind: evidence
    parent_id: paper-22-evidence
    order: 1
    epistemic_status: reported_not_reproduced
    title: "Computational study"
    summary: "The paper identifies SCIP and generation distributions, but this audit found no checked-in model, random seeds, generated instances, or result files and did not rerun the optimization."
    source_anchor_ids: [anchor-paper-22-scenarios, anchor-paper-22-model]

  - id: paper-22-boundaries
    kind: limitation_group
    parent_id: paper-22
    order: 7
    epistemic_status: material
    title: "Boundaries and limitations"
    summary: "The conclusions are conditional on the graph, traffic, capacity, key-compromise proxy, coding model, and tested topology families."
    source_anchor_ids: [anchor-paper-22-model, anchor-paper-22-conclusion]

  - id: paper-22-boundary-model
    kind: limitation
    parent_id: paper-22-boundaries
    order: 1
    epistemic_status: model_limitation
    title: "Idealized network and threat model"
    summary: "The model omits mobility, wireless interference and loss, rekeying cost, key-distribution protocol failures, active attacks, and cryptographic overhead; unit link capacities and feed-forward structure simplify deployment reality."
    source_anchor_ids: [anchor-paper-22-model, anchor-paper-22-conclusion]

  - id: paper-22-boundary-evidence
    kind: limitation
    parent_id: paper-22-boundaries
    order: 2
    epistemic_status: evaluation_limitation
    title: "Optimization, not field measurement"
    summary: "The MoteLab case uses a derived connectivity map, and the paper reports solver outcomes rather than packet-level network-coding deployment measurements."
    source_anchor_ids: [anchor-paper-22-scenarios, anchor-paper-22-evaluation]

