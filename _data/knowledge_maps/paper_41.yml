editorial_summary: "This paper formalizes the requirement that an interruptible integrity computation correspond to an input state that actually existed at some point in time. It demonstrates attacks caused by inconsistent inputs and evaluates several enforcement mechanisms on commodity embedded platforms."

research_question: "How can an interruptible integrity computation be guaranteed to describe a system state that actually existed at one point in time?"
