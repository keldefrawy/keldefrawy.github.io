nodes:
  - id: paper-41
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: Temporal consistency for integrity computations
    summary: >-
      A definition, attack analysis, mechanism family, and two-platform evaluation for making long-running integrity computations over mutable embedded-system memory correspond to a real state.
    source_anchor_ids: [anchor-paper-41-problem]

  - id: paper-41-question
    kind: question
    parent_id: paper-41
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can integrity measurement remain interruptible for safety-critical work without producing a digest of a memory state that never existed?
    source_anchor_ids: [anchor-paper-41-problem, anchor-paper-41-model]

  - id: paper-41-answer
    kind: contribution
    parent_id: paper-41
    order: 2
    epistemic_status: source_asserted
    title: Central answer
    summary: Make the desired consistency time or interval explicit, then enforce it with memory locking, snapshot copying, or detection-and-recovery rather than assuming immutable input.
    source_anchor_ids: [anchor-paper-41-model, anchor-paper-41-locks, anchor-paper-41-detection]

  - id: paper-41-definition
    kind: definition
    parent_id: paper-41
    order: 3
    epistemic_status: defined
    title: Temporal consistency
    summary: >-
      For a sequential function F over memory M, the output must equal F evaluated on all of M at some relevant time, rather than on a patchwork assembled from values observed before and after interrupts.
    source_anchor_ids: [anchor-paper-41-model]

  - id: paper-41-threat
    kind: threat_model
    parent_id: paper-41
    order: 4
    epistemic_status: defined
    title: Mutable-memory and malware adversary
    summary: >-
      An interrupting process or self-relocating malware can modify already measured or not-yet-measured blocks; remote attestation adds the objective of returning a valid-looking report while evading detection.
    source_anchor_ids: [anchor-paper-41-problem, anchor-paper-41-game]

  - id: paper-41-scope
    kind: scope
    parent_id: paper-41
    order: 5
    epistemic_status: explicitly_scoped
    title: System and enforcement assumptions
    summary: >-
      The mechanisms assume enforceable page or region permissions, trustworthy measurement code and key handling, and a platform able to mediate writes; the implementation uses seL4 capabilities and page faults on two ARM boards.
    source_anchor_ids: [anchor-paper-41-implementation]

  - id: paper-41-mechanisms
    kind: method
    parent_id: paper-41
    order: 6
    epistemic_status: specified_and_implemented
    title: Consistency mechanism family
    summary: The paper maps different lock and copy schedules to different consistency points, availability costs, and memory overheads.
    source_anchor_ids: [anchor-paper-41-locks, anchor-paper-41-copy]

  - id: paper-41-mechanism-locks
    kind: scheme
    parent_id: paper-41-mechanisms
    order: 1
    epistemic_status: specified_and_implemented
    title: Locking variants
    summary: >-
      All-Lock freezes all input; Dec-Lock releases blocks after reading and gives start-time consistency; Inc-Lock locks blocks as read and gives end-time consistency. Extended variants hold locks longer to widen the guaranteed interval.
    source_anchor_ids: [anchor-paper-41-locks]

  - id: paper-41-mechanism-copy
    kind: scheme
    parent_id: paper-41-mechanisms
    order: 2
    epistemic_status: specified
    title: Copy-based variants
    summary: >-
      Cpy-Lock briefly locks while copying input into a stable buffer, then computes over the copy; writeback and lazy-copy variants change memory, pause, and storage tradeoffs.
    source_anchor_ids: [anchor-paper-41-copy]

  - id: paper-41-mechanism-detect
    kind: protocol
    parent_id: paper-41-mechanisms
    order: 3
    epistemic_status: implemented
    title: Detect and resolve inconsistency
    summary: >-
      Write-protect attested pages, catch a modifying process through fault IPC, suspend checksum computation, release affected memory, and choose to abort, restart, or continue while reporting the inconsistency.
    source_anchor_ids: [anchor-paper-41-detection, anchor-paper-41-evaluation]

  - id: paper-41-claims
    kind: claim_group
    parent_id: paper-41
    order: 7
    epistemic_status: mixed
    title: Principal claims
    summary: The work makes definitional, security-game, mechanism-correctness, and measured-overhead claims whose support types differ.
    source_anchor_ids: [anchor-paper-41-model, anchor-paper-41-game, anchor-paper-41-evaluation]

  - id: paper-41-claim-correctness
    kind: claim
    parent_id: paper-41-claims
    order: 1
    epistemic_status: analytically_supported
    title: Each mechanism realizes a stated consistency point
    summary: >-
      The lock/copy ordering arguments connect Dec-Lock to the start state, Inc-Lock to the end state, and full locking or stable copies to stronger intervals, conditional on enforcement and sequential access assumptions.
    source_anchor_ids: [anchor-paper-41-locks, anchor-paper-41-copy]

  - id: paper-41-claim-overhead
    kind: claim
    parent_id: paper-41-claims
    order: 2
    epistemic_status: experimentally_supported
    title: Practical overhead on tested platforms
    summary: >-
      The paper reports that selected consistency mechanisms add less than ten percent runtime overhead on I.MX6-SabreLite and ODROID-XU4, with availability behavior depending on page size, memory size, and write activity.
    source_anchor_ids: [anchor-paper-41-evaluation, anchor-paper-41-conclusion]

  - id: paper-41-evidence
    kind: evidence_group
    parent_id: paper-41
    order: 8
    epistemic_status: mixed_formal_and_empirical
    title: Evidence stack
    summary: >-
      Support consists of an explicit model and security game, mechanism-by-mechanism timing arguments, an seL4 implementation, primitive microbenchmarks, and end-to-end measurements over varying memory and page sizes.
    source_anchor_ids: [anchor-paper-41-game, anchor-paper-41-implementation, anchor-paper-41-evaluation]

  - id: paper-41-boundaries
    kind: limitation_group
    parent_id: paper-41
    order: 9
    epistemic_status: material
    title: Boundaries and tradeoffs
    summary: >-
      No mechanism simultaneously minimizes locking, storage, downtime, and detection latency. Guarantees depend on mediated memory writes, and results from two boards do not establish portability or independent reproduction.
    source_anchor_ids: [anchor-paper-41-copy, anchor-paper-41-detection, anchor-paper-41-conclusion]

  - id: paper-41-artifacts
    kind: artifact_group
    parent_id: paper-41
    order: 10
    epistemic_status: partial
    title: Artifacts and audit trail
    summary: The full paper and official record are public with local fixity; this audit did not locate a version-pinned implementation, benchmark scripts, raw data, or reproduction report.
    source_anchor_ids: [anchor-paper-41-implementation, anchor-paper-41-publication]

  - id: paper-41-scrutiny
