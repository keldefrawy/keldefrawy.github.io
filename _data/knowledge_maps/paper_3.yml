nodes:
  - id: paper-3
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "PEUC-WiN"
    summary: "A cooperative WLAN location-privacy protocol that rotates users through a shared address pool while a trusted proxy preserves their external transport connections."
    source_anchor_ids: [anchor-paper-3-problem, anchor-paper-3-publication]

  - id: paper-3-question
    kind: question
    parent_id: paper-3
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can identifier rotation reduce tracking by an untrusted access point without forcing repeated reassociation and TCP restart?"
    source_anchor_ids: [anchor-paper-3-problem]

  - id: paper-3-answer
    kind: contribution
    parent_id: paper-3
    order: 2
    epistemic_status: proposed_and_simulated
    title: "Central answer"
    summary: "Coordinate simultaneous IP/MAC permutations within an anonymity group and terminate stable external connections at a Privacy Enhancer that remaps traffic after every rotation."
    source_anchor_ids: [anchor-paper-3-protocol, anchor-paper-3-results]

  - id: paper-3-scope
    kind: scope
    parent_id: paper-3
    order: 3
    epistemic_status: explicitly_scoped
    title: "Threat model and trust assumptions"
    summary: "Users registered at one malicious access point cooperate with a trusted Privacy Enhancer; the access point can observe all group traffic, while upper-layer payloads and control messages rely on public-key, signature, group-key, and IPsec protection."
    source_anchor_ids: [anchor-paper-3-model, anchor-paper-3-security]

  - id: paper-3-scope-anonymity
    kind: assumption
    parent_id: paper-3-scope
    order: 1
    epistemic_status: necessary_condition
    title: "Anonymity-set condition"
    summary: "Privacy requires more than one participating user; the anonymity level grows with group cardinality, while shorter rotation slots reduce tracking time at the cost of more switching overhead."
    source_anchor_ids: [anchor-paper-3-model, anchor-paper-3-security]

  - id: paper-3-protocol
    kind: protocol
    parent_id: paper-3
    order: 4
    epistemic_status: specified
    title: "Cooperative address-rotation protocol"
    summary: "The protocol maintains group membership, distributes an address table and hash-chain seed, synchronizes rotations, and maps each user to a collision-free address pair for each variable-length time slot."
    source_anchor_ids: [anchor-paper-3-protocol]

  - id: paper-3-protocol-control
    kind: component
    parent_id: paper-3-protocol
    order: 1
    epistemic_status: specified
    title: "Membership and synchronization"
    summary: "Signed and encrypted join/leave messages let the Privacy Enhancer update group size, address table, seed, and time base; timers handle departures that are not explicitly announced."
    source_anchor_ids: [anchor-paper-3-protocol]

  - id: paper-3-protocol-rotation
    kind: component
    parent_id: paper-3-protocol
    order: 2
    epistemic_status: specified
    title: "Address permutation"
    summary: "All members derive the same time-slot hash value and use offset indices to permute the table of active IP/MAC pairs without collisions; a hash-derived variable slot length counters fixed-period timing correlation."
    source_anchor_ids: [anchor-paper-3-protocol]

  - id: paper-3-protocol-proxy
    kind: component
    parent_id: paper-3-protocol
    order: 3
    epistemic_status: specified
    title: "Privacy Enhancer proxy"
    summary: "The proxy exposes a stable permanent address to correspondent nodes, tracks both legs of each connection, and adjusts IP addresses, sequence numbers, acknowledgments, and windows as users exchange address pairs."
    source_anchor_ids: [anchor-paper-3-protocol]

  - id: paper-3-claims
    kind: claim_group
    parent_id: paper-3
    order: 5
    epistemic_status: mixed
    title: "Principal claims"
    summary: "The paper gives an informal privacy analysis and simulation evidence about throughput disruption; it does not provide a formal security proof."
    source_anchor_ids: [anchor-paper-3-security, anchor-paper-3-results]

  - id: paper-3-claim-privacy
    kind: claim
    parent_id: paper-3-claims
    order: 1
    epistemic_status: informally_argued
    title: "Upper-layer tracking resistance"
    summary: "Against an observer limited to layer 2 and above, synchronized address permutation prevents straightforward identifier linkage, conditional on encrypted communications, uncompromised group secrets, and the stated registration assumptions."
    source_anchor_ids: [anchor-paper-3-security]

  - id: paper-3-claim-disruption
    kind: claim
    parent_id: paper-3-claims
    order: 2
    epistemic_status: simulation_supported
    title: "Lower disruption than reassociation"
    summary: "The NC-TUns comparison reports that PEUC-WiN retains TCP connections across address changes and therefore avoids the repeated handshakes, slow starts, and longer outages of reassociation-based rotation."
    source_anchor_ids: [anchor-paper-3-performance, anchor-paper-3-results]

  - id: paper-3-evidence
    kind: evidence_group
    parent_id: paper-3
    order: 6
    epistemic_status: simulation_and_measurement
    title: "Evidence"
    summary: "The authors measured interface-switch time on Linux laptops and simulated five cooperative users, two correspondent-path delay regimes, and comparative TCP throughput in NC-TUns 3.0."
    source_anchor_ids: [anchor-paper-3-performance, anchor-paper-3-results]

  - id: paper-3-boundaries
    kind: limitation_group
    parent_id: paper-3
    order: 7
    epistemic_status: material
    title: "Trusted boundary and limitations"
    summary: "The design depends on a trusted, available proxy and group secrets, excludes physical-layer tracking, and was simulated because commodity Wi-Fi drivers did not expose sequence-number control needed for implementation."
    source_anchor_ids: [anchor-paper-3-security, anchor-paper-3-performance]

  - id: paper-3-boundary-compromise
    kind: limitation
    parent_id: paper-3-boundaries
    order: 1
    epistemic_status: explicitly_vulnerable
    title: "Member compromise and former-member leakage"
    summary: "A malicious member that joins or is compromised learns the address schedule and can track members; forward-secure group-key refresh is suggested but left out of scope."
    source_anchor_ids: [anchor-paper-3-security]

  - id: paper-3-boundary-traffic
    kind: limitation
    parent_id: paper-3-boundaries
    order: 2
    epistemic_status: unresolved
    title: "Traffic analysis and proxy bottleneck"
    summary: "The proxy address can reveal group affiliation, triangular routing can degrade throughput, and the proxy is a bottleneck and single point of failure unless replicated."
    source_anchor_ids: [anchor-paper-3-security, anchor-paper-3-performance]

  - id: paper-3-artifacts
    kind: artifact
    parent_id: paper-3
    order: 8
    epistemic_status: paper_available_no_code
    title: "Artifacts"
    summary: "A fixed local copy of the archived author manuscript is available; no simulator configuration, code, packet traces, or implementation artifact was located."
    source_anchor_ids: [anchor-paper-3-archive, anchor-paper-3-performance]

  - id: paper-3-scrutiny
    kind: scrutiny
    parent_id: paper-3
    order: 9
    epistemic_status: peer_reviewed
    title: "Scrutiny and lineage"
    summary: "The protocol appeared at NPSec 2006 and contrasts its transport continuity with earlier disposable-identifier and silent-period proposals; no independent reproduction or later adversarial analysis was located."
    source_anchor_ids: [anchor-paper-3-problem, anchor-paper-3-publication]

