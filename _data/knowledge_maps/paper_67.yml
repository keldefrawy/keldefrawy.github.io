nodes:
  - id: paper-67
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_with_material_followup_critique
    title: Optimized formally verified LPZK
    summary: >-
      An optimization and proof-engineering paper for LPZK whose reported performance gains are accompanied by EasyCrypt verification; later peer-reviewed scrutiny found that the security model and extracted verifier did not establish the claimed end-to-end security.
    source_anchor_ids: [anchor-paper-67-problem, anchor-paper-67-critique-overview]

  - id: paper-67-question
    kind: question
    parent_id: paper-67
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can data-structure and parallelism changes close the performance gap between formally extracted and hand-written LPZK implementations without changing security-relevant behavior?
    source_anchor_ids: [anchor-paper-67-problem]

  - id: paper-67-answer-original
    kind: contribution
    parent_id: paper-67
    order: 2
    epistemic_status: partially_supported_and_materially_qualified
    title: Original answer, now qualified
    summary: >-
      The paper answers yes by verifying transformations and extracting optimized OCaml that approaches the manual implementation. The speed result is documented, but the later audit shows that the formal development's security specification and extraction boundary were insufficient to justify the original high-assurance conclusion.
    source_anchor_ids: [anchor-paper-67-problem, anchor-paper-67-performance, anchor-paper-67-critique-security, anchor-paper-67-critique-extraction]

  - id: paper-67-model
    kind: model
    parent_id: paper-67
    order: 3
    epistemic_status: defined_but_later_found_defective
    title: LPZK proof and extraction boundary
    summary: EasyCrypt models protocol procedures and security games, proves transformations relative to those models, and extracts selected procedures to OCaml; assurance is therefore only as strong as the modeled properties and the faithfulness of the extraction boundary.
    source_anchor_ids: [anchor-paper-67-baseline, anchor-paper-67-critique-overview]

  - id: paper-67-methods
    kind: algorithm
    parent_id: paper-67
    order: 4
    epistemic_status: implemented_and_verified_relative_to_model
    title: Optimization family
    summary: The work develops four related variants that alter traversal, memory representation, and execution parallelism while proving equivalence obligations in EasyCrypt.
    source_anchor_ids: [anchor-paper-67-list-sequential, anchor-paper-67-list-parallel, anchor-paper-67-array]

  - id: paper-67-method-ls
    kind: algorithm
    parent_id: paper-67-methods
    order: 1
    epistemic_status: implemented
    title: List-sequential variant
    summary: The list-sequential transformation restructures verifier-side computation to reduce repeated circuit or list traversal while retaining a sequential list representation.
    source_anchor_ids: [anchor-paper-67-list-sequential]

  - id: paper-67-method-lp
    kind: algorithm
    parent_id: paper-67-methods
    order: 2
    epistemic_status: implemented
    title: List-parallel variant
    summary: A generic split-compute-aggregate framework and parallel RAM wrappers distribute independent work across an arbitrary number of cores, subject to user-proved decomposition and aggregation conditions.
    source_anchor_ids: [anchor-paper-67-list-parallel]

  - id: paper-67-method-array
    kind: algorithm
    parent_id: paper-67-methods
    order: 3
    epistemic_status: implemented
    title: Array-sequential and array-parallel variants
    summary: Replacing linked-list access with arrays improves locality and supports both sequential and parallel extracted implementations.
    source_anchor_ids: [anchor-paper-67-array]

  - id: paper-67-claims
    kind: claim_group
    parent_id: paper-67
    order: 5
    epistemic_status: mixed_after_followup
    title: Claims and present evidence status
    summary: Performance and transformation claims must be evaluated separately from soundness, zero-knowledge, and end-to-end assurance claims.
    source_anchor_ids: [anchor-paper-67-performance, anchor-paper-67-critique-overview]

  - id: paper-67-claim-performance
    kind: claim
    parent_id: paper-67-claims
    order: 1
    epistemic_status: experimentally_supported
    title: Large performance improvement
    summary: The evaluation reports speedups reaching roughly 3,000x over the prior extracted baseline and performance close to the hand-written LPZK implementation for the measured configurations.
    source_anchor_ids: [anchor-paper-67-performance]

  - id: paper-67-claim-security-original
    kind: claim
    parent_id: paper-67-claims
    order: 2
    epistemic_status: contradicted_by_later_analysis
    title: Original high-assurance security conclusion
    summary: The original paper presents the optimized extracted protocol as retaining verified LPZK security; the 2025 analysis gives attacks and model gaps showing that this conclusion is not established by the represented formal development.
    source_anchor_ids: [anchor-paper-67-original-conclusion, anchor-paper-67-critique-security, anchor-paper-67-critique-extraction]

  - id: paper-67-evidence
    kind: evidence_group
    parent_id: paper-67
    order: 6
    epistemic_status: mixed
    title: Evidence layers
    summary: EasyCrypt proofs support properties of the encoded programs and games, extracted-code benchmarks support performance, and the public repository supports inspection; later adversarial analysis tests whether those layers capture the intended cryptographic guarantees.
    source_anchor_ids: [anchor-paper-67-baseline, anchor-paper-67-performance, anchor-paper-67-code, anchor-paper-67-critique-overview]

  - id: paper-67-followup
    kind: scrutiny
    parent_id: paper-67
    order: 7
    epistemic_status: independent_peer_reviewed_critique
    title: 2025 independent security re-analysis
    summary: The follow-up paper audits the proof models and implementation boundary and reports multiple security-critical discrepancies, making it essential context for interpreting the 2023 claims.
    source_anchor_ids: [anchor-paper-67-critique-overview]

  - id: paper-67-followup-soundness
    kind: counterevidence
    parent_id: paper-67-followup
    order: 1
    epistemic_status: demonstrated_attack
    title: Soundness model permits false statements
    summary: The re-analysis reports that the EasyCrypt soundness model and proof are incorrect and supplies an attack under which the verifier can accept a false statement.
    source_anchor_ids: [anchor-paper-67-critique-security]

  - id: paper-67-followup-zk
    kind: counterevidence
    parent_id: paper-67-followup
    order: 2
    epistemic_status: demonstrated_model_failure
    title: Zero-knowledge model is deficient
    summary: The re-analysis finds that the modeled zero-knowledge property does not exclude a verifier recovering the witness and also identifies a gap in the underlying pen-and-paper perfect-zero-knowledge argument under the analyzed interpretation.
    source_anchor_ids: [anchor-paper-67-critique-security]

  - id: paper-67-followup-extraction
    kind: counterevidence
    parent_id: paper-67-followup
    order: 3
    epistemic_status: implementation_gap
    title: Randomness generation crosses the extraction boundary incorrectly
    summary: The extracted verifier combines randomness generation with verified logic in a way the re-analysis identifies as inconsistent with the proved model, so proof-to-code correspondence is not end-to-end.
    source_anchor_ids: [anchor-paper-67-critique-extraction]

  - id: paper-67-boundaries
    kind: limitation_group
    parent_id: paper-67
    order: 8
    epistemic_status: materially_revised_by_followup
    title: Present boundaries
    summary: Formal verification establishes only a specified model and implementation boundary; it does not automatically validate the cryptographic definition, environmental assumptions, randomness interface, or extracted system.
    source_anchor_ids: [anchor-paper-67-critique-overview, anchor-paper-67-critique-extraction]

  - id: paper-67-boundary-performance
    kind: limitation
    parent_id: paper-67-boundaries
    order: 1
    epistemic_status: evidence_separation
    title: Performance does not repair security
    summary: The reported speedups can remain accurate even though the security model is deficient; conversely, the later attacks do not by themselves show that every program transformation or timing measurement is wrong.
    source_anchor_ids: [anchor-paper-67-performance, anchor-paper-67-critique-overview]

  - id: paper-67-resources
    kind: artifact_group
    parent_id: paper-67
    order: 9
    epistemic_status: public_artifacts_available
    title: Auditable resources
    summary: The IACR manuscript, public EasyCrypt and implementation repository, official CCS record, and peer-reviewed 2025 audit together make the claim history unusually inspectable.
    source_anchor_ids: [anchor-paper-67-problem, anchor-paper-67-code, anchor-paper-67-publication, anchor-paper-67-critique-overview]

  - id: paper-67-lineage
    kind: lineage
    parent_id: paper-67
    order: 10
    epistemic_status: documented_and_revised
    title: Scientific lineage
    summary: The work optimizes an earlier LPZK formalization; the 2025 paper is a direct technical reassessment that changes the warranted interpretation of its security contribution and records lessons for future high-assurance cryptography.
    source_anchor_ids: [anchor-paper-67-baseline, anchor-paper-67-critique-overview]

