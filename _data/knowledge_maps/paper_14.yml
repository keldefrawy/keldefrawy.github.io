    title: "Artifacts"
    summary: "Public author and archive full texts are available and the simulation model is documented, but no source-code repository, raw traces, or immutable local paper copy is attached to this map."
    source_anchor_ids: [anchor-paper-14-limitations, anchor-paper-14-anonymity]

