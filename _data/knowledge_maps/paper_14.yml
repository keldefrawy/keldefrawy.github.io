nodes:
  - id: paper-14
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "ALARM"
    summary: "A privacy-preserving link-state protocol that authenticates geographic topology without exposing durable node identities."
    source_anchor_ids: [anchor-paper-14-question]

  - id: paper-14-question
    kind: question
    parent_id: paper-14
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can nodes route using exact current locations while preventing outsiders and insiders from binding topology updates into durable identity and movement histories?"
    source_anchor_ids: [anchor-paper-14-question]

  - id: paper-14-answer
    kind: contribution
    parent_id: paper-14
    order: 2
    epistemic_status: analytically_and_empirically_supported
    title: "Central answer"
    summary: "Flood signed, time-bounded location announcements under unlinkable group signatures, build a current geographic map, and communicate to locations rather than long-term identifiers."
    source_anchor_ids: [anchor-paper-14-protocol, anchor-paper-14-security, anchor-paper-14-anonymity]

  - id: paper-14-scope
    kind: scope
    parent_id: paper-14
    order: 3
    epistemic_status: explicitly_scoped
    title: "System and trust model"
    summary: "Nodes have a reliable current location, loose synchronized time, sufficient radio reach, and credentials from a group manager; mobility supplies anonymity over time."
    source_anchor_ids: [anchor-paper-14-model, anchor-paper-14-privacy]

  - id: paper-14-adversary
    kind: threat_model
    parent_id: paper-14-scope
    order: 1
    epistemic_status: defined
    title: "Adversary classes"
    summary: "The base design analyzes passive insiders and active outsiders; active insiders can perform location fraud or Sybil behavior unless stronger signing/location mechanisms are added. Jamming and generic denial of service are excluded."
    source_anchor_ids: [anchor-paper-14-model, anchor-paper-14-security]

  - id: paper-14-primitive
    kind: primitive
    parent_id: paper-14
    order: 4
    epistemic_status: assumed_cryptographic_primitive
    title: "Group-signature pseudonyms"
    summary: "A node proves authorized membership without revealing which member signed; each announcement's signature functions as a period-specific pseudonym, while a group manager retains opening capability."
    source_anchor_ids: [anchor-paper-14-privacy]

  - id: paper-14-protocol
    kind: protocol
    parent_id: paper-14
    order: 5
    epistemic_status: proposed
    title: "Location Announcement Message workflow"
    summary: "During each time slot, every node floods its location, timestamp, temporary public key, and group signature; recipients verify and assemble a topology snapshot used for location-centric routing and encrypted sessions."
    source_anchor_ids: [anchor-paper-14-protocol]

  - id: paper-14-claim-outsider
    kind: security_claim
    parent_id: paper-14
    order: 6
    epistemic_status: conditional_analysis
    title: "Replay and forgery resistance"
    summary: "Timestamps reject stale announcements and signatures bind location records against outsider forgery or modification, assuming the underlying primitives and time/location inputs behave as specified."
    source_anchor_ids: [anchor-paper-14-security]

  - id: paper-14-claim-privacy
    kind: privacy_claim
    parent_id: paper-14
    order: 7
    epistemic_status: conditional_analysis
    title: "Tracking resistance"
    summary: "A passive insider sees the complete current topology but cannot directly link group signatures across periods; anonymity then depends on how many plausible moving nodes fit a trajectory."
    source_anchor_ids: [anchor-paper-14-security, anchor-paper-14-anonymity]

  - id: paper-14-evidence-anonymity
    kind: empirical_evidence
    parent_id: paper-14
    order: 8
    epistemic_status: simulation
    title: "Mobility and anonymity evaluation"
    summary: "SimPy experiments over Random Walk, Reference Point Group Mobility, and Time-Variant User Mobility models evaluate cumulative k-anonymity as speed, stationary fraction, announcement interval, and observation duration vary."
    source_anchor_ids: [anchor-paper-14-anonymity]

  - id: paper-14-evidence-performance
    kind: analytic_evidence
    parent_id: paper-14
    order: 9
    epistemic_status: modeled
    title: "Communication overhead"
    summary: "The paper accounts for periodic flooding, announcement size, bandwidth, and update interval to characterize scalability; this is model/simulation evidence rather than a deployed MANET measurement."
    source_anchor_ids: [anchor-paper-14-performance]

  - id: paper-14-boundary-insider
    kind: limitation
    parent_id: paper-14
    order: 10
    epistemic_status: material
    title: "Active-insider boundary"
    summary: "Generic group signatures do not stop a credentialed node from lying about its position or creating multiple simultaneous-looking locations; the proposed mitigations rely on self-distinguishing signatures or tamper-resistant GPS/signing hardware."
    source_anchor_ids: [anchor-paper-14-security, anchor-paper-14-limitations]

  - id: paper-14-limitations
    kind: limitation_group
    parent_id: paper-14
    order: 11
    epistemic_status: explicitly_reported
    title: "Privacy and deployment limits"
    summary: "ALARM intentionally reveals the full current topology to insiders, trusts a group manager plus location and time sources, gains privacy from mobility, and does not solve jamming, denial of service, or physical tracking."
    source_anchor_ids: [anchor-paper-14-model, anchor-paper-14-security, anchor-paper-14-limitations]

  - id: paper-14-artifacts
    kind: artifact_group
    parent_id: paper-14
    order: 12
