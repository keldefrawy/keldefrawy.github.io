nodes:
  - id: paper-56
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Optimizing Registration Based Encryption"
    summary: >-
      An optimized RBE scheme using authenticated crit-bit trees and a public-parameter tradeoff to reduce the concrete cost of garbled public-key operations.
    source_anchor_ids: [anchor-paper-56-problem]

  - id: paper-56-question
    kind: question
    parent_id: paper-56
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can RBE's attractive asymptotics be retained while shrinking ciphertext and decryption costs enough to move toward practice?
    source_anchor_ids: [anchor-paper-56-problem]

  - id: paper-56-answer
    kind: contribution
    parent_id: paper-56
    order: 2
    epistemic_status: construction_and_estimate
    title: Central answer
    summary: >-
      Compress authenticated tree paths with crit-bit nodes, then optionally disclose a square-root-sized set of identities so encryption traverses fewer snapshots; both changes reduce the number of costly public-key operations inside garbled circuits.
    source_anchor_ids: [anchor-paper-56-critbit, anchor-paper-56-cost, anchor-paper-56-larger-pp]

  - id: paper-56-scope
    kind: scope
    parent_id: paper-56
    order: 3
    epistemic_status: defined
    title: RBE model
    summary: >-
      Users generate their own keys; a key curator holds no secret and maintains registrations, auxiliary state, and short public parameters; an encryptor uses recipient identity plus public parameters, and a decryptor combines its secret key with periodically updated supporting information.
    source_anchor_ids: [anchor-paper-56-model]

  - id: paper-56-scope-security
    kind: threat_model
    parent_id: paper-56-scope
    order: 1
    epistemic_status: explicitly_scoped
    title: Message-hiding, not chosen-ciphertext security
    summary: >-
      The proof targets the standard RBE message-hiding definition used by prior work and does not provide a decryption oracle; active chosen-ciphertext security remains open.
    source_anchor_ids: [anchor-paper-56-model, anchor-paper-56-boundaries]

  - id: paper-56-scheme
    kind: scheme
    parent_id: paper-56
    order: 4
    epistemic_status: specified
    title: Crit-bit-tree RBE
    summary: >-
      Authenticated crit-bit trees replace balanced Merkle trees in snapshot-based registration. Each internal node stores a critical bit and two hash pointers, shortening the garbled input while preserving searchable authenticated paths.
    source_anchor_ids: [anchor-paper-56-critbit, anchor-paper-56-construction]

  - id: paper-56-scheme-security
    kind: claim
    parent_id: paper-56-scheme
    order: 1
    epistemic_status: proved_under_assumptions
    title: Standard RBE security
    summary: >-
      A single-user argument combines hash-garbling simulation with semantic PKE security; the general theorem replaces path programs through hybrids and concludes message-hiding for the crit-bit construction.
    source_anchor_ids: [anchor-paper-56-assumptions, anchor-paper-56-security]

  - id: paper-56-scheme-compact
    kind: claim
    parent_id: paper-56-scheme
    order: 2
    epistemic_status: analytical_estimate
    title: Compact-parameter reduction
    summary: >-
      For the paper's two-billion-user, 256-bit example, shorter tree nodes are estimated to reduce encryptor public-key operations and ciphertext size by about 15 percent and decryptor work by about 30 percent on average.
    source_anchor_ids: [anchor-paper-56-cost]

  - id: paper-56-scheme-largepp
    kind: method
    parent_id: paper-56
    order: 5
    epistemic_status: specified_tradeoff
    title: Larger public parameter
    summary: >-
      Publishing membership information for a square-root-sized minority of snapshot users lets encryption ignore roughly half the trees. A cuckoo filter is proposed to represent that set compactly.
    source_anchor_ids: [anchor-paper-56-larger-pp]

  - id: paper-56-claim-combined
    kind: claim
    parent_id: paper-56-scheme-largepp
    order: 1
    epistemic_status: analytical_estimate
    title: 57.5 percent combined ciphertext reduction
    summary: >-
      Combining the 15 percent crit-bit reduction with a further one-half encryptor reduction yields the stated 57.5 percent decrease; the larger-parameter example adds about 187 KB for two billion users.
    source_anchor_ids: [anchor-paper-56-problem, anchor-paper-56-larger-pp]

  - id: paper-56-evidence
    kind: evidence_group
    parent_id: paper-56
    order: 6
    epistemic_status: formal_and_analytical
    title: Evidence boundary
    summary: >-
      Security is supported by definitions and hybrid proofs, while performance is supported by operation counts and asymptotic tree-depth facts. The paper does not implement or benchmark an RBE system.
    source_anchor_ids: [anchor-paper-56-security, anchor-paper-56-cost]

  - id: paper-56-verifiability
    kind: claim
    parent_id: paper-56
    order: 7
    epistemic_status: argued_not_fully_proved
    title: Verifiable registration compatibility
    summary: >-
      Adjacent authenticated paths support non-membership and unique-membership proof sketches, but the paper explicitly does not provide the full verification algorithm or prove its soundness and completeness.
    source_anchor_ids: [anchor-paper-56-verifiability]

  - id: paper-56-boundaries
    kind: limitation_group
    parent_id: paper-56
    order: 8
    epistemic_status: material
    title: Limitations
    summary: >-
      The optimized ciphertext remains extremely large in the motivating regime, performance is estimated rather than measured, chosen-ciphertext security is absent, the verifiability extension is incomplete, and the second optimization weakens public-parameter compactness from polylogarithmic in users to square-root dependence.
    source_anchor_ids: [anchor-paper-56-problem, anchor-paper-56-boundaries]

  - id: paper-56-resources
    kind: artifact_group
    parent_id: paper-56
    order: 9
    epistemic_status: full_text_available
    title: Publication resources
    summary: >-
      The IACR archive, author-uploaded full text, and official DOI make the construction and proofs inspectable. No implementation or benchmark artifact is represented.
    source_anchor_ids: [anchor-paper-56-problem, anchor-paper-56-publication]

  - id: paper-56-scrutiny
    kind: scrutiny
    parent_id: paper-56
    order: 10
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The paper appeared at IMACC 2021. Review reports and independent implementation or proof audits are not linked.
    source_anchor_ids: [anchor-paper-56-publication]

  - id: paper-56-lineage
    kind: lineage
    parent_id: paper-56
    order: 11
    epistemic_status: documented
    title: Optimization of prior RBE blueprints
    summary: >-
      The work retains the hash-garbling and snapshot approach of earlier RBE and verifiable-RBE constructions while changing authenticated data structures and the public-parameter tradeoff.
    source_anchor_ids: [anchor-paper-56-problem, anchor-paper-56-construction]

