nodes:
  - id: paper-17
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "SMART"
    summary: "A minimal hardware/software root-of-trust primitive for low-end microcontrollers, accompanied by two modified MCU designs and synthesis results."
    source_anchor_ids: [anchor-paper-17-question]

  - id: paper-17-question
    kind: question
    parent_id: paper-17
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can remote attestation and controlled execution be made robust to fully compromised software without adding a separate security coprocessor?"
    source_anchor_ids: [anchor-paper-17-question]

  - id: paper-17-answer
    kind: contribution
    parent_id: paper-17
    order: 2
    epistemic_status: implemented_and_analytically_supported
    title: "Central answer"
    summary: "Combine immutable attestation software and secret storage with a small hardware monitor that constrains key access, legal entry and exit, interrupts, DMA, and reset behavior."
    source_anchor_ids: [anchor-paper-17-protocol, anchor-paper-17-hardware]

  - id: paper-17-goals
    kind: scope
    parent_id: paper-17
    order: 3
    epistemic_status: explicitly_scoped
    title: "Security objectives"
    summary: "SMART targets prover authentication, external verification of an arbitrary memory interval, and optional guaranteed execution of a verifier-selected routine."
    source_anchor_ids: [anchor-paper-17-goals]

  - id: paper-17-adversary
    kind: threat_model
    parent_id: paper-17-goals
    order: 1
    epistemic_status: defined
    title: "Software adversary"
    summary: "The attacker controls all mutable software, memory, and communications and may coordinate multiple devices, but cannot modify ROM or hardware, extract the protected key, or use physical, fault, or side-channel attacks."
    source_anchor_ids: [anchor-paper-17-adversary, anchor-paper-17-limitations]

  - id: paper-17-assumptions
    kind: assumption_group
    parent_id: paper-17-goals
    order: 2
    epistemic_status: assumed
    title: "Provisioning and platform assumptions"
    summary: "Prover and verifier share a secret provisioned outside the protocol; DMA is disabled during trusted execution, reset and memory erasure work as specified, and the MCU exposes enforceable program-counter and memory-access signals."
    source_anchor_ids: [anchor-paper-17-goals, anchor-paper-17-hardware]

  - id: paper-17-primitive
    kind: primitive
    parent_id: paper-17
    order: 4
    epistemic_status: implemented
    title: "Dynamic root-of-trust primitive"
    summary: "A verifier sends a nonce, memory bounds, code address, and execution flag; ROM code authenticates the request and memory with a shared-key MAC, erases sensitive state, and optionally transfers control atomically to selected code."
    source_anchor_ids: [anchor-paper-17-protocol]

  - id: paper-17-hardware
    kind: architecture
    parent_id: paper-17
    order: 5
    epistemic_status: implemented
    title: "Hardware enforcement"
    summary: "Program-counter-gated key access, restricted ROM entry and exit, interrupt suppression, memory-access checks, and reset-on-violation prevent untrusted code from reusing the key or splicing trusted execution."
    source_anchor_ids: [anchor-paper-17-hardware]

  - id: paper-17-security
    kind: security_argument
    parent_id: paper-17
    order: 6
    epistemic_status: informal_conditional_argument
    title: "Security analysis"
    summary: "Assertions A1-A11 connect hardware behavior, key isolation, atomic execution, and memory erasure to the three objectives. The paper explicitly presents this as an informal analysis, not a formal proof."
    source_anchor_ids: [anchor-paper-17-security]

  - id: paper-17-applications
    kind: application_group
    parent_id: paper-17
    order: 7
    epistemic_status: protocol_sketches
    title: "Derived uses"
    summary: "The paper sketches memory attestation, proof of reset, attested sensor readings, and authenticated key establishment as protocols composed from the SMART primitive."
    source_anchor_ids: [anchor-paper-17-applications]

  - id: paper-17-implementation
    kind: implementation
    parent_id: paper-17
    order: 8
    epistemic_status: implemented
    title: "Two MCU realizations"
    summary: "Open-source AVR and MSP430 cores are modified with fewer than 200 lines of HDL changes, and the trusted ROM routine is roughly 500 C lines compiled into 4-6 KB."
    source_anchor_ids: [anchor-paper-17-implementation, anchor-paper-17-evaluation]

  - id: paper-17-evidence-runtime
    kind: empirical_evidence
    parent_id: paper-17
    order: 9
    epistemic_status: measured_in_simulation
    title: "Attestation runtime"
    summary: "At 8 MHz, reported HMAC-based times are about 48 ms for 32 bytes, 160 ms for 512 bytes, and 287 ms for 1 KB, making protected-memory size a primary runtime factor."
    source_anchor_ids: [anchor-paper-17-evaluation]

  - id: paper-17-evidence-area
    kind: empirical_evidence
    parent_id: paper-17
    order: 10
    epistemic_status: synthesized
    title: "Hardware overhead"
    summary: "A 180 nm synthesis reports roughly 10% whole-MCU area overhead for both platforms; isolating core-logic changes gives about 2.6% for AVR and 9.2% for MSP430, with memory-access control dominating."
    source_anchor_ids: [anchor-paper-17-evaluation]

  - id: paper-17-limitations
    kind: limitation_group
    parent_id: paper-17
    order: 11
    epistemic_status: explicitly_reported
    title: "Proof and deployment boundaries"
    summary: "The chips were simulated and synthesized rather than fabricated, HMAC cost can be material, physical attacks are excluded, and full formal verification plus broader experiments are identified as future work."
    source_anchor_ids: [anchor-paper-17-limitations]

  - id: paper-17-artifacts
    kind: artifact_group
    parent_id: paper-17
    order: 12
    epistemic_status: implementation_described_not_released
    title: "Artifacts"
    summary: "The paper describes modified HDL cores, C code, synthesis tooling, and benchmarks, but this audit did not locate a public SMART source repository or immutable implementation bundle."
    source_anchor_ids: [anchor-paper-17-implementation, anchor-paper-17-evaluation]

  - id: paper-17-scrutiny
    kind: scrutiny
    parent_id: paper-17
    order: 13
    epistemic_status: venue_reviewed_and_followed_on
    title: "External scrutiny and reception"
    summary: "SMART appeared at NDSS, is explicitly treated as a precursor by later verified-attestation work, and ResearchGate reports 395 citations; review reports and a direct independent reproduction were not audited."
    source_anchor_ids: [anchor-paper-17-publication, anchor-paper-17-lineage, anchor-paper-17-citations]

  - id: paper-17-lineage
