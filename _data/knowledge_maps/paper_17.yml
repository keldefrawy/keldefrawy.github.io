    title: "Path to formally verified attestation"
    summary: "VRASED later retains SMART's minimal hybrid architecture while formalizing properties and model-checking the hardware enforcement path, directly addressing SMART's stated verification gap."
    source_anchor_ids: [anchor-paper-17-limitations, anchor-paper-17-lineage]

