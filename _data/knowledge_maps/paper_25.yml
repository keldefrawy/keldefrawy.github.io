nodes:
  - id: paper-25
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "How to Withstand Mobile Virus Attacks, Revisited"
    summary: "A proactive MPC construction that refreshes computation state against mobile corruption using packed proactive secret sharing and communication-efficient redistribution."
    source_anchor_ids: [anchor-paper-25-problem]

  - id: paper-25-question
    kind: question
    parent_id: paper-25
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can the communication improvements of stationary-fault MPC survive a model in which an adversary eventually corrupts every party, subject only to a per-stage rate bound?"
    source_anchor_ids: [anchor-paper-25-problem]

  - id: paper-25-answer
    kind: contribution
    parent_id: paper-25
    order: 2
    epistemic_status: source_asserted
    title: "Central answer"
    summary: "Pack Θ(n) secrets into polynomial sharings, refresh and restore them with hyper-invertible-matrix checks, and evaluate a transformed circuit layer by layer with redistribution after every layer."
    source_anchor_ids: [anchor-paper-25-redistribution, anchor-paper-25-pmpc]

  - id: paper-25-scope
    kind: scope
    parent_id: paper-25
    order: 3
    epistemic_status: defined
    title: "Proactive execution model"
    summary: "Parties communicate synchronously over perfectly secure point-to-point channels and broadcast, erase old state, and alternate operation with refreshment stages."
    source_anchor_ids: [anchor-paper-25-model, anchor-paper-25-uc-definition]

  - id: paper-25-scope-adversary
    kind: threat_model
    parent_id: paper-25-scope
    order: 1
    epistemic_status: defined
    title: "Active adaptive mobile adversary"
    summary: "The adversary may adaptively corrupt different parties over time, but at most the stated threshold per stage; a party corrupted during a refresh counts in both adjacent stages."
    source_anchor_ids: [anchor-paper-25-model, anchor-paper-25-uc-definition]

  - id: paper-25-scope-recovery
    kind: assumption
    parent_id: paper-25-scope
    order: 2
    epistemic_status: assumed
    title: "Reboot and erasure assumptions"
    summary: "Corrupted parties can be rebooted to a pristine state with global computation information and secure-channel access, and honest-period randomness and erased state remain unrecoverable; selecting whom to reboot is outside the protocol."
    source_anchor_ids: [anchor-paper-25-problem, anchor-paper-25-model]

  - id: paper-25-method
    kind: method
    parent_id: paper-25
    order: 4
    epistemic_status: specified
    title: "Construction stack"
    summary: "The protocol composes packed sharing, proactive redistribution, circuit normalization and permutation, per-layer arithmetic, and party virtualization."
    source_anchor_ids: [anchor-paper-25-redistribution, anchor-paper-25-pmpc, anchor-paper-25-virtualization]

  - id: paper-25-method-ppss
    kind: component
    parent_id: paper-25-method
    order: 1
    epistemic_status: specified_and_proved
    title: "Packed proactive secret sharing"
    summary: "Multiple secrets occupy evaluation points of one polynomial; random masking polynomials and hyper-invertible matrices amortize refresh and checking to O(1) communication per secret."
    source_anchor_ids: [anchor-paper-25-problem, anchor-paper-25-redistribution]

  - id: paper-25-method-redistribute
    kind: component
    parent_id: paper-25-method
    order: 2
    epistemic_status: specified_and_proved
    title: "Block-Redistribute"
    summary: "Three phases rerandomize packed sharings, verifiably double-share state, and reconstruct current shares for rebooted parties using Berlekamp-Welch recovery."
    source_anchor_ids: [anchor-paper-25-redistribution, anchor-paper-25-proofs]

  - id: paper-25-method-pmpc
    kind: component
    parent_id: paper-25-method
    order: 3
    epistemic_status: specified_and_proved
    title: "Layer-by-layer PMPC"
    summary: "Inputs are robustly shared; secrets are permuted for each homogeneous addition or multiplication layer; obsolete state is erased; all live sharings are redistributed after every layer before final reconstruction."
    source_anchor_ids: [anchor-paper-25-pmpc]

  - id: paper-25-claims
    kind: claim_group
    parent_id: paper-25
    order: 5
    epistemic_status: proved_conditional
    title: "Principal theorems"
    summary: "The paper states UC-security and communication bounds under explicit network, erasure, circuit-width, and corruption-rate conditions."
    source_anchor_ids: [anchor-paper-25-redistribution, anchor-paper-25-theorems]

  - id: paper-25-claim-redistribution
    kind: claim
    parent_id: paper-25-claims
    order: 1
    epistemic_status: proved_conditional
    title: "Redistribution theorem"
    summary: "Theorem 1 states perfect UC realization of the redistribution functionality against adaptive corruption threshold n/8, assuming secure point-to-point and broadcast channels, with O(W + poly(n)) communication for W secrets."
    source_anchor_ids: [anchor-paper-25-redistribution, anchor-paper-25-proofs]

  - id: paper-25-claim-pmpc
    kind: claim
    parent_id: paper-25-claims
    order: 2
    epistemic_status: proved_conditional
    title: "Base PMPC theorem"
    summary: "For an n-party arithmetic circuit at least Ω(n) gates wide, Theorem 2 gives perfect proactive UC security against an active adaptive adversary corrupting fewer than n/8 parties per stage."
    source_anchor_ids: [anchor-paper-25-theorems, anchor-paper-25-proofs]

  - id: paper-25-claim-thresholds
    kind: claim
    parent_id: paper-25-claims
    order: 3
    epistemic_status: proved_conditional
    title: "Virtualized thresholds"
    summary: "Theorem 3 raises perfect security to any constant corruption fraction δ < 1/3, while the statistical variant in Theorem 12 supports δ < 1/2."
    source_anchor_ids: [anchor-paper-25-theorems, anchor-paper-25-virtualization]

  - id: paper-25-claim-complexity
    kind: claim
    parent_id: paper-25-claims
    order: 4
    epistemic_status: analytically_supported
    title: "Near-linear communication"
    summary: "The final virtualized construction is reported with communication O(C log² C polylog n + D poly(n) log² C), where C and D are circuit size and depth; packed share maintenance is constant amortized per secret."
    source_anchor_ids: [anchor-paper-25-problem, anchor-paper-25-pmpc]

  - id: paper-25-evidence
    kind: evidence_group
    parent_id: paper-25
    order: 6
    epistemic_status: formal_paper_evidence
    title: "Evidence chain"
    summary: "The source supplies ideal functionalities, explicit protocols, complexity derivations, simulators for redistribution, an inductive PMPC simulation, and committee-based threshold amplification."
    source_anchor_ids: [anchor-paper-25-uc-definition, anchor-paper-25-proofs, anchor-paper-25-virtualization]

  - id: paper-25-evidence-proof
    kind: evidence
    parent_id: paper-25-evidence
    order: 1
    epistemic_status: paper_proof_not_machine_checked
    title: "UC proof structure"
    summary: "The appendices compare real and ideal executions, construct simulators, and use layer induction plus prior subprotocol security; this audit checked statement/assumption alignment but did not rederive every simulation step."
    source_anchor_ids: [anchor-paper-25-proofs]

  - id: paper-25-boundaries
    kind: limitation_group
    parent_id: paper-25
    order: 7
    epistemic_status: material
    title: "Trusted boundaries and limitations"
    summary: "The guarantees rely on synchrony, secure channels, broadcast, erasures, reliable pristine reboot, stage-rate enforcement, and sufficiently wide arithmetic circuits."
    source_anchor_ids: [anchor-paper-25-model, anchor-paper-25-theorems]

  - id: paper-25-boundary-systems
    kind: limitation
    parent_id: paper-25-boundaries
    order: 1
    epistemic_status: assumed
    title: "Recovery mechanism is external"
    summary: "The paper does not specify how compromise is detected, how parties are selected and securely rebooted, or how proactive PKI/secure channels and broadcast are implemented."
    source_anchor_ids: [anchor-paper-25-problem, anchor-paper-25-model]

