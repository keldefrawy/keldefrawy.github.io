nodes:
  - id: paper-27
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published_extended_abstract
    title: "Remote Attestation of Heterogeneous Cyber-Physical Systems"
    summary: "A position-oriented extended abstract that frames multi-device remote attestation for vehicles and identifies the architecture and formalization work still needed."
    source_anchor_ids: [anchor-paper-27-problem]

  - id: paper-27-question
    kind: question
    parent_id: paper-27
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "How should attestations from heterogeneous CPS components be combined without allowing malware migration, unsafe interruption, or weakest-component failure?"
    source_anchor_ids: [anchor-paper-27-problem, anchor-paper-27-heterogeneous]

  - id: paper-27-answer
    kind: contribution
    parent_id: paper-27
    order: 2
    epistemic_status: proposed_research_direction
    title: "Proposed direction"
    summary: "Use a high-end in-vehicle root of trust to manage keys and coordinate attestations of medium- and low-end ECUs, while developing composable definitions and schedules for static and dynamic roots of trust."
    source_anchor_ids: [anchor-paper-27-heterogeneous]

  - id: paper-27-scope
    kind: scope
    parent_id: paper-27
    order: 3
    epistemic_status: explicitly_scoped
    title: "Automotive CPS scope"
    summary: "The motivating system contains more than 70 heterogeneous ECUs and wireless interfaces, with focus on remotely induced software compromise rather than scalable physical capture."
    source_anchor_ids: [anchor-paper-27-problem, anchor-paper-27-heterogeneous]

  - id: paper-27-scope-adversary
    kind: threat_model
    parent_id: paper-27-scope
    order: 1
    epistemic_status: qualitative
    title: "Remote malware focus"
    summary: "The source treats remote software attacks as the principal concern and states that physical access generally requires special tamper-resistant hardware; no complete adversary game is defined."
    source_anchor_ids: [anchor-paper-27-problem]

  - id: paper-27-method
    kind: method
    parent_id: paper-27
    order: 4
    epistemic_status: proposed_not_implemented
    title: "Heterogeneous attestation architecture"
    summary: "High-end modules may host the in-vehicle root of trust, medium-end modules may use TrustZone, HSMs, or SMART-like support, and low-end modules may be attested through accessible memory or firmware mechanisms."
    source_anchor_ids: [anchor-paper-27-ra-landscape, anchor-paper-27-heterogeneous]

  - id: paper-27-method-static
    kind: component
    parent_id: paper-27-method
    order: 1
    epistemic_status: proposed
    title: "Startup attestation"
    summary: "The IRT could attest all modules while the vehicle starts, accepting a potentially multi-second delay to establish a static root of trust."
    source_anchor_ids: [anchor-paper-27-heterogeneous]

  - id: paper-27-method-dynamic
    kind: component
    parent_id: paper-27-method
    order: 2
    epistemic_status: open_problem
    title: "Runtime attestation"
    summary: "A dynamic root would require randomized component checks that do not interfere with safety or operation, together with a response policy after failure; the source leaves both as challenges."
    source_anchor_ids: [anchor-paper-27-heterogeneous]

  - id: paper-27-claims
    kind: claim_group
    parent_id: paper-27
    order: 5
    epistemic_status: agenda_not_result
    title: "Claims versus proposals"
    summary: "The source claims that heterogeneous CPS attestation is important and outlines plausible architecture choices, but it does not claim a completed secure composition theorem or measured system."
    source_anchor_ids: [anchor-paper-27-problem, anchor-paper-27-future]

  - id: paper-27-evidence
    kind: evidence_group
    parent_id: paper-27
    order: 6
