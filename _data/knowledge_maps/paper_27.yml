  - "cyber-physical systems"
editorial_summary: "This extended abstract argues that remote attestation should move from checking one embedded device to checking the many heterogeneous components of a cyber-physical system, using a modern vehicle as the motivating case. It outlines how multiple device attestations could be combined efficiently and identifies open problems for automotive and broader CPS deployments."

research_question: "How can remote attestation assess a heterogeneous cyber-physical system as a whole rather than only one embedded component at a time?"
central_answer: "The extended abstract proposes combining attestations from multiple heterogeneous components and frames efficiency and deployment questions through the automotive use case."

