    title: "Evidence and rationale"
    summary: "Support consists of a compact synthesis of prior software-only, hardware, hybrid, formal-model, and automotive-security work plus concrete timing and ECU-capability examples."
    source_anchor_ids: [anchor-paper-27-ra-landscape, anchor-paper-27-heterogeneous]

