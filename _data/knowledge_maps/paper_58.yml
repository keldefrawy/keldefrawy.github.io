nodes:
  - id: paper-58
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Machine-Checked ZKP for NP Relations"
    summary: >-
      A modular EasyCrypt formalization of MPC-in-the-Head, with machine-checked security arguments, concrete five-party arithmetic-circuit instantiation, and extracted executable code.
    source_anchor_ids: [anchor-paper-58-problem]

  - id: paper-58-question
    kind: question
    parent_id: paper-58
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can generic MitH proofs and their implementations be connected end to end through machine-checked definitions, modular components, and code extraction?
    source_anchor_ids: [anchor-paper-58-problem]

  - id: paper-58-answer
    kind: contribution
    parent_id: paper-58
    order: 2
    epistemic_status: machine_checked_and_extracted
    title: Central answer
    summary: >-
      Specify each cryptographic layer as an EasyCrypt interface, prove the generic transformation once, instantiate its assumptions with verified components, and extract the resulting concrete protocol into OCaml.
    source_anchor_ids: [anchor-paper-58-transformation, anchor-paper-58-instantiation, anchor-paper-58-extraction]

  - id: paper-58-scope
    kind: scope
    parent_id: paper-58
    order: 3
    epistemic_status: explicitly_scoped
    title: Concrete instantiation
    summary: >-
      The represented executable uses Shamir sharing and five-party BGW arithmetic-circuit evaluation tolerating two semi-honest corruptions; the abstract framework permits other components, but those alternatives are not all verified here.
    source_anchor_ids: [anchor-paper-58-problem, anchor-paper-58-instantiation]

  - id: paper-58-protocol
    kind: protocol
    parent_id: paper-58
    order: 4
    epistemic_status: formally_specified
    title: Commit-challenge-response MitH
    summary: >-
      The prover emulates an MPC evaluation on shared witness data, commits to party views, opens a verifier-selected subset, and is accepted when the views are pairwise consistent and produce an accepting circuit result.
    source_anchor_ids: [anchor-paper-58-zk, anchor-paper-58-transformation]

  - id: paper-58-framework
    kind: method
    parent_id: paper-58
    order: 5
    epistemic_status: machine_checked
    title: Modular EasyCrypt framework
    summary: >-
      Abstract theories define ZK protocols, relations, secret sharing, MPC circuits, party views, commitments, adversaries, simulators, and games; concrete clones discharge the interfaces and inherit the generic result.
    source_anchor_ids: [anchor-paper-58-preliminaries, anchor-paper-58-zk, anchor-paper-58-mpc]

  - id: paper-58-claims
    kind: claim_group
    parent_id: paper-58
    order: 6
    epistemic_status: machine_checked
    title: Verified security properties
    summary: >-
      The development proves perfect completeness, concrete single-execution soundness and zero-knowledge bounds, and repetition meta-arguments in EasyCrypt rather than idealizing the commitment layer away.
    source_anchor_ids: [anchor-paper-58-zk, anchor-paper-58-transformation]

  - id: paper-58-claim-completeness
    kind: claim
    parent_id: paper-58-claims
    order: 1
    epistemic_status: machine_checked
    title: Perfect completeness
    summary: >-
      For a valid witness-statement pair and honest randomness, the formal protocol's verifier accepts with probability one.
    source_anchor_ids: [anchor-paper-58-zk, anchor-paper-58-transformation]

  - id: paper-58-claim-soundness-zk
    kind: claim
    parent_id: paper-58-claims
    order: 2
    epistemic_status: machine_checked_under_component_assumptions
    title: Soundness and zero knowledge
    summary: >-
      Soundness follows from MPC correctness and commitment binding, while simulation-based zero knowledge follows from privacy of the opened MPC views and commitment hiding; repetition reduces the one-shot error under the formalized meta-argument.
    source_anchor_ids: [anchor-paper-58-zk, anchor-paper-58-transformation]

  - id: paper-58-components
    kind: method
    parent_id: paper-58
    order: 7
    epistemic_status: concretely_instantiated
    title: Verified arithmetic-circuit components
    summary: >-
      The concrete stack fixes five BGW parties, Shamir sharing, addition, multiplication, scalar multiplication, and refresh gates over a finite field, and proves circuit correctness and two-view privacy compositionally.
    source_anchor_ids: [anchor-paper-58-instantiation]

  - id: paper-58-commitments
    kind: algorithm
    parent_id: paper-58-components
    order: 1
    epistemic_status: machine_checked
    title: Pedersen and PRF commitment choices
    summary: >-
      One path reuses Pedersen commitments; a faster path commits to a whole serialized view with a collision-resistant PRF instantiated by HMAC/SHA-256, with EasyCrypt reductions for binding and hiding.
    source_anchor_ids: [anchor-paper-58-commitment]

  - id: paper-58-extraction
    kind: artifact_group
    parent_id: paper-58
    order: 8
    epistemic_status: verified_code_extracted
    title: Executable extraction
    summary: >-
      An EasyCrypt extraction tool produces OCaml from concrete specifications. The efficient path manually preserves the modular scaffold while automatically extracting concrete components, a boundary distinct from fully automatic end-to-end module extraction.
    source_anchor_ids: [anchor-paper-58-extraction, anchor-paper-58-code]

  - id: paper-58-benchmarks
    kind: evidence
    parent_id: paper-58
    order: 9
    epistemic_status: preliminary_measurement
    title: Preliminary benchmark evidence
    summary: >-
      Small arithmetic circuits are benchmarked on a 2016 dual-core MacBook Pro. The SHA-256 commitment path substantially reduces commit and verify time relative to Pedersen in the reported examples, but the experiments are not application-scale.
    source_anchor_ids: [anchor-paper-58-benchmarks]

  - id: paper-58-boundaries
    kind: limitation_group
    parent_id: paper-58
    order: 10
    epistemic_status: material
    title: Boundaries
    summary: >-
      The concrete protocol fixes five parties and passive two-party corruption, evaluates arithmetic circuits represented as less-efficient trees, benchmarks only tiny circuits, and leaves actively secure or highly optimized MitH families and low-level optimized arithmetic to future work.
    source_anchor_ids: [anchor-paper-58-problem, anchor-paper-58-instantiation, anchor-paper-58-benchmarks, anchor-paper-58-boundaries]

  - id: paper-58-resources
    kind: artifact_group
    parent_id: paper-58
    order: 11
    epistemic_status: publicly_available
    title: Auditable paper and development
    summary: >-
      The complete checked-in arXiv source has fixity metadata, the IACR ePrint and ACM DOI establish version identities, and the linked repository exposes formalization and extracted code. This audit did not rerun EasyCrypt or benchmarks.
    source_anchor_ids: [anchor-paper-58-code, anchor-paper-58-publication]

  - id: paper-58-scrutiny
    kind: scrutiny
    parent_id: paper-58
    order: 12
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The work appeared at ACM CCS 2021 and makes its formal development public. Review reports and independent reproduction are not linked.
    source_anchor_ids: [anchor-paper-58-publication, anchor-paper-58-code]

  - id: paper-58-lineage
    kind: lineage
    parent_id: paper-58
    order: 13
    epistemic_status: documented
    title: Builds on verified MPC extraction
    summary: >-
      The work reuses the earlier high-assurance BGW development and extraction mechanism, then lifts them through a generic MitH transformation to verified zero-knowledge protocols.
    source_anchor_ids: [anchor-paper-58-problem, anchor-paper-58-instantiation]

