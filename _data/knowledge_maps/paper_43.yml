nodes:
  - id: paper-43
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_conference_version
    title: SNUSE conference paper
    summary: A protocol and prototype for refreshing fuzzy-vault authentication material from threshold-shared biometric templates without user participation.
    source_anchor_ids: [anchor-paper-43-problem]
  - id: paper-43-question
    kind: question
    parent_id: paper-43
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can biometric helper data be regenerated for thousands of users without resampling each biometric or centralizing a lifetime-sensitive template?
    source_anchor_ids: [anchor-paper-43-problem]
  - id: paper-43-answer
    kind: contribution
    parent_id: paper-43
    order: 2
    epistemic_status: implemented
    title: Central answer
    summary: Distribute template shares to offline re-enrollment servers and jointly compute a fresh fuzzy vault under MPC; keep the authentication server limited to helper data.
    source_anchor_ids: [anchor-paper-43-architecture, anchor-paper-43-reenrollment]
  - id: paper-43-model
    kind: scope
    parent_id: paper-43
    order: 3
    epistemic_status: defined
    title: Parties and data placement
    summary: A trusted biometric reader sees the template transiently; N re-enrollment servers each store one share; an authentication server stores helper data; only the enrollment/re-enrollment phases invoke the RES set.
    source_anchor_ids: [anchor-paper-43-architecture, anchor-paper-43-enrollment]
  - id: paper-43-adversary
    kind: threat_model
    parent_id: paper-43
    order: 4
    epistemic_status: honest_but_curious
    title: Adversary model
    summary: The prototype assumes honest-but-curious MPC and secure authenticated channels. Stored-template confidentiality holds below the Shamir threshold, with separate leakage cases for joint online compromise.
    source_anchor_ids: [anchor-paper-43-background, anchor-paper-43-security]
  - id: paper-43-assumptions
    kind: assumption
    parent_id: paper-43
    order: 5
    epistemic_status: cryptographic_and_operational
    title: Security assumptions
    summary: Claims rely on Shamir-sharing privacy, fuzzy-vault polynomial-reconstruction hardness, secure channel establishment, trusted sampling, and enough non-colluding RESs.
    source_anchor_ids: [anchor-paper-43-background, anchor-paper-43-security]
  - id: paper-43-protocols
    kind: protocol_group
    parent_id: paper-43
    order: 6
    epistemic_status: specified_and_implemented
    title: SNUSE lifecycle
    summary: Three protocols separate one-time enrollment, routine authentication, and occasional server-side re-enrollment.
    source_anchor_ids: [anchor-paper-43-enrollment, anchor-paper-43-authentication, anchor-paper-43-reenrollment]
  - id: paper-43-enroll
    kind: protocol
    parent_id: paper-43-protocols
    order: 1
    epistemic_status: implemented
    title: Initial enrollment
    summary: The reader samples and shares the template; RESs agree on a secret and MPC-compute shares of the vault; AS reconstructs and stores only helper data.
    source_anchor_ids: [anchor-paper-43-enrollment]
  - id: paper-43-auth
    kind: protocol
    parent_id: paper-43-protocols
    order: 2
    epistemic_status: implemented
    title: Routine authentication
    summary: AS returns the user's helper data, and the reader applies fuzzy-vault opening to a fresh biometric sample; RESs are offline and uninvolved.
    source_anchor_ids: [anchor-paper-43-authentication]
  - id: paper-43-reenroll
    kind: protocol
    parent_id: paper-43-protocols
    order: 3
    epistemic_status: implemented
    title: Non-interactive re-enrollment
    summary: AS requests a fresh credential; RESs use their stored template shares and MPC to form new helper-data shares, which AS combines without reconstructing the template.
    source_anchor_ids: [anchor-paper-43-reenrollment]
  - id: paper-43-implementation-node
    kind: implementation
    parent_id: paper-43
    order: 7
    epistemic_status: prototype
    title: Fingerprint and iris prototype
    summary: The implementation uses NTL over GF(2^24), Shamir sharing, TCP processes, NBIS fingerprint minutiae, OSIRIS iris features, 20/18 data points, and 200 chaff points.
    source_anchor_ids: [anchor-paper-43-implementation]
  - id: paper-43-claims
    kind: claim_group
    parent_id: paper-43
    order: 8
    epistemic_status: mixed
    title: Main claims
    summary: SNUSE separates biometric storage across servers, preserves the underlying matching procedure, and makes bulk re-enrollment computationally feasible in the tested setting.
    source_anchor_ids: [anchor-paper-43-security, anchor-paper-43-accuracy, anchor-paper-43-performance]
  - id: paper-43-claim-confidentiality
    kind: claim
    parent_id: paper-43-claims
    order: 1
    epistemic_status: conditional_argument
    title: No complete backend template below threshold
    summary: AS sees helper data; fewer than K RESs see only shares; the template is not reconstructed during ordinary protocol execution, conditional on the stated fuzzy-vault, sharing, and corruption assumptions.
    source_anchor_ids: [anchor-paper-43-security]
  - id: paper-43-claim-performance
    kind: claim
    parent_id: paper-43-claims
    order: 2
    epistemic_status: experimentally_supported
    title: Fast bulk refresh
    summary: A single re-enrollment averages 13.2 ms in the reported setup; scaling is approximately linear, and the extrapolation places 100,000 users under five minutes with nine RESs.
    source_anchor_ids: [anchor-paper-43-performance]
  - id: paper-43-claim-accuracy
    kind: claim
    parent_id: paper-43-claims
    order: 3
    epistemic_status: dataset_supported
    title: Matching accuracy is governed by biometric/vault parameters
    summary: On the tested data, fingerprint degree 7 gives about 90% GAR and 3% FAR, while the simple iris encoding at degree 5 gives about 75% GAR and 5% FAR; SNUSE does not itself change vault opening.
    source_anchor_ids: [anchor-paper-43-accuracy]
  - id: paper-43-evidence
    kind: evidence_group
    parent_id: paper-43
    order: 9
    epistemic_status: prototype_and_security_analysis
    title: Evidence stack
    summary: Protocol pseudocode and confidentiality arguments are paired with public biometric datasets, cross-pair GAR/FAR tests, 100-run timing measurements, scale tests, and storage calculations.
    source_anchor_ids: [anchor-paper-43-implementation, anchor-paper-43-accuracy, anchor-paper-43-performance, anchor-paper-43-security]
  - id: paper-43-boundaries
    kind: limitation_group
    parent_id: paper-43
    order: 10
    epistemic_status: explicit
    title: Security and generality boundaries
    summary: Simultaneously compromising AS and one RES during computation can reveal the current template when k is visible; conventional fuzzy vaults are not reusable; the prototype is honest-but-curious and the iris encoding is intentionally simple.
    source_anchor_ids: [anchor-paper-43-security, anchor-paper-43-conclusion]
  - id: paper-43-artifacts
    kind: artifact_group
    parent_id: paper-43
    order: 11
    epistemic_status: partial
    title: Artifacts and reproducibility
    summary: Full text, algorithm detail, parameterization, and public dataset names are available. This audit did not locate version-pinned source code, raw outputs, or an independent reproduction.
    source_anchor_ids: [anchor-paper-43-implementation, anchor-paper-43-performance]
  - id: paper-43-scrutiny
    kind: scrutiny
    parent_id: paper-43
    order: 12
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: The conference publication establishes CSCML review exposure; review reports and artifact evaluation are not represented.
    source_anchor_ids: [anchor-paper-43-publication]
  - id: paper-43-lineage
    kind: lineage
    parent_id: paper-43
    order: 13
    epistemic_status: versioned
    title: Later journal version
    summary: Paper #48 is the expanded FGCS journal treatment with a reorganized design, optimization discussion, and integrated evaluation/security sections; it is a separate publication record.
    source_anchor_ids: [anchor-paper-43-problem, anchor-paper-43-conclusion]

