    epistemic_status: defined
    title: "Blindfolded search"
    summary: "A requester learns authorized matches while hiding its pattern, and the provider reveals no unrelated database content; correctness and input/output privacy are both required."
    source_anchor_ids: [anchor-paper-20-question, anchor-paper-20-models]

  - id: paper-20-use-cases
    kind: application_group
    parent_id: paper-20
    order: 4
    epistemic_status: illustrative
    title: "Why private matching matters"
    summary: "Examples include law-enforcement search of passenger manifests and clinician search of patient genomes, where both query sensitivity and data-holder obligations constrain ordinary data sharing."
    source_anchor_ids: [anchor-paper-20-applications]

  - id: paper-20-scope
    kind: scope
    parent_id: paper-20
    order: 5
    epistemic_status: comparative_framework
    title: "Comparison dimensions"
    summary: "The article distinguishes exact, wildcard, approximate, and substring matching and compares honest-but-curious, covert, and malicious adversaries together with asymptotic costs."
    source_anchor_ids: [anchor-paper-20-models, anchor-paper-20-comparison]

  - id: paper-20-family-integer
    kind: method_family
    parent_id: paper-20
    order: 6
    epistemic_status: prior_work_synthesis
    title: "Integer-comparison family"
    summary: "Hazay-Toft-style constructions encode patterns and candidate substrings as integers and compare them obliviously, supporting malicious security but incurring costs that vary by exact, wildcard, and approximate functionality."
    source_anchor_ids: [anchor-paper-20-integer]

  - id: paper-20-family-fft
    kind: method_family
    parent_id: paper-20
    order: 7
    epistemic_status: prior_work_synthesis
    title: "FFT family"
    summary: "Vergnaud's approach uses encrypted polynomial/FFT operations to reduce computation for generalized matching while relying on additive ElGamal and a malicious-security construction."
    source_anchor_ids: [anchor-paper-20-fft]

  - id: paper-20-family-matrix
    kind: method_family
    parent_id: paper-20
    order: 8
    epistemic_status: prior_work_synthesis
    title: "Matrix-multiplication family"
    summary: "5PM reduces exact, wildcard, and non-binary approximate matching to character-delay-vector and matrix operations, obtaining linear communication in n+m while retaining O(nm)-scale cryptographic computation."
    source_anchor_ids: [anchor-paper-20-matrix]

  - id: paper-20-family-garbled
    kind: method_family
    parent_id: paper-20
    order: 9
    epistemic_status: prior_work_synthesis
    title: "Garbled-circuit family"
    summary: "General secure computation provides flexible text processing, but the surveyed construction has limitations in malicious security, wildcard/substring support, and pattern-length privacy."
    source_anchor_ids: [anchor-paper-20-garbled]

