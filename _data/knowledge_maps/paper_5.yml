nodes:
  - id: paper-5
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "BotTorrent"
    summary: "An empirical security study showing that BitTorrent's multi-tracker behavior can redirect legitimate clients into a DDoS attack against an arbitrary host."
    source_anchor_ids: [anchor-paper-5-problem, anchor-paper-5-publication]
  - id: paper-5-question
    kind: question
    parent_id: paper-5
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can unauthenticated BitTorrent coordination metadata be weaponized at Internet scale without compromising or infecting the clients?"
    source_anchor_ids: [anchor-paper-5-problem]
  - id: paper-5-answer
    kind: contribution
    parent_id: paper-5
    order: 2
    epistemic_status: experimentally_demonstrated
    title: "Central answer"
    summary: "A torrent can pair one responsive modified tracker with victim addresses in its tracker list, causing clients to contact a host that neither joined the swarm nor runs BitTorrent."
    source_anchor_ids: [anchor-paper-5-attack, anchor-paper-5-results]
  - id: paper-5-mechanism
    kind: mechanism
    parent_id: paper-5
    order: 3
    epistemic_status: demonstrated
    title: "Multi-tracker redirection"
    summary: "The attacker publishes attractive torrents whose first tracker returns fabricated swarm statistics and whose remaining tracker entries name the victim; the missing peer-to-tracker handshake prevents clients from recognizing the victim as a non-tracker."
    source_anchor_ids: [anchor-paper-5-attack]
  - id: paper-5-taxonomy
    kind: taxonomy
    parent_id: paper-5
    order: 4
    epistemic_status: specified
    title: "Four attack forms"
    summary: "The paper distinguishes announcing the victim as a peer, listing it as a centralized tracker, spoofing it into the DHT, and combinations; the experiments focus on the more potent tracker-list method."
    source_anchor_ids: [anchor-paper-5-attack]
  - id: paper-5-evidence
    kind: evidence_group
    parent_id: paper-5
    order: 5
    epistemic_status: real_world_proof_of_concept
    title: "Internet experiment"
    summary: "Twenty-five deliberately small torrents targeted an author-controlled UCI host. Traffic was captured with tcpdump while torrent count, open/closed ports, and a combined peer-announcement variant were varied."
    source_anchor_ids: [anchor-paper-5-setup, anchor-paper-5-results]
  - id: paper-5-result-scale
    kind: result
    parent_id: paper-5-evidence
    order: 1
    epistemic_status: measured
    title: "Sustained connection and traffic load"
    summary: "The strongest experiment reports 58,046 unique IP addresses, roughly 1,400 attempted TCP connections per second on average, and 176.69 Kbps average incoming traffic with a 482.81 Kbps maximum over multiple days."
    source_anchor_ids: [anchor-paper-5-results]
  - id: paper-5-result-spread
    kind: result
    parent_id: paper-5-evidence
    order: 2
    epistemic_status: measured
    title: "Highly distributed sources"
    summary: "About 87% of observed source addresses lay in different /24 networks and 12% in different /16 networks, weakening simple victim-gateway source filtering."
    source_anchor_ids: [anchor-paper-5-results]
  - id: paper-5-defenses
    kind: mitigation
    parent_id: paper-5
    order: 6
    epistemic_status: proposed_not_evaluated
    title: "Protocol and publication defenses"
    summary: "Clients can validate tracker responses and back off from non-trackers; torrent sites can test or constrain tracker lists and deter automated uploads. These controls trade openness, redundancy, and load balancing for security."
    source_anchor_ids: [anchor-paper-5-defenses]
  - id: paper-5-boundaries
    kind: limitation_group
    parent_id: paper-5
    order: 7
    epistemic_status: material
    title: "Interpretation limits"
    summary: "The study intentionally limited its own attack volume and evaluated a 2007 centralized multi-tracker ecosystem. Larger-scale damage is an extrapolation, not an experiment, and implementation diversity affects both attack and defense."
    source_anchor_ids: [anchor-paper-5-setup, anchor-paper-5-boundaries]
  - id: paper-5-artifacts
    kind: artifact
    parent_id: paper-5
    order: 8
    epistemic_status: paper_available_no_dataset
    title: "Artifacts"
    summary: "The official full text is fixed locally. The modified tracker, torrent corpus, packet logs, and analysis scripts were not located as public artifacts."
    source_anchor_ids: [anchor-paper-5-setup, anchor-paper-5-publication]
  - id: paper-5-scrutiny
    kind: scrutiny
    parent_id: paper-5
    order: 9
    epistemic_status: peer_reviewed
    title: "Scrutiny and lineage"
    summary: "The study appeared at USENIX SRUTI 2007, compares its method with an earlier peer-announcement attack, and documents ethical scale restraint; no independent reproduction was located."
    source_anchor_ids: [anchor-paper-5-boundaries, anchor-paper-5-publication]

