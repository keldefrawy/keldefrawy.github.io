assessment:
  id: paper-74-assessment-2026-07-11
  rubric_version: "0.2"
  assessed_at: "2026-07-11"
  status: ai_draft_author_review_pending
  note: These dimensions describe documented support and process, not truth, correctness, or a universal ranking. No composite score is calculated.
  axes:
    - id: epistemic_evidence
      level: high
