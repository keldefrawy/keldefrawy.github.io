nodes:
  - id: paper-74
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: under_review_manuscript
    title: Private Identity-Based Bulletin Boards
    summary: >-
      A theory-and-systems paper defining metadata-private identity-based bulletin boards, constructing the required searchable-encryption and retrieval protocols, proving privacy under explicit leakage and non-collusion assumptions, and evaluating a functional prototype.
    source_anchor_ids: [anchor-paper-74-abstract]

  - id: paper-74-question
    kind: question
    parent_id: paper-74
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can parties who have never exchanged keys post and retrieve messages asynchronously through censored or intermittent networks without revealing recipient identities or requested database indices to the storage service?
    source_anchor_ids: [anchor-paper-74-abstract]

  - id: paper-74-answer
    kind: contribution
    parent_id: paper-74
    order: 2
    epistemic_status: source_asserted
    title: PIB³ construction
    summary: >-
      The answer combines anonymous IBE, two-level searchable HIBE, randomized token shares, and multi-server PIR so senders need only a receiver identity and public epoch while each allowed corrupted-server coalition sees only the stated leakage.
    source_anchor_ids: [anchor-paper-74-overview, anchor-paper-74-construction, anchor-paper-74-multiserver]

  - id: paper-74-use-case
    kind: scope
    parent_id: paper-74
    order: 3
    epistemic_status: explicitly_scoped
    title: Delay-and-disruption-prone communication
    summary: >-
      Clients may be offline at different times and face censorship, rate limits, shutdowns, or intermittent links; replicated bulletin-board servers provide temporary application-layer storage until connectivity returns.
    source_anchor_ids: [anchor-paper-74-abstract, anchor-paper-74-model]

  - id: paper-74-model-clients
    kind: assumption
    parent_id: paper-74-use-case
    order: 1
    epistemic_status: assumed
    title: Identity knowledge and public setup
    summary: >-
      Senders and receivers know pseudonyms for one another and possess a client with public IBE/HIBE parameters, but they need no pairwise pre-shared key or prior synchronous exchange.
    source_anchor_ids: [anchor-paper-74-model]

  - id: paper-74-model-channel
    kind: assumption
    parent_id: paper-74-use-case
    order: 2
    epistemic_status: assumed_external_service
    title: Anonymous client-server channels
    summary: >-
      Uploads and queries are assumed to travel through an anonymity network such as Tor; PIB³ does not itself hide the client's network address from a server observing an ordinary identified transport.
    source_anchor_ids: [anchor-paper-74-model]

  - id: paper-74-model-adversary
    kind: threat_model
    parent_id: paper-74-use-case
    order: 3
    epistemic_status: defined
    title: Network and bulletin-board adversary
    summary: >-
      A polynomial-time adversary may observe and disrupt links, corrupt a server, control malicious uploaders, adaptively insert records, and participate in retrieval as that server, but cannot violate the stated cryptographic assumptions.
    source_anchor_ids: [anchor-paper-74-model]

  - id: paper-74-leakage
    kind: definition
    parent_id: paper-74-use-case
    order: 4
    epistemic_status: explicitly_modeled
    title: Explicit leakage
    summary: >-
      Privacy exposes the public epoch, database size, and number of PIR retrievals. Padding to a fixed bound can hide retrieval count only if the application also specifies dummy retrievals and behavior when real matches exceed that bound.
    source_anchor_ids: [anchor-paper-74-model, anchor-paper-74-security]

  - id: paper-74-hibesc
    kind: primitive
    parent_id: paper-74
    order: 4
    epistemic_status: formally_defined_and_constructed
    title: HIBE with searchable ciphertexts
    summary: >-
      HIBESC extends two-level HIBE with CipherGen, Token, and Check. Anyone can create a searchable ciphertext for identity vector (id, epoch), but only the first-level identity-key holder can form the matching epoch token.
    source_anchor_ids: [anchor-paper-74-hibesc-definition, anchor-paper-74-hibesc-construction]

  - id: paper-74-hibesc-properties
    kind: security_definition
    parent_id: paper-74-hibesc
    order: 1
    epistemic_status: defined
    title: Correctness, soundness, and fixed-epoch anonymity
    summary: >-
      Correct matching tokens and ciphertexts must accept; mismatched identity or epoch should reject; and ciphertexts for different identities in the same public epoch should be computationally indistinguishable under the specified games.
    source_anchor_ids: [anchor-paper-74-hibesc-definition]

  - id: paper-74-hibesc-proof
    kind: proof
    parent_id: paper-74-hibesc
    order: 2
    epistemic_status: reduction_provided
    title: Searchable-HIBE reduction chain
    summary: >-
      The appendices establish an intermediate ciphertext-identity-indifferentiability property and reduce fixed-epoch anonymity to decisional bilinear Diffie-Hellman, with explicit random-oracle programming and abort probability accounting.
    source_anchor_ids: [anchor-paper-74-hibesc-proof]

  - id: paper-74-record
    kind: scheme
    parent_id: paper-74
    order: 5
    epistemic_status: specified
    title: Two-ciphertext bulletin-board record
    summary: >-
      Each record contains an anonymous-IBE payload ciphertext and a searchable-HIBE discovery ciphertext for (recipient identity, public epoch). The encrypted plaintext includes a hash of the discovery ciphertext to bind the two components.
    source_anchor_ids: [anchor-paper-74-overview, anchor-paper-74-construction]

  - id: paper-74-query
    kind: protocol
    parent_id: paper-74
    order: 6
    epistemic_status: specified
    title: Two-server private query
    summary: >-
      The receiver splits a search token between two replicated, non-colluding servers. Each partially evaluates Check for every record; the receiver combines replies into a matching index set and uses two-server PIR to fetch the corresponding IBE ciphertexts.
    source_anchor_ids: [anchor-paper-74-overview, anchor-paper-74-construction]

  - id: paper-74-single-server-attack
    kind: attack
    parent_id: paper-74-query
    order: 1
    epistemic_status: demonstrated_analytically
    title: Why one server is insufficient
    summary: >-
      A single server sees which records share a query token and can upload a probe ciphertext for a chosen identity and epoch, then test future tokens against it. Token sharing removes that direct Check oracle from any one allowed corrupted server.
    source_anchor_ids: [anchor-paper-74-single-server]

  - id: paper-74-multiserver
    kind: protocol
    parent_id: paper-74
    order: 7
    epistemic_status: specified
    title: N-server extension
    summary: >-
      The receiver distributes correlated token shares across N servers and combines all partial values before PIR. No server-to-server communication is needed during a query, but every server must hold identically ordered records.
    source_anchor_ids: [anchor-paper-74-multiserver]

  - id: paper-74-claims
    kind: claim_group
    parent_id: paper-74
    order: 8
    epistemic_status: formally_supported
    title: Main claims
    summary: >-
      The manuscript claims correctness and privacy for the concrete scheme under the component assumptions and leakage model, conditional coalition privacy for the extension, and practical feasibility for the measured prototype configurations.
    source_anchor_ids: [anchor-paper-74-security, anchor-paper-74-multiserver, anchor-paper-74-experiments]

  - id: paper-74-claim-privacy
    kind: claim
    parent_id: paper-74-claims
    order: 1
    epistemic_status: theorem_with_reduction
    title: Two-server bulletin-board privacy
    summary: >-
      Theorem 1 bounds a bulletin-board adversary by two PIR-privacy terms, two searchable-HIBE anonymity terms, two IBE-anonymity terms, and an IBE IND-CPA term, with active probing captured up to retrieval-count leakage.
    source_anchor_ids: [anchor-paper-74-security, anchor-paper-74-pib-proof]

  - id: paper-74-claim-coalition
    kind: claim
    parent_id: paper-74-claims
    order: 2
    epistemic_status: conditional_theorem
    title: Conditional coalition privacy
    summary: >-
      Theorem 2 extends privacy to a strict server coalition only when token shares are simulatable for that coalition and the chosen N-server PIR is private against the same coalition, with retrieval count available to its simulator.
    source_anchor_ids: [anchor-paper-74-multiserver]

  - id: paper-74-claim-complexity
    kind: claim
    parent_id: paper-74-claims
    order: 3
    epistemic_status: asymptotically_analyzed
    title: Optimized retrieval communication
    summary: >-
      Hash-compressed partial Check values and batched PIR yield four rounds and reported communication O((n + λ) log n + C + G), where n is record count, λ the security parameter, C record size, and G group-element size.
    source_anchor_ids: [anchor-paper-74-complexity]

  - id: paper-74-evidence
    kind: evidence_group
    parent_id: paper-74
    order: 9
    epistemic_status: formal_and_empirical
    title: Evidence
    summary: >-
      Support includes formal syntax and games, reductions for component and composed privacy, an explicit attack on the tempting one-server design, asymptotic analysis, and a prototype benchmark of the heavy server-side search and PIR operations.
    source_anchor_ids: [anchor-paper-74-hibesc-proof, anchor-paper-74-pib-proof, anchor-paper-74-single-server, anchor-paper-74-experiments]

  - id: paper-74-evidence-setup
    kind: evidence
    parent_id: paper-74-evidence
    order: 1
    epistemic_status: reported_experiment
    title: Prototype benchmark setup
    summary: >-
      The 128-bit-security prototype ran on an AWS c6a.8xlarge instance with 32 vCPUs. Most configurations were repeated ten times; the largest final PIR row was repeated twice, and reported variance was negligible but omitted.
    source_anchor_ids: [anchor-paper-74-experiments]

  - id: paper-74-evidence-search
    kind: evidence
    parent_id: paper-74-evidence
    order: 2
    epistemic_status: reported_measurement
    title: Linear full-database search
    summary: >-
      Server-side pairing search scaled from roughly 0.47-0.48 seconds at 1,000 ciphertexts to about 45 seconds at 100,000 ciphertexts on the test machine.
    source_anchor_ids: [anchor-paper-74-experiments]

  - id: paper-74-evidence-pir
    kind: evidence
    parent_id: paper-74-evidence
    order: 3
    epistemic_status: reported_measurement
    title: PIR and end-to-end server computation
    summary: >-
      For 100-kilobit payloads and 100,000 records, reported DPF evaluation is 35.597 seconds and total server computation is just over 80 seconds; smaller records or databases take seconds or fractions of seconds.
    source_anchor_ids: [anchor-paper-74-experiments]

  - id: paper-74-boundaries
    kind: limitation_group
    parent_id: paper-74
    order: 10
    epistemic_status: material
    title: Scope and limitations
    summary: >-
      Privacy is conditional on cryptographic assumptions, anonymous transport, synchronized replicated databases, the allowed non-colluding coalition, and explicit leakage. The prototype is not a deployed censorship-resistance study or independent reproduction.
    source_anchor_ids: [anchor-paper-74-model, anchor-paper-74-security, anchor-paper-74-experiments, anchor-paper-74-multiserver]

  - id: paper-74-boundary-collusion
    kind: limitation
    parent_id: paper-74-boundaries
    order: 1
    epistemic_status: theorem_boundary
    title: Non-collusion and PIR boundary
    summary: >-
      Two-server privacy excludes both servers colluding. The N-server claim covers only coalitions for which both token-share simulation and the underlying PIR privacy property hold.
    source_anchor_ids: [anchor-paper-74-security, anchor-paper-74-multiserver]

  - id: paper-74-boundary-leakage
    kind: limitation
    parent_id: paper-74-boundaries
    order: 2
    epistemic_status: explicit_leakage
    title: Epoch, size, and access-count leakage
    summary: >-
      The scheme does not hide public epoch, database size, or unpadded retrieval count. Padding shifts rather than eliminates costs and requires an overflow rule when a user has more than the fixed number of matches.
    source_anchor_ids: [anchor-paper-74-model, anchor-paper-74-security]

  - id: paper-74-boundary-evaluation
    kind: limitation
    parent_id: paper-74-boundaries
    order: 3
    epistemic_status: experimental_boundary
    title: Partial prototype evaluation
    summary: >-
      The benchmark covers computationally heavy server components, not the complete client path, WAN anonymity-network delay, censorship behavior, database synchronization, availability attacks, or a real multi-user deployment.
    source_anchor_ids: [anchor-paper-74-experiments]

  - id: paper-74-artifacts
    kind: artifact_group
    parent_id: paper-74
    order: 11
    epistemic_status: manuscript_available_code_pending
    title: Artifacts and reproducibility
    summary: >-
      The 44-page manuscript is checked in with a recorded hash. It states that implementation code will be open-sourced after publication; no repository, benchmark scripts, raw measurements, or environment image is currently linked.
    source_anchor_ids: [anchor-paper-74-abstract, anchor-paper-74-experiments]

  - id: paper-74-scrutiny
    kind: scrutiny
    parent_id: paper-74
    order: 12
    epistemic_status: under_review
    title: External scrutiny
    summary: >-
      The site records the manuscript as under review. No acceptance, public review report, rebuttal, independent cryptographic audit, reproduction, correction, or adversarial follow-up is represented.
    source_anchor_ids: [anchor-paper-74-status]

