nodes:
  - id: paper-9
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "PRISM"
    summary: "A privacy-oriented, location-centric reactive MANET routing protocol using group-signed requests and replies, temporary keys, and offline accountability."
    source_anchor_ids: [anchor-paper-9-problem, anchor-paper-9-publication]
  - id: paper-9-question
    kind: question
    parent_id: paper-9
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can on-demand routing protect movement privacy without preshared source-destination secrets, online identity servers, or full topology advertisement?"
    source_anchor_ids: [anchor-paper-9-problem]
  - id: paper-9-answer
    kind: contribution
    parent_id: paper-9
    order: 2
    epistemic_status: proposed_and_simulated
    title: "Central answer"
    summary: "Address a geographic area, authenticate only the source and responding destination with unlinkable group signatures, and keep intermediate state under hashes of one-time route messages."
    source_anchor_ids: [anchor-paper-9-protocol, anchor-paper-9-evaluation, anchor-paper-9-privacy]
  - id: paper-9-scope
    kind: scope
    parent_id: paper-9
    order: 3
    epistemic_status: explicitly_scoped
    title: "Location-centric environment"
    summary: "Communication decisions are assumed to depend on current areas rather than persistent identities; nodes have GPS-like location, uniform range, public-key capability, and predeployment credentials from an offline TTP."
    source_anchor_ids: [anchor-paper-9-environment]
  - id: paper-9-threat
    kind: threat_model
    parent_id: paper-9-scope
    order: 1
    epistemic_status: explicitly_scoped
    title: "Adversary model"
    summary: "Outsiders may be active or passive, but insiders in the primary privacy analysis are honest-but-curious. DoS, topology attacks, false location claims, and other active-insider behavior are excluded from the core guarantee."
    source_anchor_ids: [anchor-paper-9-environment, anchor-paper-9-security]
  - id: paper-9-protocol
    kind: protocol
    parent_id: paper-9
    order: 4
    epistemic_status: specified
    title: "PRISM route discovery"
    summary: "A RREQ contains a destination area, temporary public key, timestamp, and source group signature. A destination returns the RREQ hash, exact location, session key encrypted to the temporary key, and its group signature."
    source_anchor_ids: [anchor-paper-9-protocol]
  - id: paper-9-route-state
    kind: component
    parent_id: paper-9-protocol
    order: 1
    epistemic_status: specified
    title: "Hash-linked route state"
    summary: "Intermediate nodes cache request and reply hashes and forward unchanged messages; the two hashes identify the established bidirectional route without exposing stable source or destination names."
    source_anchor_ids: [anchor-paper-9-protocol]
  - id: paper-9-security
    kind: claim_group
    parent_id: paper-9
    order: 5
    epistemic_status: informally_argued
    title: "Privacy and authentication claims"
    summary: "Fresh group signatures and keys resist cross-route linkage, the MANET-wide key hides routing from outsiders, and source/destination logs let the TTP de-anonymize disputed messages later."
    source_anchor_ids: [anchor-paper-9-security, anchor-paper-9-forensics]
  - id: paper-9-insider
    kind: limitation
    parent_id: paper-9-security
    order: 1
    epistemic_status: explicitly_vulnerable
    title: "Active-insider attacks"
    summary: "A member can lie about location, suppress or drop messages, create Sybil replies, or probe many areas. Some probing can be detected only after logs are submitted; real-time prevention is not provided."
    source_anchor_ids: [anchor-paper-9-security, anchor-paper-9-forensics]
  - id: paper-9-evidence
    kind: evidence_group
    parent_id: paper-9
    order: 6
    epistemic_status: simulation
    title: "PRISM versus ALARM"
    summary: "Simulations use 100 nodes under random-waypoint and reference-point group mobility, varying the number of destination areas to compare routing messages and topology exposure."
    source_anchor_ids: [anchor-paper-9-evaluation, anchor-paper-9-privacy]
  - id: paper-9-result
    kind: result
    parent_id: paper-9-evidence
    order: 1
    epistemic_status: simulation_supported
    title: "Workload-dependent efficiency and exposure"
    summary: "PRISM has lower total routing traffic than ALARM when each source contacts relatively few areas and exposes a smaller topology fraction; its advantage shrinks as destination probing grows, and discovery can take longer."
    source_anchor_ids: [anchor-paper-9-evaluation, anchor-paper-9-privacy]
  - id: paper-9-boundaries
    kind: limitation_group
    parent_id: paper-9
    order: 7
    epistemic_status: material
    title: "Applicability limits"
    summary: "Empty destination areas cause timeout or expansion, destination interests are visible in RREQs, hop count is not verified, evaluation simplifies to at most one receiver per area, and no implementation or formal proof is supplied."
    source_anchor_ids: [anchor-paper-9-environment, anchor-paper-9-protocol, anchor-paper-9-security, anchor-paper-9-conclusion]
  - id: paper-9-artifacts
    kind: artifact
    parent_id: paper-9
    order: 8
    epistemic_status: paper_available_no_code
    title: "Artifacts"
    summary: "A fixed author copy is available locally; protocol implementation, simulator code/configuration, and result data were not located."
    source_anchor_ids: [anchor-paper-9-evaluation, anchor-paper-9-provenance]
  - id: paper-9-scrutiny
    kind: scrutiny
    parent_id: paper-9
    order: 9
    epistemic_status: peer_reviewed
    title: "Scrutiny"
    summary: "PRISM appeared at IEEE ICNP 2008 and explicitly compares itself with ALARM and other anonymous routing designs; independent reproduction was not located."
    source_anchor_ids: [anchor-paper-9-evaluation, anchor-paper-9-publication]

