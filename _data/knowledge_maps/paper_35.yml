nodes:
  - id: paper-35
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Efficient, Reusable Fuzzy Extractors from LWE"
    summary: >-
      A foundations paper that identifies a concrete helper-data leakage failure, formalizes two levels of repeated-use security, and gives both repaired and new lattice-based fuzzy-extractor schemes.
    source_anchor_ids: [anchor-paper-35-problem-contributions]

  - id: paper-35-question
    kind: question
    parent_id: paper-35
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      When multiple servers enroll noisy readings of the same biometric, can every target key remain indistinguishable from uniform despite the collection of correlated helper data and disclosure of other enrollment keys?
    source_anchor_ids: [anchor-paper-35-problem-contributions, anchor-paper-35-reuse-definitions]

  - id: paper-35-answer
    kind: contribution
    parent_id: paper-35
    order: 2
    epistemic_status: source_asserted
    title: Attack, repair, transform, and direct scheme
    summary: >-
      Independent FMR public matrices enable complete recovery after two nearby enrollments; sharing one random matrix restores weak reusability, hashing nonce-bound extracted values gives strong reusability in the random-oracle model, and LWE encryption yields a direct standard-model construction.
    source_anchor_ids: [anchor-paper-35-attack, anchor-paper-35-weak-repair, anchor-paper-35-ro-transform, anchor-paper-35-direct]

  - id: paper-35-model
    kind: scope
    parent_id: paper-35
    order: 3
    epistemic_status: formally_defined
    title: Fuzzy-extractor model
    summary: >-
      Gen maps a noisy source w to public helper data and an l-bit key; Rec reproduces that key from the helper data and any w-prime within distance t. Security asks whether the key is indistinguishable from uniform given helper data and sufficient source min-entropy.
    source_anchor_ids: [anchor-paper-35-fe-definition]

  - id: paper-35-model-weak
    kind: definition
    parent_id: paper-35-model
    order: 1
    epistemic_status: defined
    title: Weak reusability
    summary: >-
      An adaptive adversary selects bounded-Hamming-weight shifts of one hidden source and receives every resulting helper string; the original enrollment key must remain indistinguishable from uniform.
    source_anchor_ids: [anchor-paper-35-reuse-definitions]

  - id: paper-35-model-strong
    kind: definition
    parent_id: paper-35-model
    order: 2
    epistemic_status: defined
    title: Strong reusability
    summary: >-
      The same experiment additionally reveals the extracted key for every shifted enrollment. Strong security therefore protects one target key even after compromise or legitimate disclosure of the others.
    source_anchor_ids: [anchor-paper-35-reuse-definitions]

  - id: paper-35-model-boundary
    kind: assumption
    parent_id: paper-35-model
    order: 3
    epistemic_status: modeling_choice
    title: Shift-correlated Hamming sources
    summary: >-
      The new definitions specialize to a Hamming metric and adversarially chosen shifts of weight at most t. They do not cover every possible joint distribution of repeated biometric readings allowed by stronger prior formulations.
    source_anchor_ids: [anchor-paper-35-reuse-definitions]

  - id: paper-35-analysis
    kind: method
    parent_id: paper-35
    order: 4
    epistemic_status: specified
    title: Analysis of the FMR extractor
    summary: >-
      FMR publishes a random linear-code matrix A and As + w, extracts coordinates of s, and reconstructs s by decoding the difference between helper data and a nearby reading.
    source_anchor_ids: [anchor-paper-35-fmr]

  - id: paper-35-attack
    kind: attack
    parent_id: paper-35-analysis
    order: 1
    epistemic_status: demonstrated
    title: Two-helper-string recovery attack
    summary: >-
      For nearby w1 and w2 under independent A1 and A2, subtracting helper strings yields a noisy linear system in s1 and s2. Decoding recovers both secrets and then both original biometrics; the paper calls this a complete break of weak reusability.
    source_anchor_ids: [anchor-paper-35-attack]

  - id: paper-35-attack-range
    kind: limitation
    parent_id: paper-35-attack
    order: 1
    epistemic_status: analyzed
    title: Parameter range of the attack
    summary: >-
      The direct exposition uses m at least 6n, while the source argues the decoder also works with greater expected time for 3n through 6n and expects additional helper strings to strengthen attacks; this extension is argued rather than experimentally measured.
    source_anchor_ids: [anchor-paper-35-attack]

  - id: paper-35-schemes
    kind: method
    parent_id: paper-35
    order: 5
    epistemic_status: constructed
    title: Reusable extractor constructions
    summary: >-
      The paper supplies three distinct positive results with different setup and idealization requirements; weak repair, random-oracle bootstrapping, and the direct LWE scheme should be evaluated separately.
    source_anchor_ids: [anchor-paper-35-weak-repair, anchor-paper-35-ro-transform, anchor-paper-35-direct]

  - id: paper-35-scheme-weak
    kind: scheme
    parent_id: paper-35-schemes
    order: 1
    epistemic_status: theorem_supported
    title: Common-matrix weakly reusable FMR
    summary: >-
      Reusing one uniformly generated public A across enrollments makes helper differences expose only s1 minus s2. Theorem 1 reduces simulated shifted helpers to ordinary FMR security and concludes weak reusability with the same error bound.
    source_anchor_ids: [anchor-paper-35-weak-repair]

  - id: paper-35-scheme-separation
    kind: claim
    parent_id: paper-35-schemes
    order: 2
    epistemic_status: explicit_counterexample
    title: Weak does not imply strong reusability
    summary: >-
      In the common-A FMR repair, helper differences reveal s1 minus s2; learning coordinates of one s through a disclosed extracted key reveals the corresponding coordinates, and hence the other key. This gives a natural separation between the definitions.
    source_anchor_ids: [anchor-paper-35-weak-repair]

  - id: paper-35-scheme-ro
    kind: scheme
    parent_id: paper-35-schemes
    order: 3
    epistemic_status: theorem_supported
    title: Generic weak-to-strong transform
    summary: >-
      Append a fresh nonce to the helper data and replace extracted r with H(nonce, r). Theorem 2 bounds strong-reuse advantage by weak-reuse error, guessing, and nonce-collision terms when H is a random oracle.
    source_anchor_ids: [anchor-paper-35-ro-transform]

  - id: paper-35-scheme-direct
    kind: scheme
    parent_id: paper-35-schemes
    order: 4
    epistemic_status: construction_with_reduction_sketch
    title: Direct standard-model LWE scheme
    summary: >-
      Encode a random s as As + w, use s to LWE-encrypt an independent random key r, publish the encoding and ciphertext, and recover s from a nearby reading before decrypting r. No random oracle is used.
    source_anchor_ids: [anchor-paper-35-direct]

  - id: paper-35-claims
    kind: claim_group
    parent_id: paper-35
    order: 6
    epistemic_status: source_asserted
    title: Formal claims
    summary: >-
      The claims range from an unconditional algebraic attack to reductions conditional on the base extractor, random-oracle idealization, or decisional LWE. Their premises are not interchangeable.
    source_anchor_ids: [anchor-paper-35-attack, anchor-paper-35-weak-repair, anchor-paper-35-ro-transform, anchor-paper-35-direct]

  - id: paper-35-claim-weak
    kind: claim
    parent_id: paper-35-claims
    order: 1
    epistemic_status: theorem_1
    title: Conditional weak reusability
    summary: >-
      If FMR is already an epsilon-secure fuzzy extractor for the stated source class and all executions share one uniformly random A, then it is epsilon-weakly reusable in the paper's shift model.
    source_anchor_ids: [anchor-paper-35-weak-repair]

  - id: paper-35-claim-ro
    kind: claim
    parent_id: paper-35-claims
    order: 2
    epistemic_status: theorem_2
    title: Random-oracle strong reusability
    summary: >-
      For a bounded-time attacker, the nonce-and-hash transform is strongly reusable with a stated asymptotic advantage bound combining the weak extractor's epsilon, extracted-key length, and nonce length.
    source_anchor_ids: [anchor-paper-35-ro-transform]

  - id: paper-35-claim-direct
    kind: claim
    parent_id: paper-35-claims
    order: 3
    epistemic_status: reduction_claim
    title: Standard-model strong reusability from LWE
    summary: >-
      For coordinate-independent source noise and matched encryption-error distribution, the direct construction's strong reusability reduces to decisional LWE with enough samples to cover the target, ciphertext, and adaptive reuse queries.
    source_anchor_ids: [anchor-paper-35-lwe, anchor-paper-35-direct]

  - id: paper-35-evidence
    kind: evidence_group
    parent_id: paper-35
    order: 7
    epistemic_status: formal_analysis
    title: Proof evidence
    summary: >-
      The source gives explicit experiments, algebraic attack derivations, theorem statements, construction algorithms, and reduction sketches. It contains no implementation, benchmark, biometric dataset, or concrete-parameter evaluation.
    source_anchor_ids: [anchor-paper-35-reuse-definitions, anchor-paper-35-attack, anchor-paper-35-ro-transform, anchor-paper-35-direct]

  - id: paper-35-evidence-attack
    kind: evidence
    parent_id: paper-35-evidence
    order: 1
    epistemic_status: derivation_inspected
    title: Attack derivation
    summary: >-
      Subtracting the two public values eliminates the nearby readings up to a sparse error, producing a decodable random-linear-code instance; recovering s1 and s2 makes each wi equal to its public vector minus Ai si.
    source_anchor_ids: [anchor-paper-35-attack]

  - id: paper-35-evidence-reductions
    kind: evidence
    parent_id: paper-35-evidence
    order: 2
    epistemic_status: proof_sketches
    title: Simulation and LWE reductions
    summary: >-
      The weak repair simulates shifted helpers from one challenge, the generic transform programs independent-looking hash outputs except on collision or guessed-key events, and the direct scheme replaces LWE samples with uniform vectors that perfectly hide the target key.
    source_anchor_ids: [anchor-paper-35-weak-repair, anchor-paper-35-ro-transform, anchor-paper-35-direct]

  - id: paper-35-boundaries
    kind: limitation_group
    parent_id: paper-35
    order: 8
    epistemic_status: material
    title: Scope and limitations
    summary: >-
      Positive results depend respectively on a shared public matrix, a random oracle, or a specific LWE-based encryption construction and coordinate-independent source distribution. Error tolerance inherits the FMR decoder's small-Hamming-error regime, and the paper does not validate real biometric noise.
    source_anchor_ids: [anchor-paper-35-fmr, anchor-paper-35-weak-repair, anchor-paper-35-ro-transform, anchor-paper-35-direct]

  - id: paper-35-artifacts
    kind: artifact_group
    parent_id: paper-35
    order: 9
    epistemic_status: source_available
    title: Artifacts and resources
    summary: >-
      A checked-in author manuscript, an IACR ePrint record, and the official Springer record are available. The contribution is mathematical; no code, proof-assistant development, test vectors, or biometric corpus is claimed.
    source_anchor_ids: [anchor-paper-35-problem-contributions, anchor-paper-35-publication]

  - id: paper-35-scrutiny
    kind: scrutiny
    parent_id: paper-35
    order: 10
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The work appeared at CSCML and is publicly archived. Venue review and later citations do not substitute for independent line-by-line verification of the attacks and reductions; no public review reports or formalization were located.
    source_anchor_ids: [anchor-paper-35-publication, anchor-paper-35-citations]

