    title: "Private MANET content discovery"
    summary: "A protocol architecture for privately finding and selectively revealing peer-to-peer content in mobile ad hoc networks."
    source_anchor_ids: [anchor-paper-18-question]

  - id: paper-18-question
    kind: question
    parent_id: paper-18
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can content be queried or subscribed to without exposing search terms, matches, locations, or unauthorized fields to intermediate and responding peers?"
    source_anchor_ids: [anchor-paper-18-question]

  - id: paper-18-answer
    kind: contribution
    parent_id: paper-18
    order: 2
    epistemic_status: construction_proposed
    title: "Central answer"
    summary: "Compose privacy-preserving pattern matching for discovery with cryptographic policy enforcement for field-level release, then use the composition in both request-driven PULL and subscription-driven PUSH flows."
    source_anchor_ids: [anchor-paper-18-spm, anchor-paper-18-qpe, anchor-paper-18-protocols]

  - id: paper-18-scope
    kind: scope
    parent_id: paper-18
    order: 3
    epistemic_status: explicitly_scoped
    title: "Content-centric MANET setting"
    summary: "Content and metadata are replicated among cooperating peers without fixed infrastructure, and a compromised or curious node may observe searches and cached material."
    source_anchor_ids: [anchor-paper-18-model]

  - id: paper-18-adversary
    kind: threat_model
    parent_id: paper-18-scope
    order: 1
    epistemic_status: defined
    title: "Honest-but-curious participants"
    summary: "Participants follow the specified protocol but try to infer queries, matches, content location, popularity, or unauthorized attributes from messages and local state. Malicious deviation is not addressed."
    source_anchor_ids: [anchor-paper-18-model]

  - id: paper-18-primitive-spm
    kind: primitive
    parent_id: paper-18
    order: 4
    epistemic_status: assumed_from_prior_work
    title: "Secure pattern matching"
    summary: "The construction assumes a secure pattern-matching primitive supporting exact, wildcard, substring, and range-style metadata queries while hiding the pattern from the holder."
    source_anchor_ids: [anchor-paper-18-spm]

  - id: paper-18-primitive-qpe
    kind: scheme
    parent_id: paper-18
    order: 5
    epistemic_status: proposed
    title: "Query-policy enforcement"
    summary: "The responder encrypts the answer under a one-time key, divides that key into additive shares for requested attributes, and encrypts each share under the corresponding attribute key; reconstruction succeeds only with all required authorizations."
    source_anchor_ids: [anchor-paper-18-qpe]

  - id: paper-18-metadata
    kind: data_model
    parent_id: paper-18
    order: 6
    epistemic_status: specified
    title: "Protected content record"
    summary: "Metadata carries description, tags, group, index, and a globally unique identifier; content is encrypted, a hash binds the ciphertext, and a signature authenticates the metadata record."
    source_anchor_ids: [anchor-paper-18-metadata]

  - id: paper-18-pull
    kind: protocol
    parent_id: paper-18
    order: 7
    epistemic_status: proposed
    title: "Private PULL query"
    summary: "A requester disseminates an encrypted query; peers securely match it against metadata and return encrypted match indicators or references that only an authorized requester can interpret."
    source_anchor_ids: [anchor-paper-18-protocols]

  - id: paper-18-push
    kind: protocol
    parent_id: paper-18
    order: 8
    epistemic_status: proposed
    title: "Private PUSH subscription"
    summary: "A node advertises an encrypted interest, and newly generated content is privately matched to that interest before an authorized result is returned."
    source_anchor_ids: [anchor-paper-18-protocols]

  - id: paper-18-security
    kind: security_argument
    parent_id: paper-18
    order: 9
    epistemic_status: compositional_informal_argument
    title: "Security basis"
    summary: "Privacy and authorization are argued by composition of assumed secure pattern matching, homomorphic encryption, secret sharing, symmetric encryption, hashing, signatures, and pre-distributed attribute keys."
    source_anchor_ids: [anchor-paper-18-spm, anchor-paper-18-qpe, anchor-paper-18-protocols]

  - id: paper-18-evidence
    kind: evidence_group
    parent_id: paper-18
