    epistemic_status: construction_only
    title: "Evidence supplied"
    summary: "The paper specifies data structures and message flows and explains how their primitives fit together; it does not report an implementation, benchmark, simulation, reduction-style proof, or machine-checked model."
    source_anchor_ids: [anchor-paper-18-qpe, anchor-paper-18-protocols, anchor-paper-18-limitations]

  - id: paper-18-limitations
