nodes:
  - id: paper-28
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Communication-Optimal Proactive Secret Sharing for Dynamic Groups"
    summary: "A dynamic proactive secret-sharing construction that refreshes long-lived secrets while parties and thresholds change."
    source_anchor_ids: [anchor-paper-28-problem]

  - id: paper-28-question
    kind: question
    parent_id: paper-28
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can a mobile-adversary-resistant sharing scheme add, remove, or replace parties without the O(n⁴) or exponential communication of prior dynamic schemes?"
    source_anchor_ids: [anchor-paper-28-problem, anchor-paper-28-roadblocks]

  - id: paper-28-answer
    kind: contribution
    parent_id: paper-28
    order: 2
    epistemic_status: source_asserted
    title: "Central answer"
    summary: "Batch Θ(n) secrets per polynomial and use hyper-invertible transformations plus masked share transfer so a new group receives refreshed shares while neither old nor new corruptions reveal enough correlated state."
    source_anchor_ids: [anchor-paper-28-roadblocks, anchor-paper-28-redistribution]

  - id: paper-28-scope
    kind: scope
    parent_id: paper-28
    order: 3
    epistemic_status: defined
    title: "DPSS functionality"
    summary: "Definition 4 specifies Share, Redistribute, and Open with termination, correctness, and secrecy under a phase-by-phase mobile corruption threshold τ(n(i)) while party set and threshold change."
    source_anchor_ids: [anchor-paper-28-definitions]

  - id: paper-28-scope-adversary
    kind: threat_model
    parent_id: paper-28-scope
    order: 1
    epistemic_status: defined
    title: "Mobile adversary"
    summary: "The adversary may corrupt changing parties across phases but not more than the active threshold in any phase; perfect and statistical variants use different parameter regimes."
    source_anchor_ids: [anchor-paper-28-definitions, anchor-paper-28-parameters]

  - id: paper-28-scope-constraints
    kind: assumption
    parent_id: paper-28-scope
    order: 2
    epistemic_status: explicit
    title: "Dynamic-change constraints"
    summary: "Perfect security limits each population change to a factor of two and requires old honest shares to interpolate new polynomials while old corrupt shares cannot; the statistical base protocol constrains threshold changes to a factor of two."
    source_anchor_ids: [anchor-paper-28-parameters]

  - id: paper-28-method
    kind: method
    parent_id: paper-28
    order: 4
    epistemic_status: specified
    title: "Redistribution construction"
    summary: "Four Threshold Change protocols handle increasing/decreasing thresholds with or without batch-size changes; Refresh Recovery then masks, checks, and transfers the refreshed packed shares."
    source_anchor_ids: [anchor-paper-28-redistribution]

  - id: paper-28-method-threshold
    kind: component
    parent_id: paper-28-method
    order: 1
    epistemic_status: specified
    title: "Threshold and batch transformation"
    summary: "Hyper-invertible matrices distribute transformed sharings among old parties, who emulate trusted threshold conversion; Berlekamp-Welch reconstruction tolerates corrupted contributions."
    source_anchor_ids: [anchor-paper-28-redistribution]

  - id: paper-28-method-refresh
    kind: component
    parent_id: paper-28-method
    order: 2
    epistemic_status: specified
    title: "Masked refresh and share transfer"
    summary: "Old parties create U sharings of existing shares and random/zero V sharings; each new party receives a linear combination equal to its share of H+Q without the old group learning Q or the new group learning H."
    source_anchor_ids: [anchor-paper-28-redistribution]

  - id: paper-28-method-virtualization
    kind: component
    parent_id: paper-28-method
    order: 3
    epistemic_status: described
    title: "Statistical threshold amplification"
    summary: "Committee-based party virtualization raises the low-threshold statistical base construction toward one-half corruption while preserving constant-round redistribution."
    source_anchor_ids: [anchor-paper-28-virtualization]

  - id: paper-28-claims
    kind: claim_group
    parent_id: paper-28
    order: 5
    epistemic_status: source_asserted_with_proof_material
    title: "Principal claims"
    summary: "The paper reports first dynamic proactive schemes with O(1) amortized communication per secret, information-theoretic security, near-optimal thresholds, and a DPMPC application."
    source_anchor_ids: [anchor-paper-28-problem, anchor-paper-28-proof]

  - id: paper-28-claim-complexity
    kind: claim
    parent_id: paper-28-claims
    order: 1
    epistemic_status: analytically_supported
    title: "Amortized communication optimality"
    summary: "Batching O(n) secrets and moving O(n)-scale data yields O(1) amortized field elements per secret; the paper explicitly does not claim optimal non-amortized complexity."
    source_anchor_ids: [anchor-paper-28-problem, anchor-paper-28-parameters]

  - id: paper-28-claim-thresholds
    kind: claim
    parent_id: paper-28-claims
    order: 2
    epistemic_status: proved_conditional
    title: "Near-optimal corruption thresholds"
    summary: "The reported perfect variant supports any threshold fraction below one third under chosen constants; party virtualization raises the statistical variant toward one half."
    source_anchor_ids: [anchor-paper-28-problem, anchor-paper-28-parameters, anchor-paper-28-virtualization]

  - id: paper-28-claim-dpmpc
    kind: claim
    parent_id: paper-28-claims
    order: 3
    epistemic_status: construction_sketch
    title: "Dynamic proactive MPC"
    summary: "The application section proposes executing Redistribute between circuit layers of an existing proactive MPC to let the computing party set and threshold evolve."
    source_anchor_ids: [anchor-paper-28-dpmpc]

  - id: paper-28-evidence
    kind: evidence_group
    parent_id: paper-28
    order: 6
    epistemic_status: formal_paper_evidence
    title: "Evidence chain"
    summary: "The source provides precise functionality definitions, protocol pseudocode, parameter inequalities, complexity reasoning, and UC ideal/simulator material."
    source_anchor_ids: [anchor-paper-28-definitions, anchor-paper-28-redistribution, anchor-paper-28-proof]

  - id: paper-28-evidence-proof
    kind: evidence
    parent_id: paper-28-evidence
    order: 1
    epistemic_status: paper_proof_not_machine_checked
    title: "Security argument"
    summary: "Appendix B writes an ideal functionality and simulator for Threshold Change2 and states analogous functionality for the other threshold-change and refresh components; this audit did not mechanically verify the extrapolation or all imported subprotocol theorems."
    source_anchor_ids: [anchor-paper-28-proof]

  - id: paper-28-boundaries
    kind: limitation_group
    parent_id: paper-28
    order: 7
    epistemic_status: material
    title: "Trusted boundaries and limitations"
    summary: "The result assumes synchrony, threshold-bounded phases, admissible population changes, large batches for amortization, and an external mechanism that agrees on new membership."
    source_anchor_ids: [anchor-paper-28-parameters, anchor-paper-28-redistribution]

