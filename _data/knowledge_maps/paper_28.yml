keywords:
  - "proactive secret sharing"
  - "dynamic groups"
  - "communication complexity"
editorial_summary: "This work protects long-lived secrets even as participants join, leave, or are eventually compromised by periodically refreshing shares and restoring parties. It gives the first dynamic proactive secret-sharing schemes with optimal amortized constant communication per secret, improving on polynomial or exponential prior costs, and extends them to dynamic proactive MPC."

research_question: "Can proactive secret sharing retain long-term confidentiality under changing group membership while reducing amortized communication to the optimal per-secret scale?"
central_answer: "The paper reports dynamic refresh and recovery schemes with optimal amortized constant communication per secret, together with an extension to dynamic proactive multiparty computation."

