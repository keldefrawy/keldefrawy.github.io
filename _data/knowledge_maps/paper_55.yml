nodes:
  - id: paper-55
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Communication-Efficient (Proactive) Secure Computation for Dynamic General Adversary Structures and Dynamic Groups"
    summary: >-
      A formal protocol suite for proactive MPC under changing non-threshold adversary structures and participant sets, with conversions between additive and MSP secret-sharing representations.
    source_anchor_ids: [anchor-paper-55-problem]

  - id: paper-55-question
    kind: question
    parent_id: paper-55
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      How can long-lived MPC adapt its security encoding when both the parties and the allowed corruption subsets change over time?
    source_anchor_ids: [anchor-paper-55-problem]

  - id: paper-55-answer
    kind: contribution
    parent_id: paper-55
    order: 2
    epistemic_status: source_asserted
    title: Structure-adaptive PMPC
    summary: >-
      Maintain two proactive MPC realizations with different communication profiles and securely convert shares between them whenever the current general adversary structure makes the alternative representation preferable.
    source_anchor_ids: [anchor-paper-55-overview, anchor-paper-55-convert]

  - id: paper-55-scope
    kind: scope
    parent_id: paper-55
    order: 3
    epistemic_status: defined
    title: Communication and phase model
    summary: >-
      Parties use a synchronous network with authenticated broadcast and point-to-point channels. Operational and refresh phases alternate; a mobile adversary may change its corruption set subject to the current general adversary structure.
    source_anchor_ids: [anchor-paper-55-model]

  - id: paper-55-scope-gas
    kind: threat_model
    parent_id: paper-55-scope
    order: 1
    epistemic_status: defined
    title: Dynamic general adversary structure
    summary: >-
      Access, secrecy, and adversary structures specify qualified, ignorant, and potentially corrupted subsets rather than a single cardinality threshold. The active protocol results rely on the Q2 condition that no two allowed adversary sets cover all parties.
    source_anchor_ids: [anchor-paper-55-model, anchor-paper-55-overview]

  - id: paper-55-framework
    kind: protocol
    parent_id: paper-55
    order: 4
    epistemic_status: specified
    title: Eight-operation dynamic PMPC framework
    summary: >-
      Share, Reconstruct, Add, Multiply, Refresh, Recover, Redistribute, and Convert cover computation, proactive maintenance, membership change, and representation adaptation.
    source_anchor_ids: [anchor-paper-55-blueprint, anchor-paper-55-overview]

  - id: paper-55-framework-additive
    kind: protocol
    parent_id: paper-55-framework
    order: 1
    epistemic_status: specified
    title: Additive-sharing PMPC
    summary: >-
      The additive realization distributes each summand to a designated holder set, uses information checking and dispute control against active faults, and adds new refresh, recover, and redistribution procedures.
    source_anchor_ids: [anchor-paper-55-additive]

  - id: paper-55-framework-msp
    kind: protocol
    parent_id: paper-55-framework
    order: 2
    epistemic_status: specified
    title: MSP-based PMPC
    summary: >-
      The monotone-span-program realization represents access structures with an MSP matrix and develops random-sharing, robust-resharing, recovery, refresh, and redistribution components around the base MPC protocol.
    source_anchor_ids: [anchor-paper-55-msp]

  - id: paper-55-framework-convert
    kind: protocol
    parent_id: paper-55-framework
    order: 3
    epistemic_status: specified
    title: Bidirectional share conversion
    summary: >-
      Conversion protocols transform an additive sharing into an MSP sharing and vice versa while preserving the secret, enabling protocol selection to follow the changing structure rather than remain fixed.
    source_anchor_ids: [anchor-paper-55-convert]

  - id: paper-55-claims
    kind: claim_group
    parent_id: paper-55
    order: 5
    epistemic_status: formally_analyzed
    title: Security and efficiency claims
    summary: >-
      The paper proves correctness and secrecy of the new maintenance and conversion subprotocols under their GAS conditions and gives separate communication bounds in terms of parties, maximal secrecy sets, MSP rows, field size, and checking parameters.
    source_anchor_ids: [anchor-paper-55-additive, anchor-paper-55-msp, anchor-paper-55-convert, anchor-paper-55-proofs]

  - id: paper-55-claim-proactive
    kind: claim
    parent_id: paper-55-claims
    order: 1
    epistemic_status: proved_under_model
    title: Proactive refresh and recovery
    summary: >-
      Refresh rerandomizes shares so views across stages cannot be combined, and Recover reconstructs replacement shares for reset parties without revealing the maintained secret beyond the model's prescribed views.
    source_anchor_ids: [anchor-paper-55-additive, anchor-paper-55-msp, anchor-paper-55-proofs]

  - id: paper-55-claim-dynamic
    kind: claim
    parent_id: paper-55-claims
    order: 2
    epistemic_status: proved_under_model
    title: Dynamic group redistribution
    summary: >-
      Redistribute transfers a sharing of the same secret to a changed participant group under the old and new phase structures, so departing shares do not remain sufficient under the stated assumptions.
    source_anchor_ids: [anchor-paper-55-blueprint, anchor-paper-55-additive, anchor-paper-55-msp, anchor-paper-55-proofs]

  - id: paper-55-claim-adaptive
    kind: claim
    parent_id: paper-55-claims
    order: 3
    epistemic_status: construction_supported
    title: Representation-aware communication
    summary: >-
      Because additive complexity scales with the secrecy-structure description while MSP complexity scales with matrix dimension, conversion permits choosing the more communication-efficient representation for the current structure.
    source_anchor_ids: [anchor-paper-55-overview, anchor-paper-55-convert]

  - id: paper-55-evidence
    kind: evidence_group
    parent_id: paper-55
    order: 6
    epistemic_status: proof_documented
    title: Formal evidence
    summary: >-
      The full source contains protocol pseudocode, correctness and secrecy statements, ideal-world formulations, simulators, and proofs for additive, MSP, and conversion components. This audit maps those obligations but does not independently verify every algebraic step.
    source_anchor_ids: [anchor-paper-55-proofs]

  - id: paper-55-boundaries
    kind: limitation_group
    parent_id: paper-55
    order: 7
    epistemic_status: material
    title: Boundaries
    summary: >-
      The results assume synchrony, authenticated broadcast, point-to-point channels, phase-based reboot and erasure behavior, and Q2-compatible structures. Communication can still be large because an adversary-structure description itself may be exponential in the party count.
    source_anchor_ids: [anchor-paper-55-model, anchor-paper-55-boundaries]

  - id: paper-55-boundary-scheduling
    kind: limitation
    parent_id: paper-55-boundaries
    order: 1
    epistemic_status: explicitly_out_of_scope
    title: Refresh policy and structure compression are not solved
    summary: >-
      The paper constructs refresh mechanisms but does not specify when a deployment should trigger them, and it explicitly does not minimize the description size of general adversary structures.
    source_anchor_ids: [anchor-paper-55-blueprint, anchor-paper-55-boundaries]

  - id: paper-55-boundary-evaluation
    kind: limitation
    parent_id: paper-55-boundaries
    order: 2
    epistemic_status: absent_evidence
    title: No implementation evaluation
    summary: >-
      Evidence is formal and asymptotic; the represented paper does not supply a prototype, concrete benchmark, network experiment, or deployment study.
    source_anchor_ids: [anchor-paper-55-problem, anchor-paper-55-proofs]

  - id: paper-55-resources
    kind: artifact_group
    parent_id: paper-55
    order: 8
    epistemic_status: full_text_available
    title: Publication resources
    summary: >-
      The complete IACR ePrint and an author-uploaded ResearchGate full text expose the protocol and proofs, while the DOI identifies the SCN version. No code artifact is claimed.
    source_anchor_ids: [anchor-paper-55-problem, anchor-paper-55-publication]

  - id: paper-55-scrutiny
    kind: scrutiny
    parent_id: paper-55
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The paper appeared at SCN 2020. Review reports, independent proof audits, and reproductions are not represented.
    source_anchor_ids: [anchor-paper-55-publication]

  - id: paper-55-lineage
    kind: lineage
    parent_id: paper-55
    order: 10
    epistemic_status: documented
    title: Extends two general-adversary MPC lines
    summary: >-
      The construction proactivizes prior additive and MSP-based GAS MPC protocols and connects them through conversion, while “Communication-Efficient Proactive MPC for Dynamic Groups with Dishonest Majorities” by Karim Eldefrawy, Tancrède Lepoint, and Antonin Leroux follows a different dishonest-majority bivariate-PSS route for threshold-style dynamic groups.
    source_anchor_ids: [anchor-paper-55-overview, anchor-paper-55-convert]

