editorial_summary: "This paper refreshes long-lived secret shares against a mobile adversary even when group membership changes and a majority may be dishonest. Its batching and bivariate-sharing techniques substantially reduce communication and provide building blocks for later proactive MPC protocols."

research_question: "Can proactive secret sharing support dynamic membership and a mobile dishonest majority without prohibitive communication cost?"
central_answer: "The paper reports batching and bivariate-sharing techniques that refresh long-lived shares under dynamic membership and reduce communication."

