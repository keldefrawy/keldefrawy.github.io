nodes:
  - id: paper-44
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_body_not_audited
    title: Dishonest-majority proactive MPC
    summary: A published feasibility result for proactive MPC under separate passive, active, and mixed mobile-corruption bounds; this map is intentionally limited to exposed primary claims.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-question
    kind: question
    parent_id: paper-44
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can long-lived MPC withstand a mobile adversary whose accumulated corruptions eventually cover all parties and whose within-period passive view may exceed an honest majority?
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-answer
    kind: contribution
    parent_id: paper-44
    order: 2
    epistemic_status: abstract_asserted
    title: Central answer
    summary: The abstract claims the first PMPC feasibility result for a dishonest-majority setting, with robustness only in the passive-only case and identifiable abort under active or mixed faults.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-model
    kind: threat_model
    parent_id: paper-44
    order: 3
    epistemic_status: abstract_defined
    title: Mobile refresh-period adversary
    summary: Corrupted parties may change across refresh periods and all parties may be visited over the computation lifetime; security is conditioned on per-period passive and active thresholds.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-goals
    kind: definition
    parent_id: paper-44
    order: 4
    epistemic_status: abstract_level
    title: Correctness, privacy, robustness, and identifiable abort
    summary: >-
      The exposed source distinguishes privacy/correctness security from guaranteed completion: active faults may be detected and attributed while still forcing abort.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-protocol
    kind: protocol
    parent_id: paper-44
    order: 5
    epistemic_status: published_not_body_audited
    title: PMPC construction
    summary: A concrete PMPC protocol is claimed, but its share representation, refresh, recovery, gate evaluation, channels, cryptographic assumptions, and simulators cannot be responsibly reconstructed from the abstract alone.
    source_anchor_ids: [anchor-paper-44-abstract, anchor-paper-44-author-provenance]
  - id: paper-44-claims
    kind: claim_group
    parent_id: paper-44
    order: 6
    epistemic_status: abstract_asserted
    title: Exposed resilience claims
    summary: The abstract reports separate bounds rather than one universal corruption threshold.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-claim-passive
    kind: claim
    parent_id: paper-44-claims
    order: 1
    epistemic_status: abstract_asserted_proof_unread
    title: Passive dishonest-majority case
    summary: With no active corruptions, the abstract states robust security for t < n - 2 passive corruptions per refresh period.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-claim-active
    kind: claim
    parent_id: paper-44-claims
    order: 2
    epistemic_status: abstract_asserted_proof_unread
    title: Active-only case
    summary: With no additional passive corruptions, the abstract states non-robust security with identifiable abort for t < n/2 - 1 active corruptions.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-claim-mixed
    kind: claim
    parent_id: paper-44-claims
    order: 3
    epistemic_status: abstract_asserted_proof_unread
    title: Mixed corruption case
    summary: For k active corruptions, the abstract states identifiable-abort security when total corruptions are fewer than n - k - 1; the full quantification and rounding conventions require body review.
    source_anchor_ids: [anchor-paper-44-abstract]
  - id: paper-44-evidence
    kind: evidence_group
