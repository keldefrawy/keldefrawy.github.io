  - "proactive MPC"
  - "dishonest majority"
editorial_summary: "This paper gives the first feasibility result for proactive MPC when a mobile adversary can control a dishonest majority over the system's lifetime. The protocol provides strong passive-corruption resilience and identifiable aborts under active or mixed corruptions, rather than unconditional robustness in every case."

research_question: "Is proactive secure multiparty computation feasible when a mobile adversary can accumulate a dishonest majority over the system's lifetime?"
central_answer: "The paper reports a protocol with strong passive-corruption resilience and identifiable abort under active or mixed corruptions."

