nodes:
  - id: paper-62
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: In-app selective access control
    summary: A working Office add-in design for encrypting selected document regions under attribute policies, evaluated as an Excel prototype and extended with enterprise-deployment analysis.
    source_anchor_ids: [anchor-paper-62-problem, anchor-paper-62-published-version]

  - id: paper-62-question
    kind: question
    parent_id: paper-62
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can users selectively share one intact Office document while cryptography, rather than a trusted document server, determines which protected regions each recipient can read?
    source_anchor_ids: [anchor-paper-62-problem]

  - id: paper-62-answer
    kind: contribution
    parent_id: paper-62
    order: 2
    epistemic_status: implemented_and_measured
    title: Central answer
    summary: Integrate a policy UI and hybrid encryption into an Office JavaScript add-in, place encrypted cell data in the document's custom XML, and release a data key only when a recipient's CP-ABE attributes satisfy the policy.
    source_anchor_ids: [anchor-paper-62-workflows, anchor-paper-62-evaluation]

  - id: paper-62-scope
    kind: scope
    parent_id: paper-62
    order: 3
    epistemic_status: explicitly_scoped
    title: System and trust boundary
    summary: The prototype protects selected spreadsheet content while relying on a key-issuing authority, Office's add-in and document APIs, cryptographic implementations, and secure handling of recipient keys.
    source_anchor_ids: [anchor-paper-62-setting, anchor-paper-62-deployment]

  - id: paper-62-scope-authority
    kind: assumption
    parent_id: paper-62-scope
    order: 1
    epistemic_status: trusted_component
    title: Key authority and identity integration
    summary: An authority alone holds the CP-ABE master secret and issues attribute keys; an enterprise deployment must connect that lifecycle to IAM, private-key storage, revocation, and logging infrastructure.
    source_anchor_ids: [anchor-paper-62-setting, anchor-paper-62-deployment]

  - id: paper-62-scheme
    kind: scheme
    parent_id: paper-62
    order: 4
    epistemic_status: implemented
    title: Selective-encryption scheme
    summary: The design combines local authenticated symmetric encryption for cell contents with FAME CP-ABE encapsulation of a random content key and an embedded policy describing eligible attributes.
    source_anchor_ids: [anchor-paper-62-workflows, anchor-paper-62-evaluation]

  - id: paper-62-scheme-document
    kind: component
    parent_id: paper-62-scheme
    order: 1
    epistemic_status: implemented
    title: Document-preserving storage
    summary: Ciphertexts and metadata are stored in a custom XML part, protected cells are cleared or shown as unavailable, and formulas remain recoverable because the workflow encrypts underlying cell inputs rather than only rendered text.
    source_anchor_ids: [anchor-paper-62-workflows]

  - id: paper-62-scheme-policy
    kind: component
    parent_id: paper-62-scheme
    order: 2
    epistemic_status: implemented_with_caveats
    title: Policy representation
    summary: The UI supports AND/OR combinations over string and numerical predicates; numerical comparisons are compiled into bit attributes, increasing policy size and requiring a fixed bit length chosen consistently by issuers and encryptors.
    source_anchor_ids: [anchor-paper-62-policies]

  - id: paper-62-claims
    kind: claim_group
    parent_id: paper-62
    order: 5
    epistemic_status: mixed
    title: Principal claims
    summary: The paper makes an implementation claim, a conditional confidentiality claim, and a measured usability/performance claim; it does not claim a production deployment or an end-to-end formal proof.
    source_anchor_ids: [anchor-paper-62-workflows, anchor-paper-62-evaluation, anchor-paper-62-alternative]

  - id: paper-62-claim-access
    kind: claim
    parent_id: paper-62-claims
    order: 1
    epistemic_status: cryptographically_conditional
    title: Attribute-gated confidentiality
    summary: A recipient who lacks a CP-ABE key satisfying the cell policy should not recover the symmetric content key, conditional on the CP-ABE, authenticated-encryption, key-issuance, and client-execution assumptions.
    source_anchor_ids: [anchor-paper-62-workflows, anchor-paper-62-evaluation]

  - id: paper-62-claim-performance
    kind: claim
    parent_id: paper-62-claims
    order: 2
    epistemic_status: experimentally_supported
    title: Interactive-scale prototype performance
    summary: In the reported laptop/Docker environment, encrypting 10,000 cells ranges from 580 ms for the simplest policy to 1.614 s for the largest tested policy; decrypting one to ten 100-cell ranges averages about 1.082-1.851 s.
    source_anchor_ids: [anchor-paper-62-evaluation]

  - id: paper-62-evidence
    kind: evidence_group
    parent_id: paper-62
    order: 6
    epistemic_status: implemented_and_measured
    title: Evidence chain
    summary: Evidence consists of described add-in workflows, screenshots, a FAME/Charm prototype, concrete policy and file-size tests, and deployment analysis; no public code repository or independent reproduction is identified in the audited sources.
    source_anchor_ids: [anchor-paper-62-workflows, anchor-paper-62-evaluation, anchor-paper-62-deployment]

  - id: paper-62-boundaries
    kind: limitation_group
    parent_id: paper-62
    order: 7
    epistemic_status: material
    title: Limits and unresolved obligations
    summary: The tested system is a prototype, large numerical policies expand substantially, the standardized fallback loses collusion resistance for AND clauses, and production security depends on key lifecycle, trusted client execution, Office APIs, and enterprise integration.
    source_anchor_ids: [anchor-paper-62-policies, anchor-paper-62-alternative, anchor-paper-62-deployment]

  - id: paper-62-boundary-platform
    kind: limitation
    parent_id: paper-62-boundaries
    order: 1
    epistemic_status: platform_dependent
    title: Client-side execution is essential
    summary: Platforms that execute extensions only on a server may expose plaintext or long-term keys to that server; the paper's out-of-platform workaround improves trust placement at a cost in usability.
    source_anchor_ids: [anchor-paper-62-platforms]

  - id: paper-62-resources
    kind: artifact_group
    parent_id: paper-62
    order: 8
    epistemic_status: source_available
    title: Auditable resources and versions
    summary: "Both the published and extended PDFs are checked into this site with fixity and page counts. They are distinct versions: the extended copy adds material and should not silently replace the published record."
    source_anchor_ids: [anchor-paper-62-published-version, anchor-paper-62-deployment, anchor-paper-62-publication]

  - id: paper-62-scrutiny
    kind: scrutiny
    parent_id: paper-62
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: The proceedings paper appeared at CSCML 2022. No public review reports, artifact evaluation, independent reproduction, correction, or adversarial analysis was located in this audit.
    source_anchor_ids: [anchor-paper-62-publication]

  - id: paper-62-lineage
    kind: lineage
    parent_id: paper-62
    order: 10
    epistemic_status: documented
    title: Research and version lineage
    summary: The work applies mature CP-ABE ideas to widely used authoring software, with Excel as the measured case and Word, Outlook, PowerPoint, browser, and other platform directions treated at different implementation or future-work stages.
    source_anchor_ids: [anchor-paper-62-problem, anchor-paper-62-platforms]

