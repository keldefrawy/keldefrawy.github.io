  - "remote attestation"
  - "secure updates"
  - "embedded systems"
editorial_summary: "PURE extends verified remote attestation so a verifier can obtain trustworthy proofs that a compromised embedded device was updated, erased, and reset correctly. The added services remain secure under full software compromise and require very little additional hardware."

research_question: "Can verified remote attestation be extended so a verifier can establish that a compromised low-end device was updated, erased, and reset as intended?"
central_answer: "PURE reportedly adds update, erasure, and reset services to a verified attestation foundation while targeting security under full software compromise and small hardware cost."

