title: "PURE: Using Verified Remote Attestation to Obtain Proofs of Update, Reset and Erasure in Low-End Embedded Systems"
year: 2019
status: "Published"
venue: "IEEE/ACM International Conference on Computer-Aided Design (ICCAD)"
