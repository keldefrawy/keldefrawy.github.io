nodes:
  - id: paper-46
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: PURE
    summary: A verified-attestation extension that gives a remote verifier cryptographic proofs of reset, update, and erasure on a low-end MCU.
    source_anchor_ids: [anchor-paper-46-problem]
  - id: paper-46-question
    kind: question
    parent_id: paper-46
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: After remote attestation detects compromise, can the verifier prove that remediation really changed all intended device state and restarted execution safely?
    source_anchor_ids: [anchor-paper-46-problem]
  - id: paper-46-answer
    kind: contribution
    parent_id: paper-46
    order: 2
    epistemic_status: implemented_and_formally_analyzed
    title: Central answer
    summary: Reuse VRASED's protected HMAC and hardware monitor to bind a fresh challenge to reset, update, or erasure transitions, then serially compose the three services.
    source_anchor_ids: [anchor-paper-46-vrased, anchor-paper-46-por, anchor-paper-46-pou, anchor-paper-46-poe]
  - id: paper-46-threat
    kind: threat_model
    parent_id: paper-46
    order: 3
    epistemic_status: defined
    title: Full software-compromise adversary
    summary: Malware controls the prover's writable memory and software execution, including code-reuse attempts and refusal to cooperate, but cannot violate protected hardware/ROM, extract the attestation key, or mount physical/fault attacks.
    source_anchor_ids: [anchor-paper-46-adversary]
  - id: paper-46-assumptions
    kind: assumption
    parent_id: paper-46
    order: 4
    epistemic_status: inherited_and_extended
    title: Trusted boundary
    summary: Guarantees inherit VRASED's MCU-signal, reset, key, HMAC, compiler, and hardware-monitor assumptions; helper-code availability and verifier request authentication are separate operational concerns.
    source_anchor_ids: [anchor-paper-46-vrased, anchor-paper-46-pou, anchor-paper-46-poe]
  - id: paper-46-services
    kind: protocol_group
    parent_id: paper-46
    order: 5
    epistemic_status: specified_verified_and_implemented
    title: Three remediation services
    summary: Each service has a security game and construction; only trusted-component changes are model-checked, while theorem proofs connect accepted HMAC evidence to the intended state transition.
    source_anchor_ids: [anchor-paper-46-por, anchor-paper-46-pou, anchor-paper-46-poe]
  - id: paper-46-por-node
    kind: protocol
    parent_id: paper-46-services
    order: 1
    epistemic_status: implemented_and_model_checked
    title: Proof of Reset (PoR)
    summary: Trusted code authenticates reset completion under a challenge, and hardware rules ensure that the proof is emitted only through the reset path before execution returns to unprivileged software.
    source_anchor_ids: [anchor-paper-46-por]
  - id: paper-46-pou-node
    kind: protocol
    parent_id: paper-46-services
    order: 2
    epistemic_status: implemented_and_reduction_proved
    title: Proof of Update (PoU)
    summary: Untrusted helper code writes target software S into region UR; VRASED then authenticates UR and request context so a valid proof is tied to the installed bytes, assuming request origin is authenticated when needed.
    source_anchor_ids: [anchor-paper-46-pou]
  - id: paper-46-poe-node
    kind: protocol
    parent_id: paper-46-services
    order: 3
    epistemic_status: implemented_and_reduction_reused
    title: Proof of Erasure (PoE)
    summary: PoE specializes update to an all-zero target over the erased region; erasing all writable memory requires immutable or separately attested helper code to avoid hiding malware in an excluded region.
    source_anchor_ids: [anchor-paper-46-poe]
  - id: paper-46-compose
    kind: protocol
    parent_id: paper-46-services
    order: 4
    epistemic_status: composition_argument
    title: Serial remediation sequence
    summary: Update program memory, erase residual writable state, then reset so the verifier obtains evidence of new code, cleared old data, and reinitialized control flow.
    source_anchor_ids: [anchor-paper-46-problem, anchor-paper-46-conclusion]
  - id: paper-46-claims
    kind: claim_group
    parent_id: paper-46
    order: 6
    epistemic_status: mixed_formal_and_empirical
    title: Principal claims
    summary: PURE claims game-based service security, formal conformance of modified trusted hardware, low incremental footprint, and practical runtime.
    source_anchor_ids: [anchor-paper-46-por, anchor-paper-46-pou, anchor-paper-46-evaluation]
  - id: paper-46-claim-security
    kind: claim
    parent_id: paper-46-claims
    order: 1
    epistemic_status: proved_conditional
    title: Accepted proofs imply intended transitions
    summary: Under VRASED/HMAC assumptions, an adversary cannot produce accepted PoR or PoU/PoE evidence without taking the corresponding reset or memory-state action except with negligible probability.
    source_anchor_ids: [anchor-paper-46-por, anchor-paper-46-pou, anchor-paper-46-poe]
  - id: paper-46-claim-verification
    kind: claim
    parent_id: paper-46-claims
    order: 2
    epistemic_status: model_checked_within_rtl_model
    title: Modified trusted logic satisfies LTL policies
    summary: Additional reset-operation state and DMA/execution rules are translated to NuSMV and checked as extensions to VRASED's hardware monitor; this is not verification of every MCU component.
    source_anchor_ids: [anchor-paper-46-vrased, anchor-paper-46-por]
  - id: paper-46-claim-overhead
    kind: claim
    parent_id: paper-46-claims
    order: 3
    epistemic_status: experimentally_supported
    title: Small incremental cost
    summary: Relative to VRASED, PURE adds 4 LUTs, 3 registers, about 50 bytes of trusted ROM, and 26 bytes of helper code; PoR takes 26 ms at 8 MHz and update/erasure scale linearly with memory size.
    source_anchor_ids: [anchor-paper-46-evaluation]
  - id: paper-46-evidence
    kind: evidence_group
    parent_id: paper-46
    order: 7
    epistemic_status: formal_artifact_and_fpga_measurement
    title: Evidence stack
    summary: Security games and theorem arguments, NuSMV checks of added trusted logic, an OpenMSP430/Basys3 FPGA implementation, resource synthesis, runtime measurements, and a public code branch jointly support the claims.
    source_anchor_ids: [anchor-paper-46-por, anchor-paper-46-pou, anchor-paper-46-evaluation, anchor-paper-46-repository]
  - id: paper-46-boundaries
    kind: limitation_group
    parent_id: paper-46
    order: 8
    epistemic_status: material
    title: Security and deployment boundaries
    summary: A valid proof does not authenticate who requested a malicious update unless verifier authentication is enabled; writable helper code can be erased or infected; physical attacks, faults, and the complete MCU are outside the model.
    source_anchor_ids: [anchor-paper-46-adversary, anchor-paper-46-pou, anchor-paper-46-poe]
  - id: paper-46-artifacts
    kind: artifact_group
    parent_id: paper-46
    order: 9
    epistemic_status: public_unpinned
    title: Implementation and verification artifacts
    summary: The paper and PURE repository branch are public. This map records no immutable repository revision, build transcript, model-check log, FPGA bitstream hash, or independent reproduction.
    source_anchor_ids: [anchor-paper-46-repository, anchor-paper-46-evaluation]
  - id: paper-46-scrutiny
    kind: scrutiny
    parent_id: paper-46
    order: 10
    epistemic_status: venue_reviewed_with_machine_checked_components
    title: External scrutiny
    summary: ICCAD publication and public formal/implementation artifacts provide substantial exposure, but no public review reports or independent end-to-end verification were located.
    source_anchor_ids: [anchor-paper-46-publication, anchor-paper-46-repository]
  - id: paper-46-lineage
    kind: lineage
    parent_id: paper-46
    order: 11
    epistemic_status: explicit
    title: VRASED extension
    summary: >-
      “PURE: Using Verified Remote Attestation to Obtain Proofs of Update, Reset and Erasure in Low-End Embedded Systems” by Ivan De Oliveira Nunes, Karim Eldefrawy, Norrathep Rattanavipanon, and Gene Tsudik is downstream of “VRASED: A Verified Hardware/Software Co-Design for Remote Attestation” by Ivan De Oliveira Nunes, Karim Eldefrawy, Norrathep Rattanavipanon, Michael Steiner, and Gene Tsudik: PURE reuses VRASED's verified attestation TCB and HMAC path, adding remediation states and services rather than replacing the base architecture.
    source_anchor_ids: [anchor-paper-46-vrased, anchor-paper-46-problem]

