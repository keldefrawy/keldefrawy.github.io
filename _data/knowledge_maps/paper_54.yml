nodes:
  - id: paper-54
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "APEX: A Verified Architecture for Proofs of Execution on Remote Devices Under Full Software Compromise"
    summary: >-
      A formally specified, model-checked, implemented, and evaluated proof-of-execution architecture for low-end microcontrollers under complete software compromise.
    source_anchor_ids: [anchor-paper-54-problem]

  - id: paper-54-question
    kind: question
    parent_id: paper-54
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can a remote verifier bind a fresh device output to complete atomic execution of expected code even when every unprotected software component is adversarial?
    source_anchor_ids: [anchor-paper-54-problem, anchor-paper-54-pox-definition]

  - id: paper-54-answer
    kind: contribution
    parent_id: paper-54
    order: 2
    epistemic_status: constructed_and_verified
    title: Central answer
    summary: >-
      APEX adds verified hardware monitors and protected execution metadata to VRASED so an attestation token authenticates the executable region, output region, request challenge, bounds, and a hardware-controlled successful-execution flag.
    source_anchor_ids: [anchor-paper-54-architecture, anchor-paper-54-subproperties]

  - id: paper-54-pox
    kind: primitive
    parent_id: paper-54
    order: 3
    epistemic_status: formally_defined
    title: Proof of execution primitive
    summary: >-
      PoX consists of request, atomic execution, proof generation, and verification algorithms. Security forbids convincing the verifier after no or incomplete execution and forbids substituting a tampered output for the actual execution result.
    source_anchor_ids: [anchor-paper-54-pox-definition]

  - id: paper-54-scope
    kind: threat_model
    parent_id: paper-54
    order: 4
    epistemic_status: defined
    title: Full software compromise
    summary: >-
      The adversary controls all device software, writable state, and DMA, and may read any memory not hardware-protected. It cannot change ROM, violate the assumed CPU semantics, induce physical faults, or extract secrets through physical side channels.
    source_anchor_ids: [anchor-paper-54-adversary, anchor-paper-54-machine]

  - id: paper-54-scope-correctness
    kind: limitation
    parent_id: paper-54-scope
    order: 1
    epistemic_status: explicitly_scoped
    title: Execution is not program correctness
    summary: >-
      A valid APEX proof says the requested code ran under the defined conditions and produced the authenticated bytes; it does not establish that the code is bug-free, functionally correct, or safe on malicious inputs.
    source_anchor_ids: [anchor-paper-54-pox-definition, anchor-paper-54-limitations]

  - id: paper-54-architecture-node
    kind: protocol
    parent_id: paper-54
    order: 5
    epistemic_status: specified
    title: APEX protocol
    summary: >-
      The verifier supplies code or identifies preinstalled code, memory bounds, and a fresh challenge. Hardware enforces atomic execution and sets EXEC only after success; VRASED then computes an HMAC-based proof over code, output, and metadata.
    source_anchor_ids: [anchor-paper-54-architecture]

  - id: paper-54-architecture-execution
    kind: mechanism
    parent_id: paper-54-architecture-node
    order: 1
    epistemic_status: hardware_enforced
    title: Execution and output protection
    summary: >-
      The verified logic rejects interrupted execution, entry or exit at the wrong boundary, DMA or software modification of protected regions, and changes to the executable or output between completion and proof generation.
    source_anchor_ids: [anchor-paper-54-subproperties]

  - id: paper-54-architecture-metadata
    kind: mechanism
    parent_id: paper-54-architecture-node
    order: 2
    epistemic_status: hardware_enforced
    title: Protected metadata and freshness
    summary: >-
      Hardware makes the EXEC flag software read-only and protects challenge and region bounds; including the fresh challenge in key derivation and the MAC binds the proof to the current request.
    source_anchor_ids: [anchor-paper-54-architecture, anchor-paper-54-subproperties]

  - id: paper-54-formal
    kind: evidence_group
    parent_id: paper-54
    order: 6
    epistemic_status: machine_checked
    title: Formal evidence
    summary: >-
      APEX subproperties are expressed in linear temporal logic, translated into a finite-state hardware model, and checked with NuSMV; the security argument composes these invariants with VRASED remote-attestation security.
    source_anchor_ids: [anchor-paper-54-formal]

  - id: paper-54-claim-security
    kind: claim
    parent_id: paper-54-formal
    order: 1
    epistemic_status: proved_under_assumptions
    title: PoX security under the stated MCU model
    summary: >-
      The paper argues that satisfying the verified execution, output, and metadata properties reduces a successful PoX forgery to breaking VRASED's attestation guarantee, under the cryptographic and machine assumptions.
    source_anchor_ids: [anchor-paper-54-pox-definition, anchor-paper-54-formal]

  - id: paper-54-implementation
    kind: artifact_group
    parent_id: paper-54
    order: 7
    epistemic_status: implemented
    title: Hardware and software implementation
    summary: >-
      The authors implement APEX on OpenMSP430, synthesize the design for an Artix-7 FPGA, reuse VRASED's protected attestation software, and publish the implementation.
    source_anchor_ids: [anchor-paper-54-evaluation, anchor-paper-54-code]

  - id: paper-54-evidence-overhead
    kind: evidence
    parent_id: paper-54-implementation
    order: 1
    epistemic_status: measured
    title: Hardware, memory, and verification cost
    summary: >-
      Relative to VRASED, APEX adds 44 registers and 302 lookup tables, reported as about 2 percent and 12 percent respectively, plus 9 bytes of metadata RAM. Model checking takes about three minutes and 280 MB on the reported workstation.
    source_anchor_ids: [anchor-paper-54-evaluation]

  - id: paper-54-evidence-runtime
    kind: evidence
    parent_id: paper-54-implementation
    order: 2
    epistemic_status: measured
    title: Runtime boundary
    summary: >-
      The hardware monitor adds no instructions to the protected program; proof latency is the program's own execution plus VRASED attestation, reported around 900 ms on an 8 MHz device for the evaluated configuration.
    source_anchor_ids: [anchor-paper-54-evaluation]

  - id: paper-54-case-study
    kind: demonstration
    parent_id: paper-54
    order: 8
    epistemic_status: proof_of_concept
    title: Authenticated sensing and actuation
    summary: >-
      A fire-sensor prototype on an APEX-enabled MSP430 and FPGA binds temperature or humidity reads and buzzer actuation to specified code, illustrating how a verifier can detect spoofed software outputs in the model.
    source_anchor_ids: [anchor-paper-54-case-study]

  - id: paper-54-boundaries
    kind: limitation_group
    parent_id: paper-54
    order: 9
    epistemic_status: material
    title: Limitations
    summary: >-
      Physical attacks and CPU-design faults are outside scope; code with external shared-library calls must be made self-contained; self-modifying code violates immutability; and atomic execution currently rejects interrupts, creating a real-time compatibility problem.
    source_anchor_ids: [anchor-paper-54-adversary, anchor-paper-54-limitations]

  - id: paper-54-artifacts
    kind: artifact_group
    parent_id: paper-54
    order: 10
    epistemic_status: evaluated_artifact
    title: Public and evaluated artifact
    summary: >-
      The paper, source repository, and official USENIX record are public, and the paper carries an Artifact Evaluated - Passed badge. This map did not independently rebuild the repository.
    source_anchor_ids: [anchor-paper-54-code, anchor-paper-54-publication]

  - id: paper-54-scrutiny
    kind: scrutiny
    parent_id: paper-54
    order: 11
    epistemic_status: venue_and_artifact_reviewed
    title: External scrutiny
    summary: >-
      APEX appeared at USENIX Security 2020 and passed the venue's represented artifact evaluation. Public review reports and independent formal re-verification are not linked.
    source_anchor_ids: [anchor-paper-54-publication]

  - id: paper-54-lineage
    kind: lineage
    parent_id: paper-54
    order: 12
    epistemic_status: documented
    title: Extension of VRASED
    summary: >-
      APEX deliberately reuses VRASED's verified remote-attestation root and adds a proof-of-execution layer without changing the protected attestation routine, so the two services can coexist.
    source_anchor_ids: [anchor-paper-54-architecture, anchor-paper-54-formal]

