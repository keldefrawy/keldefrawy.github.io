      rationale: "ResearchGate displayed 21 citations on 2026-07-11, exceeding the rubric's 11-citation high threshold. The count is index-specific and citing contexts were not reviewed."
      basis_source_anchor_ids: [anchor-paper-16-citations]
    - id: contribution_significance
