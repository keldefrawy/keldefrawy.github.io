      rationale: "Journal publication and follow-on citations provide external attention, but review reports, corrections, data reuse, and independent classifier reproduction were not audited."
      basis_source_anchor_ids: [anchor-paper-16-publication, anchor-paper-16-citations]
    - id: reception
