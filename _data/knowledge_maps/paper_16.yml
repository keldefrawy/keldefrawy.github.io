    - id: production_provenance
      level: medium
      rationale: "Named authorship, journal and preprint records, and an author-hosted journal PDF establish baseline provenance. Contributor roles, dataset snapshots, code versions, and revision history are not documented."
      basis_source_anchor_ids: [anchor-paper-16-question, anchor-paper-16-publication]
