nodes:
  - id: paper-16
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Certificate-based web-fraud classification"
    summary: "An Internet measurement and machine-learning study using only server X.509 certificate data to flag potentially fraudulent domains."
    source_anchor_ids: [anchor-paper-16-question]

  - id: paper-16-question
    kind: question
    parent_id: paper-16
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can certificate metadata distinguish HTTPS-enabled web fraud without collecting user-specific navigation history?"
    source_anchor_ids: [anchor-paper-16-question]

  - id: paper-16-answer
    kind: contribution
    parent_id: paper-16
    order: 2
    epistemic_status: empirically_supported
    title: "Central answer"
    summary: "Certificate fields provide useful statistical signal in the sampled datasets, and classical classifiers can combine those signals into an anti-fraud feature; false positives and incomplete HTTPS coverage prevent treating the output as a definitive verdict."
    source_anchor_ids: [anchor-paper-16-results, anchor-paper-16-limitations]

  - id: paper-16-scope
    kind: scope
    parent_id: paper-16
    order: 3
    epistemic_status: explicitly_scoped
    title: "Measurement scope"
    summary: "Certificates were collected in September-October 2009 and March-October 2010 from popular, random .com/.net, phishing, and typosquatting domain lists that responded on HTTPS."
    source_anchor_ids: [anchor-paper-16-collection]

  - id: paper-16-data
    kind: dataset
    parent_id: paper-16
    order: 4
    epistemic_status: described_not_released
    title: "Four certificate datasets"
    summary: "The article reports 2,984 Alexa certificates, 22,063 random .com/.net certificates, 5,175 phishing certificates, and 486 typosquatting certificates, with substantial duplicate rates in several sets."
    source_anchor_ids: [anchor-paper-16-datasets]

  - id: paper-16-data-labels
    kind: assumption
    parent_id: paper-16-data
    order: 1
    epistemic_status: operationalized
    title: "Label construction"
    summary: "Alexa ranking is used as a popular/legitimate proxy, PhishTank supplies phishing domains, and typosquatting candidates are derived from random domains using typo correction plus a parked-domain classifier."
    source_anchor_ids: [anchor-paper-16-collection]

  - id: paper-16-features
    kind: method
    parent_id: paper-16
    order: 5
    epistemic_status: implemented
    title: "Certificate feature extraction"
    summary: "The system derives boolean, categorical, and duration features from certificate issuer, subject, host-name similarity, signing, and validity information, including pairwise popularity indicators."
    source_anchor_ids: [anchor-paper-16-features]

  - id: paper-16-algorithm
    kind: algorithm
    parent_id: paper-16
    order: 6
    epistemic_status: implemented
    title: "Classifier ensemble comparison"
    summary: "Random Forest, Decision Tree, bagged and boosted trees, and Nearest Neighbor are trained and compared using positive/negative precision and recall under ten-fold cross-validation."
    source_anchor_ids: [anchor-paper-16-classifiers]

  - id: paper-16-evidence-phishing
    kind: empirical_evidence
    parent_id: paper-16
    order: 7
    epistemic_status: cross_validated
    title: "Phishing versus popular certificates"
    summary: "Across classifiers, positive recall is about 0.935-0.94 and positive precision about 0.877-0.881, while negative recall is about 0.773-0.780; the asymmetry matters for deployment false positives."
    source_anchor_ids: [anchor-paper-16-results]

  - id: paper-16-evidence-suspicious
    kind: empirical_evidence
    parent_id: paper-16
    order: 8
    epistemic_status: cross_validated
    title: "Random-or-phishing versus popular certificates"
    summary: "When random .com/.net and phishing certificates form the positive class, reported positive recall reaches about 0.975 and precision about 0.960, but negative recall remains only about 0.598-0.631."
    source_anchor_ids: [anchor-paper-16-results]

  - id: paper-16-evidence-robustness
    kind: empirical_evidence
    parent_id: paper-16
    order: 9
    epistemic_status: sensitivity_analysis
    title: "Training-size and feature sensitivity"
    summary: "Increasing the phishing training set improves positive precision and recall, and an issuer-only feature set remains informative, supporting—but not proving—some resilience to easily forged subject fields."
    source_anchor_ids: [anchor-paper-16-robustness]

  - id: paper-16-deployment
    kind: implication
    parent_id: paper-16
    order: 10
    epistemic_status: source_recommendation
    title: "Intended deployment role"
    summary: "The classifier is proposed as a privacy-preserving signal combined with URL, content, blacklist, or browser defenses, not as a standalone blocking oracle."
    source_anchor_ids: [anchor-paper-16-limitations]

  - id: paper-16-limitations
    kind: limitation_group
    parent_id: paper-16
    order: 11
    epistemic_status: explicitly_reported
    title: "Generalization and adversarial limits"
    summary: "The labels and Internet sample are time- and source-dependent, many fraudulent domains do not use HTTPS, false positives remain, larger geographically diverse datasets are needed, and attackers can imitate forgeable certificate fields."
    source_anchor_ids: [anchor-paper-16-limitations]

  - id: paper-16-artifacts
    kind: artifact_group
    parent_id: paper-16
    order: 12
    epistemic_status: paper_only
    title: "Artifacts"
    summary: "The journal paper records datasets, features, metrics, and results in detail, but this audit did not locate the harvested certificates, labels, feature code, trained models, or evaluation scripts."
    source_anchor_ids: [anchor-paper-16-datasets, anchor-paper-16-classifiers]

  - id: paper-16-scrutiny
    kind: scrutiny
    parent_id: paper-16
    order: 13
    epistemic_status: journal_reviewed
    title: "External scrutiny and reception"
    summary: "The work appeared in the International Journal of Network Security and ResearchGate reports 21 citations; this audit did not inspect review reports, citing contexts, or a modern replication."
    source_anchor_ids: [anchor-paper-16-publication, anchor-paper-16-citations]

  - id: paper-16-lineage
