nodes:
  - id: paper-45
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_chapter_body_not_audited
    title: Cryptographic foundations for moving-target defense
    summary: A theory chapter connecting periodic cryptographic rerandomization and recovery to the moving-target-defense objective, with dishonest-majority PSS as its exposed example.
    source_anchor_ids: [anchor-paper-45-abstract]
  - id: paper-45-question
    kind: question
    parent_id: paper-45
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can changing a distributed system's cryptographic representation over time ensure that a persistent mobile attacker never accumulates a usable global view?
    source_anchor_ids: [anchor-paper-45-abstract]
  - id: paper-45-answer
    kind: contribution
    parent_id: paper-45
    order: 2
    epistemic_status: abstract_asserted_synthesis
    title: Central synthesis
    summary: >-
      Proactive refresh replaces a fixed lifetime corruption bound by a rate condition: old shares are rerandomized and erased before the attacker crosses the within-period threshold.
    source_anchor_ids: [anchor-paper-45-abstract, anchor-paper-45-example-model]
  - id: paper-45-mtd
    kind: definition
    parent_id: paper-45
    order: 3
    epistemic_status: conceptual_mapping
    title: Cryptographic moving-target defense
    summary: The target that moves is the representation of long-lived secrets and computation state, not necessarily the physical host, address, or software image.
    source_anchor_ids: [anchor-paper-45-abstract]
  - id: paper-45-model
    kind: threat_model
    parent_id: paper-45
    order: 4
    epistemic_status: abstract_defined
    title: Mobile adversary
    summary: The adversary may eventually compromise every party, but security requires its corruption set to stay within the appropriate threshold during each refresh period while repaired parties return clean.
    source_anchor_ids: [anchor-paper-45-abstract, anchor-paper-45-example-model]
  - id: paper-45-foundations
    kind: method
    parent_id: paper-45
    order: 5
    epistemic_status: survey_and_synthesis
    title: PSS and PMPC foundations
    summary: PSS preserves distributed secrets by refresh and recovery; MPC evaluates functions on shares; PMPC composes these ideas so long-running private computation tolerates a moving corruption set.
    source_anchor_ids: [anchor-paper-45-abstract]
  - id: paper-45-example-node
    kind: scheme
    parent_id: paper-45-foundations
    order: 1
    epistemic_status: predecessor_source_inspected
    title: Dishonest-majority PSS example
    summary: The cited example encodes a secret as additive summands shared by increasing-degree polynomials, with share, reconstruct, refresh, and recovery protocols.
    source_anchor_ids: [anchor-paper-45-example-model]
  - id: paper-45-claims
    kind: claim_group
    parent_id: paper-45
    order: 6
    epistemic_status: exposed_abstract_and_predecessor
    title: Example resilience profile
    summary: The example separates robust passive resilience from non-robust active and mixed security with identifiable abort; a single scalar threshold would misstate the result.
    source_anchor_ids: [anchor-paper-45-abstract, anchor-paper-45-example-limits]
  - id: paper-45-claim-rate
    kind: claim
    parent_id: paper-45-claims
    order: 1
    epistemic_status: conceptual
    title: Rate-based security interpretation
    summary: Proactive security constrains attacker penetration relative to refresh and repair speed, even when the adversary's lifetime union of corruptions contains all parties.
    source_anchor_ids: [anchor-paper-45-abstract]
  - id: paper-45-claim-thresholds
    kind: claim
    parent_id: paper-45-claims
    order: 2
    epistemic_status: abstract_asserted
    title: Dishonest-majority example thresholds
    summary: The abstract states robust passive security near n parties, non-robust active security below half, and a mixed active/total tradeoff; exact inequalities must be checked against the chapter body.
    source_anchor_ids: [anchor-paper-45-abstract]
  - id: paper-45-evidence
    kind: evidence_group
    parent_id: paper-45
    order: 7
    epistemic_status: bounded
    title: Evidence boundary
    summary: The chapter's central framing and example are visible in its abstract, and the predecessor brief exposes the example construction; the chapter's full exposition, comparisons, and any PMPC development were not audited.
    source_anchor_ids: [anchor-paper-45-abstract, anchor-paper-45-example-model]
