nodes:
  - id: paper-29
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Byzantine Fault Tolerant SDN Controllers"
    summary: "A replicated SDN control architecture and Java prototype that applies BFT-SMaRt to OpenFlowJ and Beacon controllers."
    source_anchor_ids: [anchor-paper-29-problem]

  - id: paper-29-question
    kind: question
    parent_id: paper-29
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can the logically centralized SDN control plane tolerate malicious controllers and switches without a new centralized fault point and without prohibitive flow-setup cost?"
    source_anchor_ids: [anchor-paper-29-problem]

  - id: paper-29-answer
    kind: contribution
    parent_id: paper-29
    order: 2
    epistemic_status: implemented
    title: "Central answer"
    summary: "Replicate deterministic controller logic with BFT-SMaRt, place a service proxy beside each switch, and require f+1 identical replica replies before installing a flow rule."
    source_anchor_ids: [anchor-paper-29-design, anchor-paper-29-security]

  - id: paper-29-scope
    kind: scope
    parent_id: paper-29
    order: 3
    epistemic_status: defined
    title: "Threat and system model"
    summary: "The system contains 3f+1 controller replicas plus switch-side clients/proxies, with authenticated replica messages and BFT-SMaRt's total-order execution."
    source_anchor_ids: [anchor-paper-29-bftsmart, anchor-paper-29-adversary]

  - id: paper-29-scope-adversary
    kind: threat_model
    parent_id: paper-29-scope
    order: 1
    epistemic_status: defined
    title: "Byzantine control and data planes"
    summary: "The adversary actively corrupts up to f controller components and arbitrarily many switches, allowing message injection, replay, modification, arbitrary requests/replies, or silence."
    source_anchor_ids: [anchor-paper-29-adversary]

  - id: paper-29-scope-assumptions
    kind: assumption
    parent_id: paper-29-scope
    order: 2
    epistemic_status: assumed
    title: "Replication assumptions"
    summary: "Correctness relies on BFT-SMaRt's communication and quorum assumptions, deterministic replicas, authenticated messages (MACs in the prototype), direct client-to-replica communication, and at most f faulty replicas."
    source_anchor_ids: [anchor-paper-29-bftsmart, anchor-paper-29-security]

  - id: paper-29-method
    kind: method
    parent_id: paper-29
    order: 4
    epistemic_status: implemented
    title: "Proxy-mediated replicated controller"
    summary: "A per-switch proxy translates OpenFlow Packet_In requests into BFT client requests and translates the agreed response back into Packet_Out or Flow_Mod messages."
    source_anchor_ids: [anchor-paper-29-design]

  - id: paper-29-method-prototypes
    kind: component
    parent_id: paper-29-method
    order: 1
    epistemic_status: implemented
    title: "SimpleBFT and BeaconBFT"
    summary: "The authors integrate OpenFlowJ and Beacon with BFT-SMaRt, respectively, and evaluate both as learning-switch controllers with four replicas for f=1."
    source_anchor_ids: [anchor-paper-29-design, anchor-paper-29-evaluation]

  - id: paper-29-claims
    kind: claim_group
    parent_id: paper-29
    order: 5
    epistemic_status: mixed
    title: "Principal claims"
    summary: "The paper combines quorum-based fault-tolerance reasoning with performance evidence from a proof-of-concept prototype."
    source_anchor_ids: [anchor-paper-29-security, anchor-paper-29-evaluation]

  - id: paper-29-claim-security
    kind: claim
    parent_id: paper-29-claims
    order: 1
    epistemic_status: analytically_supported_conditional
    title: "Single-fault tolerance in tested configuration"
    summary: "With four controller replicas, no one compromised replica can make a client accept an unsolicited or incorrect action because the client requires two identical replies and consensus quorums remain available."
    source_anchor_ids: [anchor-paper-29-security]

  - id: paper-29-claim-performance
    kind: claim
    parent_id: paper-29-claims
    order: 2
    epistemic_status: experimentally_supported
    title: "Measured flow-setup cost"
    summary: "SimpleBFT reports 59.3 flow modifications/s versus OpenFlowJ's 106.9 (about 1.8× slower); BeaconBFT reports 87.0 versus Beacon's 550.6 (about 6.3× slower)."
    source_anchor_ids: [anchor-paper-29-evaluation]

  - id: paper-29-evidence
    kind: evidence_group
    parent_id: paper-29
    order: 6
    epistemic_status: documented
    title: "Evidence chain"
    summary: "Evidence consists of architecture diagrams, quorum analysis inherited from BFT-SMaRt, two implementations, and comparative Mininet flow-setup measurements."
    source_anchor_ids: [anchor-paper-29-design, anchor-paper-29-security, anchor-paper-29-evaluation]

  - id: paper-29-evidence-experiment
    kind: evidence
    parent_id: paper-29-evidence
    order: 1
    epistemic_status: reported_not_reproduced
    title: "Mininet proof-of-concept"
    summary: "The test uses 64 hosts and 63 switches in a binary tree, a reactive empty-table workload, four controller replicas, and flow setup duration, delay, and rate metrics; no fault-injection result is reported."
    source_anchor_ids: [anchor-paper-29-evaluation]

  - id: paper-29-boundaries
    kind: limitation_group
    parent_id: paper-29
    order: 7
    epistemic_status: material
    title: "Boundaries and limitations"
    summary: "The source explicitly treats the implementation as a proof of concept and says it is not ready for large-scale networks with tens of thousands of flow changes per second."
    source_anchor_ids: [anchor-paper-29-problem, anchor-paper-29-limitations]

  - id: paper-29-boundary-evaluation
    kind: limitation
    parent_id: paper-29-boundaries
    order: 1
    epistemic_status: evaluation_limitation
    title: "No adversarial or large-scale validation"
    summary: "The reported experiment measures benign throughput in Mininet; it does not inject Byzantine faults, test recovery/view change, measure geographic distribution, or demonstrate production traffic scale."
    source_anchor_ids: [anchor-paper-29-evaluation, anchor-paper-29-limitations]

  - id: paper-29-boundary-architecture
    kind: limitation
    parent_id: paper-29-boundaries
    order: 2
    epistemic_status: implementation_limitation
    title: "Proxy and serialization costs"
    summary: "Each switch depends on a paired proxy, and BFT-SMaRt's total ordering removes much of Beacon's parallel advantage; the paper proposes integrated switches, batching, and speculative/coarser consensus as future work."
    source_anchor_ids: [anchor-paper-29-design, anchor-paper-29-evaluation, anchor-paper-29-limitations]

  - id: paper-29-artifacts
    kind: artifact_group
    parent_id: paper-29
    order: 8
    epistemic_status: full_text_available
    title: "Artifacts and resources"
    summary: "The complete author copy is mirrored locally with fixity metadata and linked to the IEEE record; no source-code repository or experiment package was identified."
    source_anchor_ids: [anchor-paper-29-problem, anchor-paper-29-publication]

  - id: paper-29-scrutiny
    kind: scrutiny
    parent_id: paper-29
    order: 9
    epistemic_status: publication_recorded
    title: "External scrutiny"
    summary: "The paper was published at the IEEE COMPSAC MidCCI workshop; reviews, independent replications, and later security evaluations were not audited."
    source_anchor_ids: [anchor-paper-29-publication]

  - id: paper-29-lineage
    kind: lineage
    parent_id: paper-29
    order: 10
