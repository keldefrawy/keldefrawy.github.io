title: "Byzantine Fault Tolerant Software-Defined Networking (SDN) Controllers"
year: 2016
status: "Published"
venue: "IEEE COMPSAC, MidCCI workshop"
topic: "secure-systems-networks"
labels: ["Theory", "Applied"]
authors:
  - "Karim Eldefrawy"
  - "Tyler Kaczmarek"
keywords:
  - "software-defined networking"
  - "Byzantine fault tolerance"
editorial_summary: "The paper replaces the single vulnerable SDN controller with replicated controllers that use Byzantine fault-tolerant state-machine replication to survive malicious behavior in both the control and data planes. Its prototype tolerates one compromised component among four replicas and demonstrates feasibility with roughly a twofold slowdown in the best configuration."

research_question: "Can a software-defined network avoid a single vulnerable controller and continue operating when a control- or data-plane component behaves maliciously?"
central_answer: "The paper reports replicating controllers with Byzantine fault-tolerant state-machine replication and demonstrates a four-replica prototype designed to tolerate one compromised component."

