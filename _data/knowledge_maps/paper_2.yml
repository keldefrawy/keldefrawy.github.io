nodes:
  - id: paper-2
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Cross-layer coordination framework"
    summary: "A host-local protocol architecture for organized event and state exchange between non-adjacent wireless-stack layers while retaining per-layer modules."
    source_anchor_ids: [anchor-paper-2-problem, anchor-paper-2-publication]

  - id: paper-2-question
    kind: question
    parent_id: paper-2
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can a wireless stack support extensible cross-layer adaptation without uncontrolled direct dependencies between protocol layers?"
    source_anchor_ids: [anchor-paper-2-problem]

  - id: paper-2-answer
    kind: contribution
    parent_id: paper-2
    order: 2
    epistemic_status: proposed_design
    title: "Central answer"
    summary: "Route cross-layer interactions through a local coordination service and use uniform client, event, parameter, and priority abstractions to isolate adaptation logic from the base stack."
    source_anchor_ids: [anchor-paper-2-architecture, anchor-paper-2-signaling]

  - id: paper-2-scope
    kind: scope
    parent_id: paper-2
    order: 3
    epistemic_status: explicitly_scoped
    title: "Design requirements and scope"
    summary: "The framework targets host-internal coordination among application, transport, network, link, and physical layers; its stated requirements are modularity, scalability, and low coordination overhead."
    source_anchor_ids: [anchor-paper-2-problem]

  - id: paper-2-architecture
    kind: protocol
    parent_id: paper-2
    order: 4
    epistemic_status: specified_not_implemented
    title: "Coordination protocol architecture"
    summary: "Per-layer clients send events to a host-local server, which may forward events, update shared parameters, and schedule concurrent event handling."
    source_anchor_ids: [anchor-paper-2-architecture]

  - id: paper-2-architecture-client
    kind: component
    parent_id: paper-2-architecture
    order: 1
    epistemic_status: specified
    title: "Cross-layer client"
    summary: "Each layer's client contains the adaptation algorithm, conversion logic for parameters received from other layers, required foreign parameters, and an abstracted representation of local layer state."
    source_anchor_ids: [anchor-paper-2-client]

  - id: paper-2-architecture-server
    kind: component
    parent_id: paper-2-architecture
    order: 2
    epistemic_status: specified
    title: "Cross-layer server"
    summary: "The server separates a control module (actions plus concurrent-event management) from a parameter repository that stores layer state in forms usable by other clients."
    source_anchor_ids: [anchor-paper-2-server]

  - id: paper-2-architecture-messages
    kind: component
    parent_id: paper-2-architecture
    order: 3
    epistemic_status: specified
    title: "Event messages"
    summary: "A message can carry one or more events encoded as type-length-value fields, with optional parameters and a priority used by server-side scheduling."
    source_anchor_ids: [anchor-paper-2-signaling]

  - id: paper-2-method-designer
    kind: method
    parent_id: paper-2
    order: 5
    epistemic_status: design_procedure
    title: "How an adaptation is instantiated"
    summary: "A designer supplies the client-side adaptation algorithm, defines event types and parameters plus actions in each direction, and supplies a policy for ordering simultaneous events."
    source_anchor_ids: [anchor-paper-2-designer]

  - id: paper-2-example
    kind: evidence_group
    parent_id: paper-2
    order: 6
    epistemic_status: worked_example
    title: "Worked video-adaptation example"
    summary: "The paper maps a real-time FGS/PGOP video adaptation path onto the framework but does not report an implementation or measured evaluation."
    source_anchor_ids: [anchor-paper-2-video]

  - id: paper-2-example-flow
    kind: evidence
    parent_id: paper-2-example
    order: 1
    epistemic_status: illustrated
    title: "Physical-to-application event flow"
    summary: "The physical layer reports the number X of transportable bits for the next coherence period as a high-priority event; the video packetizer retains the base layer and truncates enhancement bits so payload plus lower-layer headers fits X."
    source_anchor_ids: [anchor-paper-2-video]

  - id: paper-2-claims
    kind: claim_group
    parent_id: paper-2
    order: 7
    epistemic_status: design_rationale
    title: "Principal claims"
    summary: "The architecture is argued to organize non-adjacent interaction and preserve modularity; scalability and efficiency are requirements rather than empirically established properties."
    source_anchor_ids: [anchor-paper-2-problem, anchor-paper-2-architecture]

  - id: paper-2-boundaries
    kind: limitation_group
    parent_id: paper-2
    order: 8
    epistemic_status: material
    title: "Boundaries and unresolved obligations"
    summary: "The proposal leaves fault handling, stability across multiple adaptations, performance overhead, and concrete implementation to future work."
    source_anchor_ids: [anchor-paper-2-limitations]

  - id: paper-2-boundary-event-loss
    kind: limitation
    parent_id: paper-2-boundaries
    order: 1
    epistemic_status: explicitly_unmodeled
    title: "Event delivery failure"
    summary: "The video example does not model loss of the capacity event; the paper only sketches fallbacks such as base-layer-only transmission, reuse of the previous size, or a weighted history."
    source_anchor_ids: [anchor-paper-2-video]

  - id: paper-2-boundary-validation
    kind: limitation
    parent_id: paper-2-boundaries
    order: 2
    epistemic_status: future_work
