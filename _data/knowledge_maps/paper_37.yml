  - "remote attestation"
  - "seL4"
  - "embedded systems"
editorial_summary: "HYDRA is the first hybrid remote-attestation design to use the formally verified seL4 microkernel for memory isolation, protection, and access control instead of extensive custom hardware. Implementations on commodity boards show the approach is practical, attesting 10 MB of memory in under 250 ms with the fastest tested checksum."

research_question: "Can a formally verified microkernel provide the isolation needed for hybrid remote attestation without extensive custom hardware?"
central_answer: "HYDRA uses seL4 for memory isolation, protection, and access control and reports implementations on commodity boards."

