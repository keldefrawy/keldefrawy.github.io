nodes:
  - id: paper-37
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "HYDRA: Hybrid Design for Remote Attestation Using a Formally Verified Microkernel"
    summary: >-
      A remote-attestation protocol and implemented system that replaces most custom microcontroller access controls with seL4-enforced capabilities and process isolation, retaining hardware secure boot and a time source.
    source_anchor_ids: [anchor-paper-37-problem]

  - id: paper-37-question
    kind: question
    parent_id: paper-37
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can verified operating-system mechanisms provide the isolation and atomicity needed for secure attestation on commodity embedded boards with less bespoke hardware than SMART or TrustLite?
    source_anchor_ids: [anchor-paper-37-problem, anchor-paper-37-properties]

  - id: paper-37-answer
    kind: contribution
    parent_id: paper-37
    order: 2
    epistemic_status: source_asserted
    title: HYDRA co-design
    summary: >-
      Secure boot authenticates seL4 and the attestation binary; seL4 gives one highest-priority initial process exclusive authority over the key and relevant memory; that process authenticates fresh requests and MACs requested process memory.
    source_anchor_ids: [anchor-paper-37-controls, anchor-paper-37-components, anchor-paper-37-algorithm]

  - id: paper-37-objective
    kind: definition
    parent_id: paper-37
    order: 3
    epistemic_status: adopted_from_prior_analysis
    title: Attestation security objective
    summary: >-
      A prover should produce an unforgeable token that convinces a verifier of its measured state; malware must not make a compromised state appear expected, and request handling should resist malicious triggering and replay.
    source_anchor_ids: [anchor-paper-37-properties]

  - id: paper-37-properties
    kind: requirement_group
    parent_id: paper-37-objective
    order: 1
    epistemic_status: enumerated
    title: Minimal RA properties
    summary: >-
      The adopted requirements are exclusive access to attestation key K, no leakage of key-derived intermediates, immutable attestation code, uninterruptible execution, controlled entry and exit, and authenticated fresh verifier requests.
    source_anchor_ids: [anchor-paper-37-properties]

  - id: paper-37-threat
    kind: threat_model
    parent_id: paper-37
    order: 4
    epistemic_status: defined
    title: Application-compromise adversary
    summary: >-
      Remote or local attackers may control all ordinary application software and communication before and after attestation. They cannot physically tamper, induce hardware faults, extract K through side channels, or interrupt seL4 or the protected attestation process.
    source_anchor_ids: [anchor-paper-37-threat]

  - id: paper-37-assumption-setup
    kind: assumption
    parent_id: paper-37-threat
    order: 1
    epistemic_status: assumed
    title: Provisioning and boot trust
    summary: >-
      The prover and verifier share a pre-provisioned secret K. ROM authenticates the boot image, seL4 verifies the initial attestation process, and the initial capability distribution exactly implements the paper's configuration.
    source_anchor_ids: [anchor-paper-37-components, anchor-paper-37-key-clock]

  - id: paper-37-assumption-proof
    kind: assumption
    parent_id: paper-37-threat
    order: 2
    epistemic_status: outside_verified_kernel
    title: seL4 proof assumptions
    summary: >-
      The inherited functional-correctness claim assumes correct ARM assembly, conforming untampered hardware, correct cache and TLB management, correct boot code, disabled or trusted DMA, and absence of timing side channels.
    source_anchor_ids: [anchor-paper-37-proof-assumptions]

  - id: paper-37-sel4
    kind: verified_component
    parent_id: paper-37
    order: 5
    epistemic_status: externally_machine_checked
    title: seL4 verified enforcement base
    summary: >-
      seL4's refinement chain links abstract specification through C and binary behavior, and separate access-control proofs establish authority confinement, integrity, and confidentiality for correctly configured capabilities under the stated assumptions.
    source_anchor_ids: [anchor-paper-37-sel4]

  - id: paper-37-configuration
    kind: method
    parent_id: paper-37
    order: 6
    epistemic_status: paper_argued
    title: HYDRA capability configuration
    summary: >-
      PR-Att receives exclusive access to the attestation binary and K, its thread-control block, and its virtual address space, plus exclusive write authority over the clock; all later processes receive lower priority and only minimal capabilities.
    source_anchor_ids: [anchor-paper-37-controls, anchor-paper-37-implementation]

  - id: paper-37-configuration-priority
    kind: method
    parent_id: paper-37-configuration
    order: 1
    epistemic_status: enforced_if_code_conforms
    title: Atomic high-priority execution
    summary: >-
      Making PR-Att the initial, highest-priority user process and preventing later processes from raising priority is used to establish uninterruptibility; protecting its TCB and address space supplies controlled invocation and no-leak isolation.
    source_anchor_ids: [anchor-paper-37-controls, anchor-paper-37-security]

  - id: paper-37-protocol
    kind: protocol
    parent_id: paper-37
    order: 7
    epistemic_status: specified_and_implemented
    title: HYDRA attestation protocol
    summary: >-
      A request names a timestamp, target process, memory interval, and MAC. PR-Att rejects stale or unauthenticated requests, maps the target range into its own address space, MACs request context and bytes under K, and returns the report.
    source_anchor_ids: [anchor-paper-37-algorithm]

  - id: paper-37-protocol-boot
    kind: protocol
    parent_id: paper-37-protocol
    order: 1
    epistemic_status: implemented
    title: Boot and setup sequence
    summary: >-
      A ROM loader verifies the signed seL4 image, seL4 authenticates PR-Att, and PR-Att creates the remaining user processes with non-overlapping virtual spaces and no capability-grant endpoint that could leak its authority.
    source_anchor_ids: [anchor-paper-37-components, anchor-paper-37-implementation]

  - id: paper-37-protocol-freshness
    kind: protocol
    parent_id: paper-37-protocol
    order: 2
    epistemic_status: prototype_approximation
    title: Request freshness and DoS mitigation
    summary: >-
      The design calls for a protected real-time clock. Because seL4 lacked a driver, the prototype combines a persisted prior timestamp, the first validated request, and a protected timer counter; a secure counter is an alternative with weaker delayed-message detection.
    source_anchor_ids: [anchor-paper-37-key-clock]

  - id: paper-37-claims
    kind: claim_group
    parent_id: paper-37
    order: 8
    epistemic_status: source_asserted
    title: Main claims
    summary: >-
      The paper claims conditional RA security and practical performance. Kernel isolation is machine-checked upstream; the mapping from HYDRA code and configuration to the required RA properties is an informal paper argument.
    source_anchor_ids: [anchor-paper-37-security, anchor-paper-37-evaluation]

  - id: paper-37-claim-security
    kind: claim
    parent_id: paper-37-claims
    order: 1
    epistemic_status: informally_derived_from_verified_component
    title: Satisfaction of minimal RA properties
    summary: >-
      Nine boot, priority, memory, TCB, capability, and clock features are mapped to exclusive K access, no leaks, immutability, uninterruptibility, controlled invocation, and verifier authentication.
    source_anchor_ids: [anchor-paper-37-security]

  - id: paper-37-claim-hardware
    kind: claim
    parent_id: paper-37-claims
    order: 2
    epistemic_status: design_comparison
    title: Reduced bespoke hardware requirement
    summary: >-
      Unlike earlier hybrid designs that modify microcontroller access controls, HYDRA pushes isolation and scheduling into seL4; it still needs hardware-enforced secure boot, immutable trust material, and a reliable clock or counter.
    source_anchor_ids: [anchor-paper-37-controls, anchor-paper-37-components]

  - id: paper-37-claim-performance
    kind: claim
    parent_id: paper-37-claims
    order: 3
    epistemic_status: measured
    title: Commodity-platform feasibility
    summary: >-
      The Sabre Lite prototype reports under 250 milliseconds to attest 10 MB with a Speck-based MAC, while ODROID-XU4 reports under 100 milliseconds with keyed BLAKE2S; memory and process-count costs scale approximately linearly in the tested ranges.
    source_anchor_ids: [anchor-paper-37-evaluation, anchor-paper-37-odroid]

  - id: paper-37-evidence
    kind: evidence_group
    parent_id: paper-37
    order: 9
    epistemic_status: mixed_formal_argument_and_experiment
    title: Evidence stack
    summary: >-
      Support combines upstream Isabelle/HOL proofs for seL4, manual configuration and code obligations for HYDRA, two C implementations on commodity boards, and runtime measurements decomposed into request verification, memory mapping, and MAC computation.
    source_anchor_ids: [anchor-paper-37-sel4, anchor-paper-37-security, anchor-paper-37-implementation, anchor-paper-37-evaluation]

  - id: paper-37-evidence-code
    kind: evidence
    parent_id: paper-37-evidence
    order: 1
    epistemic_status: implemented
    title: Prototype scale
    summary: >-
      On seL4 1.3, the complete build with helper libraries and network stack is reported as 105,360 C lines and 574 KB, while HYDRA-specific code excluding helpers is about 2,800 lines and the base seL4 kernel is 215 KB.
    source_anchor_ids: [anchor-paper-37-implementation]

  - id: paper-37-evidence-runtime
    kind: evidence
    parent_id: paper-37-evidence
    order: 2
    epistemic_status: reported_experiment
    title: Runtime breakdown and scaling
    summary: >-
      On Sabre Lite, MAC computation accounts for roughly 89 percent of the 1 MB time and 92 percent of the 20 KB time; memory mapping remains below one fifth of MAC time in the tested sizes, and process-count scaling is approximately linear.
    source_anchor_ids: [anchor-paper-37-evaluation]

  - id: paper-37-boundaries
    kind: limitation_group
    parent_id: paper-37
    order: 10
    epistemic_status: material
    title: Formal and empirical boundaries
    summary: >-
      HYDRA inherits verified isolation only where the actual boot chain, hardware, capability configuration, and code satisfy seL4 assumptions. PR-Att, cryptography, timestamp persistence, network stack, device drivers, and the end-to-end RA theorem are not machine-checked by this work.
    source_anchor_ids: [anchor-paper-37-implementation, anchor-paper-37-security, anchor-paper-37-proof-assumptions]

  - id: paper-37-boundary-adversary
    kind: limitation
    parent_id: paper-37-boundaries
    order: 1
    epistemic_status: explicitly_out_of_scope
    title: Physical, DMA, and side-channel boundary
    summary: >-
      Physical attackers, hardware faults, key extraction, timing leakage, and untrusted DMA are excluded. The paper notes that helper networking code is acceptable to the objective only if an I/O MMU prevents DMA attacks.
    source_anchor_ids: [anchor-paper-37-threat, anchor-paper-37-proof-assumptions]

  - id: paper-37-boundary-comparison
    kind: limitation
    parent_id: paper-37-boundaries
    order: 2
    epistemic_status: experimental_limitation
    title: No same-platform baseline
    summary: >-
      SMART and TrustLite could not run on the same off-the-shelf boards because of their hardware and microcontroller requirements, so the evaluation establishes HYDRA feasibility but not a controlled performance comparison against those systems.
    source_anchor_ids: [anchor-paper-37-evaluation]

  - id: paper-37-artifacts
    kind: artifact_group
    parent_id: paper-37
    order: 11
    epistemic_status: partial
    title: Artifacts and reproducibility
    summary: >-
      The full paper, arXiv record, seL4 and library repositories, algorithm pseudocode, and platform descriptions are public. This audit did not locate a publication-specific HYDRA repository, exact build image, benchmark scripts, or raw measurements.
    source_anchor_ids: [anchor-paper-37-implementation, anchor-paper-37-publication]

  - id: paper-37-scrutiny
    kind: scrutiny
    parent_id: paper-37
    order: 12
    epistemic_status: venue_reviewed_and_upstream_verified
    title: External scrutiny
    summary: >-
      HYDRA appeared at ACM WiSec and builds on independently published seL4 proof artifacts. That is stronger than an unreviewed design, but neither venue acceptance nor upstream kernel verification constitutes independent verification of the full HYDRA composition.
    source_anchor_ids: [anchor-paper-37-publication, anchor-paper-37-sel4]

