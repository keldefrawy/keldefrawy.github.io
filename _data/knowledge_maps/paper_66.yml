    title: External scrutiny
    summary: ESORICS publication provides venue-level review. No public review reports, independent reproduction, correction, or comparative re-evaluation was located.
    source_anchor_ids: [anchor-paper-66-publication]

  - id: paper-66-lineage
    kind: lineage
