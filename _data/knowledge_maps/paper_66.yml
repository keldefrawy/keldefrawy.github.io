nodes:
  - id: paper-66
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: Traffic analysis with partial visibility
    summary: A general inference framework for representing and sampling the hidden parts of a mix-network trace under adversaries with heterogeneous monitoring and compromise capabilities.
    source_anchor_ids: [anchor-paper-66-problem]

  - id: paper-66-question
    kind: question
    parent_id: paper-66
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: What posterior knowledge about sender-receiver flows is available when an adversary sees only a subset of the network's traffic matrices or internal mappings?
    source_anchor_ids: [anchor-paper-66-problem, anchor-paper-66-adversary]

  - id: paper-66-answer
    kind: contribution
    parent_id: paper-66
    order: 2
    epistemic_status: source_asserted
    title: Central answer
    summary: Represent the known and unknown portions of the network as constrained matrices and sample hidden traces from a posterior that combines observations with an adversarial prior.
    source_anchor_ids: [anchor-paper-66-matrices, anchor-paper-66-sampler]

  - id: paper-66-model
    kind: model
    parent_id: paper-66
    order: 3
    epistemic_status: defined
    title: Mix-network and adversary model
    summary: The communication trace is a sequence of matrices over flows between entities and mixes; an adversary is characterized by its inference goal, prior knowledge, and capability to monitor links or compromise mixes.
    source_anchor_ids: [anchor-paper-66-adversary, anchor-paper-66-matrices]

  - id: paper-66-model-observation
    kind: definition
    parent_id: paper-66-model
    order: 1
    epistemic_status: formalized
    title: Observation and hidden state
    summary: The trace is partitioned into an observed component O and hidden state HS. Network conservation, observed counts, topology, and compromised mappings constrain the set of feasible hidden matrices.
    source_anchor_ids: [anchor-paper-66-matrices]

  - id: paper-66-model-capabilities
    kind: threat_model
    parent_id: paper-66-model
    order: 2
    epistemic_status: defined
    title: Monitoring and compromise capabilities
    summary: The framework distinguishes observation of inter-entity traffic matrices from compromise of a mix, which can expose the mix's input-output correspondence under the modeled honest-but-curious behavior.
    source_anchor_ids: [anchor-paper-66-adversary, anchor-paper-66-matrices]

  - id: paper-66-algorithm
    kind: algorithm
    parent_id: paper-66
    order: 4
    epistemic_status: specified
    title: Posterior inference by Metropolis-Hastings
    summary: A Markov-chain sampler explores feasible hidden traces and estimates adversary-relevant probabilities without enumerating the complete hidden-state space.
    source_anchor_ids: [anchor-paper-66-sampler]

  - id: paper-66-algorithm-transition
    kind: algorithm_step
    parent_id: paper-66-algorithm
    order: 1
    epistemic_status: specified
    title: Feasibility-preserving proposal
    summary: The transition chooses a hidden matrix and exchanges entries across two columns in a way designed to preserve the trace constraints and produce another feasible candidate state.
    source_anchor_ids: [anchor-paper-66-sampler]

  - id: paper-66-algorithm-posterior
    kind: algorithm_step
    parent_id: paper-66-algorithm
    order: 2
    epistemic_status: specified
    title: Bayesian acceptance and estimation
    summary: Candidate transitions are accepted according to the Metropolis-Hastings ratio induced by the adversary's prior and observations, after which samples estimate the posterior quantity tied to the attack goal.
    source_anchor_ids: [anchor-paper-66-sampler]

  - id: paper-66-claims
    kind: claim_group
    parent_id: paper-66
    order: 5
    epistemic_status: source_asserted
    title: Principal claims
    summary: The authors claim a flexible representation for partial visibility and a sampling method that can instantiate substantially different traffic-analysis adversaries within one framework.
    source_anchor_ids: [anchor-paper-66-problem, anchor-paper-66-evaluation]

  - id: paper-66-claim-generality
    kind: claim
    parent_id: paper-66-claims
    order: 1
    epistemic_status: demonstrated
    title: Common model for different adversaries
    summary: The case study instantiates both link-monitoring and mix-compromise views, including a global passive adversary and an adversary compromising entry and exit mixes.
    source_anchor_ids: [anchor-paper-66-case-study, anchor-paper-66-evaluation]

  - id: paper-66-claim-feasibility
    kind: claim
    parent_id: paper-66-claims
    order: 2
    epistemic_status: experimentally_supported
    title: Sampling is feasible in the demonstrator
    summary: The Python implementation generates posterior samples for the evaluated nine-mix, three-layer source-routed topology, and the paper reports convergence diagnostics across generated traces.
    source_anchor_ids: [anchor-paper-66-case-study, anchor-paper-66-evaluation]

  - id: paper-66-evidence
    kind: evidence_group
    parent_id: paper-66
    order: 6
    epistemic_status: documented
    title: Evidence and checks
    summary: The paper gives the mathematical representation and sampler, a 2,363-line Python implementation, multiple adversary configurations, repeated traces, and Wilson-score intervals used to assess sampling convergence.
    source_anchor_ids: [anchor-paper-66-sampler, anchor-paper-66-evaluation]

  - id: paper-66-boundaries
    kind: limitation_group
    parent_id: paper-66
    order: 7
    epistemic_status: explicitly_bounded
    title: Scope and limitations
    summary: The evaluation demonstrates the framework on one mix-network model and does not establish universal anonymity loss, production scalability, or resistance to active manipulation.
    source_anchor_ids: [anchor-paper-66-evaluation, anchor-paper-66-limitations]

  - id: paper-66-boundary-adversary
    kind: limitation
    parent_id: paper-66-boundaries
    order: 1
    epistemic_status: model_bounded
    title: Compromise is not an active-attack model
    summary: The compromised mixes reveal internal mappings under the paper's modeled behavior; arbitrary packet dropping, modification, delay attacks, and adaptive malicious control require additional modeling.
    source_anchor_ids: [anchor-paper-66-adversary, anchor-paper-66-limitations]

  - id: paper-66-boundary-generalization
    kind: limitation
    parent_id: paper-66-boundaries
    order: 2
    epistemic_status: benchmark_bounded
    title: Topology and prior dependence
    summary: Posterior conclusions and convergence depend on the nine-mix topology, source routing, traffic assumptions, prior, capability placement, and attack goal; broader empirical coverage is left for future work.
    source_anchor_ids: [anchor-paper-66-case-study, anchor-paper-66-limitations]

  - id: paper-66-boundary-computation
    kind: limitation
    parent_id: paper-66-boundaries
    order: 3
    epistemic_status: scalability_open
    title: Sampling cost remains a boundary
    summary: Metropolis-Hastings avoids exhaustive enumeration but may require substantial burn-in and sampling for large hidden spaces; the paper does not provide a general polynomial-time convergence guarantee.
    source_anchor_ids: [anchor-paper-66-sampler, anchor-paper-66-evaluation, anchor-paper-66-limitations]

  - id: paper-66-resources
    kind: artifact_group
    parent_id: paper-66
    order: 8
    epistemic_status: source_available
    title: Auditable resources
    summary: The complete author copy is checked into this site with page count and SHA-256, and the official DOI establishes the proceedings identity. The paper describes implementation code but this audit did not locate a public repository.
    source_anchor_ids: [anchor-paper-66-problem, anchor-paper-66-evaluation, anchor-paper-66-publication]

  - id: paper-66-scrutiny
