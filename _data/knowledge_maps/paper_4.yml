    summary: "WPANs act as entities that discover peers, exchange certificates, negotiate short contracts under owner policies, enforce limited guest access, and exchange micropayments."
    source_anchor_ids: [anchor-paper-4-operation, anchor-paper-4-policy, anchor-paper-4-incentives]
  - id: paper-4-workflow
    kind: mechanism
    parent_id: paper-4
    order: 3
    epistemic_status: outlined
    title: "Negotiation workflow"
    summary: "Devices coordinate interface information, select a gateway and peer provider, mutually authenticate, establish trust metrics and contractual terms, then initiate payment for the delivered service."
    source_anchor_ids: [anchor-paper-4-operation]
  - id: paper-4-security
    kind: design
    parent_id: paper-4
    order: 4
    epistemic_status: proposed
    title: "Escrowed anonymity"
    summary: "Group signatures are proposed to authenticate customers and traders anonymously while allowing a group manager to reveal a signer during a dispute."
    source_anchor_ids: [anchor-paper-4-security]
  - id: paper-4-policy
    kind: design
    parent_id: paper-4
    order: 5
    epistemic_status: requirements_and_open_questions
    title: "Access control and policy"
    summary: "Guest profiles should constrain relayed traffic, but policy authoring, distribution, adaptation, device failure, and traffic attribution remain design questions."
    source_anchor_ids: [anchor-paper-4-policy]
  - id: paper-4-incentives
    kind: design
    parent_id: paper-4
    order: 6
    epistemic_status: proposed
    title: "Micropayments and reputation"
    summary: "Small incremental payments are intended to reduce losses from a misbehaving provider and reward users for resale of connectivity; a scalable cheat-resistant billing system is not supplied."
    source_anchor_ids: [anchor-paper-4-incentives]
  - id: paper-4-scope
