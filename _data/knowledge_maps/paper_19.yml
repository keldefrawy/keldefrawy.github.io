nodes:
  - id: paper-19
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "5PM"
    summary: "A two-party secure pattern-matching protocol family based on an algebraic reduction and additively homomorphic encryption."
    source_anchor_ids: [anchor-paper-19-question]

  - id: paper-19-question
    kind: question
    parent_id: paper-19
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can expressive non-binary pattern search be securely computed with communication linear in text-plus-pattern length rather than linear in a quadratic generic circuit?"
    source_anchor_ids: [anchor-paper-19-question]

  - id: paper-19-answer
    kind: contribution
    parent_id: paper-19
    order: 2
    epistemic_status: formally_supported
    title: "Central answer"
    summary: "Represent candidate matches as linear matrix/vector operations over character-delay vectors, then evaluate those operations homomorphically with protocol-specific checks for semi-honest or malicious behavior."
    source_anchor_ids: [anchor-paper-19-linear, anchor-paper-19-hbc, anchor-paper-19-malicious]

  - id: paper-19-scope
    kind: scope
    parent_id: paper-19
    order: 3
    epistemic_status: explicitly_scoped
    title: "Functionality and parties"
    summary: "A server holds text of length n and a client holds a pattern of length m over an arbitrary alphabet; outputs can represent exact, single-wildcard, substring/Hamming matches, with optional pattern-length hiding."
    source_anchor_ids: [anchor-paper-19-question]

  - id: paper-19-adversary
    kind: threat_model
    parent_id: paper-19-scope
    order: 1
    epistemic_status: defined
    title: "Semi-honest and malicious models"
    summary: "Separate constructions address honest-but-curious behavior and static malicious corruption in the stand-alone model; privacy is defined through simulation and allowed leakage such as public length bounds."
    source_anchor_ids: [anchor-paper-19-hbc, anchor-paper-19-malicious, anchor-paper-19-proofs]

  - id: paper-19-primitive-ipm
    kind: primitive
    parent_id: paper-19
    order: 4
    epistemic_status: algorithmically_defined
    title: "Character-delay-vector matching"
    summary: "Each pattern character creates delayed contributions to an activation vector; a match is detected where the accumulated value equals the pattern length, with adjustments for wildcards and allowed Hamming distance."
    source_anchor_ids: [anchor-paper-19-ipm]

  - id: paper-19-primitive-linear
    kind: primitive
    parent_id: paper-19
    order: 5
    epistemic_status: proposed
    title: "Linear-algebra reduction"
    summary: "Matrix multiplication followed by Stretch, Cut, and column summation expresses matching using additions and scalar products compatible with additive homomorphism."
    source_anchor_ids: [anchor-paper-19-linear]

  - id: paper-19-protocol-hbc
    kind: protocol
    parent_id: paper-19
    order: 6
    epistemic_status: proven_conditional_and_implemented
    title: "Two-round honest-but-curious protocol"
    summary: "The client encrypts preprocessed pattern material, the server evaluates the linear matching computation over ciphertexts, and the client decrypts the blinded result; security relies on semantic security of the chosen additive homomorphic scheme."
    source_anchor_ids: [anchor-paper-19-hbc, anchor-paper-19-theorems]

  - id: paper-19-protocol-malicious
    kind: protocol
    parent_id: paper-19
    order: 7
    epistemic_status: proven_conditional_not_implemented
    title: "Eight-round malicious protocol"
    summary: "Threshold ElGamal, commitments, and interleaved zero-knowledge arguments constrain both parties to well-formed encrypted inputs and protocol steps while preserving the algebraic matching path."
    source_anchor_ids: [anchor-paper-19-malicious, anchor-paper-19-theorems]

  - id: paper-19-claim-security-hbc
    kind: formal_claim
    parent_id: paper-19
    order: 8
    epistemic_status: theorem_in_source
    title: "Semi-honest security"
    summary: "Theorem 1 establishes simulation-based security of the honest-but-curious construction assuming a semantically secure additively homomorphic encryption scheme over the specified group."
    source_anchor_ids: [anchor-paper-19-theorems, anchor-paper-19-proofs]

  - id: paper-19-claim-security-malicious
    kind: formal_claim
    parent_id: paper-19
    order: 9
    epistemic_status: theorem_in_source
    title: "Malicious security"
    summary: "Theorem 2 establishes security of the malicious construction under the Decisional Diffie-Hellman assumption and the soundness/zero-knowledge properties of its proof subprotocols."
    source_anchor_ids: [anchor-paper-19-theorems, anchor-paper-19-proofs]

  - id: paper-19-claim-complexity
    kind: formal_claim
    parent_id: paper-19
    order: 10
    epistemic_status: asymptotic_analysis
    title: "Communication and round complexity"
    summary: "The malicious construction uses O((m+n)k^2) bandwidth and O(m+n) encryptions and completes in eight rounds; the honest-but-curious construction completes in two rounds, with computational work still scaling with pattern-text interactions."
    source_anchor_ids: [anchor-paper-19-question, anchor-paper-19-theorems]

  - id: paper-19-evidence-proof
    kind: formal_evidence
    parent_id: paper-19
    order: 11
    epistemic_status: human_proof
    title: "Simulation proof chain"
    summary: "The full version supplies hybrid/simulator arguments for the protocol components and their composition; this map records the chain but does not independently verify every proof step."
    source_anchor_ids: [anchor-paper-19-proofs]

  - id: paper-19-evidence-implementation
    kind: empirical_evidence
    parent_id: paper-19
    order: 12
    epistemic_status: measured_prototype
    title: "Honest-but-curious prototype"
    summary: "A C++ Paillier-based implementation on a dual quad-core 2.93 GHz machine reports, for alphabet 36, pattern 100, and text 10,000, about 7.55 seconds at 1024-bit keys and 25.01 seconds at 2048-bit keys."
    source_anchor_ids: [anchor-paper-19-implementation]

  - id: paper-19-limitations
    kind: limitation_group
    parent_id: paper-19
    order: 13
    epistemic_status: material
    title: "Implementation and evidence limits"
    summary: "The malicious protocol is not implemented in the reported evaluation, benchmarks use an older single-machine setup, preprocessing and key generation are separated from online totals, and no public code or independent reproduction was located."
    source_anchor_ids: [anchor-paper-19-implementation]

  - id: paper-19-artifacts
    kind: artifact_group
    parent_id: paper-19
    order: 14
    epistemic_status: paper_and_proof_only
    title: "Artifacts"
    summary: "The IACR full version exposes detailed constructions, proofs, and benchmark tables; an author-uploaded full text is also public, but no code repository, test vectors, or locally fixed PDF was obtained."
    source_anchor_ids: [anchor-paper-19-proofs, anchor-paper-19-implementation]

  - id: paper-19-scrutiny
    kind: scrutiny
    parent_id: paper-19
    order: 15
    epistemic_status: conference_and_journal_reviewed
    title: "External scrutiny and reception"
    summary: "A preliminary version appeared at SCN 2012, a full version later appeared in the Journal of Computer Security, and ResearchGate reports 56 citations; review reports and independent proof/implementation audits were not inspected."
    source_anchor_ids: [anchor-paper-19-publication, anchor-paper-19-journal, anchor-paper-19-citations]

  - id: paper-19-lineage
    kind: lineage
    parent_id: paper-19
    order: 16
    epistemic_status: documented
    title: "Research lineage"
    summary: "5PM contributes a reusable linear representation for secure string search and supplies the cryptographic search primitive later used and surveyed in application-oriented private-search work."
    source_anchor_ids: [anchor-paper-19-question, anchor-paper-19-linear]

