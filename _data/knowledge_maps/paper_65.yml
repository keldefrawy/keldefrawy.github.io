nodes:
  - id: paper-65
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: Hardness of SIMD FHE scheme switching
    summary: >-
      A theory paper that studies exact-to-approximate and approximate-to-exact SIMD FHE conversion through oracle reductions, showing that broadly useful switching would subsume costly refresh capabilities.
    source_anchor_ids: [anchor-paper-65-problem]

  - id: paper-65-question
    kind: question
    parent_id: paper-65
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Is generic, efficient switching between BGV/BFV exact SIMD encodings and CKKS approximate SIMD encodings substantially easier than bootstrapping?
    source_anchor_ids: [anchor-paper-65-problem]

  - id: paper-65-answer
    kind: contribution
    parent_id: paper-65
    order: 2
    epistemic_status: proved_conditionally
    title: Conditional barrier answer
    summary: >-
      Under the formal oracle interfaces, switching in either direction yields bootstrapping for the destination scheme with small additional work. Thus an efficient switching primitive of the modeled strength would also solve a capability usually regarded as expensive.
    source_anchor_ids: [anchor-paper-65-exact-to-approx, anchor-paper-65-approx-to-exact]

  - id: paper-65-model
    kind: model
    parent_id: paper-65
    order: 3
    epistemic_status: defined
    title: Exact and approximate SIMD model
    summary: BGV and BFV represent exact modular plaintext slots, whereas CKKS represents approximate complex or real slots with scale and error; switching must address both ciphertext semantics and plaintext encoding.
    source_anchor_ids: [anchor-paper-65-preliminaries]

  - id: paper-65-model-oracle
    kind: definition
    parent_id: paper-65-model
    order: 1
    epistemic_status: formalized
    title: Weak versus strong switching
    summary: >-
      A weak oracle preserves a compatible underlying ring-polynomial representation without performing the full slot-encoding conversion. A strong oracle includes the encoding transformation expected by an application-facing scheme switch.
    source_anchor_ids: [anchor-paper-65-switch-definitions]

  - id: paper-65-model-encoding
    kind: theorem
    parent_id: paper-65-model
    order: 2
    epistemic_status: proved
    title: Weak-to-strong lifting
    summary: The Section 3 lemmas and theorems connect the weak oracle formulations to strong switching by accounting for the relevant BGV and CKKS encoding transformations.
    source_anchor_ids: [anchor-paper-65-switch-definitions]

  - id: paper-65-results
    kind: claim_group
    parent_id: paper-65
    order: 4
    epistemic_status: proved
    title: Reduction results
    summary: The central results are black-box consequences of possessing the specified switching oracle; they are not constructions of a cheap switching implementation.
    source_anchor_ids: [anchor-paper-65-exact-to-approx, anchor-paper-65-approx-to-exact]

  - id: paper-65-result-bgv-ckks
    kind: theorem
    parent_id: paper-65-results
    order: 1
    epistemic_status: proved
    title: Exact-to-approximate switch bootstraps CKKS
    summary: >-
      Theorem 5 shows that a weak BGV-to-CKKS switching oracle can be used to bootstrap CKKS with one oracle call and one rescaling step, subject to the theorem's parameter and noise conditions.
    source_anchor_ids: [anchor-paper-65-exact-to-approx]

  - id: paper-65-result-ckks-bgv
    kind: theorem
    parent_id: paper-65-results
    order: 2
    epistemic_status: proved
    title: Approximate-to-exact switch bootstraps BGV
    summary: >-
      The reverse reduction uses one CKKS-to-BGV oracle call followed by a homomorphic inner-product style computation, plaintext multiplication and addition, and modulus switching to obtain a refreshed BGV ciphertext; the treatment extends to BFV through the stated conversion.
    source_anchor_ids: [anchor-paper-65-approx-to-exact]

  - id: paper-65-result-comparison
    kind: theorem
    parent_id: paper-65-results
    order: 3
    epistemic_status: proved_conditionally
    title: Comparison access also carries refresh power
    summary: >-
      The comparison analysis shows how a suitable comparison oracle can support bootstrapping with few calls for typical parameter regimes and connects the mechanism to nonlinear operations such as minimum, maximum, and ReLU.
    source_anchor_ids: [anchor-paper-65-comparison]

  - id: paper-65-evidence
    kind: evidence_group
    parent_id: paper-65
    order: 5
    epistemic_status: formal
    title: Formal evidence
    summary: The paper's evidence consists of definitions, encoding lemmas, constructive oracle reductions, and explicit noise or parameter accounting rather than implementation benchmarks.
    source_anchor_ids: [anchor-paper-65-switch-definitions, anchor-paper-65-exact-to-approx, anchor-paper-65-approx-to-exact]

  - id: paper-65-boundaries
    kind: limitation_group
    parent_id: paper-65
    order: 6
    epistemic_status: explicitly_bounded
    title: What the reductions do not establish
    summary: The reductions delimit the consequences of modeled switching capabilities but do not prove an unconditional complexity lower bound or impossibility theorem.
    source_anchor_ids: [anchor-paper-65-problem, anchor-paper-65-conclusion]

  - id: paper-65-boundary-conditional
    kind: limitation
    parent_id: paper-65-boundaries
    order: 1
    epistemic_status: logical_boundary
    title: Conditional, not unconditional, hardness
    summary: >-
      Showing that A implies B does not prove that A is impossible or as hard as B under every implementation model; the result becomes a hardness barrier only together with an external belief or lower bound about bootstrapping cost.
    source_anchor_ids: [anchor-paper-65-exact-to-approx, anchor-paper-65-approx-to-exact]

  - id: paper-65-boundary-interface
    kind: limitation
    parent_id: paper-65-boundaries
    order: 2
    epistemic_status: model_bounded
    title: Oracle-interface dependence
    summary: A specialized converter outside the weak or strong oracle semantics, a restricted plaintext domain, amortization, or changed correctness and precision requirements may fall outside a theorem's conclusion.
    source_anchor_ids: [anchor-paper-65-switch-definitions, anchor-paper-65-conclusion]

  - id: paper-65-boundary-empirical
    kind: limitation
    parent_id: paper-65-boundaries
    order: 3
    epistemic_status: not_evaluated
    title: No implementation comparison
    summary: The work does not implement a switch, benchmark bootstrapping, or measure engineering tradeoffs; it establishes relative capability, not concrete runtime cost.
    source_anchor_ids: [anchor-paper-65-problem, anchor-paper-65-conclusion]

  - id: paper-65-resources
