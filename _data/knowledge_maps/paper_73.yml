    kind: threat_model
    parent_id: paper-73
    order: 9
    epistemic_status: abstract_reported
    title: Malicious or compromised committer boundary
    summary: "Classical time-lock puzzles let one committer know the secret and therefore assume that party will not selectively disclose it early. MTP distributes generation so premature recovery requires compromising a quorum rather than one party."
    source_anchor_ids: [anchor-paper-73-abstract]

  - id: paper-73-primitive
