    order: 10
    epistemic_status: abstract_reported_definition
    title: Multi-party time-lock puzzle
    summary: "The abstract characterizes MTP as a new primitive with distributed puzzle generation and a threshold-controlled early-reconstruction condition. The exact interface, threshold, setup, and security experiment require full-text audit."
