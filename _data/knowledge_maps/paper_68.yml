nodes:
  - id: paper-68
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: Short concurrent covert AKE
    summary: A one-flow group-authenticated key-exchange protocol whose UC goal includes hiding protocol execution and participant credentials within random-looking beacon traffic under concurrent execution.
    source_anchor_ids: [anchor-paper-68-problem]

  - id: paper-68-question
    kind: question
    parent_id: paper-68
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can covert AKE simultaneously achieve concurrent composability, group membership and revocation checks, independent session keys, short messages, and no visible protocol marker?
    source_anchor_ids: [anchor-paper-68-problem, anchor-paper-68-uc-model]

  - id: paper-68-answer
    kind: contribution
    parent_id: paper-68
    order: 2
    epistemic_status: proved_conditionally
    title: Central construction
    summary: Combine a covert identity-escrow mechanism and a covert KEM so that both credential checks must succeed before either party derives the session key, while each transmitted string remains distributed like a beacon string to outsiders.
    source_anchor_ids: [anchor-paper-68-overview, anchor-paper-68-cake]

  - id: paper-68-model
    kind: model
    parent_id: paper-68
    order: 3
    epistemic_status: formalized
    title: UC functionality and adversary
    summary: The functionality represents a group manager, member credentials, revocation, concurrent sessions, authentication, key independence, and covert transcripts under static corruptions.
    source_anchor_ids: [anchor-paper-68-uc-model]

  - id: paper-68-model-covertness
    kind: security_goal
    parent_id: paper-68-model
    order: 1
    epistemic_status: defined
    title: Transcript and identity covertness
    summary: Before successful mutual recognition, observable protocol strings should be indistinguishable from the ambient random-beacon distribution and should not reveal a party's group token or membership.
    source_anchor_ids: [anchor-paper-68-problem, anchor-paper-68-uc-model]

  - id: paper-68-model-authentication
    kind: security_goal
    parent_id: paper-68-model
    order: 2
    epistemic_status: defined
    title: Authenticated independent keys
    summary: Honest parties accepting the same session obtain a shared key only for valid, non-revoked credentials, and concurrent sessions obtain independent keys under the ideal functionality.
    source_anchor_ids: [anchor-paper-68-uc-model]

  - id: paper-68-protocol
    kind: protocol
    parent_id: paper-68
    order: 4
    epistemic_status: constructed
    title: Short cAKE protocol
    summary: Each party simultaneously sends one compound message containing the commitment and sender/receiver material needed for covert credential escrow and covert encapsulation, then locally combines both acceptance conditions before deriving a key.
    source_anchor_ids: [anchor-paper-68-overview, anchor-paper-68-cake]

  - id: paper-68-protocol-identity
    kind: protocol_component
    parent_id: paper-68-protocol
    order: 1
    epistemic_status: constructed
    title: Covert identity escrow
    summary: A group credential is committed and tested without exposing it to non-members; revocation information is included in the local decision.
    source_anchor_ids: [anchor-paper-68-building-blocks, anchor-paper-68-cake]

  - id: paper-68-protocol-ckem
    kind: protocol_component
    parent_id: paper-68-protocol
    order: 2
    epistemic_status: constructed
    title: Covert key encapsulation
    summary: The CKEM is compiled from Sigma-protocol, trapdoor-commitment, and smooth-projective-hash ingredients in the random-oracle model, with properties designed for same-statement concurrency and postponed statements.
    source_anchor_ids: [anchor-paper-68-building-blocks, anchor-paper-68-ckem]

  - id: paper-68-protocol-efficiency
    kind: property
    parent_id: paper-68-protocol
    order: 3
    epistemic_status: analytically_derived
    title: One simultaneous flow and short messages
    summary: Each party sends one 351-byte message consisting of four DDH-group elements and two type-3 pairing-curve points; the paper reports roughly a tenfold size reduction over its prior comparison point.
    source_anchor_ids: [anchor-paper-68-problem, anchor-paper-68-cake]

  - id: paper-68-results
    kind: claim_group
    parent_id: paper-68
    order: 5
    epistemic_status: theorem_backed
    title: Security and efficiency results
    summary: The source states separate conditional security results for the CKEM compiler and for the composed cAKE realization, together with operation counts.
    source_anchor_ids: [anchor-paper-68-ckem, anchor-paper-68-cake]

  - id: paper-68-result-ckem
    kind: theorem
    parent_id: paper-68-results
    order: 1
    epistemic_status: proved_conditionally
    title: Covert KEM theorem
    summary: Theorem 5.1 establishes the required CKEM security from the listed commitment, proof, hash, and random-oracle assumptions under the theorem's concurrency conditions.
    source_anchor_ids: [anchor-paper-68-ckem]

  - id: paper-68-result-cake
    kind: theorem
    parent_id: paper-68-results
    order: 2
    epistemic_status: proved_conditionally
    title: UC realization theorem
    summary: Theorem 6.1 states that the composed protocol realizes the defined cAKE functionality when the covert identity-escrow and CKEM components satisfy their required properties.
    source_anchor_ids: [anchor-paper-68-cake]

  - id: paper-68-result-cost
    kind: claim
    parent_id: paper-68-results
    order: 3
    epistemic_status: analytically_derived
    title: Per-party computation
    summary: The proceedings analysis reports 14 exponentiations in total, including ten fixed-base and four variable-base operations, plus 4+n pairings for a group parameter n.
    source_anchor_ids: [anchor-paper-68-problem, anchor-paper-68-cake]

  - id: paper-68-evidence
    kind: evidence_group
    parent_id: paper-68
    order: 6
    epistemic_status: formal_with_deferred_details
    title: Evidence structure
    summary: The chapter gives the UC functionality, component definitions, concrete construction, theorem statements, and analytical costs; it directs readers to the IACR full version for deferred proofs and proof-of-concept implementation details.
    source_anchor_ids: [anchor-paper-68-uc-model, anchor-paper-68-ckem, anchor-paper-68-cake, anchor-paper-68-full-version]

  - id: paper-68-boundaries
    kind: limitation_group
    parent_id: paper-68
    order: 7
    epistemic_status: explicitly_bounded
    title: Scope and limitations
    summary: The result is conditional on a trusted credential lifecycle and specific cryptographic models; its covertness guarantee does not automatically survive later endpoint compromise.
    source_anchor_ids: [anchor-paper-68-overview, anchor-paper-68-uc-model]

  - id: paper-68-boundary-corruption
    kind: limitation
    parent_id: paper-68-boundaries
    order: 1
    epistemic_status: model_bounded
    title: Static corruption and no forward covertness
    summary: The analysis uses static corruption. Later compromise may reveal that a party participated in past sessions even when session-key security remains, so forward privacy of participation is outside the claim.
    source_anchor_ids: [anchor-paper-68-overview, anchor-paper-68-uc-model]

  - id: paper-68-boundary-setup
    kind: limitation
    parent_id: paper-68-boundaries
    order: 2
    epistemic_status: assumption_dependent
    title: Credential and random-oracle assumptions
    summary: A group manager must issue credentials and distribute revocation state securely, and the CKEM compiler relies on random-oracle and group assumptions; these are prerequisites rather than guarantees of cAKE itself.
    source_anchor_ids: [anchor-paper-68-building-blocks, anchor-paper-68-ckem]

  - id: paper-68-boundary-implementation
    kind: limitation
    parent_id: paper-68-boundaries
    order: 3
    epistemic_status: evidence_boundary
    title: Proceedings chapter defers implementation detail
    summary: The represented 35-page chapter gives analytical costs but sends readers to the full ePrint for proof-of-concept measurements; no independent deployment or side-channel evaluation is established here.
    source_anchor_ids: [anchor-paper-68-problem, anchor-paper-68-full-version]

  - id: paper-68-resources
    kind: artifact_group
    parent_id: paper-68
    order: 8
    epistemic_status: source_available
    title: Auditable resources
    summary: A complete public proceedings copy, IACR full-version record, and official DOI expose the protocol and its formal context. No public source-code repository was located in this audit.
    source_anchor_ids: [anchor-paper-68-problem, anchor-paper-68-full-version, anchor-paper-68-publication]

