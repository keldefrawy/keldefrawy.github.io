nodes:
  - id: paper-53
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Towards Automated Augmentation and Instrumentation of Legacy Cryptographic Executables"
    summary: >-
      ALICE is an implemented binary-analysis and rewriting toolchain for replacing weak hash functions in legacy executables without source code or debugging symbols.
    source_anchor_ids: [anchor-paper-53-problem]

  - id: paper-53-question
    kind: question
    parent_id: paper-53
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Is automatic cryptographic migration at the binary level practically feasible when maintainers cannot recompile or inspect original source?
    source_anchor_ids: [anchor-paper-53-problem]

  - id: paper-53-answer
    kind: contribution
    parent_id: paper-53
    order: 2
    epistemic_status: demonstrated_on_tested_scope
    title: Central answer
    summary: >-
      For a bounded class of non-obfuscated ELF x86-64 binaries, ALICE identifies hash routines, propagates digest-size changes through affected buffers, injects a replacement routine, and redirects calls with low measured overhead.
    source_anchor_ids: [anchor-paper-53-scope, anchor-paper-53-identification, anchor-paper-53-rewriting]

  - id: paper-53-scope
    kind: scope
    parent_id: paper-53
    order: 3
    epistemic_status: explicitly_scoped
    title: Target environment
    summary: >-
      The prototype targets ELF-format x86-64 binaries produced from C, assumes ordinary defensive software rather than malware, and requires neither source code nor debugging symbols.
    source_anchor_ids: [anchor-paper-53-scope]

  - id: paper-53-scope-boundary
    kind: assumption
    parent_id: paper-53-scope
    order: 1
    epistemic_status: assumed
    title: Non-malicious and unobfuscated input
    summary: >-
      Correctness of the workflow depends on the binary being non-obfuscated and on underlying disassembly, symbolic execution, assembly, and rewriting tools behaving adequately on the encountered instructions.
    source_anchor_ids: [anchor-paper-53-scope, anchor-paper-53-limitations]

  - id: paper-53-pipeline
    kind: method
    parent_id: paper-53
    order: 4
    epistemic_status: implemented
    title: Three-phase ALICE pipeline
    summary: >-
      ALICE identifies target cryptography, scopes affected state, and then augments and rewrites the executable. The paper separates these phases so failures and manual obligations remain visible.
    source_anchor_ids: [anchor-paper-53-identification, anchor-paper-53-scoping, anchor-paper-53-rewriting]

  - id: paper-53-pipeline-identify
    kind: algorithm
    parent_id: paper-53-pipeline
    order: 1
    epistemic_status: implemented
    title: Identify hash routines
    summary: >-
      The tool scans for known constants, follows the binary call graph to collect candidates, enumerates plausible calling conventions, and executes candidates offline on known inputs to remove false positives and recover parameter order.
    source_anchor_ids: [anchor-paper-53-identification]

  - id: paper-53-pipeline-scope
    kind: algorithm
    parent_id: paper-53-pipeline
    order: 2
    epistemic_status: implemented
    title: Scope propagated buffer changes
    summary: >-
      Dynamic taint analysis marks the target digest output and tracks affected memory buffers so a larger replacement digest can be accommodated. It handles routine replacement and buffer resizing, not arbitrary semantic logic changes.
    source_anchor_ids: [anchor-paper-53-scoping]

  - id: paper-53-pipeline-rewrite
    kind: algorithm
    parent_id: paper-53-pipeline
    order: 3
    epistemic_status: implemented
    title: Inject and redirect
    summary: >-
      ALICE appends replacement code, rewrites affected stack and memory references, and redirects calls statically, minimizing runtime instrumentation overhead.
    source_anchor_ids: [anchor-paper-53-rewriting]

  - id: paper-53-evidence
    kind: evidence_group
    parent_id: paper-53
    order: 5
    epistemic_status: empirical
    title: Experimental evidence
    summary: >-
      The prototype is evaluated across multiple cryptographic libraries, compiler optimization levels, and six real applications, with explicit functional tests, code-size measurements, instruction counts, and tool runtime.
    source_anchor_ids: [anchor-paper-53-experiment-design, anchor-paper-53-library-results, anchor-paper-53-application-results]

  - id: paper-53-evidence-libraries
    kind: evidence
    parent_id: paper-53-evidence
    order: 1
    epistemic_status: measured
    title: Library corpus
    summary: >-
      Tests cover hash implementations from OpenSSL, libgcrypt, mbedTLS, and FreeBL across common compiler optimization settings. The rewritten library binaries add little executed-instruction overhead relative to manually rebuilt baselines.
    source_anchor_ids: [anchor-paper-53-experiment-design, anchor-paper-53-library-results]

  - id: paper-53-evidence-applications
    kind: evidence
    parent_id: paper-53-evidence
    order: 2
    epistemic_status: measured_with_failure
    title: Real-world application corpus
    summary: >-
      The paper tests md5sum, sha1sum, smd5_mkpass, ssha_mkpass, curl, and lighttpd. Most rewritten binaries pass project tests and the target hash behavior, but one misidentified routine and an O3 curl case expose concrete failure modes.
    source_anchor_ids: [anchor-paper-53-application-results]

  - id: paper-53-claim-functionality
    kind: claim
    parent_id: paper-53
    order: 6
    epistemic_status: demonstrated_on_corpus
    title: Functionality preservation on tested binaries
    summary: >-
      For the successful cases, rewritten applications pass the available original test suites and produce the expected stronger-hash behavior. This is test-based evidence, not a proof of semantic equivalence.
    source_anchor_ids: [anchor-paper-53-application-results]

  - id: paper-53-claim-overhead
    kind: claim
    parent_id: paper-53
    order: 7
    epistemic_status: measured
    title: Low measured runtime and code-size overhead
    summary: >-
      Library experiments add about 300 executed instructions on average, and application runs remain below roughly five percent instruction overhead; rewritten real binaries add about 4-11 KB. Tool execution ranges from under a minute on simple cases to about five minutes on the largest tested program.
    source_anchor_ids: [anchor-paper-53-library-results, anchor-paper-53-application-results]

  - id: paper-53-claim-automation
    kind: claim
    parent_id: paper-53
    order: 8
    epistemic_status: measured_on_corpus
    title: Reduced manual rewriting effort
    summary: >-
      On the reported O2 application set, ALICE automatically rewrites 99.87 percent of counted changed instructions when routine and buffer changes are included; excluding routine identification, it handles about 70.17 percent of buffer-plus-logic changes.
    source_anchor_ids: [anchor-paper-53-application-results]

  - id: paper-53-boundaries
    kind: limitation_group
    parent_id: paper-53
    order: 9
    epistemic_status: material
    title: Limitations
    summary: >-
      The prototype does not automatically infer arbitrary control-logic changes, does not replace primitives inside dynamic libraries, does not support obfuscated programs, and inherits unsoundness or unsupported-instruction risks from angr, Keystone, and other components.
    source_anchor_ids: [anchor-paper-53-scoping, anchor-paper-53-limitations]

  - id: paper-53-boundary-generality
    kind: limitation
    parent_id: paper-53-boundaries
    order: 1
    epistemic_status: explicitly_scoped
    title: Demonstrated only for hash replacement
    summary: >-
      Although the architecture is presented as extensible, the concrete evaluation replaces hash functions; it does not establish automated migration for arbitrary encryption, signature, protocol, or post-quantum primitives.
    source_anchor_ids: [anchor-paper-53-scope, anchor-paper-53-conclusion]

  - id: paper-53-artifacts
    kind: artifact_group
    parent_id: paper-53
    order: 10
    epistemic_status: publicly_available
    title: Paper and code
    summary: >-
      The extended manuscript is checked in with fixity metadata and the authors link a public ALICE repository. This audit confirmed the repository link but did not rebuild or reproduce the toolchain.
    source_anchor_ids: [anchor-paper-53-code, anchor-paper-53-publication]

  - id: paper-53-scrutiny
    kind: scrutiny
    parent_id: paper-53
    order: 11
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The conference paper appeared at ACNS 2020 and the extended source exposes its experiments and limitations. Review reports and an independent reproduction are not represented.
    source_anchor_ids: [anchor-paper-53-publication, anchor-paper-53-limitations]

  - id: paper-53-lineage
    kind: lineage
    parent_id: paper-53
    order: 12
    epistemic_status: documented
    title: Role in cryptographic migration
    summary: >-
      ALICE extends binary cryptographic identification from detection toward replacement, while leaving semantic logic repair and broader primitive support as subsequent work.
    source_anchor_ids: [anchor-paper-53-problem, anchor-paper-53-limitations]

