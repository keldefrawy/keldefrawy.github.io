nodes:
  - id: paper-21
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "5PM: Secure Pattern Matching"
    summary: "A two-party secure pattern-matching protocol family for exact matching, single-character wildcards, nonbinary Hamming distance, and substring matching, with explicit honest-but-curious and static-malicious constructions."
    source_anchor_ids: [anchor-paper-21-problem]

  - id: paper-21-question
    kind: question
    parent_id: paper-21
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can expressive private pattern matching obtain malicious security, bounded rounds, O(m+n) ciphertext-scale communication, and optional hiding of the pattern length?"
    source_anchor_ids: [anchor-paper-21-problem]

  - id: paper-21-answer
    kind: contribution
    parent_id: paper-21
    order: 2
    epistemic_status: source_asserted
    title: "Central answer"
    summary: "Encode the server text and client pattern as matrices, reduce matching to linear operators, evaluate one encrypted operand homomorphically, and enforce well-formedness and consistent computation with threshold decryption and zero-knowledge arguments in the malicious variant."
    source_anchor_ids: [anchor-paper-21-tools, anchor-paper-21-malicious]

  - id: paper-21-scope
    kind: scope
    parent_id: paper-21
    order: 3
    epistemic_status: defined
    title: "Functionality, parties, and adversary"
    summary: "Server holds text T of length n over alphabet Sigma; Client holds pattern p of length m, optionally containing wildcards, and learns either matching locations or a decision while Server learns no output."
    source_anchor_ids: [anchor-paper-21-input-output, anchor-paper-21-security-model]

  - id: paper-21-scope-functionality
    kind: definition
    parent_id: paper-21-scope
    order: 1
    epistemic_status: defined
    title: "Matching semantics"
    summary: "The same activation-vector construction supports exact matches, single-character wildcards, nonbinary Hamming distance, and thresholded substring matching; multiple distance thresholds can reuse one protocol execution."
    source_anchor_ids: [anchor-paper-21-input-output, anchor-paper-21-hbc]

  - id: paper-21-scope-adversary
    kind: threat_model
    parent_id: paper-21-scope
    order: 2
    epistemic_status: defined
    title: "Static two-party corruption"
    summary: "The formal analyses treat one statically corrupted party in either the honest-but-curious or malicious stand-alone setting; the malicious proof is simulation-based for the stated ideal functionality."
    source_anchor_ids: [anchor-paper-21-security-model, anchor-paper-21-security-theorems]

  - id: paper-21-scope-assumptions
    kind: assumption
    parent_id: paper-21-scope
    order: 3
    epistemic_status: assumed
    title: "Cryptographic assumptions"
    summary: "The HBC theorem assumes semantically secure additive homomorphic encryption over a prime-order cyclic group; the concrete malicious construction uses threshold ElGamal and assumes DDH hardness plus the specified commitment and zero-knowledge machinery."
    source_anchor_ids: [anchor-paper-21-tools, anchor-paper-21-security-theorems]

  - id: paper-21-method
    kind: method
    parent_id: paper-21
    order: 4
    epistemic_status: specified
    title: "Construction path"
    summary: "5PM transforms the insecure character-delay-vector algorithm into matrix multiplication, Stretch, Cut, and column-sum operations that remain computable when one operand is encrypted."
    source_anchor_ids: [anchor-paper-21-input-output, anchor-paper-21-tools]

  - id: paper-21-method-hbc
    kind: component
    parent_id: paper-21-method
    order: 1
    epistemic_status: specified_and_proved
    title: "Two-round HBC protocol"
    summary: "Client encrypts its character-delay matrix and threshold; Server forms and blinds an encrypted activation vector; Client decrypts zero entries to identify matches."
    source_anchor_ids: [anchor-paper-21-hbc]

  - id: paper-21-method-malicious
    kind: component
    parent_id: paper-21-method
    order: 2
    epistemic_status: specified_and_proved
    title: "Eight-round malicious protocol"
    summary: "Both parties independently derive encrypted activation vectors, compare affine hashes, and prove matrix formation, partial decryption, randomization, and final-decryption consistency through interleaved zero-knowledge arguments."
    source_anchor_ids: [anchor-paper-21-malicious]

  - id: paper-21-claims
    kind: claim_group
    parent_id: paper-21
    order: 5
    epistemic_status: mixed
    title: "Principal claims"
    summary: "The paper makes functionality, round/complexity, simulation-security, and implementation-performance claims."
    source_anchor_ids: [anchor-paper-21-problem, anchor-paper-21-security-theorems, anchor-paper-21-performance]

  - id: paper-21-claim-complexity
    kind: claim
    parent_id: paper-21-claims
    order: 1
    epistemic_status: analytically_supported
    title: "Rounds and asymptotic cost"
    summary: "The paper reports two one-way rounds for HBC and eight for malicious security; the malicious construction uses O((m+n)k^2) bandwidth and O(m+n) encryptions, while pattern-length hiding adds no asymptotic computation or bandwidth."
    source_anchor_ids: [anchor-paper-21-problem, anchor-paper-21-malicious]

  - id: paper-21-claim-security
    kind: claim
    parent_id: paper-21-claims
    order: 2
    epistemic_status: proved_conditional
    title: "Simulation security"
    summary: "Theorems 4 and 5 state realization of the specified pattern-matching functionality for static HBC corruption under semantic security and static malicious corruption under DDH, respectively."
    source_anchor_ids: [anchor-paper-21-security-theorems]

  - id: paper-21-claim-implementation
    kind: claim
    parent_id: paper-21-claims
    order: 3
    epistemic_status: experimentally_supported
    title: "HBC implementation"
    summary: "A Paillier-based HBC prototype is timed on one dual-quad-core 2.93 GHz Ubuntu 10.10 machine for DNA and alphanumeric alphabets, text lengths through 100,000, and 1024/2048-bit keys."
    source_anchor_ids: [anchor-paper-21-performance]

  - id: paper-21-evidence
    kind: evidence_group
    parent_id: paper-21
    order: 6
    epistemic_status: documented
    title: "Evidence chain"
    summary: "Support consists of explicit protocols, ideal-world simulations, asymptotic accounting, and a timing table for an HBC prototype."
    source_anchor_ids: [anchor-paper-21-security-model, anchor-paper-21-performance]

  - id: paper-21-evidence-formal
