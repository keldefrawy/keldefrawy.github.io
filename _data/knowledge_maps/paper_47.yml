nodes:
  - id: paper-47
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_opinion
    title: A formal-methods agenda for remote attestation
    summary: A position paper arguing that RA security claims need machine-assisted models, proofs, and synthesized implementations, supported by failure case studies and a four-part agenda.
    source_anchor_ids: [anchor-paper-47-thesis]
  - id: paper-47-question
    kind: question
    parent_id: paper-47
    order: 1
    epistemic_status: research_agenda_question
    title: Research question
    summary: How can RA move from plausible manual arguments to implementations whose architecture-level obligations are explicit and mechanically checked?
    source_anchor_ids: [anchor-paper-47-thesis]
  - id: paper-47-answer
    kind: perspective
    parent_id: paper-47
    order: 2
    epistemic_status: argued_position
    title: Central position
    summary: Specify RA requirements and threat models precisely, verify protocol and hardware/software components with computer aid, prove their composition, and synthesize executable artifacts from checked descriptions.
    source_anchor_ids: [anchor-paper-47-thesis, anchor-paper-47-methods, anchor-paper-47-agenda]
  - id: paper-47-scope
    kind: scope
    parent_id: paper-47
    order: 3
    epistemic_status: explicit
    title: Scope of the argument
    summary: The discussion focuses on challenge-response measurement against a remote software adversary; completeness of the initial security definition itself and physical adversaries are explicitly orthogonal or excluded.
    source_anchor_ids: [anchor-paper-47-model]
  - id: paper-47-premise
    kind: premise
    parent_id: paper-47
    order: 4
    epistemic_status: argued
    title: Why RA is a tractable first target
    summary: RA has only a few messages and basic primitives such as HMAC, yet hybrid implementations expose processor, memory, interrupt, and control-flow details that manual abstractions routinely miss.
    source_anchor_ids: [anchor-paper-47-model, anchor-paper-47-methods]
  - id: paper-47-cases-node
    kind: evidence_group
    parent_id: paper-47
    order: 5
    epistemic_status: case_based_argument
    title: Failure case studies
    summary: Three examples illustrate how omitted machine details can undermine a security or correctness story.
    source_anchor_ids: [anchor-paper-47-cases]
  - id: paper-47-case-consistency
    kind: evidence
    parent_id: paper-47-cases-node
    order: 1
    epistemic_status: literature_case
    title: Temporal consistency
    summary: Interruptible hashing may combine bytes from states that never coexisted, invalidating the implicit static-input premise and enabling relocating malware.
    source_anchor_ids: [anchor-paper-47-cases]
  - id: paper-47-case-atomicity
    kind: evidence
    parent_id: paper-47-cases-node
    order: 2
    epistemic_status: architecture_case
    title: Non-instantaneous interrupt control
    summary: On some MCUs, enabling or disabling interrupts spans cycles and can itself be interrupted, so a paper assumption of instantaneous atomicity may block formal verification or security.
    source_anchor_ids: [anchor-paper-47-cases]
  - id: paper-47-case-availability
    kind: evidence
    parent_id: paper-47-cases-node
    order: 3
    epistemic_status: design_case
    title: Self-attestation denial of service
    summary: A return-address API can point back to attestation entry and combine with enforced atomicity to trap a device in an endless attestation loop; a termination proof would expose the corner case.
    source_anchor_ids: [anchor-paper-47-cases]
  - id: paper-47-agenda-node
    kind: agenda
    parent_id: paper-47
    order: 6
    epistemic_status: proposed
    title: Four-part research program
    summary: The paper separates property completeness, design verification, implementation synthesis, and heterogeneous/group attestation as distinct obligations.
    source_anchor_ids: [anchor-paper-47-agenda]
  - id: paper-47-agenda-properties
    kind: open_problem
    parent_id: paper-47-agenda-node
    order: 1
    epistemic_status: proposed
    title: Prove completeness and minimality
    summary: Establish that the chosen properties/components are sufficient and no unnecessary hardware remains, especially for minimalist hybrid RA.
    source_anchor_ids: [anchor-paper-47-agenda]
  - id: paper-47-agenda-verification
    kind: open_problem
    parent_id: paper-47-agenda-node
    order: 2
    epistemic_status: proposed
    title: End-to-end computer-aided proofs
    summary: Verify protocols and HW/SW co-designs in compatible frameworks and prove composition rather than relying on separately checked components plus manual glue.
    source_anchor_ids: [anchor-paper-47-agenda]
  - id: paper-47-agenda-synthesis
    kind: open_problem
    parent_id: paper-47-agenda-node
    order: 3
    epistemic_status: proposed
    title: Correct-by-construction executables
    summary: Extend synthesis beyond small hardware monitors and inherited HMAC binaries to the complete attestation executable and services built on it.
    source_anchor_ids: [anchor-paper-47-agenda]
  - id: paper-47-agenda-groups
    kind: open_problem
    parent_id: paper-47-agenda-node
    order: 4
    epistemic_status: proposed
    title: Group and heterogeneous RA
    summary: Derive and verify properties for multiple, possibly heterogeneous provers instead of assuming single-prover requirements compose unchanged.
    source_anchor_ids: [anchor-paper-47-agenda]
  - id: paper-47-boundaries
    kind: limitation_group
    parent_id: paper-47
    order: 7
    epistemic_status: explicit
    title: Evidentiary boundary
    summary: This is an agenda and case-based argument, not a new protocol, proof, synthesized toolchain, implementation, or empirical evaluation; feasibility is illustrated by prior systems.
    source_anchor_ids: [anchor-paper-47-thesis, anchor-paper-47-methods]
  - id: paper-47-artifacts
    kind: artifact_group
    parent_id: paper-47
    order: 8
    epistemic_status: publication_only
    title: Publication resources
    summary: Author, NSF, and DOI copies are public with local fixity. No new code or dataset is claimed by the opinion paper.
    source_anchor_ids: [anchor-paper-47-thesis, anchor-paper-47-publication]
  - id: paper-47-scrutiny
    kind: scrutiny
    parent_id: paper-47
    order: 9
    epistemic_status: venue_reviewed_opinion
    title: External scrutiny
    summary: WiSec publication and shepherd acknowledgment establish venue exposure, but the normative agenda has not been independently validated as a theorem or standard.
    source_anchor_ids: [anchor-paper-47-publication]
  - id: paper-47-lineage
    kind: lineage
    parent_id: paper-47
    order: 10
    epistemic_status: documented
    title: VRASED/HYDRA/PURE context
    summary: HYDRA illustrates verified-component reuse, VRASED advances model-checked co-design, and PURE extends it to remediation; the paper argues the broader end-to-end agenda remains unfinished.
    source_anchor_ids: [anchor-paper-47-methods, anchor-paper-47-agenda]

