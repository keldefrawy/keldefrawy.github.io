nodes:
  - id: paper-36
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Brief Announcement: Secure Self-Stabilizing Computation"
    summary: >-
      A three-page announcement that joins self-stabilizing distributed systems with secure MPC so a computation can recover confidentiality and correctness after total but temporary compromise.
    source_anchor_ids: [anchor-paper-36-problem]

  - id: paper-36-question
    kind: question
    parent_id: paper-36
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      After parties recover asynchronously from an arbitrary globally compromised state, can the system autonomously reestablish a coherent computation whose state, inputs, and outputs are again private and whose transitions are correct?
    source_anchor_ids: [anchor-paper-36-problem, anchor-paper-36-definition]

  - id: paper-36-answer
    kind: contribution
    parent_id: paper-36
    order: 2
    epistemic_status: source_asserted
    title: Secure self-stabilizing computation
    summary: >-
      The paper proposes convergence and closure for a secret-shared FSM together with recurring key renewal, state validation, default-state recovery, and secure transition evaluation once fewer than the tolerated Byzantine parties remain.
    source_anchor_ids: [anchor-paper-36-definition, anchor-paper-36-construction]

  - id: paper-36-model
    kind: scope
    parent_id: paper-36
    order: 3
    epistemic_status: defined
    title: Continuous distributed FSM model
    summary: >-
      n parties over a complete synchronous or semi-synchronous network continuously compute a public Mealy FSM on periodically supplied secret-shared inputs. Parties do not know their compromise history and maintain secret shares of FSM state and output.
    source_anchor_ids: [anchor-paper-36-system, anchor-paper-36-construction]

  - id: paper-36-model-setup
    kind: assumption
    parent_id: paper-36-model
    order: 1
    epistemic_status: assumed
    title: Cryptographic and hardware setup
    summary: >-
      Every party has a true random number generator and tamper-resistant access to its private key and the configuration authority's public key; parties can authenticate fresh public keys, derive pairwise secure channels, and establish secure broadcast.
    source_anchor_ids: [anchor-paper-36-system]

  - id: paper-36-model-clock
    kind: assumption
    parent_id: paper-36-model
    order: 2
    epistemic_status: inherited_component
    title: Stabilizing time base
    summary: >-
      A self-stabilizing Byzantine clock-synchronization protocol supplies logical global pulses and common round numbers in the semi-synchronous setting; this clock is an assumed underlying service, not constructed in the announcement.
    source_anchor_ids: [anchor-paper-36-system, anchor-paper-36-construction]

  - id: paper-36-model-adversary
    kind: threat_model
    parent_id: paper-36-model
    order: 3
    epistemic_status: defined
    title: Temporary total mixed compromise
    summary: >-
      A computationally bounded adversary may passively or actively corrupt any number of parties, including all n for a finite interval, but watchdog-driven recovery prevents indefinite control of every party and the adversary cannot immediately recapture a just-recovered party.
    source_anchor_ids: [anchor-paper-36-adversary]

  - id: paper-36-definition-standard
    kind: definition
    parent_id: paper-36
    order: 4
    epistemic_status: reviewed
    title: Standard self-stabilization
    summary: >-
      Convergence requires reaching some consistent legal configuration from any arbitrary configuration in finite rounds; closure requires remaining legal absent another unexpected fault.
    source_anchor_ids: [anchor-paper-36-definition]

  - id: paper-36-definition-secure
    kind: definition
    parent_id: paper-36
    order: 5
    epistemic_status: introduced
    title: Security recovery requirement
    summary: >-
      Secure self-stabilization extends functional convergence so that after enough parties recover and the MPC corruption threshold again holds, secrecy of computation state, inputs, and outputs and correctness of computation are automatically regained.
    source_anchor_ids: [anchor-paper-36-definition]

  - id: paper-36-construction
    kind: protocol
    parent_id: paper-36
    order: 6
    epistemic_status: specified_at_brief_level
    title: Secure FSM stabilization protocol
    summary: >-
      Each transition round refreshes communication keys, verifiably reshapes the state shares, securely checks that they encode a legitimate state, and evaluates public transition and output circuits using an existing MPC protocol.
    source_anchor_ids: [anchor-paper-36-construction]

  - id: paper-36-construction-keys
    kind: protocol
    parent_id: paper-36-construction
    order: 1
    epistemic_status: composed_from_primitives
    title: Fresh channel establishment
    summary: >-
      Parties generate fresh key pairs from local true randomness, use Byzantine agreement to agree on each public key, and derive fresh pairwise symmetric keys before processing the next FSM transition.
    source_anchor_ids: [anchor-paper-36-construction]

  - id: paper-36-construction-state
    kind: algorithm
    parent_id: paper-36-construction
    order: 2
    epistemic_status: specified
    title: State validation and reset
    summary: >-
      VSS supplies redundant state shares and an MPC evaluates an error-detection circuit such as Berlekamp-Welch to test polynomial degree and membership in the legal-state set. Invalid state is replaced by shares of public default state S0.
    source_anchor_ids: [anchor-paper-36-construction, anchor-paper-36-algorithm]

  - id: paper-36-construction-transition
    kind: algorithm
    parent_id: paper-36-construction
    order: 3
    epistemic_status: specified
    title: Private transition and output evaluation
    summary: >-
      On a valid state, MPC applies transition circuit T to the current state and new input and output circuit O to produce secret-shared next state and output; after reset, the same circuits run from S0.
    source_anchor_ids: [anchor-paper-36-algorithm]

  - id: paper-36-claims
    kind: claim_group
    parent_id: paper-36
    order: 7
    epistemic_status: source_asserted
    title: Stated recovery claims
    summary: >-
      The brief states conditional recovery rather than uninterrupted security: during total compromise all secrets may be exposed, and protection resumes only after the required party threshold and supporting services recover.
    source_anchor_ids: [anchor-paper-36-definition, anchor-paper-36-forgetting]

  - id: paper-36-claim-convergence
    kind: claim
    parent_id: paper-36-claims
    order: 1
    epistemic_status: construction_claim
    title: Consistency and security convergence
    summary: >-
      Once fewer than roughly one third of participants are Byzantine in the illustrated setting, state checking and secure transition evaluation are claimed to restore consistent state, correct computation, and confidentiality.
    source_anchor_ids: [anchor-paper-36-problem, anchor-paper-36-algorithm]

  - id: paper-36-claim-forgetting
    kind: claim
    parent_id: paper-36-claims
    order: 2
    epistemic_status: graph_conditional
    title: Loss of stale adversarial state knowledge
    summary: >-
      With unknown fresh inputs, a complete FSM transition graph makes every state possible to the adversary after the first post-convergence transition; an expander transition graph is stated to erase state knowledge after logarithmically many transitions.
    source_anchor_ids: [anchor-paper-36-forgetting]

  - id: paper-36-evidence
    kind: evidence_group
    parent_id: paper-36
    order: 8
    epistemic_status: bounded_by_brief_announcement
    title: Evidence and proof boundary
    summary: >-
      The announcement defines the setting, composes known cryptographic and stabilization components, and supplies Algorithm 1 and recovery intuition. It does not present a formal ideal functionality, simulator, theorem statement, full proof, implementation, or experiment.
    source_anchor_ids: [anchor-paper-36-system, anchor-paper-36-definition, anchor-paper-36-algorithm]

  - id: paper-36-evidence-mechanism
    kind: evidence
    parent_id: paper-36-evidence
    order: 1
    epistemic_status: mechanism_inspected
    title: Mechanism-level support
    summary: >-
      Fresh randomness severs old channel-key exposure, error-correcting state checks remove malformed Byzantine shares, the default state restores legality, and post-recovery secret inputs drive the FSM away from previously known state.
    source_anchor_ids: [anchor-paper-36-construction, anchor-paper-36-forgetting]

  - id: paper-36-boundaries
    kind: limitation_group
    parent_id: paper-36
    order: 9
    epistemic_status: material
    title: Assumptions and limitations
    summary: >-
      Recovery depends on trustworthy local reset, TRNGs, secure hardware keys, clock stabilization, Byzantine agreement, VSS, and an MPC whose threshold has recovered. The protocol does not protect secrets already learned during total compromise or guarantee correct outputs before convergence.
    source_anchor_ids: [anchor-paper-36-system, anchor-paper-36-adversary, anchor-paper-36-definition]

  - id: paper-36-boundary-model
    kind: limitation
    parent_id: paper-36-boundaries
    order: 1
    epistemic_status: unresolved_in_brief
    title: Formal and systems obligations
    summary: >-
      The three-page source does not analyze composability among all assumed services, recovery timing, adaptive re-corruption rates, output handling during unsafe rounds, implementation overhead, or failures of the hardware watchdog and configuration authority.
    source_anchor_ids: [anchor-paper-36-system, anchor-paper-36-algorithm]

  - id: paper-36-artifacts
    kind: artifact_group
    parent_id: paper-36
    order: 10
    epistemic_status: publication_only
    title: Artifacts and resources
    summary: >-
      The complete brief announcement and official DOI are available. No extended proof, code, proof-assistant artifact, implementation, trace, or evaluation dataset is linked by the paper.
    source_anchor_ids: [anchor-paper-36-problem, anchor-paper-36-publication]

  - id: paper-36-scrutiny
    kind: scrutiny
    parent_id: paper-36
    order: 11
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The work appeared as a PODC brief announcement. This gives venue exposure but not the evidentiary weight of a full-paper security proof, independently verified implementation, or public review record.
    source_anchor_ids: [anchor-paper-36-publication]

