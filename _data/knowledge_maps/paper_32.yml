  - "proactive secret sharing"
  - "dishonest majority"
editorial_summary: "The full paper develops proactive secret sharing whose confidentiality can survive a dishonest majority, unlike earlier schemes that fail once half the parties are observed within a refresh period. It combines additive sharing with verifiable polynomial sharing to tolerate up to n−1 passive corruptions in the basic case, while also analyzing recovery, active corruption, and communication costs."

research_question: "How can proactive secret sharing preserve confidentiality when an adversary passively observes a dishonest majority during a refresh period?"
central_answer: "The paper reports combining additive sharing with verifiable polynomial sharing to tolerate up to n−1 passive corruptions in a basic setting and analyzes recovery, active corruption, and communication."

