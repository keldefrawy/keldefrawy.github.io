nodes:
  - id: paper-32
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Proactive Secret Sharing with a Dishonest Majority"
    summary: >-
      A formal proactive secret-sharing construction for mixed mobile adversaries that exceeds the passive honest-majority barrier by combining additive secret decomposition, increasing-degree polynomial shares, homomorphic commitments, refresh, and recovery.
    source_anchor_ids: [anchor-paper-32-results]

  - id: paper-32-question
    kind: question
    parent_id: paper-32
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can PSS tolerate a passive dishonest majority in every epoch without losing the ability to detect active faults, refresh obsolete shares, and restore shares to rebooted parties?
    source_anchor_ids: [anchor-paper-32-results, anchor-paper-32-roadblock]

  - id: paper-32-answer
    kind: contribution
    parent_id: paper-32
    order: 2
    epistemic_status: source_asserted
    title: Central answer
    summary: >-
      Encode s as random additive summands, place those summands in verifiably shared polynomials with different degrees, and operate on the family through DM-Share, DM-Reconstruct, DM-Refresh, and DM-Recover.
    source_anchor_ids: [anchor-paper-32-blueprint, anchor-paper-32-share]

  - id: paper-32-scope
    kind: scope
    parent_id: paper-32
    order: 3
    epistemic_status: explicitly_scoped
    title: System and security model
    summary: >-
      Security is defined per epoch for n synchronized parties connected by authenticated broadcast and pairwise secure authenticated channels, with periodic refresh, secure deletion of old shares, and optional recovery after reboot or share loss.
    source_anchor_ids: [anchor-paper-32-system, anchor-paper-32-definition]

  - id: paper-32-scope-adversary
    kind: threat_model
    parent_id: paper-32-scope
    order: 1
    epistemic_status: defined
    title: Mixed mobile adversary
    summary: >-
      A polynomial-time adversary passively reads the state of P* and may actively control A* subseteq P*. Correctness, secrecy, and robustness are parameterized by separate multi-threshold sets rather than by one undifferentiated corruption bound.
    source_anchor_ids: [anchor-paper-32-adversary]

  - id: paper-32-scope-thresholds
    kind: definition
    parent_id: paper-32-scope
    order: 2
    epistemic_status: defined
    title: Threshold accounting
    summary: >-
      For the single-recovery setting the paper states passive bound tp < n - 2, active bound ta < n/2 - 1, and mixed constraint ta + tp < n - 2, where each active corruption is also counted among passive corruptions.
    source_anchor_ids: [anchor-paper-32-adversary, anchor-paper-32-blueprint]

  - id: paper-32-scope-assumptions
    kind: assumption
    parent_id: paper-32-scope
    order: 3
    epistemic_status: assumed
    title: Environmental and cryptographic assumptions
    summary: >-
      The construction assumes synchrony, a global clock, authenticated broadcast, private authenticated channels, erasure of obsolete shares, reboot into a pristine state, and a binding/hiding homomorphic commitment; the concrete Feldman instantiation relies on discrete-log hardness.
    source_anchor_ids: [anchor-paper-32-system, anchor-paper-32-commitments]

  - id: paper-32-construction
    kind: method
    parent_id: paper-32
    order: 4
    epistemic_status: formally_specified
    title: Dishonest-majority PSS construction
    summary: >-
      The four protocols manipulate a vector of additive summands shared by polynomials whose degree profile is chosen to balance secrecy against the number of active faults and simultaneously recovering parties.
    source_anchor_ids: [anchor-paper-32-blueprint, anchor-paper-32-share, anchor-paper-32-refresh, anchor-paper-32-recover]

  - id: paper-32-construction-encoding
    kind: method
    parent_id: paper-32-construction
    order: 1
    epistemic_status: specified
    title: Additive and polynomial encoding
    summary: >-
      Directly placing s in one polynomial would reveal it after enough passive observations. The construction first splits s into d random summands and then shares each summand with a polynomial of a different degree, so no allowed passive view determines every summand.
    source_anchor_ids: [anchor-paper-32-roadblock, anchor-paper-32-blueprint]

  - id: paper-32-construction-share
    kind: protocol
    parent_id: paper-32-construction
    order: 2
    epistemic_status: specified
    title: DM-Share and DM-Reconstruct
    summary: >-
      DM-Share commits to and distributes the increasing-degree sharings; DM-Reconstruct opens enough evaluations to recover each additive summand and sums the reconstructed summands to recover s.
    source_anchor_ids: [anchor-paper-32-share]

  - id: paper-32-construction-refresh
    kind: protocol
    parent_id: paper-32-construction
    order: 3
    epistemic_status: specified_and_analyzed
    title: DM-Refresh
    summary: >-
      Parties verifiably share random polynomials of matching degrees whose free terms sum to zero, add the evaluations to current shares, resolve inconsistent openings by abort and identification, and delete obsolete shares.
    source_anchor_ids: [anchor-paper-32-refresh]

  - id: paper-32-construction-recover
    kind: protocol
    parent_id: paper-32-construction
    order: 4
    epistemic_status: specified_and_analyzed
    title: DM-Recover
    summary: >-
      Parties mask current polynomials with random recovery polynomials that vanish at each recovering party's evaluation point. Interpolation gives replacement evaluations at those points without revealing s or other parties' shares.
    source_anchor_ids: [anchor-paper-32-recover]

  - id: paper-32-claims
    kind: claim_group
    parent_id: paper-32
    order: 5
    epistemic_status: proved_in_paper
    title: Principal guarantees
    summary: >-
      The paper separates correctness, secrecy, robustness, termination, and communication statements and conditions each one on explicit passive, active, degree, and recovery parameters.
    source_anchor_ids: [anchor-paper-32-adversary, anchor-paper-32-refresh, anchor-paper-32-recover]

  - id: paper-32-claim-passive
    kind: claim
    parent_id: paper-32-claims
    order: 1
    epistemic_status: proved_conditional
    title: Passive confidentiality
    summary: >-
      In the represented single-recovery configuration, the paper states robust secrecy for fewer than n - 2 passive corruptions and no active corruptions; without recovery the overview gives the larger fewer-than-n passive bound.
    source_anchor_ids: [anchor-paper-32-results, anchor-paper-32-blueprint, anchor-paper-32-refresh]

  - id: paper-32-claim-mixed
    kind: claim
    parent_id: paper-32-claims
    order: 2
    epistemic_status: proved_non_robust
    title: Active and mixed-adversary security
    summary: >-
      With one recovering party, the paper states non-robust security with identifiable abort for fewer than n/2 - 1 active corruptions and for mixed corruption sets satisfying the defined multi-threshold constraints.
    source_anchor_ids: [anchor-paper-32-adversary, anchor-paper-32-results, anchor-paper-32-recover]

  - id: paper-32-claim-refresh
    kind: claim
    parent_id: paper-32-claims
    order: 3
    epistemic_status: proved_conditional
    title: Refresh correctness, secrecy, and robustness
    summary: >-
      Lemmas 1-4 argue termination, preservation of the encoded secret, independence of new shares from old shares, and sufficient correct interpolation points under the stated degree and corruption inequalities.
    source_anchor_ids: [anchor-paper-32-refresh]

  - id: paper-32-claim-recover
    kind: claim
    parent_id: paper-32-claims
    order: 4
    epistemic_status: proved_conditional
    title: Recovery correctness, secrecy, and robustness
    summary: >-
      Lemmas 5-8 argue termination, reconstruction of the recovering party's correct evaluations, secrecy of the secret and other shares, and preservation under d < n - k - c for k active corruptions and c recovering parties.
    source_anchor_ids: [anchor-paper-32-recover]

  - id: paper-32-claim-communication
    kind: claim
    parent_id: paper-32-claims
    order: 5
    epistemic_status: asymptotic_analysis
    title: Communication complexity
    summary: >-
      The paper reports O(n^4) communication for the single-secret scheme and an O(n) batching factor that reduces the effective per-secret cost, with O(n^3) communication for recovery of an O(n)-secret batch.
    source_anchor_ids: [anchor-paper-32-results, anchor-paper-32-batching]

  - id: paper-32-evidence
    kind: evidence_group
    parent_id: paper-32
    order: 6
    epistemic_status: formal_paper_analysis
    title: Evidence chain
    summary: >-
      Evidence consists of explicit syntax and adversary definitions, four concrete protocols, homomorphic-commitment checks, interpolation arguments, and eight proof lemmas. The proofs were read but not mechanically checked or independently reproduced for this map.
    source_anchor_ids: [anchor-paper-32-definition, anchor-paper-32-refresh, anchor-paper-32-recover]

  - id: paper-32-evidence-refresh
    kind: evidence
    parent_id: paper-32-evidence
    order: 1
    epistemic_status: proof_inspected_not_reproduced
    title: Refresh proof structure
    summary: >-
      Binding commitments detect inconsistent distributions; zero-sum constant terms preserve s; one honest random contribution rerandomizes the family; and degree bounds ensure enough correct points remain for interpolation.
    source_anchor_ids: [anchor-paper-32-refresh]

  - id: paper-32-evidence-recover
    kind: evidence
    parent_id: paper-32-evidence
    order: 2
    epistemic_status: proof_inspected_not_reproduced
    title: Recovery proof structure
    summary: >-
      Vanishing masks preserve the recovering evaluations, computational hiding protects the random recovery polynomials, and the threshold inequalities guarantee enough correct shares to interpolate them.
    source_anchor_ids: [anchor-paper-32-recover]

  - id: paper-32-boundaries
    kind: limitation_group
    parent_id: paper-32
    order: 7
    epistemic_status: material
    title: Boundaries and open problems
    summary: >-
      Active security is non-robust, recovery consumes resilience, security depends on computational commitments and secure erasure, the network is synchronous, and the fully specified batched protocols are deferred beyond the represented version.
    source_anchor_ids: [anchor-paper-32-system, anchor-paper-32-commitments, anchor-paper-32-batching, anchor-paper-32-limitations]

  - id: paper-32-boundary-asynchrony
    kind: limitation
    parent_id: paper-32-boundaries
    order: 1
    epistemic_status: open_problem
    title: Asynchrony and communication remain open
    summary: >-
      The conclusion leaves lower communication and dishonest-majority PSS over asynchronous networks unresolved; the construction itself assumes synchrony.
    source_anchor_ids: [anchor-paper-32-limitations]

  - id: paper-32-resources
    kind: artifact_group
    parent_id: paper-32
    order: 8
    epistemic_status: publicly_available
    title: Sources and artifacts
    summary: >-
      A complete author-uploaded paper and official Springer record are public. The represented work is a protocol-and-proof paper and does not claim a software implementation or reproducibility package.
    source_anchor_ids: [anchor-paper-32-results, anchor-paper-32-publication]

  - id: paper-32-scrutiny
    kind: scrutiny
    parent_id: paper-32
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The work appeared at SCN 2016 and acknowledges anonymous-reviewer feedback. Public review reports, machine proof checking, independent reproduction, and a correction history were not located in this audit.
    source_anchor_ids: [anchor-paper-32-publication, anchor-paper-32-limitations]

  - id: paper-32-lineage
    kind: lineage
    parent_id: paper-32
    order: 10
    epistemic_status: documented
    title: Research lineage
    summary: >-
      The paper extends classical proactive secret sharing and mixed-adversary gradual sharing, and its static dishonest-majority construction becomes a baseline later work seeks to batch, generalize, or make dynamic.
    source_anchor_ids: [anchor-paper-32-roadblock, anchor-paper-32-limitations]

