nodes:
  - id: paper-40
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "BlockCIS: A Blockchain-Based Cyber Insurance System"
    summary: >-
      A systems-and-protocol paper proposing a permissioned-blockchain infrastructure for continuously collecting and processing cyber-risk information shared among an insured organization, insurer, specialized third parties, and auditors, with an example Hyperledger implementation.
    source_anchor_ids: [anchor-paper-40-abstract]

  - id: paper-40-question
    kind: question
    parent_id: paper-40
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      How can cyber insurance move from static, technically shallow questionnaires and coarse pricing formulas toward a continuously updated and auditable view of an organization's changing security posture?
    source_anchor_ids: [anchor-paper-40-abstract, anchor-paper-40-background]

  - id: paper-40-answer
    kind: contribution
    parent_id: paper-40
    order: 2
    epistemic_status: source_asserted
    title: Permissioned-ledger feedback architecture
    summary: >-
      BlockCIS places a ledger node at each participating organization and uses authorized transactions and insurer-side smart-contract logic to build an automated, real-time, immutable feedback loop while retaining role-specific control over what each participant can read or write.
    source_anchor_ids: [anchor-paper-40-abstract, anchor-paper-40-framework]

  - id: paper-40-problem
    kind: motivation
    parent_id: paper-40
    order: 3
    epistemic_status: source_asserted
    title: Three cyber-insurance data problems
    summary: >-
      The paper identifies three linked barriers: no standardized way to rate cyber risk, insufficient relevant technical data for premiums, and security postures that change much faster than conventional insurance assessments.
    source_anchor_ids: [anchor-paper-40-abstract, anchor-paper-40-background]

  - id: paper-40-model
    kind: system_model
    parent_id: paper-40
    order: 4
    epistemic_status: specified
    title: Four-party permissioned setting
    summary: >-
      The system connects an insured entity, its insurer, specialized third-party services, and potential auditors. Participation, consensus, ledger maintenance, and transaction access occur in a restricted permissioned network rather than an open public cryptocurrency.
    source_anchor_ids: [anchor-paper-40-background, anchor-paper-40-entities]

  - id: paper-40-insured
    kind: actor
    parent_id: paper-40-model
    order: 1
    epistemic_status: specified
    title: Insured organization
    summary: >-
      An enterprise-local BlockCIS node interfaces with services such as DNS, web, database, storage, and firewall logs, performs analytics, and submits selected reports or events to the shared system.
    source_anchor_ids: [anchor-paper-40-entities, anchor-paper-40-framework]

  - id: paper-40-insurer
    kind: actor
    parent_id: paper-40-model
    order: 2
    epistemic_status: specified
    title: Insurer
    summary: >-
      The insurer consumes authorized evidence, runs analytics and smart-contract logic, records insurance-contract events, and can adjust risk assessment or premiums as the insured party's posture changes.
    source_anchor_ids: [anchor-paper-40-entities, anchor-paper-40-framework]

  - id: paper-40-third-parties
    kind: actor
    parent_id: paper-40-model
    order: 3
    epistemic_status: specified
    title: Third-party security services
    summary: >-
      Specialized providers can combine external sources—such as vulnerability reports, open-web or dark-web information, news, and forums—with authorized enterprise evidence and contribute analyses that are difficult for either principal to produce alone.
    source_anchor_ids: [anchor-paper-40-entities, anchor-paper-40-framework]

  - id: paper-40-auditor
    kind: actor
    parent_id: paper-40-model
    order: 4
    epistemic_status: specified
    title: Auditor
    summary: >-
      An auditor receives policy-controlled read access to records needed to examine the relationship, claims, or compliance without necessarily gaining unrestricted access to all underlying enterprise data.
    source_anchor_ids: [anchor-paper-40-entities, anchor-paper-40-framework]

  - id: paper-40-method
    kind: method
    parent_id: paper-40
    order: 5
    epistemic_status: specified
    title: Continuous monitoring and processing workflow
    summary: >-
      BlockCIS couples entity-local data collection and analytics with a shared append-only transaction history. The ledger coordinates mutually interested parties, while smart contracts encode insurer-side business logic; blockchain payment is expressly decoupled from the design.
    source_anchor_ids: [anchor-paper-40-framework]

  - id: paper-40-incentives
    kind: mechanism
    parent_id: paper-40-method
    order: 1
    epistemic_status: proposed
    title: Participation incentives
    summary: >-
      Insurers gain more current technical evidence for tailoring premiums, while insured organizations gain a record with which to demonstrate posture changes and whether an incident falls within agreed coverage.
    source_anchor_ids: [anchor-paper-40-incentives]

  - id: paper-40-privacy
    kind: mechanism
    parent_id: paper-40-method
    order: 2
    epistemic_status: design_options
    title: Confidentiality and selective disclosure
    summary: >-
      The paper discusses access policy, encryption, and homomorphic-encryption techniques as options for limiting disclosure or enabling computation over protected evidence; these are architectural options, not a single formally analyzed end-to-end privacy construction.
    source_anchor_ids: [anchor-paper-40-privacy]

  - id: paper-40-implementation
    kind: implementation
    parent_id: paper-40
    order: 6
    epistemic_status: prototyped
    title: Hyperledger instantiation
    summary: >-
      The authors prototype the design using the open-source Hyperledger ecosystem, whose permissioned membership, replicated transaction processing, modular components, and chaincode smart contracts match the intended multi-organization setting.
    source_anchor_ids: [anchor-paper-40-implementation]

  - id: paper-40-claims
    kind: claim_group
    parent_id: paper-40
    order: 7
    epistemic_status: source_asserted
    title: Main claims
    summary: >-
      The source claims architectural feasibility and a useful cyber-insurance feedback structure. It does not report an operational deployment, statistically validate a risk-scoring model, or prove that every proposed privacy and security property holds in a complete implementation.
    source_anchor_ids: [anchor-paper-40-abstract, anchor-paper-40-conclusion]

  - id: paper-40-claim-feasibility
    kind: claim
    parent_id: paper-40-claims
    order: 1
    epistemic_status: supported_by_design_instantiation
    title: Framework feasibility
    summary: >-
      A permissioned ledger can represent the four-party workflow and automate selected transactions and insurer logic, as illustrated by the Hyperledger instantiation.
    source_anchor_ids: [anchor-paper-40-framework, anchor-paper-40-implementation]

  - id: paper-40-claim-audit-loop
    kind: claim
    parent_id: paper-40-claims
    order: 2
    epistemic_status: architectural_claim
    title: Shared audit trail
    summary: >-
      Authorized parties can use a common immutable transaction history to support continuous posture reporting and later auditing, conditional on the ledger's governance, consensus, identity, and access-control configuration.
    source_anchor_ids: [anchor-paper-40-framework, anchor-paper-40-privacy]

  - id: paper-40-evidence
    kind: evidence_group
    parent_id: paper-40
    order: 8
    epistemic_status: design_and_prototype
    title: Evidence
    summary: >-
      Evidence consists of a role-and-data-flow architecture, use-case and incentive analysis, privacy-design alternatives, and an example Hyperledger prototype. The paper does not present a production deployment, controlled performance study, or independently reproduced artifact.
    source_anchor_ids: [anchor-paper-40-framework, anchor-paper-40-incentives, anchor-paper-40-implementation, anchor-paper-40-conclusion]

  - id: paper-40-evidence-design
    kind: evidence
    parent_id: paper-40-evidence
    order: 1
    epistemic_status: design_artifact
    title: Explicit component and data-flow model
    summary: >-
      Figures and prose identify where BlockCIS nodes run, which enterprise and external sources feed them, what each actor reads or writes, and where smart-contract execution occurs.
    source_anchor_ids: [anchor-paper-40-entities, anchor-paper-40-framework]

  - id: paper-40-evidence-prototype
    kind: evidence
    parent_id: paper-40-evidence
    order: 2
    epistemic_status: implementation_report
    title: Open-source-platform instantiation
    summary: >-
      The Hyperledger construction shows how the design could be instantiated on a permissioned blockchain platform, but this map located no archived BlockCIS code, deployment recipe, test data, or benchmark package tied to the publication.
    source_anchor_ids: [anchor-paper-40-implementation]

  - id: paper-40-boundaries
    kind: limitation_group
    parent_id: paper-40
    order: 9
    epistemic_status: material
    title: Scope and limitations
    summary: >-
      The ledger can preserve submitted transactions but cannot by itself establish that sensors, logs, analytics, external feeds, or risk scores are truthful. Organizational governance, privacy configuration, and insurance validity remain separate concerns.
    source_anchor_ids: [anchor-paper-40-framework, anchor-paper-40-privacy, anchor-paper-40-conclusion]

  - id: paper-40-boundary-input
    kind: limitation
    parent_id: paper-40-boundaries
    order: 1
    epistemic_status: inferred_system_boundary
    title: Immutability is not input correctness
    summary: >-
      An immutable ledger can make a submitted record difficult to alter later; it does not certify the integrity, completeness, calibration, or semantics of evidence before submission. Those properties require trusted collection and analytic mechanisms outside consensus alone.
    source_anchor_ids: [anchor-paper-40-framework]

  - id: paper-40-boundary-validation
    kind: limitation
    parent_id: paper-40-boundaries
    order: 2
    epistemic_status: author_identified_future_work
    title: Deployment and risk-score validation remain future work
    summary: >-
      The conclusion explicitly leaves operational deployment and measurement of how well computed cyber-risk scores predict attacks or breaches for future work, so the paper does not establish actuarial accuracy or real-world effectiveness.
    source_anchor_ids: [anchor-paper-40-conclusion]

  - id: paper-40-artifacts
    kind: artifact_group
    parent_id: paper-40
    order: 10
    epistemic_status: partially_available
    title: Artifacts and reproducibility
    summary: >-
      The full paper and official record are public, and the prototype is described against an open-source platform. No publication-specific source repository, chaincode archive, configuration, dataset, or executable reproduction bundle was located.
    source_anchor_ids: [anchor-paper-40-abstract, anchor-paper-40-implementation, anchor-paper-40-publication]

  - id: paper-40-scrutiny
    kind: scrutiny
    parent_id: paper-40
    order: 11
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The work appeared in the IC2E BAT workshop proceedings and has an official IEEE record. Review reports, rebuttal, independent security analysis, reproduction, deployment audit, and correction history are not represented here.
    source_anchor_ids: [anchor-paper-40-publication, anchor-paper-40-coauthor]

