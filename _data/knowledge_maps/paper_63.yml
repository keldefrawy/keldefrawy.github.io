    - id: production_provenance
      level: medium
      rationale: Named authorship, ePrint identity, and peer-reviewed publication establish baseline provenance; roles, revision decisions, proof review, tool/AI use, and author approval of this map are not fully documented.
      basis_source_anchor_ids: [anchor-paper-63-results, anchor-paper-63-publication]
    - id: external_scrutiny
      level: medium
      rationale: ACNS publication and public availability provide external exposure, but no public review reports, independent proof audit, formal mechanization, or correction history was located.
      basis_source_anchor_ids: [anchor-paper-63-publication, anchor-paper-63-author-summary]
    - id: reception
