nodes:
  - id: paper-63
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: How Byzantine is send corruption?
    summary: A theory of synchronous consensus under mixed Byzantine, send, and receive corruptions, with expected-constant-round constructions and a tight result for the spotty-send submodel.
    source_anchor_ids: [anchor-paper-63-results]

  - id: paper-63-question
    kind: question
    parent_id: paper-63
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: How do achievable consensus thresholds change when faulty parties follow the protocol but an adaptive adversary suppresses messages they send or receive?
    source_anchor_ids: [anchor-paper-63-results]

  - id: paper-63-answer
    kind: contribution
    parent_id: paper-63
    order: 2
    epistemic_status: proved_conditional
    title: Central answer
    summary: General send faults incur a coefficient of two in the proved threshold; restricting each corrupted sender's round to uniform delivery or uniform dropping removes that extra coefficient and yields a matching lower bound.
    source_anchor_ids: [anchor-paper-63-main-theorem, anchor-paper-63-spotty]

  - id: paper-63-model-node
    kind: threat_model
    parent_id: paper-63
    order: 3
    epistemic_status: defined
    title: Synchronous mixed-corruption model
    summary: Parties communicate over authenticated point-to-point channels with known delay bound; a strongly rushing adaptive adversary may select Byzantine, receive-corrupt, and send-corrupt parties, with overlap counted in each applicable budget.
    source_anchor_ids: [anchor-paper-63-model]

  - id: paper-63-model-live
    kind: definition
    parent_id: paper-63-model-node
    order: 1
    epistemic_status: defined
    title: Live parties and zombies
    summary: Honest, send-corrupt, and undetected receive-corrupt parties are live and must produce consistent outputs; a receive-corrupt party that detects missing traffic becomes a zombie, stops participating, and outputs failure.
    source_anchor_ids: [anchor-paper-63-model, anchor-paper-63-fixreceive]

  - id: paper-63-model-spotty
    kind: definition
    parent_id: paper-63-model-node
    order: 2
    epistemic_status: defined
    title: General versus spotty send corruption
    summary: General send corruption permits recipient-selective suppression, whereas spotty corruption requires all of a sender's still-undelivered messages in a round to be delivered or dropped together.
    source_anchor_ids: [anchor-paper-63-model]

  - id: paper-63-pathology-node
    kind: analysis
    parent_id: paper-63
    order: 4
    epistemic_status: proved_and_demonstrated
    title: Why send faults are unexpectedly strong
    summary: Selective delivery can give honest and send-corrupt groups incompatible views while both groups' outputs remain constrained; threshold signatures, leader-election techniques, and time-lock-puzzle broadcast do not automatically repair this asymmetry.
    source_anchor_ids: [anchor-paper-63-pathology]

  - id: paper-63-construction
    kind: method
    parent_id: paper-63
    order: 5
    epistemic_status: formally_specified
    title: Consensus construction
    summary: The construction composes all-to-all FixReceive, weak broadcast, weak consensus, graded consensus, a common coin, and signed decision certificates in a repeated coin-loop.
    source_anchor_ids: [anchor-paper-63-fixreceive, anchor-paper-63-building-blocks, anchor-paper-63-main-theorem]

  - id: paper-63-construction-repair
    kind: component
    parent_id: paper-63-construction
    order: 1
    epistemic_status: specified_and_proved
    title: All-to-all FixReceive
    summary: Parties send signed inputs, relay unique first-round messages, and become zombies if too few messages arrive; the proofs ensure a non-zombie party receives honest-origin traffic and propagates honest messages across live views.
    source_anchor_ids: [anchor-paper-63-fixreceive]

  - id: paper-63-construction-graded
    kind: component
    parent_id: paper-63-construction
    order: 2
    epistemic_status: specified_and_proved
    title: Graded-consensus bridge
    summary: Weak-consensus outputs are weak-broadcast in parallel; a party chooses the majority bit and assigns grade one only after a large enough support threshold rules out a conflicting live grade-one output.
    source_anchor_ids: [anchor-paper-63-building-blocks]

  - id: paper-63-construction-coin
    kind: component
    parent_id: paper-63-construction
    order: 3
    epistemic_status: assumes_primitive
    title: Common-coin loop and certificates
    summary: Each iteration combines graded consensus with a common coin; signed decision certificates propagate termination while preserving a single decision value.
    source_anchor_ids: [anchor-paper-63-main-theorem]

  - id: paper-63-claims
    kind: claim_group
    parent_id: paper-63
    order: 6
    epistemic_status: proved_conditional
    title: Main results
    summary: The full version proves validity, consistency, and expected termination under explicit threshold, synchrony, PKI/signature, and common-coin assumptions.
    source_anchor_ids: [anchor-paper-63-main-theorem, anchor-paper-63-spotty]

  - id: paper-63-claim-general
    kind: theorem
    parent_id: paper-63-claims
    order: 1
    epistemic_status: proved_conditional
    title: General-send threshold
    summary: Theorem 3 proves expected-constant-round consensus when n is greater than t_rcv + 2t_snd + 2t_byz, assuming the specified common coin is available.
    source_anchor_ids: [anchor-paper-63-main-theorem]

  - id: paper-63-claim-spotty
    kind: theorem
    parent_id: paper-63-claims
    order: 2
    epistemic_status: proved_tight
    title: Optimal spotty-send threshold
    summary: Theorems 4 and 5 establish sufficiency above, and impossibility at or below, n = t_rcv + t_snd + 2t_byz in the spotty-send model with zombies.
    source_anchor_ids: [anchor-paper-63-spotty]

  - id: paper-63-claim-lowerbound
    kind: theorem
    parent_id: paper-63-claims
    order: 3
    epistemic_status: inherited_and_reproved
    title: Deterministic-round lower bound
    summary: The Dolev-Strong neighboring-execution argument transfers to send corruptions, so deterministic authenticated broadcast tolerating t_snd send faults cannot finish in fewer than t_snd + 1 rounds.
    source_anchor_ids: [anchor-paper-63-pathology]

  - id: paper-63-evidence
    kind: evidence_group
    parent_id: paper-63
    order: 7
    epistemic_status: formal_paper_proofs
    title: Evidence and proof chain
    summary: Protocol pseudocode, definitions, quorum arguments, reductions among consensus primitives, termination bounds, and a partition-style impossibility proof support the results; no machine-checked proof or implementation artifact is claimed.
    source_anchor_ids: [anchor-paper-63-building-blocks, anchor-paper-63-main-theorem, anchor-paper-63-spotty]

  - id: paper-63-boundaries
    kind: limitation_group
    parent_id: paper-63
    order: 8
    epistemic_status: material
    title: Limits and open questions
    summary: The model is synchronous and uses authenticated channels, a PKI, signatures, and a common coin; optimal combined send/Byzantine tolerance for recipient-selective general send corruption remains unresolved.
    source_anchor_ids: [anchor-paper-63-results, anchor-paper-63-model, anchor-paper-63-pathology]

  - id: paper-63-resources
    kind: artifact_group
    parent_id: paper-63
    order: 9
    epistemic_status: source_available
    title: Auditable resources
    summary: A complete public ePrint supplies definitions, protocols, and proofs, while the Springer DOI and CISPA page establish publication identity; no executable artifact is represented.
    source_anchor_ids: [anchor-paper-63-results, anchor-paper-63-publication, anchor-paper-63-author-summary]

  - id: paper-63-scrutiny
    kind: scrutiny
    parent_id: paper-63
    order: 10
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: The work appeared at ACNS 2022 and has a public full version. This audit did not locate public reviews, a machine-checked proof audit, a correction, or an independent reproduction.
    source_anchor_ids: [anchor-paper-63-publication, anchor-paper-63-citations]

  - id: paper-63-lineage
    kind: lineage
    parent_id: paper-63
    order: 11
    epistemic_status: documented
    title: Research lineage
    summary: The paper extends mixed crash/send/receive/Byzantine models, diagnoses why dishonest-majority broadcast techniques do not transfer directly, and reframes send corruption through the gap between general and spotty delivery.
    source_anchor_ids: [anchor-paper-63-results, anchor-paper-63-pathology]

