      rationale: The paper supplies the first claimed sublinear-round consensus result allowing a majority of online faulty parties in the spotty model, proves that threshold optimal, and identifies a structural obstruction for general send faults.
      basis_source_anchor_ids: [anchor-paper-63-results, anchor-paper-63-spotty]

