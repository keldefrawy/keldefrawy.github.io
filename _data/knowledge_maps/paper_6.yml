    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Optimal Filtering for DDoS Attacks"
    summary: "An optimization and algorithm paper for allocating scarce router filters under DDoS traffic while preserving legitimate throughput."
    source_anchor_ids: [anchor-paper-6-problem, anchor-paper-6-provenance]
  - id: paper-6-question
    kind: question
    parent_id: paper-6
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "How should a victim choose filtering granularity under simultaneous link-capacity and filter-count constraints?"
    source_anchor_ids: [anchor-paper-6-problem]
  - id: paper-6-answer
    kind: contribution
    parent_id: paper-6
    order: 2
    epistemic_status: proved_and_simulated
    title: "Central answer"
    summary: "Use greedy knapsack allocation at one tier and a Bellman dynamic program when filters may be assigned at both gateway and individual-attacker tiers."
    source_anchor_ids: [anchor-paper-6-single, anchor-paper-6-two, anchor-paper-6-evaluation]
  - id: paper-6-model
    kind: model
    parent_id: paper-6
    order: 3
    epistemic_status: formalized
    title: "Traffic and resource model"
    summary: "A victim gateway knows good and bad traffic rates per attack gateway and attacker, has link capacity C and at most F filters, and optimizes admitted legitimate traffic."
    source_anchor_ids: [anchor-paper-6-assumptions, anchor-paper-6-single]
  - id: paper-6-single
    kind: algorithm
    parent_id: paper-6
    order: 4
    epistemic_status: optimally_solved
    title: "Single-tier fractional-knapsack allocation"
    summary: "Blocking entire gateways yields a computationally hard 0-1 knapsack. Relaxing each decision to a passed traffic fraction models rate limiting; sorting by legitimate-traffic efficiency then gives a fractional-knapsack optimum with filters on later gateways and one rate limiter at the capacity boundary."
    source_anchor_ids: [anchor-paper-6-single]
  - id: paper-6-two
    kind: algorithm
    parent_id: paper-6
    order: 5
    epistemic_status: optimally_solved
    title: "Two-tier dynamic program"
    summary: "The algorithm considers each gateway, residual capacity, and filter budget, choosing how many filters to assign within that gateway and reusing stored optima for the previous gateways."
    source_anchor_ids: [anchor-paper-6-two]
  - id: paper-6-proof
    kind: theorem
    parent_id: paper-6-two
    order: 1
    epistemic_status: proved
    title: "Optimal-substructure justification"
    summary: "A proposition shows that an optimal allocation for n gateways contains an optimal allocation for its first n-1 gateways under the induced capacity and filter budgets, justifying the recurrence."
    source_anchor_ids: [anchor-paper-6-proof]
  - id: paper-6-complexity
    kind: limitation
    parent_id: paper-6-two
    order: 2
    epistemic_status: analyzed
    title: "Pseudo-polynomial cost"
    summary: "The exact table scales with N, discretized capacity C, and filter budget F and can be prohibitively large; the paper therefore also studies a simpler heuristic."
    source_anchor_ids: [anchor-paper-6-proof]
  - id: paper-6-evidence
    kind: evidence_group
    parent_id: paper-6
    order: 6
    epistemic_status: simulation
    title: "Comparative simulations"
    summary: "The algorithms are compared with uniform, random, max-min, and heuristic policies on generated traffic plus Code Red, Slammer, and commercial DDoS-report distributions."
    source_anchor_ids: [anchor-paper-6-evaluation]
  - id: paper-6-result
    kind: result
    parent_id: paper-6-evidence
    order: 1
    epistemic_status: simulation_supported
    title: "Goodput/filter tradeoff"
    summary: "Across the reported scenarios, optimized placement preserves more good traffic and can use fewer filters than baselines; exact magnitudes depend on the assumed traffic distributions and capacity."
    source_anchor_ids: [anchor-paper-6-evaluation]
