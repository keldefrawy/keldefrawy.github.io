nodes:
  - id: paper-69
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: Key lattice for concurrent group messaging
    summary: A framework and protocol that replace globally synchronized messaging epochs with partially ordered per-participant key evolution while formalizing forward and post-compromise security.
    source_anchor_ids: [anchor-paper-69-problem]

  - id: paper-69-question
    kind: question
    parent_id: paper-69
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: How can a group evolve keys securely when members issue updates concurrently and messages arrive out of order, so that no universally agreed current epoch exists?
    source_anchor_ids: [anchor-paper-69-problem, anchor-paper-69-model]

  - id: paper-69-answer
    kind: contribution
    parent_id: paper-69
    order: 2
    epistemic_status: proved_conditionally
    title: Central answer
    summary: Place each key state at a lattice coordinate, advance the sender's coordinate with a commutative KeyRoll operation, and define security through which coordinates a compromised view can or cannot traverse.
    source_anchor_ids: [anchor-paper-69-lattice, anchor-paper-69-group-protocol]

  - id: paper-69-model
    kind: model
    parent_id: paper-69
    order: 3
    epistemic_status: formalized
    title: Concurrent static-group model
    summary: The core theorem treats a fixed set of n participants exchanging application messages and update messages over an asynchronous network with possible reordering and concurrent sender updates.
    source_anchor_ids: [anchor-paper-69-model, anchor-paper-69-group-protocol]

  - id: paper-69-model-adversary
    kind: threat_model
    parent_id: paper-69-model
    order: 1
    epistemic_status: defined
    title: Adaptive compromise and freshness
    summary: Security games expose evolving participant state and message transcripts; freshness is expressed relative to compromise and recovery paths through the lattice rather than by one global epoch number.
    source_anchor_ids: [anchor-paper-69-model, anchor-paper-69-lattice]

  - id: paper-69-framework
    kind: framework
    parent_id: paper-69
    order: 4
    epistemic_status: constructed
    title: n-dimensional key lattice
    summary: A point in the integer lattice records how many key rolls are known along each participant's dimension, and each receiver maintains a local view sufficient to process reachable updates and messages.
    source_anchor_ids: [anchor-paper-69-lattice]

  - id: paper-69-framework-fs
    kind: security_goal
    parent_id: paper-69-framework
    order: 1
    epistemic_status: formalized
    title: Forward secrecy as backward non-traversability
    summary: Deleting obsolete state should prevent a later compromise at a newer coordinate from traversing backward to derive protected earlier keys.
    source_anchor_ids: [anchor-paper-69-lattice]

  - id: paper-69-framework-pcs
    kind: security_goal
    parent_id: paper-69-framework
    order: 2
    epistemic_status: formalized
    title: Post-compromise security as forward recovery
    summary: A fresh honest update moves key state in a direction the adversary cannot traverse from compromised coordinates, restoring secrecy for later reachable states.
    source_anchor_ids: [anchor-paper-69-lattice]

  - id: paper-69-protocol
    kind: protocol
    parent_id: paper-69
    order: 5
    epistemic_status: constructed
    title: Concurrent group-messaging protocol
    summary: The construction composes an initial group key agreement, a group-random-messaging update layer, and AEAD-protected application payloads.
    source_anchor_ids: [anchor-paper-69-grm, anchor-paper-69-group-protocol]

  - id: paper-69-protocol-gka
    kind: protocol_component
    parent_id: paper-69-protocol
    order: 1
    epistemic_status: assumed_primitive
    title: Initial group key agreement
    summary: A secure asynchronous GKA establishes the initial shared state; its security is assumed by the group-messaging reduction rather than reconstructed by the key-lattice layer.
    source_anchor_ids: [anchor-paper-69-model, anchor-paper-69-security]

  - id: paper-69-protocol-grm
    kind: protocol_component
    parent_id: paper-69-protocol
    order: 2
    epistemic_status: constructed
    title: Group random messaging update
    summary: The concrete GRM sends evolving ephemeral public-key material and authenticated encrypted randomness, erasing obsolete decryption keys so updates can refresh the appropriate lattice direction.
    source_anchor_ids: [anchor-paper-69-grm]

  - id: paper-69-protocol-payload
    kind: protocol_component
    parent_id: paper-69-protocol
    order: 3
    epistemic_status: constructed_from_primitive
    title: AEAD payload protection
    summary: Application messages use the key at the relevant local lattice point and carry coordinate information needed for receivers to select or derive the matching state.
    source_anchor_ids: [anchor-paper-69-group-protocol]

  - id: paper-69-results
    kind: claim_group
    parent_id: paper-69
    order: 6
    epistemic_status: theorem_backed
    title: Security and cost results
    summary: The source proves security by reductions to GKA, GRM, and AEAD and analytically derives constant payload and linear update overhead.
    source_anchor_ids: [anchor-paper-69-security, anchor-paper-69-problem]

  - id: paper-69-result-grm
    kind: theorem
    parent_id: paper-69-results
    order: 1
    epistemic_status: proved_conditionally
    title: GRM security
    summary: Theorem 5.1 reduces security of the concrete evolving-key GRM construction to the stated public-key encryption, authenticated-encryption or MAC, and deletion assumptions.
    source_anchor_ids: [anchor-paper-69-grm]

  - id: paper-69-result-group
    kind: theorem
    parent_id: paper-69-results
    order: 2
    epistemic_status: proved_conditionally
    title: Group-messaging reduction
    summary: >-
      Theorem 6.1 bounds the group-messaging adversary by 2 nS times GKA advantage, plus 2 nS n times GRM advantage, plus nS nq times AEAD CCA advantage, with nS and nq denoting the theorem's session and query bounds.
    source_anchor_ids: [anchor-paper-69-security]

  - id: paper-69-result-cost
    kind: claim
    parent_id: paper-69-results
    order: 3
    epistemic_status: analytically_derived
    title: Constant payload, linear update
    summary: Application-message overhead is O(1) in group size and update-message overhead is O(n); the paper argues these asymptotics are optimal for the modeled functionality.
    source_anchor_ids: [anchor-paper-69-problem, anchor-paper-69-group-protocol]

  - id: paper-69-evidence
    kind: evidence_group
    parent_id: paper-69
    order: 7
    epistemic_status: formal
    title: Formal evidence
    summary: The evidence consists of syntax and security games, lattice definitions, concrete constructions, reduction theorems, and asymptotic communication analysis; no implementation benchmark is presented.
    source_anchor_ids: [anchor-paper-69-model, anchor-paper-69-lattice, anchor-paper-69-grm, anchor-paper-69-security]

  - id: paper-69-boundaries
    kind: limitation_group
    parent_id: paper-69
    order: 8
    epistemic_status: explicitly_bounded
    title: Scope and tradeoffs
    summary: The core proof covers a static group and relies on secure primitives, key deletion, and state handling; fully asynchronous delivery creates an unavoidable correctness-versus-forward-secrecy storage tradeoff.
    source_anchor_ids: [anchor-paper-69-window, anchor-paper-69-dynamic]

  - id: paper-69-boundary-window
    kind: limitation
    parent_id: paper-69-boundaries
    order: 1
    epistemic_status: explicit_tradeoff
    title: Out-of-order window
    summary: Retaining every obsolete key allows arbitrarily delayed decryption but defeats forward deletion; bounding the receive window preserves deletion but may make sufficiently delayed messages undecryptable.
    source_anchor_ids: [anchor-paper-69-window]

  - id: paper-69-boundary-dynamic
    kind: limitation
    parent_id: paper-69-boundaries
    order: 2
    epistemic_status: informal_extension
    title: Dynamic membership is not re-proved
    summary: Section 8 sketches joins and removals as an extension, but the represented body does not restate and prove the full security theorem for dynamic groups; the formal core should therefore be read as static-group security.
    source_anchor_ids: [anchor-paper-69-dynamic]

  - id: paper-69-boundary-implementation
    kind: limitation
    parent_id: paper-69-boundaries
    order: 3
    epistemic_status: not_evaluated
    title: No implementation or operational evaluation
    summary: The source does not measure latency, storage growth, failed deliveries, state rollback, side channels, or deployment behavior under real messaging workloads.
    source_anchor_ids: [anchor-paper-69-group-protocol, anchor-paper-69-window]

  - id: paper-69-resources
    kind: artifact_group
    parent_id: paper-69
    order: 9
    epistemic_status: source_available
    title: Auditable resources
    summary: IACR and author-uploaded full-text routes expose the model and proofs, and the DOI establishes publication identity. No code artifact is claimed.
    source_anchor_ids: [anchor-paper-69-problem, anchor-paper-69-publication]

  - id: paper-69-scrutiny
    kind: scrutiny
    parent_id: paper-69
    order: 10
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: ACNS publication establishes venue review; no public proof audit, implementation reproduction, correction, or independent adversarial analysis was located.
    source_anchor_ids: [anchor-paper-69-publication]

  - id: paper-69-lineage
    kind: lineage
    parent_id: paper-69
    order: 11
    epistemic_status: documented
    title: Conceptual lineage
    summary: The key lattice generalizes epoch-based forward-secure and post-compromise-secure messaging into a partial order suited to concurrent senders and locally observed state.
    source_anchor_ids: [anchor-paper-69-problem, anchor-paper-69-lattice]

