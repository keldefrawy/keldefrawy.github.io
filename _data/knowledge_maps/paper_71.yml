nodes:
  - id: paper-71
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_position_paper
    title: "Challenges in Timed-Cryptography: A Position Paper (Short Paper)"
    summary: >-
      A theory-focused position paper auditing the modeling and proof obligations required for timed cryptography, especially time-lock puzzles used inside larger multi-party protocols.
    source_anchor_ids: [anchor-paper-71-abstract]

  - id: paper-71-question
    kind: question
    parent_id: paper-71
    order: 1
    epistemic_status: research_question
    title: Foundational question
    summary: >-
      Which parts of existing time-lock-puzzle analyses fail to support a consistent, falsifiable, and generally composable security claim?
    source_anchor_ids: [anchor-paper-71-abstract]

  - id: paper-71-answer
    kind: contribution
    parent_id: paper-71
    order: 2
    epistemic_status: argued_position
    title: Three-part diagnosis
    summary: >-
      The paper diagnoses inconsistent model mixing, computationally overpowered simulation, and insufficient composition guarantees, then advocates explicit computational budgets and a consistent treatment of intermediate-state leakage.
    source_anchor_ids: [anchor-paper-71-abstract, anchor-paper-71-conclusion]

  - id: paper-71-background
    kind: definition
    parent_id: paper-71
    order: 3
    epistemic_status: literature_grounded
    title: Timed security and the generation-solving gap
    summary: >-
      A time-lock puzzle should be efficient to generate using a trapdoor while requiring a substantially longer sequential computation to solve publicly. Unlike ordinary indefinite security, privacy intentionally expires after a chosen time.
    source_anchor_ids: [anchor-paper-71-abstract, anchor-paper-71-inconsistency]

  - id: paper-71-critique
    kind: argument_group
    parent_id: paper-71
    order: 4
    epistemic_status: author_argument
    title: Model-consistency critique
    summary: >-
      The central critique is that one cannot claim a super-polynomial generation-solving gap from algebraic structure while analyzing the solver's intermediate states as independent random labels without confronting the random-oracle impossibility result.
    source_anchor_ids: [anchor-paper-71-inconsistency]

  - id: paper-71-impossibility
    kind: premise
    parent_id: paper-71-critique
    order: 1
    epistemic_status: prior_result_invoked
    title: Random-oracle impossibility premise
    summary: >-
      The argument relies on prior work showing that random oracles alone, and repetitive computation whose next state is completely random given the previous state, cannot yield the desired super-polynomial time gap.
    source_anchor_ids: [anchor-paper-71-abstract, anchor-paper-71-inconsistency]

  - id: paper-71-model-mixing
    kind: claim
    parent_id: paper-71-critique
    order: 2
    epistemic_status: comparative_literature_claim
    title: Algebraic generation versus idealized solving
    summary: >-
      For the surveyed constructions that claim the large gap, generation is analyzed algebraically while solving is analyzed in a random-oracle, generic-group, or effectively equivalent model; the authors argue these two halves are not jointly consistent.
    source_anchor_ids: [anchor-paper-71-table, anchor-paper-71-inconsistency]

  - id: paper-71-random-to-whom
    kind: diagnostic_question
    parent_id: paper-71-critique
    order: 3
    epistemic_status: author_argument
    title: “Random” must be relative to a bounded observer
    summary: >-
      If intermediate states only look random to a bounded distinguisher, the proof must identify that observer and keep its allowed computation below the point at which the algebraic sequence becomes distinguishable or predictable.
    source_anchor_ids: [anchor-paper-71-inconsistency, anchor-paper-71-bbs]

  - id: paper-71-bbs-example
    kind: analytical_example
    parent_id: paper-71-critique
    order: 4
    epistemic_status: illustrative_not_general_proof
    title: Generalized BBS boundary example
    summary: >-
      The generalized BBS assumption illustrates that a next repeated-square value can look random to a sufficiently shallow algorithm while the guarantee degrades as computation approaches the puzzle's solving depth.
    source_anchor_ids: [anchor-paper-71-bbs]

  - id: paper-71-simulator
    kind: argument_group
    parent_id: paper-71
    order: 5
    epistemic_status: author_argument
    title: Meaningful simulation
    summary: >-
      In real-ideal security, a simulator should establish that an adversary can do no worse than an input-ignorant ideal process. For timed privacy, that comparison becomes uninformative if the simulator itself is allowed enough depth to solve the puzzle.
    source_anchor_ids: [anchor-paper-71-simulation]

  - id: paper-71-budget
    kind: requirement
    parent_id: paper-71-simulator
    order: 1
    epistemic_status: proposed_proof_obligation
    title: Bound the simulator explicitly
    summary: >-
      The simulator's computational class or depth must be stated and must respect the adversarial bound relevant to the privacy interval; arbitrary polynomial time is not automatically meaningful when puzzle solving is itself polynomial but intentionally slow.
    source_anchor_ids: [anchor-paper-71-simulation]

  - id: paper-71-stepwise-pattern
    kind: method
    parent_id: paper-71-simulator
    order: 2
    epistemic_status: recommended_pattern
    title: Step-by-step companion simulation
    summary: >-
      The paper recommends a natural design pattern in which the simulator advances with the adversary and uses ideal access only to provide each next response, keeping its computational progress comparable rather than jumping to the final puzzle solution.
    source_anchor_ids: [anchor-paper-71-stepwise]

  - id: paper-71-clock-boundary
    kind: caution
    parent_id: paper-71-simulator
    order: 3
    epistemic_status: case_study_argument
    title: Global clocks do not automatically tether computation
    summary: >-
      A global timekeeping functionality can synchronize protocol time without necessarily limiting how much local computation an untethered simulator performs between clock events; resource accounting must therefore be explicit.
    source_anchor_ids: [anchor-paper-71-stepwise]

  - id: paper-71-composability
    kind: argument_group
    parent_id: paper-71
    order: 6
    epistemic_status: comparative_literature_claim
    title: Specialized combination is not general MPC composition
    summary: >-
      The surveyed literature offers useful but narrower properties—homomorphic combination, concurrent non-malleability, or IND-CCA security—without yet supplying the general subroutine composition needed for timed primitives inside arbitrary MPC.
    source_anchor_ids: [anchor-paper-71-composition]

  - id: paper-71-evidence
    kind: evidence_group
    parent_id: paper-71
    order: 7
    epistemic_status: analytical_literature_review
    title: Evidence and argument structure
    summary: >-
      Support consists of a comparative table, close reading of model assumptions and simulation strategies, the prior impossibility theorem, and worked conceptual examples. The paper is not a new construction, empirical study, or complete impossibility proof for every future model.
    source_anchor_ids: [anchor-paper-71-table, anchor-paper-71-inconsistency, anchor-paper-71-bbs, anchor-paper-71-composition]

  - id: paper-71-boundaries
    kind: limitation_group
    parent_id: paper-71
    order: 8
    epistemic_status: material
    title: Boundaries of the position
    summary: >-
      Several conclusions are critical interpretations of how idealized and generic analyses interact with prior impossibility results. The authors invite the community to falsify or refine those interpretations and do not claim that all idealization is useless.
    source_anchor_ids: [anchor-paper-71-inconsistency, anchor-paper-71-conclusion]

  - id: paper-71-boundary-constructive
    kind: limitation
    parent_id: paper-71-boundaries
    order: 1
    epistemic_status: explicit_scope_boundary
    title: Diagnosis rather than final construction
    summary: >-
      The short paper identifies necessary proof obligations and a research direction; it does not itself deliver a fully general composable timed-MPC framework or protocol satisfying the requested foundations.
    source_anchor_ids: [anchor-paper-71-abstract, anchor-paper-71-conclusion]

  - id: paper-71-boundary-prior
    kind: limitation
    parent_id: paper-71-boundaries
    order: 2
    epistemic_status: explicit_qualification
    title: Existing work retains partial value
    summary: >-
      The paper recognizes that earlier idealized and specialized analyses provided insight and that some reviewed works state machine bounds consistently; its objection is to treating those partial guarantees as the final basis for general realizable composition.
    source_anchor_ids: [anchor-paper-71-composition, anchor-paper-71-conclusion]

  - id: paper-71-agenda
    kind: lineage
    parent_id: paper-71
    order: 9
    epistemic_status: proposed_research_agenda
    title: Moving-forward agenda
    summary: >-
      Establish timed-cryptography foundations that represent leakage during solving, bound adversaries, simulators, and distinguishers coherently, use falsifiable assumptions, and support general composition as a protocol subroutine.
    source_anchor_ids: [anchor-paper-71-conclusion]

  - id: paper-71-scrutiny
    kind: scrutiny
    parent_id: paper-71
    order: 10
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The short paper appeared in the peer-reviewed CSCML proceedings and has a public archive copy. Review reports, rebuttal, a published technical response to the critique, or an independent formal audit are not represented here.
    source_anchor_ids: [anchor-paper-71-publication]

