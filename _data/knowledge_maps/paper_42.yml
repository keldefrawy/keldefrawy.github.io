keywords:
  - "remote attestation"
  - "safety-critical systems"
  - "IoT"
editorial_summary: "This paper examines the conflict between atomic remote-attestation scans and devices that must remain available for safety-critical work. It analyzes transient and relocating malware and explores periodic measurement, shuffled traversal, interruptible attestation, and memory-locking mitigations."

research_question: "How can simple safety-critical IoT devices perform remote attestation without making an unacceptable tradeoff between atomic measurement and continued operation?"
central_answer: "The paper analyzes transient and relocating malware and explores periodic measurement, shuffled traversal, interruptible attestation, and memory locking as mitigation directions."

