nodes:
  - id: paper-42
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_invited_paper
    title: Remote attestation under safety-critical constraints
    summary: A protocol-level analysis of why atomic attestation threatens availability and why interruptibility threatens malware detection, with a taxonomy of imperfect mitigations.
    source_anchor_ids: [anchor-paper-42-problem]
  - id: paper-42-question
    kind: question
    parent_id: paper-42
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can a simple IoT prover remain responsive to critical events while still producing a fresh, meaningful malware measurement?
    source_anchor_ids: [anchor-paper-42-problem, anchor-paper-42-overhead]
  - id: paper-42-answer
    kind: contribution
    parent_id: paper-42
    order: 2
    epistemic_status: analytical_synthesis
    title: Central answer
    summary: Use explicit tradeoffs among periodic self-measurement, randomized order, and progressive locking; no surveyed protocol dominates on freshness, detection, consistency, availability, and assumptions.
    source_anchor_ids: [anchor-paper-42-locking, anchor-paper-42-shuffle, anchor-paper-42-self]
  - id: paper-42-baseline
    kind: protocol
    parent_id: paper-42
    order: 3
    epistemic_status: defined
    title: On-demand RA baseline
    summary: A verifier sends a fresh challenge, the prover computes an authenticated measurement over selected memory, returns it, and the verifier checks it against an admissible state.
    source_anchor_ids: [anchor-paper-42-ra-model]
  - id: paper-42-threat
    kind: threat_model
    parent_id: paper-42
    order: 4
    epistemic_status: defined
    title: Malware and availability threats
    summary: Transient malware can leave between measurements, self-relocating malware can evade a predictable interruptible scan, and malware may trigger a nominally critical task to preempt attestation.
    source_anchor_ids: [anchor-paper-42-threats]
  - id: paper-42-assumptions
    kind: assumption
    parent_id: paper-42
    order: 5
    epistemic_status: model_dependent
    title: Mechanism-dependent assumptions
    summary: Solutions variously need secure keys and measurement code, memory-lock enforcement, secret scan order, protected clocks or counters, authenticated channels, and predictable verifier expectations.
    source_anchor_ids: [anchor-paper-42-ra-model, anchor-paper-42-locking, anchor-paper-42-self]
  - id: paper-42-designs
    kind: method
    parent_id: paper-42
    order: 6
    epistemic_status: comparative_analysis
    title: Mitigation design space
    summary: The paper compares three protocol families rather than presenting a single deployed system.
    source_anchor_ids: [anchor-paper-42-locking, anchor-paper-42-shuffle, anchor-paper-42-self]
  - id: paper-42-design-lock
    kind: protocol
    parent_id: paper-42-designs
    order: 1
    epistemic_status: specified
    title: Progressive locking
    summary: All-Lock freezes all memory; Dec-Lock releases measured blocks and targets start-time consistency; Inc-Lock progressively locks measured blocks and targets end-time consistency.
    source_anchor_ids: [anchor-paper-42-locking]
  - id: paper-42-design-shuffle
    kind: protocol
    parent_id: paper-42-designs
    order: 2
    epistemic_status: probability_analyzed
    title: Shuffled measurement
    summary: SMARM hides traversal order so roving malware cannot know which block is safe; one scan leaves escape probability near e^-1, so repeated independent scans reduce but do not eliminate false negatives.
    source_anchor_ids: [anchor-paper-42-shuffle]
  - id: paper-42-design-self
    kind: protocol
    parent_id: paper-42-designs
    order: 3
    epistemic_status: comparative_analysis
    title: Periodic self-measurement
    summary: ERASMUS decouples measurement frequency from verifier collection; SeED makes reports prover-initiated but adds protected time/replay and expected-delivery requirements.
    source_anchor_ids: [anchor-paper-42-self]
  - id: paper-42-claims
    kind: claim_group
    parent_id: paper-42
    order: 7
    epistemic_status: analytical
    title: Main conclusions
    summary: Atomic scans can be dangerously slow, while interruptible or scheduled protocols exchange stronger availability for weaker or more assumption-heavy detection guarantees.
    source_anchor_ids: [anchor-paper-42-overhead, anchor-paper-42-conclusion]
  - id: paper-42-evidence
    kind: evidence_group
    parent_id: paper-42
    order: 8
    epistemic_status: synthesis_of_prior_results
    title: Evidence basis
    summary: Support consists of measured hashing costs, worked attack scenarios, cited probability analysis for shuffled measurement, and a structured comparison of existing mechanisms; no new prototype or formal proof is reported.
    source_anchor_ids: [anchor-paper-42-overhead, anchor-paper-42-shuffle, anchor-paper-42-self]
  - id: paper-42-boundaries
    kind: limitation_group
    parent_id: paper-42
    order: 9
    epistemic_status: explicit
    title: Limits of reconciliation
    summary: Self-measurement can be stale; shuffled scans need repetition; locking impairs writes; protected time and communication expectations add hardware and availability assumptions; on-demand RA remains necessary for maximum freshness.
    source_anchor_ids: [anchor-paper-42-locking, anchor-paper-42-shuffle, anchor-paper-42-self, anchor-paper-42-conclusion]
  - id: paper-42-artifacts
    kind: artifact_group
    parent_id: paper-42
    order: 10
    epistemic_status: publication_only
    title: Artifacts
    summary: Full author and NSF copies plus the DOI are public. The invited synthesis does not claim a new implementation, dataset, proof artifact, or reproduction package.
    source_anchor_ids: [anchor-paper-42-problem, anchor-paper-42-publication]
  - id: paper-42-scrutiny
    kind: scrutiny
    parent_id: paper-42
    order: 11
    epistemic_status: invited_venue_paper
    title: External scrutiny
    summary: DAC publication provides external venue exposure, while the represented source is an invited analytical paper and public review reports were not located.
    source_anchor_ids: [anchor-paper-42-publication]
  - id: paper-42-lineage
    kind: lineage
    parent_id: paper-42
    order: 12
    epistemic_status: documented
    title: Relation to temporal consistency
    summary: The locking taxonomy and consistency vocabulary are drawn from the fuller treatment in paper #41; this paper reframes them around safety-critical protocol selection.
    source_anchor_ids: [anchor-paper-42-locking, anchor-paper-42-conclusion]

