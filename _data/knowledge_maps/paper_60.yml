    order: 11
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The paper appeared at IEEE QCE 2021. Public review reports and independent experimental reproduction are not linked.
    source_anchor_ids: [anchor-paper-60-publication]

  - id: paper-60-lineage
    kind: lineage
    parent_id: paper-60
