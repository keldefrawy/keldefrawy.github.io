nodes:
  - id: paper-60
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Quantum Optimization Heuristics with an Application to Knapsack Problems"
    summary: >-
      Two biased QAOA-style optimization algorithms for constrained knapsack instances, analyzed algebraically and evaluated by small statevector simulations.
    source_anchor_ids: [anchor-paper-60-problem]

  - id: paper-60-question
    kind: question
    parent_id: paper-60
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can a greedy warm start and bias-preserving mixers focus a shallow quantum search near feasible solutions without the qubit cost of penalty encodings?
    source_anchor_ids: [anchor-paper-60-problem, anchor-paper-60-qaoa]

  - id: paper-60-answer
    kind: contribution
    parent_id: paper-60
    order: 2
    epistemic_status: simulated_support
    title: Central answer
    summary: >-
      Convert a smoothed lazy-greedy profile into product-state qubit marginals, preserve those marginals with an hourglass mixer, and optionally add pairwise anticorrelation through a copula mixer.
    source_anchor_ids: [anchor-paper-60-mixers, anchor-paper-60-qkp]

  - id: paper-60-scope
    kind: scope
    parent_id: paper-60
    order: 3
    epistemic_status: explicitly_scoped
    title: Experimental regime
    summary: >-
      Results use binary knapsack instances with ten items, depth-one circuits, statevector simulation, ten output samples per algorithm run, and 100 instances from each of five selected hard distributions.
    source_anchor_ids: [anchor-paper-60-instances, anchor-paper-60-quantum, anchor-paper-60-results]

  - id: paper-60-method
    kind: algorithm
    parent_id: paper-60
    order: 4
    epistemic_status: specified
    title: Biased xQAOA
    summary: >-
      A logistic smoothing of the lazy-greedy stopping ratio assigns each item a qubit inclusion probability, creating a constant-depth initial state near the capacity boundary rather than a uniform superposition.
    source_anchor_ids: [anchor-paper-60-mixers, anchor-paper-60-qkp]

  - id: paper-60-method-hourglass
    kind: algorithm
    parent_id: paper-60-method
    order: 1
    epistemic_status: specified
    title: QKP hourglass mixer
    summary: >-
      A single-qubit mixer has each biased marginal state as an eigenstate, preserving the chosen product-distribution bias while the objective phase steers probability toward higher-value strings.
    source_anchor_ids: [anchor-paper-60-mixers, anchor-paper-60-qkp]

  - id: paper-60-method-copula
    kind: algorithm
    parent_id: paper-60-method
    order: 2
    epistemic_status: specified
    title: QKP copula mixer
    summary: >-
      Two-qubit copula operations preserve individual marginals while adding tunable correlations; the evaluated ring construction favors anticorrelation so neighboring items are less likely to be jointly selected.
    source_anchor_ids: [anchor-paper-60-mixers, anchor-paper-60-qkp]

  - id: paper-60-baselines
    kind: evidence_group
    parent_id: paper-60
    order: 5
    epistemic_status: controlled_simulation
    title: Comparison design
    summary: >-
      Quantum heuristics are compared with lazy greedy, very greedy, warm-start simulated annealing, and a global one-step annealing variant on strongly correlated, inverse-strong, profit, and two spanner distributions.
    source_anchor_ids: [anchor-paper-60-instances, anchor-paper-60-classical]

  - id: paper-60-parameters
    kind: method
    parent_id: paper-60-baselines
    order: 1
    epistemic_status: per_instance_optimized
    title: Parameter search
    summary: >-
      Quantum angles are grid-searched then refined with BFGS for each instance across bias strengths and selected copula correlations; simulated annealing temperature is also tuned per instance from repeated trials.
    source_anchor_ids: [anchor-paper-60-classical, anchor-paper-60-quantum]

  - id: paper-60-claim-comparison
    kind: claim
    parent_id: paper-60
    order: 6
    epistemic_status: simulation_result
    title: Better results than selected shallow heuristics
    summary: >-
      Across the sampled ten-item instances, the hourglass variant typically exceeds the four chosen classical heuristics and the copula variant improves further; infeasible outputs count as zero rather than being postselected away.
    source_anchor_ids: [anchor-paper-60-results]

  - id: paper-60-claim-sensitivity
    kind: claim
    parent_id: paper-60
    order: 7
    epistemic_status: numerical_observation
    title: Limited sensitivity on the tested size
    summary: >-
      The tested copula mixer generally prefers maximal anticorrelation, performance varies weakly across the sampled bias strengths, and favorable beta angles cluster in two regions, suggesting some parameter reuse at n equals 10.
    source_anchor_ids: [anchor-paper-60-results]

  - id: paper-60-boundaries
    kind: limitation_group
    parent_id: paper-60
    order: 8
    epistemic_status: material
    title: Boundaries
    summary: >-
      Experiments are statevector simulations at n equals 10 and depth one, use heavily optimized per-instance parameters, and compare only simple classical methods. The authors expect more elaborate classical algorithms to outperform these quantum heuristics and leave larger n, deeper p, and parameter-scaling behavior open.
    source_anchor_ids: [anchor-paper-60-quantum, anchor-paper-60-results, anchor-paper-60-conclusion]

  - id: paper-60-boundary-classical
    kind: limitation
    parent_id: paper-60-boundaries
    order: 1
    epistemic_status: explicitly_acknowledged
    title: Hourglass path can be quantum-inspired classical
    summary: >-
      For a linear objective such as knapsack, the first non-entangling technique can be classically simulated with comparable circuit complexity, so its improvement is not evidence of quantum advantage.
    source_anchor_ids: [anchor-paper-60-problem, anchor-paper-60-conclusion]

  - id: paper-60-evidence
    kind: evidence_group
    parent_id: paper-60
    order: 9
    epistemic_status: analytical_and_simulated
    title: Evidence boundary
    summary: >-
      The paper supplies circuit derivations, pseudocode, instance generators, baseline settings, scatter plots, and sensitivity results. It supplies neither hardware experiments nor a proof of asymptotic advantage.
    source_anchor_ids: [anchor-paper-60-mixers, anchor-paper-60-instances, anchor-paper-60-results]

  - id: paper-60-resources
    kind: artifact_group
    parent_id: paper-60
    order: 10
    epistemic_status: source_available
    title: Publication resources
    summary: >-
      The checked-in arXiv manuscript has fixity metadata and the DOI identifies the IEEE publication. No code or data artifact is represented in the paper map.
    source_anchor_ids: [anchor-paper-60-problem, anchor-paper-60-publication]

  - id: paper-60-scrutiny
