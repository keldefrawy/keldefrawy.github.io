    title: Warm-start constrained QAOA line
    summary: >-
      The work extends prior alternating-operator and warm-start approaches with constant-depth bias-preserving and copula mixers specialized and tested for knapsack.
    source_anchor_ids: [anchor-paper-60-mixers, anchor-paper-60-conclusion]

