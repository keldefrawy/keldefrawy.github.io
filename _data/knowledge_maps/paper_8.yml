nodes:
  - id: paper-8
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Filtering Sources of Unwanted Traffic Based on Blacklists"
    summary: "A family of provably optimal algorithms for compiling static and changing source-IP blacklists into a bounded number of interval filters."
    source_anchor_ids: [anchor-paper-8-problem, anchor-paper-8-publication]
  - id: paper-8-question
    kind: question
    parent_id: paper-8
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "How should limited ACL entries aggregate blacklist addresses while balancing missed malicious sources against blocked legitimate addresses?"
    source_anchor_ids: [anchor-paper-8-problem]
  - id: paper-8-answer
    kind: contribution
    parent_id: paper-8
    order: 2
    epistemic_status: proved_and_simulated
    title: "Central answer"
    summary: "Exploit the total order of IP addresses: greedy adjacent-range operations produce optimal static filter sets and efficient incremental variants reuse that structure as a blacklist changes."
    source_anchor_ids: [anchor-paper-8-p0, anchor-paper-8-p1, anchor-paper-8-dynamic]
  - id: paper-8-model
    kind: model
    parent_id: paper-8
    order: 3
    epistemic_status: formalized
    title: "Weighted interval-filter model"
    summary: "Each filter blocks a contiguous address range. Address weights can encode legitimate-traffic cost, confidence in maliciousness, or operator policy, under a maximum filter count."
    source_anchor_ids: [anchor-paper-8-model]
  - id: paper-8-p0
    kind: algorithm
    parent_id: paper-8
    order: 4
    epistemic_status: proved_optimal
    title: "FILTER-ALL-STATIC"
    summary: "Starting with one filter per bad address, the greedy algorithm merges the N-F least-cost adjacent ranges. Theorem 3.1 proves optimality; sorting yields O(N log N) time."
    source_anchor_ids: [anchor-paper-8-p0]
  - id: paper-8-p1
    kind: algorithm
    parent_id: paper-8
    order: 5
    epistemic_status: proved_optimal
    title: "FILTER-SOME-STATIC"
    summary: "At each step the algorithm compares removing a bad-address filter with merging adjacent filters, using signed address weights to trade false negatives against collateral damage. Theorem 3.2 proves optimality."
    source_anchor_ids: [anchor-paper-8-p1]
  - id: paper-8-dynamic
    kind: algorithm
    parent_id: paper-8
    order: 6
    epistemic_status: incrementally_specified
    title: "Dynamic blacklist variants"
    summary: "FILTER-ALL-DYNAMIC updates the sorted merge-cost list after an address arrives or departs; a corresponding filter-some method is outlined to exploit temporal correlation rather than recomputing from scratch."
    source_anchor_ids: [anchor-paper-8-dynamic]
  - id: paper-8-evidence
    kind: evidence_group
    parent_id: paper-8
    order: 7
    epistemic_status: simulation
    title: "Clustering and density evaluation"
    summary: "Multifractal and synthetic blacklist distributions vary clustering, blacklist density, filter budget, and weights to measure blocked bad addresses and collateral damage."
    source_anchor_ids: [anchor-paper-8-evaluation]
  - id: paper-8-result
    kind: result
    parent_id: paper-8-evidence
    order: 1
    epistemic_status: simulation_supported
    title: "Clustering makes aggregation effective"
    summary: "The reported benefits are strongest when malicious addresses cluster in the IP space; sparse or weakly clustered blacklists require more filters or greater collateral damage."
    source_anchor_ids: [anchor-paper-8-evaluation]
  - id: paper-8-boundaries
    kind: limitation_group
    parent_id: paper-8
    order: 8
    epistemic_status: material
    title: "Operational boundaries"
    summary: "Blacklist construction and accuracy are assumed, weights are policy inputs, spoofing and evasion are not modeled, and evaluation uses distribution models rather than a deployed filtering system or released longitudinal blacklist."
