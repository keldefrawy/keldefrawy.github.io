nodes:
  - id: paper-10
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Leveraging Social Contacts for Message Confidentiality in DTNs"
    summary: "A confidential-messaging scheme that substitutes recipient-affiliated intermediaries for unavailable end-to-end key discovery in intermittently connected networks."
    source_anchor_ids: [anchor-paper-10-problem, anchor-paper-10-publication]
  - id: paper-10-question
    kind: question
    parent_id: paper-10
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "How can a sender encrypt its first message to a recipient with no shared security context and no dependable online infrastructure?"
    source_anchor_ids: [anchor-paper-10-problem]
  - id: paper-10-answer
    kind: contribution
    parent_id: paper-10
    order: 2
    epistemic_status: proposed_and_simulated
    title: "Central answer"
    summary: "Use two or more socially affiliated entities as independent key-translation points, so only the destination can combine all pseudorandom masks and recover the message."
    source_anchor_ids: [anchor-paper-10-intra, anchor-paper-10-simulation]
  - id: paper-10-model
    kind: model
    parent_id: paper-10
    order: 3
    epistemic_status: explicitly_scoped
    title: "Regional DTN model"
    summary: "Mobile nodes communicate opportunistically within regions; fixed gateways connect regions. Nodes know keys for selected affiliated entities, and those entities are assumed to know or share a key with the destination."
    source_anchor_ids: [anchor-paper-10-model, anchor-paper-10-intra]
  - id: paper-10-intra
    kind: scheme
    parent_id: paper-10
    order: 4
    epistemic_status: specified
    title: "Intra-region affiliated-entity scheme"
    summary: "The sender XOR-masks the message with PRF outputs under independent seeds and encrypts one seed to each AE. AEs re-encrypt their seed for the destination; AE traversal order may vary and replicated paths may collectively visit all AEs."
    source_anchor_ids: [anchor-paper-10-intra]
  - id: paper-10-inter
    kind: scheme
    parent_id: paper-10
    order: 5
    epistemic_status: specified
    title: "Inter-region extension"
    summary: "Source- and destination-region gateways translate an additional masking seed between regional trust domains, providing a second layer when only one ordinary AE is available."
    source_anchor_ids: [anchor-paper-10-inter]
  - id: paper-10-poor
    kind: fallback
    parent_id: paper-10
    order: 6
    epistemic_status: heuristic
    title: "Poor Man's Approach"
    summary: "If no AE is known, the sender separates ciphertext and key shares across different routes and delays. Confidentiality is probabilistic: any intermediary that gathers all components recovers the message."
    source_anchor_ids: [anchor-paper-10-poor]
  - id: paper-10-threat
    kind: threat_model
    parent_id: paper-10
    order: 7
    epistemic_status: explicitly_scoped
    title: "Honest-but-curious intermediaries"
    summary: "Nodes follow routing behavior but may retain and correlate messages beyond TTL. Active modification, dropping, and origin authentication are outside the primary model; AE collusion is the central confidentiality threat."
    source_anchor_ids: [anchor-paper-10-security]
  - id: paper-10-evidence
    kind: evidence_group
    parent_id: paper-10
    order: 8
    epistemic_status: simulation_and_observational_sample
    title: "Feasibility evidence"
    summary: "ONE simulations model 250 pedestrians on a Helsinki map with epidemic routing, while samples of 870 Orange County and 900 Egypt Facebook users estimate friend/friend-of-friend reach."
    source_anchor_ids: [anchor-paper-10-simulation, anchor-paper-10-social]
  - id: paper-10-result
    kind: result
    parent_id: paper-10-evidence
    order: 1
    epistemic_status: simulation_supported
    title: "Delay, path length, and interception"
    summary: "For the fallback scheme, longer intra-region separation lowers measured interception but raises latency; in inter-region runs, more hops increase exposure and retained copies weaken the benefit of delay."
    source_anchor_ids: [anchor-paper-10-simulation]
  - id: paper-10-social-result
    kind: result
    parent_id: paper-10-evidence
    order: 2
    epistemic_status: observational_sample
    title: "Social reach"
    summary: "The sampled public profiles suggest that tens to hundreds of direct contacts can expose thousands of friends-of-friends, but closed profiles are omitted and the two convenience samples do not establish a general population distribution."
    source_anchor_ids: [anchor-paper-10-social]
  - id: paper-10-boundaries
    kind: limitation_group
    parent_id: paper-10
    order: 9
    epistemic_status: material
    title: "Security and scalability boundaries"
    summary: "Security is informal; multiple AEs must not collude, the sender must know their keys, and each AE must know the destination key. The paper itself flags the latter assumption as potentially unscalable and leaves formal analysis for future work."
    source_anchor_ids: [anchor-paper-10-security, anchor-paper-10-conclusion]
  - id: paper-10-artifacts
    kind: artifact
    parent_id: paper-10
    order: 10
    epistemic_status: paper_available_no_code
    title: "Artifacts"
    summary: "A fixed author copy is available locally; ONE configurations, simulation outputs, and the historical social-network sample were not located."
    source_anchor_ids: [anchor-paper-10-simulation, anchor-paper-10-social, anchor-paper-10-provenance]
  - id: paper-10-scrutiny
    kind: scrutiny
    parent_id: paper-10
    order: 11
    epistemic_status: peer_reviewed
    title: "Scrutiny"
    summary: "The work appeared at IEEE COMPSAC 2009 and explicitly labels its security assessment preliminary and informal; independent reproduction was not located."
    source_anchor_ids: [anchor-paper-10-security, anchor-paper-10-publication]

