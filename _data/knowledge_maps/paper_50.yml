nodes:
  - id: paper-50
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: VRASED
    summary: A formally specified hardware/software architecture for remote attestation on low-end embedded devices, accompanied by proofs, model checking, a public implementation, and FPGA evaluation.
    source_anchor_ids: [anchor-paper-problem-novelty]

  - id: paper-50-question
    kind: question
    parent_id: paper-50
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can remote attestation for a constrained MCU be both practical and connected to explicit end-to-end soundness and security definitions?
    source_anchor_ids: [anchor-paper-problem-novelty]

  - id: paper-50-answer
    kind: contribution
    parent_id: paper-50
    order: 2
    epistemic_status: source_asserted
    title: Central answer
    summary: Use verified HMAC software for the attestation computation and a small verified hardware monitor to enforce key protection, safe execution, and reset policies.
    source_anchor_ids: [anchor-paper-problem-novelty, anchor-paper-verification-method]

  - id: paper-50-scope
    kind: scope
    parent_id: paper-50
    order: 3
    epistemic_status: explicitly_scoped
    title: Scope, adversary, and assumptions
    summary: The guarantees concern software-controlled attacks on a low-end MCU and hold only when the stated machine, compiler, cryptographic, and hardware boundaries are satisfied.
    source_anchor_ids: [anchor-paper-threat-model, anchor-paper-security]

  - id: paper-50-scope-adversary
    kind: threat_model
    parent_id: paper-50-scope
    order: 1
    epistemic_status: defined
    title: Software adversary
    summary: The adversary controls all untrusted software and writable data, can relocate malware, and can control DMA, but cannot modify protected ROM or directly bypass HW-Mod.
    source_anchor_ids: [anchor-paper-threat-model, anchor-paper-security]

  - id: paper-50-scope-axioms
    kind: assumption
    parent_id: paper-50-scope
    order: 2
    epistemic_status: assumed
    title: Axioms A1-A7
    summary: The proof trusts accurate PC, memory, DMA, reset, and interrupt signals, plus compiler register cleanup and semantic preservation from verified C to assembly.
    source_anchor_ids: [anchor-paper-threat-model, anchor-paper-formal-proofs]

  - id: paper-50-scope-exclusions
    kind: limitation
    parent_id: paper-50-scope
    order: 3
    epistemic_status: explicitly_excluded
    title: Excluded attacks and components
    summary: Physical attacks, induced hardware faults, physical side channels, and verification of the complete MCU implementation are outside the proved model.
    source_anchor_ids: [anchor-paper-threat-model]

  - id: paper-50-architecture
    kind: method
    parent_id: paper-50
    order: 4
    epistemic_status: implemented
    title: Architecture and enforcement path
    summary: The design composes a trusted software attestation routine with hardware state machines that watch execution and force reset on policy violations.
    source_anchor_ids: [anchor-paper-properties, anchor-paper-verification-method]

  - id: paper-50-architecture-sw-att
    kind: component
    parent_id: paper-50-architecture
    order: 1
    epistemic_status: partially_machine_checked
    title: SW-Att
    summary: HACL* HMAC-SHA256 derives a challenge-specific key and authenticates the requested memory region; HACL* supplies inherited F* proofs, while mapping those guarantees into VRASED's model is manual.
    source_anchor_ids: [anchor-paper-security]

  - id: paper-50-architecture-hw-mod
    kind: component
    parent_id: paper-50-architecture
    order: 2
    epistemic_status: model_checked
    title: HW-Mod
    summary: Hardware monitors observe program-counter, memory, interrupt, DMA, and reset signals; FSMs enforce LTL policies and reset the MCU when a policy is violated.
    source_anchor_ids: [anchor-paper-verification-method, anchor-paper-ltl-enforcement]

  - id: paper-50-architecture-properties
    kind: definition
    parent_id: paper-50-architecture
    order: 3
    epistemic_status: defined
    title: Required properties P1-P7
    summary: Key access control, no leakage, secure reset, functional correctness, immutability, atomicity, and controlled invocation are the bridge from components to remote-attestation guarantees.
    source_anchor_ids: [anchor-paper-properties]

  - id: paper-50-claims
    kind: claim_group
    parent_id: paper-50
    order: 5
    epistemic_status: mixed
    title: Principal claims
    summary: The paper makes formal claims about a stated model, an empirical claim about concrete overhead, and a priority claim about first-of-kind verification.
    source_anchor_ids: [anchor-paper-soundness, anchor-paper-security, anchor-paper-evaluation]

  - id: paper-50-claim-soundness
    kind: claim
    parent_id: paper-50-claims
    order: 1
    epistemic_status: machine_checked_within_model
    title: End-to-end soundness
    summary: SW-Att returns a temporally consistent HMAC of the attested memory as it existed when attestation began, conditional on the stated model and trusted boundaries.
    source_anchor_ids: [anchor-paper-soundness, anchor-paper-formal-proofs]

  - id: paper-50-claim-security
    kind: claim
    parent_id: paper-50-claims
    order: 2
    epistemic_status: proved_conditional
    title: End-to-end security
    summary: A polynomial-time software adversary cannot forge a valid report for a different memory state except with negligible probability, assuming a secure HMAC and the machine/compiler axioms.
    source_anchor_ids: [anchor-paper-security, anchor-paper-formal-proofs]

  - id: paper-50-claim-overhead
    kind: claim
    parent_id: paper-50-claims
    order: 3
    epistemic_status: experimentally_supported
    title: Practical overhead
    summary: The standard FPGA design adds 6.3% logic cells and reports approximately 3.6 million cycles, or 450 ms at 8 MHz, to attest 4 KB.
    source_anchor_ids: [anchor-paper-evaluation]

  - id: paper-50-evidence
    kind: evidence_group
    parent_id: paper-50
    order: 6
    epistemic_status: documented
    title: Evidence chain
    summary: The evidence combines inherited software proofs, model-checked hardware properties, compositional reasoning, public artifacts, and FPGA measurements.
    source_anchor_ids: [anchor-paper-verification-method, anchor-paper-evaluation, anchor-paper-formal-proofs]

  - id: paper-50-evidence-formal
    kind: evidence
    parent_id: paper-50-evidence
    order: 1
    epistemic_status: machine_checked_and_proved
    title: Formal verification path
    summary: NuSMV checks the hardware LTL properties and composition; Spot checks stated LTL implications; the final HMAC security reduction is a conditional paper proof rather than a wholly machine-checked proof.
    source_anchor_ids: [anchor-paper-verification-method, anchor-paper-formal-proofs]

  - id: paper-50-evidence-implementation
    kind: evidence
    parent_id: paper-50-evidence
    order: 2
    epistemic_status: implemented_and_measured
    title: Prototype and measurements
    summary: The authors synthesize an OpenMSP430-based implementation for a Basys3 Artix-7 FPGA and report model-checker resources, hardware cost, memory, and attestation time.
    source_anchor_ids: [anchor-paper-implementation, anchor-paper-evaluation]

  - id: paper-50-evidence-artifacts
    kind: artifact
    parent_id: paper-50-evidence
    order: 3
    epistemic_status: publicly_available
    title: Public code and proof artifacts
    summary: The public repository includes source, build instructions, Verilog modules, verification specifications, scripts, and soundness/security proof material; this map has not pinned a commit or independently reproduced it.
    source_anchor_ids: [anchor-repository-artifacts]

  - id: paper-50-boundaries
    kind: limitation_group
    parent_id: paper-50
    order: 7
    epistemic_status: material
    title: Trusted boundary and limitations
    summary: The strongest guarantees apply to the formalized module and model; moving from verified source and FSMs to a concrete MCU/FPGA system introduces trusted steps.
    source_anchor_ids: [anchor-paper-threat-model, anchor-paper-formal-proofs]

  - id: paper-50-boundary-compiler
    kind: limitation
    parent_id: paper-50-boundaries
    order: 1
    epistemic_status: assumed
    title: Compiler and timing preservation
    summary: msp430-gcc is trusted to preserve functional semantics and register cleanup; preservation of HACL* timing properties by the compiler and MCU is also assumed.
    source_anchor_ids: [anchor-paper-threat-model, anchor-paper-formal-proofs]

  - id: paper-50-boundary-core
    kind: limitation
    parent_id: paper-50-boundaries
    order: 2
    epistemic_status: unverified_integration
    title: MCU core and integration
    summary: The whole OpenMSP430 core and its concrete integration are not verified; implementers must establish that each target MCU satisfies the abstract signal and reset axioms.
    source_anchor_ids: [anchor-paper-threat-model, anchor-repository-boundary-response]

  - id: paper-50-boundary-physical
    kind: limitation
    parent_id: paper-50-boundaries
    order: 3
    epistemic_status: out_of_scope
    title: Physical and availability attacks
    summary: Physical hardware attacks are excluded, and the base design does not authenticate verifier requests; the paper discusses an optional authenticated variant to reduce request-flooding risk.
    source_anchor_ids: [anchor-paper-threat-model, anchor-paper-formal-proofs]

  - id: paper-50-scrutiny
    kind: scrutiny
    parent_id: paper-50
    order: 8
    epistemic_status: independently_examined
    title: Independent scrutiny and correction context
    summary: Later researchers examined the gap between VRASED's formal model and its concrete openMSP430 instantiation, and the VRASED repository records a scoped response and prototype changes.
    source_anchor_ids: [anchor-mind-gap-attacks, anchor-repository-boundary-response]

  - id: paper-50-scrutiny-analysis
    kind: counterevidence
    parent_id: paper-50-scrutiny
    order: 1
    epistemic_status: independently_reported
    title: Mind the Gap analysis
    summary: The 2022 study reports attacks against concrete implementations and argues that formal guarantees do not automatically transfer across unmodeled assumptions and integration steps.
    source_anchor_ids: [anchor-mind-gap-context, anchor-mind-gap-attacks]

  - id: paper-50-scrutiny-response
    kind: response
    parent_id: paper-50-scrutiny
    order: 2
    epistemic_status: author_response
    title: VRASED repository response
    summary: The maintainers state that reported issues do not falsify properties of the verified RA module; they distinguish integration violations, out-of-model hardware changes, and an unverified fork, and report changes to the sample instantiation.
    source_anchor_ids: [anchor-repository-boundary-response]

  - id: paper-50-lineage
    kind: lineage
    parent_id: paper-50
    order: 9
    epistemic_status: documented
    title: Significance and research lineage
    summary: VRASED presents a first-of-kind verified hybrid remote-attestation architecture and became a basis for follow-on architectures and independent examination of how proofs meet real systems.
    source_anchor_ids: [anchor-paper-conclusion, anchor-mind-gap-context, anchor-repository-artifacts]

