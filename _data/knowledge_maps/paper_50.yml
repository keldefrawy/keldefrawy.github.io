assessment:
  id: paper-50-assessment-2026-07-11
  rubric_version: "0.2"
  assessed_at: "2026-07-11"
  status: author_approved
  note: These dimensions describe documented support and process, not truth, correctness, or a universal ranking. No composite score is calculated.
  axes:
    - id: epistemic_evidence
      level: medium
      rationale: Strong formal and empirical evidence supports the stated model, but crucial transfer steps to the concrete compiler, MCU, and integration are assumed; later adversarial work found implementation-level gaps.
      basis_source_anchor_ids: [anchor-paper-verification-method, anchor-paper-formal-proofs, anchor-paper-evaluation, anchor-mind-gap-attacks]
    - id: auditability
      level: high
      rationale: "An author-hosted paper, implementation, verification specifications, scripts, and proof material are public and documented, making the work directly inspectable; auditability is high. The map has not pinned an immutable repository revision or recorded an independent full reproduction."
      basis_source_anchor_ids: [anchor-repository-artifacts, anchor-paper-evaluation]
    - id: production_provenance
      level: medium
      rationale: The record documents named authorship and the publication or review status of the paper, establishing a baseline human and lifecycle provenance trail. Contributor roles, revision and effort history, AI or tool use, artifact-version lineage, and explicit final approval have not yet been audited, so this provisional medium rating should not be read as complete production provenance.
      basis_source_anchor_ids: [anchor-paper-problem-novelty, anchor-repository-artifacts]
    - id: external_scrutiny
      level: high
      rationale: The work passed conference review, exposes public artifacts, received detailed independent adversarial examination, and has a public response that records scope distinctions and prototype changes.
      basis_source_anchor_ids: [anchor-usenix-publication, anchor-mind-gap-attacks, anchor-repository-boundary-response]
    - id: reception
      level: medium
      rationale: A dated qualitative snapshot shows multiple follow-on architectures, outside analysis, and an independent reimplementation, but this draft does not yet include a field-adjusted citation or adoption count.
      basis_source_anchor_ids: [anchor-mind-gap-context, anchor-repository-artifacts]
    - id: contribution_significance
      level: high
      rationale: The paper introduced a first-of-kind verified hybrid remote-attestation architecture and helped establish a research line around both verified low-end security architectures and the limits of transferring proofs to implementations.
      basis_source_anchor_ids: [anchor-paper-problem-novelty, anchor-paper-conclusion, anchor-mind-gap-context]

