title: "VRASED: A Verified Hardware/Software Co-Design for Remote Attestation"
short_title: VRASED
year: 2019
venue: 28th USENIX Security Symposium
topic: secure-systems-networks
labels:
  - Applied
authors:
  - Ivan De Oliveira Nunes
  - Karim Eldefrawy
  - Norrathep Rattanavipanon
