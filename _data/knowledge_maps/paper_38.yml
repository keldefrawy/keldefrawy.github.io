  - "seL4"
  - "lessons learned"
editorial_summary: "This experience paper presents the HYDRA design and reports the engineering lessons involved in combining remote attestation with the formally verified seL4 microkernel. Its commodity-board prototype attests 10 MB in under 500 ms and highlights practical issues such as secure boot, trustworthy time, and cryptographic checksum selection."

research_question: "What engineering constraints arise when remote attestation is integrated with the formally verified seL4 microkernel on commodity embedded boards?"
central_answer: "The experience report presents HYDRA, reports a commodity-board prototype, and identifies secure boot, trustworthy time, and checksum selection as practical integration issues."

