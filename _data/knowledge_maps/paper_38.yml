nodes:
  - id: paper-38
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Fusing Hybrid Remote Attestation with a Formally Verified Microkernel: Lessons Learned"
    summary: >-
      A four-page companion paper that compresses HYDRA's seL4-based remote-attestation architecture, reports Sabre Lite feasibility data, and foregrounds the engineering gaps between a verified kernel and a trustworthy deployed attestation system.
    source_anchor_ids: [anchor-paper-38-problem]

  - id: paper-38-question
    kind: question
    parent_id: paper-38
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Which security properties can seL4 enforce for hybrid attestation, which properties still require hardware or platform support, and what practical obstacles appear in a commodity prototype?
    source_anchor_ids: [anchor-paper-38-problem, anchor-paper-38-lessons]

  - id: paper-38-answer
    kind: contribution
    parent_id: paper-38
    order: 2
    epistemic_status: source_asserted
    title: Architecture plus implementation lessons
    summary: >-
      seL4 capabilities and scheduling can enforce most key, memory, isolation, and atomicity requirements, but secure initialization, immutable boot trust, hardware correctness, and reliable time remain outside the kernel proof and require explicit platform mechanisms.
    source_anchor_ids: [anchor-paper-38-controls, anchor-paper-38-lessons]

  - id: paper-38-requirements
    kind: requirement_group
    parent_id: paper-38
    order: 3
    epistemic_status: adopted_from_prior_analysis
    title: Hybrid-attestation security requirements
    summary: >-
      The paper uses exclusive key access, no key-derived leakage, code immutability, uninterruptible execution, and controlled invocation as the minimal properties; it argues secure reset is unnecessary when atomic invocation is enforced.
    source_anchor_ids: [anchor-paper-38-properties]

  - id: paper-38-sel4
    kind: verified_component
    parent_id: paper-38
    order: 4
    epistemic_status: externally_machine_checked
    title: seL4 guarantee base
    summary: >-
      The seL4 refinement proof and access-control work establish functional correctness, authority confinement, integrity, and confidentiality for the microkernel and a correctly specified capability configuration.
    source_anchor_ids: [anchor-paper-38-sel4]

  - id: paper-38-assumption-proof
    kind: assumption
    parent_id: paper-38-sel4
    order: 1
    epistemic_status: outside_proof
    title: Initialization and hardware assumptions
    summary: >-
      The inherited proof assumes the kernel is loaded correctly into a consistent state and the processor behaves correctly. HYDRA uses hardware secure boot for the first premise; no commercially available formally verified processor closes the second premise.
    source_anchor_ids: [anchor-paper-38-lessons]

  - id: paper-38-design
    kind: system
    parent_id: paper-38
    order: 5
    epistemic_status: specified_and_implemented
    title: HYDRA capability architecture
    summary: >-
      The attestation process is the initial and highest-priority user process, with exclusive access to its executable and embedded K, its thread-control block, and its virtual address space; it spawns lower-priority applications with non-conflicting capabilities.
    source_anchor_ids: [anchor-paper-38-controls, anchor-paper-38-protocol]

  - id: paper-38-protocol
    kind: protocol
    parent_id: paper-38
    order: 6
    epistemic_status: specified_and_implemented
    title: Boot-to-attestation sequence
    summary: >-
      ROM verifies seL4, seL4 authenticates and starts the protected process, and that process rejects stale or unauthenticated requests before MACing a named memory interval of a target process and returning the checksum.
    source_anchor_ids: [anchor-paper-38-protocol]

  - id: paper-38-protocol-freshness
    kind: protocol
    parent_id: paper-38-protocol
    order: 1
    epistemic_status: workaround
    title: Persisted pseudo-timestamp
    summary: >-
      Lacking a seL4 real-time-clock driver, the prototype loads a timestamp saved before reboot, validates the first new request's larger timestamp, starts a counter, and periodically persists their combination for later restarts.
    source_anchor_ids: [anchor-paper-38-lessons]

  - id: paper-38-lessons
    kind: contribution_group
    parent_id: paper-38
    order: 7
    epistemic_status: experience_report
    title: Engineering lessons
    summary: >-
      The paper records decisions and unresolved platform dependencies that are easy to hide when a verified component is described as if it verified an entire system.
    source_anchor_ids: [anchor-paper-38-lessons]

  - id: paper-38-lesson-design
    kind: contribution
    parent_id: paper-38-lessons
    order: 1
    epistemic_status: experience_based
    title: Choose hybrid MAC attestation deliberately
    summary: >-
      Software-only timing attestation depends on disputed optimal-checksum assumptions and complete hardware attestation is not easily emulated; a challenge-response MAC fits the hybrid model, with Speck and BLAKE2S performing best among the tested software implementations.
    source_anchor_ids: [anchor-paper-38-lessons, anchor-paper-38-evaluation]

  - id: paper-38-lesson-properties
    kind: contribution
    parent_id: paper-38-lessons
    order: 2
    epistemic_status: experience_based
    title: Verified isolation does not eliminate all hardware
    summary: >-
      seL4 emulates most access-control properties previously supplied by processor logic, while immutable storage and authenticated boot are still required to ensure the intended kernel and attestation code start first.
    source_anchor_ids: [anchor-paper-38-controls, anchor-paper-38-lessons]

  - id: paper-38-lesson-platform
    kind: contribution
    parent_id: paper-38-lessons
    order: 3
    epistemic_status: experience_based
    title: Board capabilities constrain assurance
    summary: >-
      A usable prototype needs configurable secure-boot ROM and drivers for security-critical devices. Sabre Lite's High Assurance Boot can authenticate a signed image, but the absent clock driver forced a weaker timestamp workaround.
    source_anchor_ids: [anchor-paper-38-lessons]

  - id: paper-38-claims
    kind: claim_group
    parent_id: paper-38
    order: 8
    epistemic_status: source_asserted
    title: Main claims
    summary: >-
      The source reports an implemented hybrid design, conditional enforcement of the adopted RA properties, and platform-scale feasibility; its compressed format refers readers to the full HYDRA paper for a broader threat and security analysis.
    source_anchor_ids: [anchor-paper-38-controls, anchor-paper-38-evaluation, anchor-paper-38-lineage]

  - id: paper-38-claim-security
    kind: claim
    parent_id: paper-38-claims
    order: 1
    epistemic_status: configuration_argument
    title: Capability realization of RA properties
    summary: >-
      Exclusive executable/key, TCB, and VSpace capabilities plus highest scheduling priority are argued to realize key secrecy, no leaks, immutability at runtime, uninterruptibility, and controlled invocation, conditional on correct secure boot and code.
    source_anchor_ids: [anchor-paper-38-controls]

  - id: paper-38-claim-performance
    kind: claim
    parent_id: paper-38-claims
    order: 2
    epistemic_status: measured
    title: Sabre Lite feasibility
    summary: >-
      The paper reports under 500 milliseconds for a 10 MB region with Speck, at least a one-third speed advantage for Speck and BLAKE2S over other tested MACs, and approximately linear runtime in memory size and process count.
    source_anchor_ids: [anchor-paper-38-evaluation]

  - id: paper-38-evidence
    kind: evidence_group
    parent_id: paper-38
    order: 9
    epistemic_status: compressed_mixed_evidence
    title: Evidence
    summary: >-
      Evidence consists of inherited seL4 proof results, an explicit property-to-capability mapping, the boot and protocol design, a commodity Sabre Lite implementation, and microbenchmarks decomposed into request verification, memory mapping, and MAC work.
    source_anchor_ids: [anchor-paper-38-sel4, anchor-paper-38-controls, anchor-paper-38-protocol, anchor-paper-38-evaluation]

  - id: paper-38-evidence-runtime
    kind: evidence
    parent_id: paper-38-evidence
    order: 1
    epistemic_status: reported_experiment
    title: Runtime composition
    summary: >-
      MacMem consumes about 84 percent of time for a 1 MB region and about 90 percent for 10 KB in this version; request verification and memory mapping together remain below 20 percent.
    source_anchor_ids: [anchor-paper-38-evaluation]

  - id: paper-38-boundaries
    kind: limitation_group
    parent_id: paper-38
    order: 10
    epistemic_status: material
    title: Assurance boundaries
    summary: >-
      seL4's proof covers the kernel, not the processor, boot ROM, board initialization, attestation code, cryptographic implementation, timestamp persistence, drivers, or the full composition. The paper also does not reproduce a complete adversarial model or end-to-end proof in four pages.
    source_anchor_ids: [anchor-paper-38-lessons, anchor-paper-38-lineage]

  - id: paper-38-boundary-version
    kind: limitation
    parent_id: paper-38-boundaries
    order: 1
    epistemic_status: companion_version
    title: Short companion, not the full HYDRA paper
    summary: >-
      This DSN-W article reports under 500 milliseconds and emphasizes lessons; the longer WiSec/arXiv version maps more assumptions, two platforms, and an expanded evaluation, including a later sub-250-millisecond Sabre Lite result. The records should not be conflated.
    source_anchor_ids: [anchor-paper-38-evaluation, anchor-paper-38-lineage]

  - id: paper-38-artifacts
    kind: artifact_group
    parent_id: paper-38
    order: 11
    epistemic_status: partial
    title: Artifacts and reproducibility
    summary: >-
      The author-uploaded paper, official DOI, public full HYDRA version, and public presentation material expose the design. No publication-specific code, exact build image, benchmark scripts, or raw measurements were located.
    source_anchor_ids: [anchor-paper-38-problem, anchor-paper-38-lineage]

  - id: paper-38-scrutiny
    kind: scrutiny
    parent_id: paper-38
    order: 12
    epistemic_status: workshop_reviewed
    title: External scrutiny
    summary: >-
      The work appeared in the DSN Workshops/industry-track proceedings and cites the separately reviewed full WiSec paper. Public reviews, an independent end-to-end proof audit, and a reproduction were not located.
    source_anchor_ids: [anchor-paper-38-publication, anchor-paper-38-lineage]

