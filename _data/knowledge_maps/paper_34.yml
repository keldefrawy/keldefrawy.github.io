editorial_summary: "The paper designs and implements PiSCES, a cloud-storage system that periodically refreshes secret shares so data can stay confidential even if an attacker compromises different servers over time. Its evaluation shows that proactive protection can scale beyond tiny cryptographic keys to larger files and tens of commodity cloud servers at practical cost."

research_question: "Can proactive secret sharing protect substantial cloud-stored data against a mobile attacker at a practical systems scale?"
central_answer: "The paper reports PiSCES, which periodically refreshes shares across cloud servers and evaluates the approach on larger files and tens of commodity servers."

