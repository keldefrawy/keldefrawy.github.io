nodes:
  - id: paper-34
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Proactively Secure Cloud-Enabled Storage"
    summary: >-
      A theory-to-system feasibility study that turns packed proactive secret sharing into PiSCES, a cloud file-storage prototype whose shares, servers, and keys are periodically refreshed to limit what a mobile attacker can accumulate over time.
    source_anchor_ids: [anchor-paper-34-problem]

  - id: paper-34-question
    kind: question
    parent_id: paper-34
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can proactive security be scaled from small keys and fewer than ten parties to larger files and tens of commodity cloud servers at tolerable refresh time and monetary cost?
    source_anchor_ids: [anchor-paper-34-problem, anchor-paper-34-pss]

  - id: paper-34-answer
    kind: contribution
    parent_id: paper-34
    order: 2
    epistemic_status: source_asserted
    title: PiSCES feasibility result
    summary: >-
      The paper designs and prototypes a proactively secure storage service parameterized by an underlying PSS scheme and reports that packed shares, constant-amortized refresh, reboot orchestration, and deployment-specific tuning make larger-file operation feasible.
    source_anchor_ids: [anchor-paper-34-problem, anchor-paper-34-design, anchor-paper-34-lessons]

  - id: paper-34-scope
    kind: scope
    parent_id: paper-34
    order: 3
    epistemic_status: explicitly_scoped
    title: Confidentiality-focused proactive model
    summary: >-
      Time is divided into rounds. Between rounds, old shares are rerandomized and removed so compromises collected in different periods cannot be combined; the represented goal is long-term data confidentiality rather than a general cloud integrity or availability service.
    source_anchor_ids: [anchor-paper-34-problem, anchor-paper-34-adversary]

  - id: paper-34-threat
    kind: threat_model
    parent_id: paper-34-scope
    order: 1
    epistemic_status: defined
    title: Passive mobile compromise adversary
    summary: >-
      The honest-but-curious outside adversary may compromise different servers over time and eventually visit all of them, but fewer than one third in any round. It cannot globally monitor traffic, delay traffic it did not send, create servers, corrupt multiple hypervisors, break the Internet, or orchestrate system-wide denial of service.
    source_anchor_ids: [anchor-paper-34-adversary]

  - id: paper-34-assumption-pss
    kind: assumption
    parent_id: paper-34-scope
    order: 2
    epistemic_status: inherited_security_assumption
    title: Underlying packed PSS guarantee
    summary: >-
      The implementation instantiates a perfectly secure packed PSS scheme with constant amortized communication per share. Its privacy and robustness parameter constraints include l + t at most d and 3t + l less than n.
    source_anchor_ids: [anchor-paper-34-pss]

  - id: paper-34-assumption-platform
    kind: assumption
    parent_id: paper-34-scope
    order: 3
    epistemic_status: assumed
    title: Trusted lifecycle mechanisms
    summary: >-
      Security relies on read-only pristine images, authenticated fresh keys, controlled VM creation, scheduled reboot, bounded network delay, and secure disassociation that prevents a restarted VM from accessing storage and RAM associated with earlier rounds.
    source_anchor_ids: [anchor-paper-34-reboot, anchor-paper-34-network-storage]

  - id: paper-34-design
    kind: system
    parent_id: paper-34
    order: 4
    epistemic_status: specified_and_implemented
    title: PiSCES architecture
    summary: >-
      A client shares files among n storage hosts; hosts keep inactive shares in secondary storage, periodically load batches into memory, execute recovery and refresh, and write new shares back. The client may disconnect between upload and reconstruction.
    source_anchor_ids: [anchor-paper-34-design, anchor-paper-34-network-storage]

  - id: paper-34-design-deployments
    kind: method
    parent_id: paper-34-design
    order: 1
    epistemic_status: proposed
    title: Three deployment patterns
    summary: >-
      The design covers a single cloud provider, multiple providers, and a hybrid of local enterprise infrastructure with remote providers. Only the single-provider arrangement is the reported prototype deployment.
    source_anchor_ids: [anchor-paper-34-problem, anchor-paper-34-evaluation]

  - id: paper-34-protocol-lifecycle
    kind: protocol
    parent_id: paper-34-design
    order: 2
    epistemic_status: specified
    title: Proactive server lifecycle
    summary: >-
      The hypervisor creates hosts from a read-only image, allocates shares, shuts down and reclaims resources, initializes a replacement with fresh authenticated keys, and lets peers recover and rerandomize its shares according to a predetermined rotation schedule.
    source_anchor_ids: [anchor-paper-34-design, anchor-paper-34-reboot]

  - id: paper-34-protocol-keying
    kind: protocol
    parent_id: paper-34-design
    order: 3
    epistemic_status: specified_with_alternatives
    title: Epoch key secrecy
    summary: >-
      The prototype assumes TPM-backed or hypervisor-installed fresh keying material so a key learned in period i cannot forge or decrypt period-j traffic. The paper also discusses pre-uploaded signed key pairs as a way to reduce hypervisor computation.
    source_anchor_ids: [anchor-paper-34-pss, anchor-paper-34-reboot]

  - id: paper-34-claims
    kind: claim_group
    parent_id: paper-34
    order: 5
    epistemic_status: source_asserted
    title: Main claims
    summary: >-
      The paper combines inherited PSS confidentiality with systems assumptions and empirical feasibility evidence. The cryptographic, architectural, and measured claims have different support and should not be collapsed into one guarantee.
    source_anchor_ids: [anchor-paper-34-security, anchor-paper-34-evaluation]

  - id: paper-34-claim-confidentiality
    kind: claim
    parent_id: paper-34-claims
    order: 1
    epistemic_status: conditional_on_model
    title: Long-term confidentiality against mobile compromise
    summary: >-
      If fewer than the tolerated servers are exposed within any refresh period and old state, keys, and adversarial presence are removed at the boundary, observations from different periods do not combine to reveal the protected file.
    source_anchor_ids: [anchor-paper-34-adversary, anchor-paper-34-pss, anchor-paper-34-security]

  - id: paper-34-claim-scale
    kind: claim
    parent_id: paper-34-claims
    order: 2
    epistemic_status: implemented_and_measured
    title: Larger-file and tens-of-host feasibility
    summary: >-
      The prototype exercises files beyond cryptographic-key sizes and configurations up to 30 servers, including a t = 9 threshold point, showing that the selected PSS can operate at a scale not previously exercised by the cited PSS implementations.
    source_anchor_ids: [anchor-paper-34-pss, anchor-paper-34-evaluation]

  - id: paper-34-claim-cost
    kind: claim
    parent_id: paper-34-claims
    order: 3
    epistemic_status: reported_measurement
    title: Deployment-specific cost feasibility
    summary: >-
      The lessons-learned section reports, for one tuned configuration, storage of a 10-kilobyte object at approximately 0.08 cents per kilobyte per refresh; it does not claim that this price generalizes across clouds, dates, objects, or assurance settings.
    source_anchor_ids: [anchor-paper-34-lessons]

  - id: paper-34-evidence
    kind: evidence_group
    parent_id: paper-34
    order: 6
    epistemic_status: mixed_analytical_and_empirical
    title: Evidence
    summary: >-
      Evidence includes the inherited packed-PSS conditions, an architectural security analysis, an implemented multi-host prototype, an automated EC2 benchmarking driver, and parameter sweeps over security, file, restart, packing, threading, and field-size choices.
    source_anchor_ids: [anchor-paper-34-pss, anchor-paper-34-security, anchor-paper-34-implementation, anchor-paper-34-evaluation]

  - id: paper-34-evidence-testbed
    kind: evidence
    parent_id: paper-34-evidence
    order: 1
    epistemic_status: reported_experiment
    title: Amazon EC2 testbed
    summary: >-
      The experiments use dedicated EC2 Small, Medium, and Large instances and an outside driver that creates deployments and initiates measurements. Dedicated hosts reduce interference but differ from the lower-priced instances anticipated for practical operation.
    source_anchor_ids: [anchor-paper-34-evaluation]

  - id: paper-34-evidence-parameters
    kind: evidence
    parent_id: paper-34-evidence
    order: 2
    epistemic_status: systematic_parameter_study
    title: Parameter exploration
    summary: >-
      The study varies n, tolerated corruptions t, file size s, simultaneous restarts r, packing l, concurrent refreshed shares b, and field size g. It identifies t and refresh interval as especially consequential and reports n = 21, t = 4, l = 6, r = 3, g = 1024 as its best tested selection.
    source_anchor_ids: [anchor-paper-34-evaluation, anchor-paper-34-lessons]

  - id: paper-34-evidence-security
    kind: evidence
    parent_id: paper-34-evidence
    order: 3
    epistemic_status: architectural_argument
    title: Security analysis boundary
    summary: >-
      The paper reasons about hypervisor compromise, secure broadcast, reboot authentication, and stale-state isolation, but the represented source does not supply a composable end-to-end proof that the concrete cloud implementation realizes the ideal PSS model.
    source_anchor_ids: [anchor-paper-34-security]

  - id: paper-34-boundaries
    kind: limitation_group
    parent_id: paper-34
    order: 7
    epistemic_status: material
    title: Limitations and operational assumptions
    summary: >-
      PiSCES trades long-term confidentiality for periodic computation, many hosts, synchronized recovery windows, key and image trust, and provider-dependent state isolation. Parameter selection is non-obvious, and more hosts can improve threshold efficiency while increasing fleet complexity and idle cost.
    source_anchor_ids: [anchor-paper-34-reboot, anchor-paper-34-network-storage, anchor-paper-34-lessons]

  - id: paper-34-boundary-passive
    kind: limitation
    parent_id: paper-34-boundaries
    order: 1
    epistemic_status: explicitly_out_of_scope
    title: Passive-adversary and availability boundary
    summary: >-
      The core evaluation does not establish Byzantine robustness against arbitrary active deviations, multi-hypervisor compromise, global traffic observation, Internet failure, or denial of service. Manual recovery may be required after some assumed-away platform failures.
    source_anchor_ids: [anchor-paper-34-adversary, anchor-paper-34-security]

  - id: paper-34-boundary-deletion
    kind: limitation
    parent_id: paper-34-boundaries
    order: 2
    epistemic_status: weakened_requirement
    title: Disassociation is not assured deletion
    summary: >-
      Because commercial clouds did not provide guaranteed erasure, the design substitutes probabilistic or architectural disassociation: a new VM must not regain physical access to the prior round's RAM or disk. This is a key assumption, not a measured deletion guarantee.
    source_anchor_ids: [anchor-paper-34-network-storage]

  - id: paper-34-artifacts
    kind: artifact_group
    parent_id: paper-34
    order: 8
    epistemic_status: paper_described
    title: Artifacts and reproducibility
    summary: >-
      The paper describes an implementation and automated AWS benchmark, but this audit located no public code repository, deployment scripts, raw measurements, machine images, or preserved cloud-price snapshot associated with the publication.
    source_anchor_ids: [anchor-paper-34-implementation, anchor-paper-34-evaluation]

  - id: paper-34-scrutiny
    kind: scrutiny
    parent_id: paper-34
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The paper appeared at IEEE ICDCS. The official record establishes venue review, but public reports, rebuttal, independent deployment, reproduction, and correction history were not located in this audit.
    source_anchor_ids: [anchor-paper-34-publication]

