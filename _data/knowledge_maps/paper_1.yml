nodes:
  - id: paper-1
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Predictive multi-frame OFDMA allocation"
    summary: "An OFDMA scheduling algorithm that uses future channel predictions to allocate subcarriers jointly across several frames, evaluated in an IEEE 802.16 fixed-wireless simulation."
    source_anchor_ids: [anchor-paper-1-problem, anchor-paper-1-publication]

  - id: paper-1-question
    kind: question
    parent_id: paper-1
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Does looking L frames ahead expose time-frequency opportunities that repeated one-frame allocation misses, while still meeting per-user rate constraints?"
    source_anchor_ids: [anchor-paper-1-problem]

  - id: paper-1-answer
    kind: contribution
    parent_id: paper-1
    order: 2
    epistemic_status: source_asserted
    title: "Central answer"
    summary: "Treat predicted subcarrier states over L frames as an enlarged L-by-N allocation domain, then schedule against that horizon rather than committing one frame at a time."
    source_anchor_ids: [anchor-paper-1-allocation, anchor-paper-1-conclusion]

  - id: paper-1-scope
    kind: scope
    parent_id: paper-1
    order: 3
    epistemic_status: explicitly_scoped
    title: "System model and assumptions"
    summary: "The evaluated setting is a fixed IEEE 802.16 downlink with K users, N orthogonal subcarriers, minimum average rates, adaptive QAM, pilot observations, and channels slow enough to predict multiple frames ahead."
    source_anchor_ids: [anchor-paper-1-system-model, anchor-paper-1-prediction]

  - id: paper-1-scope-allocation
    kind: definition
    parent_id: paper-1-scope
    order: 1
    epistemic_status: defined
    title: "Allocation variables and constraints"
    summary: "Binary assignment variables allocate each subcarrier in each scheduled frame to at most one user; the objective maximizes assigned bits while aggregate L-frame rates must meet each user's requirement."
    source_anchor_ids: [anchor-paper-1-system-model]

  - id: paper-1-scope-independence
    kind: assumption
    parent_id: paper-1-scope
    order: 2
    epistemic_status: assumed
    title: "Time-frequency independence simplification"
    summary: "The formulation treats user/subcarrier states across frames as independent so the L-frame problem can be viewed as increasing the number of allocable subcarriers from N to L times N; the paper notes that correlation could instead be used to reduce complexity."
    source_anchor_ids: [anchor-paper-1-system-model]

  - id: paper-1-method
    kind: method
    parent_id: paper-1
    order: 4
    epistemic_status: algorithmically_specified
    title: "Prediction-and-allocation pipeline"
    summary: "Pilot-derived channel estimates feed per-subcarrier Wiener predictors; predicted states then drive the constrained multi-frame allocator."
    source_anchor_ids: [anchor-paper-1-allocation, anchor-paper-1-prediction]

  - id: paper-1-method-prediction
    kind: component
    parent_id: paper-1-method
    order: 1
    epistemic_status: specified
    title: "Channel predictor"
    summary: "A frequency-domain one-dimensional Wiener filter predicts future channel responses from p prior noisy pilot estimates; prediction may run at the base station or be distributed to subscriber stations."
    source_anchor_ids: [anchor-paper-1-prediction]

  - id: paper-1-method-allocation
    kind: component
    parent_id: paper-1-method
    order: 2
    epistemic_status: heuristic
    title: "Constrained allocation"
    summary: "The instantiated allocator starts from an unconstrained throughput-maximizing assignment and adjusts allocations until user rate constraints are met; a comparison variant modifies the allocation to account for fairness."
    source_anchor_ids: [anchor-paper-1-allocation]

  - id: paper-1-claims
    kind: claim_group
    parent_id: paper-1
    order: 5
    epistemic_status: experimentally_evaluated
    title: "Principal claims"
    summary: "The paper's main support is simulation evidence, not an optimality theorem or a deployed implementation."
    source_anchor_ids: [anchor-paper-1-results]

  - id: paper-1-claim-rate
    kind: claim
    parent_id: paper-1-claims
    order: 1
    epistemic_status: experimentally_supported
    title: "More users meet target rates"
    summary: "In the reported 32-subcarrier experiments, ten-frame predictive allocation satisfies more users than repeated single-frame allocation, including when users outnumber subcarriers."
    source_anchor_ids: [anchor-paper-1-results]

  - id: paper-1-claim-fairness
    kind: claim
    parent_id: paper-1-claims
    order: 2
    epistemic_status: experimentally_supported
    title: "Improved rate distribution"
    summary: "For the illustrated 8-subcarrier, 32-user case, single-frame allocation over-serves early users while under-serving others; the multi-frame scheme is reported to achieve a better balance between meeting targets and distributing rate."
    source_anchor_ids: [anchor-paper-1-results]

  - id: paper-1-evidence
    kind: evidence_group
    parent_id: paper-1
    order: 6
    epistemic_status: simulation_only
    title: "Evidence"
    summary: "Four simulated variants compare one-frame and ten-frame horizons, each with the base allocator or fairness modification."
    source_anchor_ids: [anchor-paper-1-simulation, anchor-paper-1-results]

  - id: paper-1-evidence-setup
    kind: evidence
    parent_id: paper-1-evidence
    order: 1
    epistemic_status: documented
    title: "Simulation configuration"
    summary: "The reported setup uses the SUI-5 fixed-wireless channel, ten predicted frames, a 50-tap predictor, QPSK/16-QAM/64-QAM, 20 dB average SNR, BER 10^-6, and equal user targets set to 80% of an idealized maximum-rate share."
    source_anchor_ids: [anchor-paper-1-simulation]

  - id: paper-1-boundaries
    kind: limitation_group
    parent_id: paper-1
    order: 7
    epistemic_status: material
    title: "Boundaries and limitations"
    summary: "The results are conditional on predictable fixed-wireless channels and the chosen simulated allocator and traffic assumptions."
    source_anchor_ids: [anchor-paper-1-prediction, anchor-paper-1-simulation]

  - id: paper-1-boundary-prediction
    kind: limitation
    parent_id: paper-1-boundaries
    order: 1
    epistemic_status: explicitly_limited
    title: "Prediction horizon"
    summary: "L is bounded by frame duration, Doppler behavior, and filter accuracy; prediction error or faster mobility can erase the look-ahead advantage."
    source_anchor_ids: [anchor-paper-1-prediction]

  - id: paper-1-boundary-validation
    kind: limitation
    parent_id: paper-1-boundaries
    order: 2
    epistemic_status: not_evaluated
    title: "No deployment or robustness study"
    summary: "The paper reports simulation rather than a hardware or network implementation and does not establish robustness across other channel models, predictors, schedulers, workloads, or prediction-error regimes."
    source_anchor_ids: [anchor-paper-1-simulation, anchor-paper-1-conclusion]

  - id: paper-1-artifacts
    kind: artifact
    parent_id: paper-1
    order: 8
    epistemic_status: paper_available_no_reproduction_package
    title: "Artifacts"
    summary: "A public author-uploaded paper and official DOI record are linked; no code, simulator configuration, raw data, or reproduction package was located in this audit."
    source_anchor_ids: [anchor-paper-1-publication, anchor-paper-1-problem]

  - id: paper-1-scrutiny
    kind: scrutiny
    parent_id: paper-1
    order: 9
    epistemic_status: peer_reviewed
    title: "Scrutiny and lineage"
    summary: "The work appeared at ICCES 2006 and adapts an existing subcarrier allocator by adding a predicted time horizon; no independent reproduction, correction, or adversarial follow-up was located in this audit."
    source_anchor_ids: [anchor-paper-1-publication, anchor-paper-1-allocation]

