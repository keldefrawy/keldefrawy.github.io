nodes:
  - id: paper-61
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Communication-Efficient Proactive MPC for Dynamic Groups with Dishonest Majorities"
    summary: >-
      A formal batched proactive MPC protocol for arithmetic circuits, dynamic groups, mobile mixed adversaries, and dishonest-majority thresholds.
    source_anchor_ids: [anchor-paper-61-problem]

  - id: paper-61-question
    kind: question
    parent_id: paper-61
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can the efficient dynamic dishonest-majority PSS of paper #52 be extended to multiplication and full circuit evaluation without returning to quartic communication?
    source_anchor_ids: [anchor-paper-61-problem]

  - id: paper-61-answer
    kind: contribution
    parent_id: paper-61
    order: 2
    epistemic_status: theorem_supported
    title: Central answer
    summary: >-
      Add a multi-dealer Share, local Add, batched Permute, and a new verified bivariate multiplication pipeline to the existing refresh, recover, redistribute, and reconstruct protocols.
    source_anchor_ids: [anchor-paper-61-share, anchor-paper-61-pmpc, anchor-paper-61-multiplication]

  - id: paper-61-scope
    kind: threat_model
    parent_id: paper-61
    order: 3
    epistemic_status: defined
    title: Mobile mixed adversary
    summary: >-
      A computationally bounded adversary adaptively chooses passive and active corruptions between predefined refresh phases and may eventually visit every party, while the within-phase multi-threshold remains satisfied.
    source_anchor_ids: [anchor-paper-61-model]

  - id: paper-61-scope-network
    kind: assumption
    parent_id: paper-61-scope
    order: 1
    epistemic_status: assumed
    title: Network, reset, and cryptographic assumptions
    summary: >-
      Parties use synchronous pairwise secure channels and authenticated broadcast, reset parties return to a pristine state, old shares are not retained, and proofs rely on DDH-based homomorphic commitments plus Paillier and zero-knowledge multiplication components.
    source_anchor_ids: [anchor-paper-61-model, anchor-paper-61-multiplication]

  - id: paper-61-pmpc
    kind: protocol
    parent_id: paper-61
    order: 4
    epistemic_status: specified
    title: Layered dynamic PMPC
    summary: >-
      Inputs are batched and shared, then each arithmetic-circuit layer permutes operands, applies Add or Mult, redistributes shares for planned departures and arrivals, optionally refreshes, and finally reconstructs designated outputs.
    source_anchor_ids: [anchor-paper-61-pmpc]

  - id: paper-61-pmpc-maintenance
    kind: protocol
    parent_id: paper-61-pmpc
    order: 1
    epistemic_status: reused_and_adapted
    title: Proactive and dynamic maintenance
    summary: >-
      Refresh rerandomizes current batches, Recover restores reset parties, Redistribute changes membership, and gradual Reconstruct releases outputs fairly within a separate threshold region.
    source_anchor_ids: [anchor-paper-61-pmpc, anchor-paper-61-proofs]

  - id: paper-61-share
    kind: protocol
    parent_id: paper-61-pmpc
    order: 2
    epistemic_status: specified
    title: Multi-dealer batched Share
    summary: >-
      Multiple input owners first Shamir-share their values and the parties combine those univariate sharings into a common bivariate batch, removing the earlier requirement that every batched secret originate from one dealer.
    source_anchor_ids: [anchor-paper-61-share]

  - id: paper-61-mult
    kind: protocol
    parent_id: paper-61-pmpc
    order: 3
    epistemic_status: specified
    title: Bivariate batched multiplication
    summary: >-
      The protocol splits each batch into roughly square-root-sized univariate groups, creates bivariate zero masks, computes blinded cross-products with pairwise zero-knowledge multiplication, verifies random evaluations, and recombines product sharings.
    source_anchor_ids: [anchor-paper-61-overview, anchor-paper-61-multiplication]

  - id: paper-61-mult-verification
    kind: mechanism
    parent_id: paper-61-mult
    order: 1
    epistemic_status: cryptographically_checked
    title: Commitment and random-evaluation checks
    summary: >-
      Homomorphic commitments check local algebra, Paillier-based ZK-Mult protects pairwise products, and a jointly sampled random evaluation detects malformed bivariate commitments except with the theorem's bounded probability.
    source_anchor_ids: [anchor-paper-61-model, anchor-paper-61-multiplication, anchor-paper-61-proofs]

  - id: paper-61-claims
    kind: claim_group
    parent_id: paper-61
    order: 5
    epistemic_status: formally_analyzed
    title: Main guarantees
    summary: >-
      Theorems separately state multiplication security, full PMPC secrecy and correctness, conditional fairness, and amortized communication; the thresholds and ideal functionalities must be read together.
    source_anchor_ids: [anchor-paper-61-main-theorem, anchor-paper-61-mult-theorem]

  - id: paper-61-claim-efficiency
    kind: claim
    parent_id: paper-61-claims
    order: 1
    epistemic_status: asymptotic_theorem
    title: Quadratic amortized communication
    summary: >-
      For batches of size n minus 2, the complete PMPC reports O(n squared) amortized communication per secret; the new multiplication and permutation procedures report O(n times square root of n) amortized communication.
    source_anchor_ids: [anchor-paper-61-problem, anchor-paper-61-mult-theorem, anchor-paper-61-proofs]

  - id: paper-61-claim-security
    kind: claim
    parent_id: paper-61-claims
    order: 2
    epistemic_status: proved_under_model
    title: Dishonest-majority proactive security
    summary: >-
      Under DDH and the formal model, Theorem 1 gives a secrecy and correctness region with a square-root batch-size loss from n minus 3, plus a distinct mixed active/passive threshold for fair reconstruction.
    source_anchor_ids: [anchor-paper-61-main-theorem, anchor-paper-61-proofs]

  - id: paper-61-claim-mult
    kind: claim
    parent_id: paper-61-claims
    order: 3
    epistemic_status: proved_under_model
    title: No-precomputation multiplication
    summary: >-
      Theorem 2 realizes the multiplication ideal functionality for batches within the degree bound and a square-root-loss corruption threshold, without a preprocessing phase.
    source_anchor_ids: [anchor-paper-61-mult-theorem, anchor-paper-61-proofs]

  - id: paper-61-evidence
    kind: evidence_group
    parent_id: paper-61
    order: 6
    epistemic_status: proof_documented
    title: Formal evidence
    summary: >-
      The source contains detailed pseudocode, commitment checks, ideal functionalities, subprotocol simulators, permutation constructions, and an appendical composition argument. This map audits their presence, not every proof step independently.
    source_anchor_ids: [anchor-paper-61-multiplication, anchor-paper-61-proofs]

  - id: paper-61-boundaries
    kind: limitation_group
    parent_id: paper-61
    order: 7
    epistemic_status: material
    title: Boundaries
    summary: >-
      Membership changes are assumed planned before execution and occur between circuit layers; corruption sets change only during refresh; fairness holds only in its narrower region; the protocol assumes synchrony, secure channels, reset and erasure; and evidence is formal rather than implemented or benchmarked.
    source_anchor_ids: [anchor-paper-61-model, anchor-paper-61-pmpc, anchor-paper-61-boundaries]

  - id: paper-61-boundary-refresh
    kind: limitation
    parent_id: paper-61-boundaries
    order: 1
    epistemic_status: deployment_tradeoff
    title: Refresh frequency is a policy input
    summary: >-
      More frequent refresh permits the adversary less time within a corruption set but costs more communication; the protocol accepts a set of refresh layers rather than deriving an operational schedule.
    source_anchor_ids: [anchor-paper-61-pmpc, anchor-paper-61-boundaries]

  - id: paper-61-resources
    kind: artifact_group
    parent_id: paper-61
    order: 8
    epistemic_status: full_text_available
    title: Publication resources
    summary: >-
      The complete IACR ePrint exposes all proofs and the DOI fixes the ACNS identity. No public implementation artifact or local byte copy is represented in this map.
    source_anchor_ids: [anchor-paper-61-problem, anchor-paper-61-publication]

  - id: paper-61-scrutiny
    kind: scrutiny
    parent_id: paper-61
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The work appeared at ACNS 2022. Public reviews, independent proof checking, and reproductions are not linked.
    source_anchor_ids: [anchor-paper-61-publication]

  - id: paper-61-lineage
    kind: lineage
    parent_id: paper-61
    order: 10
    epistemic_status: documented
    title: Builds full PMPC on paper #52
    summary: >-
      The paper reuses the dynamic bivariate PSS from paper #52, adapts its proof to multi-dealer batches, and adds the missing arithmetic-circuit multiplication and permutation layers.
    source_anchor_ids: [anchor-paper-61-problem, anchor-paper-61-share, anchor-paper-61-multiplication]

