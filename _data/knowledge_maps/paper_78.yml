nodes:
  - id: paper-78
    kind: paper
    parent_id:
    order: 1
    epistemic_status: public_preprint_pending_author_audit
    title: "A compositional foundation for expiring security"
    summary: >-
      A 43-page theory preprint that models timed cryptographic security with fine-grained circuit depth, makes leakage explicit through residual complexity, proves composition rules with quantified degradation, and demonstrates the framework through timed auction protocols.
    source_anchor_ids: [anchor-paper-78-problem, anchor-paper-78-archive]

  - id: paper-78-question
    kind: question
    parent_id: paper-78
    order: 1
    epistemic_status: explicitly_stated
    title: "Research question"
    summary: >-
      How can a larger MPC protocol use time-lock primitives whose secrecy expires in feasible time without hiding leakage, giving the simulator unrealistic power, or assuming composition preserves an undegraded guarantee?
    source_anchor_ids: [anchor-paper-78-problem, anchor-paper-78-leakage-motivation]

  - id: paper-78-diagnosis
    kind: problem_analysis
    parent_id: paper-78
    order: 2
    epistemic_status: source_argued
    title: "Why conventional idealization is insufficient"
    summary: >-
      The paper argues that existing approaches lack composability, consistent analysis, or required functionality when algebraic time-lock solving is modeled as opaque or random-oracle-like at every step despite possible intermediate leakage.
    source_anchor_ids: [anchor-paper-78-problem, anchor-paper-78-leakage-motivation]

  - id: paper-78-framework
    kind: contribution
    parent_id: paper-78
    order: 3
    epistemic_status: formally_defined
    title: "Depth-bounded timed-cryptography framework"
    summary: >-
      The framework parameterizes adversary, simulator, and environment by polynomial circuit depth and represents a timed primitive's changing hardness rather than treating it as perfectly hidden until an instantaneous expiry.
    source_anchor_ids: [anchor-paper-78-residual, anchor-paper-78-depth-model, anchor-paper-78-depth-mpc]

  - id: paper-78-residual-complexity
    kind: definition
    parent_id: paper-78-framework
    order: 1
    epistemic_status: formally_defined
    title: "Residual complexity"
    summary: >-
      A puzzle has residual complexity (d, r) when every depth-d adversary guesses a random puzzle solution with probability at most r; the paper calls 1−r the remaining hardness and uses the curve across depths as a leakage profile.
    source_anchor_ids: [anchor-paper-78-residual]

  - id: paper-78-critical-time
    kind: definition
    parent_id: paper-78-framework
    order: 2
    epistemic_status: formally_defined_and_designer_parameterized
    title: "Critical time"
    summary: >-
      Given a designer-chosen unacceptable guessing threshold, the critical time is the first depth at which residual complexity crosses it. Timed privacy is claimed only before that point, which may conservatively precede honest completion.
    source_anchor_ids: [anchor-paper-78-residual]

  - id: paper-78-falsifiability
    kind: methodological_property
    parent_id: paper-78-framework
    order: 3
    epistemic_status: explicitly_argued
    title: "Falsifiable leakage assumptions"
    summary: >-
      Rather than asserting an opaque generic step, the framework's depth-indexed guessing bounds can in principle be falsified by a sampling and guessing algorithm that outperforms the assumed residual-complexity curve.
    source_anchor_ids: [anchor-paper-78-leakage-motivation, anchor-paper-78-residual]

  - id: paper-78-depth-machines
    kind: definition_group
    parent_id: paper-78-framework
    order: 4
    epistemic_status: formally_defined
    title: "Depth-bounded machines and indistinguishability"
    summary: >-
      The model bounds circuit depth while retaining polynomial size, extends this accounting to interactive circuits, and defines indistinguishability relative to a depth-bounded distinguisher.
    source_anchor_ids: [anchor-paper-78-depth-model]

  - id: paper-78-depth-mpc
    kind: security_definition
    parent_id: paper-78-framework
    order: 5
    epistemic_status: formally_defined
    title: "(d_a, d_s, d_e)-depth-secure MPC"
    summary: >-
      A protocol is depth-secure when a d_s-depth simulator makes real and ideal executions indistinguishable to every d_a-depth adversary and d_e-depth environment; the paper gives a concurrent UC-like model and a separate sequential model.
    source_anchor_ids: [anchor-paper-78-depth-mpc]

  - id: paper-78-simulator-budget
    kind: modeling_constraint
    parent_id: paper-78-depth-mpc
    order: 1
    epistemic_status: explicitly_justified
    title: "Simulator budget is security-critical"
    summary: >-
      Constraining simulator depth prevents a vacuous proof in which the simulator solves a time-lock puzzle to learn information unavailable to the real adversary; meaningful parameters require the simulation budget to remain below relevant adversary and environment depths.
    source_anchor_ids: [anchor-paper-78-depth-mpc, anchor-paper-78-sequential]

  - id: paper-78-temporary-privacy
    kind: security_property
    parent_id: paper-78-depth-mpc
    order: 2
    epistemic_status: formally_modeled
    title: "Temporary privacy with matched leakage"
    summary: >-
      Leaky ideal functionalities reveal information in phases so that a simulator learns no more than the adversary at the corresponding depth; outputs may become public after the timed protection has served its purpose.
    source_anchor_ids: [anchor-paper-78-temporary-privacy]

  - id: paper-78-composition
    kind: theorem_group
    parent_id: paper-78
    order: 4
    epistemic_status: formally_proved
    title: "Composition with explicit degradation"
    summary: >-
      The paper tracks how simulator work reduces the adversary depth covered by the result, increases the composite simulator budget, and limits the environment to the weaker component bound.
    source_anchor_ids: [anchor-paper-78-concurrent, anchor-paper-78-sequential]

  - id: paper-78-concurrent-theorem
    kind: theorem
    parent_id: paper-78-composition
    order: 1
    epistemic_status: proved
    title: "Concurrent composition (Theorem 3)"
    summary: >-
      If π is (d_a,d_s,d_e)-secure and ρ is (d'_a,d'_s,d'_e)-secure, their concurrent composition is (d_a−d'_s, d_s+d'_s, min(d_e,d'_e))-secure, under the theorem's meaningful-depth conditions.
    source_anchor_ids: [anchor-paper-78-concurrent]

  - id: paper-78-sequential-theorem
    kind: theorem
    parent_id: paper-78-composition
    order: 2
    epistemic_status: proved
    title: "Sequential composition (Theorem 4)"
    summary: >-
      When π invokes ρ sequentially, the general bound is (d_a−d'_s, d_s·d'_s, min(d_e,d'_e)); if the caller's simulator never rewinds across the invocation, Corollary 1 improves the simulator term to d_s+d'_s.
    source_anchor_ids: [anchor-paper-78-sequential]

  - id: paper-78-lockstep
    kind: corollary
    parent_id: paper-78-composition
    order: 3
    epistemic_status: proved_or_claimed_as_specified
    title: "Lockstep and serial structure"
    summary: >-
      Lockstep execution lets multiple subprotocol simulators run in parallel so degradation depends on the largest relevant simulator depth rather than summing all of them. For serially separated executions, the paper states that independent analyses need not degrade one another.
    source_anchor_ids: [anchor-paper-78-sequential, anchor-paper-78-arbitrary-poly]

  - id: paper-78-arbitrary-poly-boundary
    kind: boundary
    parent_id: paper-78-composition
    order: 4
    epistemic_status: explicitly_characterized
    title: "Boundary with standard arbitrary-polynomial MPC"
    summary: >-
      Depth-bounded protocols may use or run beside standard MPC through the stated composition bounds. The reverse direction has no general black-box theorem; it is supported in the special case where the timed subprotocol's inputs and outputs may all be revealed when it terminates.
    source_anchor_ids: [anchor-paper-78-arbitrary-poly]

  - id: paper-78-compiler
    kind: construction
    parent_id: paper-78
    order: 5
    epistemic_status: proposed_and_analyzed
    title: "One-random-oracle compiler for leaky algebraic puzzles"
    summary: >-
      Generate an algebraic puzzle Z with random solution r, mask the intended solution χ as γ=H(r) xor χ, and publish (Z,γ). Solving recovers r and then χ; only the final masking step uses the random oracle.
    source_anchor_ids: [anchor-paper-78-compiler]

  - id: paper-78-compiler-theorem
    kind: theorem
    parent_id: paper-78-compiler
    order: 1
    epistemic_status: proved
    title: "Compiler guarantee (Theorem 5)"
    summary: >-
      The compiled construction's critical time is no earlier than the last point at which the base algebraic solution still hides on the order of the security parameter in bits; the proof links this hidden information to negligible guessing probability.
    source_anchor_ids: [anchor-paper-78-compiler]

  - id: paper-78-equivocation
    kind: simulation_technique
    parent_id: paper-78-compiler
    order: 2
    epistemic_status: analyzed_in_random_oracle_model
    title: "Late equivocation"
    summary: >-
      A simulator can initially use a random puzzle solution and later program the random oracle so the puzzle opens to the required value. This requires a small timing advantage and guarantees privacy only until the critical time.
    source_anchor_ids: [anchor-paper-78-equivocation]

  - id: paper-78-auction-application
    kind: application
    parent_id: paper-78
    order: 6
    epistemic_status: formally_specified
    title: "Timed auction application"
    summary: >-
      The paper uses auctions to demonstrate how temporary privacy, non-malleability, simulator budgeting, and composition loss interact in a concrete multi-party protocol.
    source_anchor_ids: [anchor-paper-78-auction, anchor-paper-78-smra]

  - id: paper-78-single-auction
    kind: protocol
    parent_id: paper-78-auction-application
    order: 1
    epistemic_status: specified_and_proved_under_assumptions
    title: "Single-round single-item auction"
    summary: >-
      Each party unfair-broadcasts a time-lock puzzle containing its bid before t_bid, solves all timely puzzles in parallel by t_end, and outputs all bids and the maximum. Puzzle parameters require the critical time to follow the bid deadline.
    source_anchor_ids: [anchor-paper-78-auction]

  - id: paper-78-auction-security
    kind: theorem
    parent_id: paper-78-single-auction
    order: 1
    epistemic_status: proved_under_named_assumptions
    title: "Single-auction security (Theorem 6)"
    summary: >-
      Given an equivocable, non-malleable time-lock puzzle and a bounded unfair-broadcast simulator, the protocol realizes the auction functionality with adversary depth reduced by the broadcast-simulation cost and simulator depth covering puzzle generation plus equivocation.
    source_anchor_ids: [anchor-paper-78-auction, anchor-paper-78-appendices]

  - id: paper-78-nonmalleability
    kind: assumption
    parent_id: paper-78-single-auction
    order: 2
    epistemic_status: explicitly_required
    title: "Non-malleability blocks bid adaptation"
    summary: >-
      The proof requires a corrupt bidder not to transform honest parties' unsolved puzzles into related bid puzzles. Appendix F reduces indistinguishability of real and simulated executions to concurrent puzzle non-malleability, with a CCA-based alternative discussed.
    source_anchor_ids: [anchor-paper-78-auction, anchor-paper-78-appendices]

  - id: paper-78-smra
    kind: protocol
    parent_id: paper-78-auction-application
    order: 2
    epistemic_status: specified_and_composition_analyzed
    title: "Simultaneous multi-round auction"
    summary: >-
      A round runs one single-item auction per item in lockstep, and rounds are then composed serially. Because concurrent composition weakens the adversary-depth guarantee, the bid deadline and puzzle hardness must be retuned.
    source_anchor_ids: [anchor-paper-78-smra]

  - id: paper-78-smra-theorem
    kind: theorem
    parent_id: paper-78-smra
    order: 1
    epistemic_status: proved
    title: "SMRA security (Theorem 7)"
    summary: >-
      If the single-auction protocol is (d_a,d_s,d_e)-secure, one lockstep SMRA round is (d_a−d_s,2d_s,d_e)-secure; with appropriate parameterization and end-of-round revelation, the full serial SMRA implements its functionality in the arbitrary-polynomial regime.
    source_anchor_ids: [anchor-paper-78-smra]

  - id: paper-78-proof-evidence
    kind: formal_evidence
    parent_id: paper-78
    order: 7
    epistemic_status: human_written_proofs_present
    title: "Formal evidence"
    summary: >-
      The preprint contains formal definitions, theorem statements, reductions and simulation arguments, with deferred composition, residual-hardness, non-malleability, and auction proofs in the appendices. No proof is represented as machine checked.
    source_anchor_ids: [anchor-paper-78-concurrent, anchor-paper-78-sequential, anchor-paper-78-compiler, anchor-paper-78-appendices]

  - id: paper-78-empirical-evidence
    kind: evidence_boundary
    parent_id: paper-78
    order: 8
    epistemic_status: not_claimed
    title: "No empirical system evaluation"
    summary: >-
      The evidence is definitional and proof-based. The represented preprint does not provide an implementation, measured puzzle leakage curve, benchmark, deployment study, or machine-checked formalization.
    source_anchor_ids: [anchor-paper-78-problem, anchor-paper-78-appendices]

  - id: paper-78-limitations
    kind: limitation_group
    parent_id: paper-78
    order: 9
    epistemic_status: source_reported_and_audit_inferred
    title: "Technical boundaries"
    summary: >-
      Composition analysis is black-box and not proven tight; the critical time depends on a designer's hardness belief and threshold; the compiler uses the random-oracle model; auction security requires equivocation, non-malleability, unfair broadcast, parameter retuning, and eventual revelation of all bids.
    source_anchor_ids: [anchor-paper-78-residual, anchor-paper-78-sequential, anchor-paper-78-compiler, anchor-paper-78-auction, anchor-paper-78-smra]

  - id: paper-78-artifacts
    kind: artifact_group
    parent_id: paper-78
    order: 10
    epistemic_status: public_full_text_only
    title: "Artifacts"
    summary: >-
