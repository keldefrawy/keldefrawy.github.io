nodes:
  - id: paper-59
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: extended_version
    title: "F1: A Fast and Programmable Accelerator for Fully Homomorphic Encryption"
    summary: >-
      A synthesized programmable FHE accelerator and scheduling compiler evaluated by cycle-accurate simulation on complete encrypted workloads.
    source_anchor_ids: [anchor-paper-59-problem]

  - id: paper-59-question
    kind: question
    parent_id: paper-59
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can architecture and compiler co-design accelerate complete parameter-diverse FHE dataflow graphs while keeping their massive data movement manageable?
    source_anchor_ids: [anchor-paper-59-problem]

  - id: paper-59-answer
    kind: contribution
    parent_id: paper-59
    order: 2
    epistemic_status: simulated_and_synthesized
    title: Central answer
    summary: >-
      Specialize high-throughput vector units to FHE primitives, expose all data movement to a static compiler, and prioritize reuse through scratchpads and distributed register files rather than relying on a host for unsupported operations.
    source_anchor_ids: [anchor-paper-59-architecture, anchor-paper-59-compiler, anchor-paper-59-units]

  - id: paper-59-scope
    kind: scope
    parent_id: paper-59
    order: 3
    epistemic_status: explicitly_scoped
    title: FHE workload model
    summary: >-
      FHE programs are known-ahead-of-time dataflow DAGs over large encrypted vectors. F1 supports the common ciphertext operations needed by BGV, GSW, and CKKS; data-dependent branching is unavailable and B/FV is not directly supported by this design.
    source_anchor_ids: [anchor-paper-59-fhe-model, anchor-paper-59-boundaries]

  - id: paper-59-architecture-node
    kind: system
    parent_id: paper-59
    order: 4
    epistemic_status: rtl_implemented
    title: F1 architecture
    summary: >-
      Sixteen compute clusters combine NTT, automorphism, modular multiply and add units with local registers, a banked 64 MB scratchpad, three crossbar networks, and dual HBM2 interfaces.
    source_anchor_ids: [anchor-paper-59-architecture, anchor-paper-59-units, anchor-paper-59-rtl]

  - id: paper-59-architecture-vector
    kind: mechanism
    parent_id: paper-59-architecture-node
    order: 1
    epistemic_status: rtl_implemented
    title: FHE-specific wide-vector units
    summary: >-
      Dedicated four-step NTT and automorphism pipelines handle the structured permutations that do not map well to ordinary element-wise SIMD, while modular units provide high arithmetic throughput.
    source_anchor_ids: [anchor-paper-59-units]

  - id: paper-59-architecture-memory
    kind: mechanism
    parent_id: paper-59-architecture-node
    order: 2
    epistemic_status: rtl_implemented
    title: Data-movement-first hierarchy
    summary: >-
      Explicit register files and scratchpad storage, decoupled loads, and high-throughput interconnects are designed to reuse key-switch hints and ciphertexts and hide off-chip latency.
    source_anchor_ids: [anchor-paper-59-architecture, anchor-paper-59-analysis]

  - id: paper-59-compiler
    kind: algorithm
    parent_id: paper-59
    order: 5
    epistemic_status: implemented
    title: Static scheduling compiler
    summary: >-
      The compiler lowers homomorphic operations to primitive dataflows, chooses operation variants, assigns compute and storage, schedules transfers far ahead of use, and emits cycle-level instructions with fixed component latencies.
    source_anchor_ids: [anchor-paper-59-compiler]

  - id: paper-59-implementation
    kind: evidence_group
    parent_id: paper-59
    order: 6
    epistemic_status: rtl_synthesized
    title: Implementation evidence
    summary: >-
      Components are implemented in RTL and synthesized in a commercial 14/12 nm flow. The modeled 151.4 square millimeter design runs most logic at 1 GHz, double-pumps SRAM at 2 GHz, and has a reported 180.4 W thermal design power.
    source_anchor_ids: [anchor-paper-59-rtl]

  - id: paper-59-evaluation
    kind: evidence_group
    parent_id: paper-59
    order: 7
    epistemic_status: cycle_accurate_simulation
    title: Evaluation design
    summary: >-
      A cycle-accurate simulator and RTL-derived activity energies evaluate logistic regression, two LoLa networks with weight variants, encrypted database lookup, and BGV and CKKS bootstrapping against a four-core Xeon baseline; HEAX is used for operation-level comparison.
    source_anchor_ids: [anchor-paper-59-methodology]

  - id: paper-59-claim-speedup
    kind: claim
    parent_id: paper-59-evaluation
    order: 1
    epistemic_status: simulated_measurement
    title: 5,432-fold geometric-mean full-program speedup
    summary: >-
      Across seven workloads the reported speedups range from 1,195-fold to 17,412-fold over the CPU, with LoLa-CIFAR falling from about 20 minutes to 241 ms in the model.
    source_anchor_ids: [anchor-paper-59-performance]

  - id: paper-59-claim-prior-accelerator
    kind: claim
    parent_id: paper-59-evaluation
    order: 2
    epistemic_status: simulated_microbenchmark
    title: Operation-level speedups over HEAX extension
    summary: >-
      NTT, automorphism, homomorphic multiplication, and permutation microbenchmarks report roughly 172-fold to 1,866-fold speedups over an augmented HEAX design across selected parameter sets.
    source_anchor_ids: [anchor-paper-59-performance]

  - id: paper-59-evidence-analysis
    kind: evidence
    parent_id: paper-59-evaluation
    order: 3
    epistemic_status: sensitivity_study
    title: Data movement and ablation analysis
    summary: >-
      Traffic breakdowns show key-switch hints dominate high-depth workloads, while alternate low-throughput units and a generic capacity-aware scheduler substantially slow the design, supporting the paper's co-design rationale.
    source_anchor_ids: [anchor-paper-59-analysis]

  - id: paper-59-functional
    kind: artifact
    parent_id: paper-59
    order: 8
    epistemic_status: internal_simulator_described
    title: Functional simulator
    summary: >-
      A C++ simulator built on NTL checks FHE-level input-output behavior and produces dataflow graphs for supported parameter ranges, but its internal algorithms are not the same as the RTL functional units.
    source_anchor_ids: [anchor-paper-59-analysis]

  - id: paper-59-boundaries
    kind: limitation_group
    parent_id: paper-59
    order: 9
    epistemic_status: material
    title: Boundaries
    summary: >-
      Results come from RTL synthesis and cycle-accurate simulation, not fabricated silicon; the architecture assumes static branch-free FHE DAGs, omits direct B/FV support, compares to a particular CPU and augmented prior accelerator, and does not expose a reproduction artifact in this map.
    source_anchor_ids: [anchor-paper-59-fhe-model, anchor-paper-59-methodology, anchor-paper-59-boundaries]

  - id: paper-59-resources
    kind: artifact_group
    parent_id: paper-59
    order: 10
    epistemic_status: source_available
    title: Versioned paper resources
    summary: >-
      The complete extended version is checked in with fixity metadata. The DOI identifies the related, distinct MICRO conference version; this map does not treat the two author lists or texts as byte-identical.
    source_anchor_ids: [anchor-paper-59-problem, anchor-paper-59-publication]

  - id: paper-59-scrutiny
    kind: scrutiny
    parent_id: paper-59
    order: 11
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The related F1 paper appeared at MICRO 2021 and the extended manuscript exposes more detail. Review reports and independent hardware reproduction are not linked.
    source_anchor_ids: [anchor-paper-59-publication]

  - id: paper-59-lineage
    kind: lineage
    parent_id: paper-59
    order: 12
    epistemic_status: documented
    title: From kernel accelerators to complete programs
    summary: >-
      F1 positions itself against host-assisted accelerators for isolated FHE operations by supporting all operations of complete selected programs in one compiler-controlled architecture.
    source_anchor_ids: [anchor-paper-59-problem, anchor-paper-59-performance]

