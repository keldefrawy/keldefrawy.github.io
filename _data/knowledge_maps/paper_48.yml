editorial_summary: "SNUSE distributes biometric templates across re-enrollment servers and uses secure computation to refresh authentication material without storing a complete template at any one server. Its fingerprint and iris prototypes re-enroll thousands of users in seconds without materially reducing matching accuracy."

research_question: "Can biometric authentication material be refreshed for thousands of users without centralizing complete biometric templates or requiring users to enroll again?"
central_answer: "SNUSE reportedly distributes templates across servers and uses secure computation to refresh authentication material, with fingerprint and iris prototypes."

