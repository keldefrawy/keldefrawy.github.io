nodes:
  - id: paper-48
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_journal_article
    title: SNUSE journal paper
    summary: An expanded protocol, optimization, prototype, evaluation, and security treatment of large-scale non-interactive biometric re-enrollment.
    source_anchor_ids: [anchor-paper-48-problem]
  - id: paper-48-question
    kind: question
    parent_id: paper-48
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: How can an organization refresh many biometric-bound credentials while neither storing full templates centrally nor requiring every user to return?
    source_anchor_ids: [anchor-paper-48-problem]
  - id: paper-48-answer
    kind: contribution
    parent_id: paper-48
    order: 2
    epistemic_status: implemented
    title: Central answer
    summary: Store Shamir shares at re-enrollment servers, keep only helper data at the authentication server, and MPC-generate new fuzzy vaults from those shares.
    source_anchor_ids: [anchor-paper-48-architecture, anchor-paper-48-protocols]
  - id: paper-48-model-node
    kind: scope
    parent_id: paper-48
    order: 3
    epistemic_status: defined
    title: Deployment model
    summary: One trusted reader samples templates, one AS serves routine authentication, and configurable RESs remain offline except during enrollment/re-enrollment; secure channels are assumed.
    source_anchor_ids: [anchor-paper-48-architecture, anchor-paper-48-protocols]
  - id: paper-48-adversary
    kind: threat_model
    parent_id: paper-48
    order: 4
    epistemic_status: honest_but_curious
    title: Adversary and threshold
    summary: The implementation targets honest-but-curious parties. A (K,N) sharing threshold protects stored templates against fewer than K RES compromises, with stronger simultaneous-compromise caveats during computation.
    source_anchor_ids: [anchor-paper-48-model, anchor-paper-48-security]
  - id: paper-48-assumptions
    kind: assumption
    parent_id: paper-48
    order: 5
    epistemic_status: cryptographic_and_operational
    title: Required assumptions
    summary: Security depends on Shamir privacy, fuzzy-vault security, authenticated channels, trustworthy sampling, correct implementations, and enough non-colluding RESs.
    source_anchor_ids: [anchor-paper-48-model, anchor-paper-48-security]
  - id: paper-48-protocol-group
    kind: protocol_group
    parent_id: paper-48
    order: 6
    epistemic_status: specified_and_implemented
    title: Three-phase SNUSE protocol
    summary: Initial enrollment distributes template shares and creates helper data; routine authentication opens the vault locally; re-enrollment regenerates helper data without the user.
    source_anchor_ids: [anchor-paper-48-protocols]
  - id: paper-48-protocol-enroll
    kind: protocol
    parent_id: paper-48-protocol-group
    order: 1
    epistemic_status: implemented
    title: Initial enrollment
    summary: The reader samples and shares BT; RESs choose credential material and MPC-compute helper-data shares; AS reconstructs helper data, never BT.
    source_anchor_ids: [anchor-paper-48-protocols]
  - id: paper-48-protocol-auth
    kind: protocol
    parent_id: paper-48-protocol-group
    order: 2
    epistemic_status: implemented
    title: Routine authentication
    summary: A new biometric sample and stored helper data run fuzzy-vault opening at the reader; RESs are not online.
    source_anchor_ids: [anchor-paper-48-protocols]
  - id: paper-48-protocol-refresh
    kind: protocol
    parent_id: paper-48-protocol-group
    order: 3
    epistemic_status: implemented
    title: Non-interactive re-enrollment
    summary: RESs operate on their persistent shares to compute a vault for fresh credential material, then AS reconstructs the new helper data.
    source_anchor_ids: [anchor-paper-48-protocols]
  - id: paper-48-optimization
    kind: algorithm
    parent_id: paper-48
    order: 7
    epistemic_status: implemented_and_compared
    title: MPC multiplication optimization
    summary: Three strategies trade interactive multiplications against enrollment-time precomputation and share storage; precomputing template powers minimizes online rounds and enables fast bulk refresh.
    source_anchor_ids: [anchor-paper-48-mpc]
  - id: paper-48-implementation-node
    kind: implementation
    parent_id: paper-48
    order: 8
    epistemic_status: prototype
    title: Two-modality prototype
    summary: NTL over GF(2^24), TCP processes, NBIS fingerprint minutiae, OSIRIS iris codes, polynomial fuzzy vaults, and configurable RES counts implement the full lifecycle.
    source_anchor_ids: [anchor-paper-48-implementation]
  - id: paper-48-claims
    kind: claim_group
    parent_id: paper-48
    order: 9
    epistemic_status: mixed
    title: Principal claims
    summary: SNUSE protects backend template storage below threshold, keeps regular authentication simple, and makes server-side bulk credential refresh feasible without altering the base biometric matching decision.
    source_anchor_ids: [anchor-paper-48-security, anchor-paper-48-performance, anchor-paper-48-accuracy]
  - id: paper-48-claim-security
    kind: claim
    parent_id: paper-48-claims
    order: 1
    epistemic_status: conditional_security_argument
    title: Distributed biometric confidentiality
    summary: Compromising AS yields helper data but not BT under fuzzy-vault security; fewer than K RESs yield insufficient shares; the template remains unreconstructed during normal execution.
    source_anchor_ids: [anchor-paper-48-security]
  - id: paper-48-claim-scale
    kind: claim
    parent_id: paper-48-claims
    order: 2
    epistemic_status: experimentally_supported_and_extrapolated
    title: Large-scale refresh
    summary: The reported setup averages 13.2 ms for one re-enrollment and scales linearly; 100,000 users with nine RESs are projected under five minutes and one million under one hour.
    source_anchor_ids: [anchor-paper-48-performance]
  - id: paper-48-claim-accuracy
    kind: claim
    parent_id: paper-48-claims
    order: 3
    epistemic_status: dataset_supported
    title: Biometric matching behavior
    summary: The prototype reports over 90% GAR and under 5% FAR for selected parameters; accuracy comes from feature/vault choices, while SNUSE's re-enrollment uses the same helper-data semantics.
    source_anchor_ids: [anchor-paper-48-accuracy, anchor-paper-48-conclusion]
  - id: paper-48-evidence
    kind: evidence_group
    parent_id: paper-48
    order: 10
    epistemic_status: prototype_experiments_and_analysis
    title: Evidence stack
    summary: Detailed protocol algorithms, implementation parameters, three public biometric datasets, all-pairs GAR/FAR experiments, 100-run timings, scaling trials, storage calculations, and a dedicated security section support the paper.
    source_anchor_ids: [anchor-paper-48-protocols, anchor-paper-48-implementation, anchor-paper-48-accuracy, anchor-paper-48-performance, anchor-paper-48-security]
  - id: paper-48-boundaries
    kind: limitation_group
    parent_id: paper-48
    order: 11
    epistemic_status: explicit
    title: Security and scope limits
    summary: AS plus one RES compromised simultaneously during a run can expose that run's BT when k is visible; ordinary fuzzy vaults are cross-instance linkable; malicious/covert MPC, other modalities, and reusable FE/FV support remain future work.
    source_anchor_ids: [anchor-paper-48-security, anchor-paper-48-conclusion]
  - id: paper-48-artifacts
    kind: artifact_group
    parent_id: paper-48
    order: 12
    epistemic_status: partial
    title: Reproducibility resources
    summary: Full manuscript, algorithms, parameters, environment, and public dataset names are available. Version-pinned code, processed data, raw results, and independent reproduction were not located.
    source_anchor_ids: [anchor-paper-48-implementation, anchor-paper-48-performance]
  - id: paper-48-scrutiny
    kind: scrutiny
    parent_id: paper-48
    order: 13
    epistemic_status: journal_reviewed
    title: External scrutiny
    summary: FGCS journal publication provides external review exposure; reports, artifact evaluation, and independent replication are not represented.
    source_anchor_ids: [anchor-paper-48-publication]
  - id: paper-48-lineage
