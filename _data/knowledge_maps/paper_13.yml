    title: "One-way group distance bounding"
    summary: "A short paper defining group distance-bounding settings and introducing passive observation as a primitive for cheaper multi-party protocols."
    source_anchor_ids: [anchor-paper-13-question]

  - id: paper-13-question
    kind: question
    parent_id: paper-13
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can multiple verifiers and provers establish secure upper-distance bounds with fewer rapid exchanges than a complete pairwise deployment?"
    source_anchor_ids: [anchor-paper-13-question]

  - id: paper-13-answer
    kind: contribution
    parent_id: paper-13
    order: 2
    epistemic_status: analytically_supported
    title: "Central answer"
    summary: "Let some verifiers actively challenge while others passively observe timing; passive bounds can be derived geometrically and the active fraction controls a security-efficiency tradeoff."
    source_anchor_ids: [anchor-paper-13-passive, anchor-paper-13-protocol, anchor-paper-13-performance]

  - id: paper-13-scope
    kind: scope
    parent_id: paper-13
    order: 3
    epistemic_status: explicitly_scoped
    title: "One-way group settings"
    summary: "The construction addresses many-prover/many-verifier, one-prover/many-verifier, and many-prover/one-verifier one-way cases; mutual GDB is acknowledged but left outside this short paper."
    source_anchor_ids: [anchor-paper-13-model, anchor-paper-13-future]

  - id: paper-13-assumptions
    kind: assumption_group
    parent_id: paper-13-scope
    order: 1
    epistemic_status: assumed
    title: "Timing, geometry, and trust assumptions"
    summary: "Nodes are in mutual radio range, rapid processing is available, verifiers know their locations and pairwise distances, and passive verifiers can receive the three relevant transmissions."
    source_anchor_ids: [anchor-paper-13-model, anchor-paper-13-passive]

  - id: paper-13-adversary
    kind: threat_model
    parent_id: paper-13-scope
    order: 2
    epistemic_status: defined
    title: "Adversary and exclusions"
    summary: "Provers may collude and attempt distance or mafia fraud, but verifiers are trusted in the base argument; reception blocking, directional antennas, terrorist fraud, and distance hijacking beyond the assumed base protocol are excluded."
    source_anchor_ids: [anchor-paper-13-model, anchor-paper-13-security]

  - id: paper-13-primitive
    kind: primitive
    parent_id: paper-13
    order: 4
    epistemic_status: proposed
    title: "Passive distance bounding"
    summary: "A passive verifier timestamps the active verifier's commitment/challenge and the prover's response, then combines a time-difference-of-arrival hyperbola with the active distance bound to derive its own upper bound."
    source_anchor_ids: [anchor-paper-13-passive]

  - id: paper-13-primitive-security
    kind: security_argument
    parent_id: paper-13-primitive
    order: 1
    epistemic_status: conditional_argument
    title: "Why a prover cannot shorten only the passive bound"
    summary: "Under the timing geometry, making the passive verifier infer an impossibly short distance would also require defeating the active verifier's underlying distance-bound exchange."
    source_anchor_ids: [anchor-paper-13-passive]

  - id: paper-13-protocol
    kind: protocol
    parent_id: paper-13
    order: 5
    epistemic_status: proposed
    title: "Active/passive GDB protocol"
    summary: "A selected fraction of verifiers runs active pairwise exchanges while remaining verifiers observe them, permitting each active exchange to contribute bounds to more than one verifier."
    source_anchor_ids: [anchor-paper-13-protocol]

  - id: paper-13-evidence-performance
    kind: analytic_evidence
    parent_id: paper-13
    order: 6
    epistemic_status: calculated
    title: "Communication-cost analysis"
    summary: "For the paper's 30-prover/30-verifier example, an 80% active fraction saves about one third of messages and a 60% active fraction saves more than half relative to naive pairwise execution."
    source_anchor_ids: [anchor-paper-13-performance]

  - id: paper-13-evidence-security
    kind: analytic_evidence
    parent_id: paper-13
    order: 7
    epistemic_status: conditional_analysis
    title: "Security analysis"
    summary: "The paper relates success probability to the underlying distance-bounding protocol and the chance that an adversary controls active verifiers; it provides analytical metrics rather than a reduction-style theorem or machine-checked proof."
    source_anchor_ids: [anchor-paper-13-security]

  - id: paper-13-boundary-active
    kind: limitation
    parent_id: paper-13
    order: 8
    epistemic_status: material
    title: "Malicious active verifier boundary"
    summary: "An active verifier can lie about location or send challenges early, so passive conclusions are only as trustworthy as the active participant and underlying protocol; multiple simultaneous verifiers may be needed for secure localization."
    source_anchor_ids: [anchor-paper-13-security]

  - id: paper-13-limitations
