    parent_id: paper-13
    order: 9
    epistemic_status: explicitly_reported
    title: "Unresolved scope"
    summary: "The short paper has no implementation or noisy-channel evaluation and leaves mutual GDB, passive operation without known verifier locations, denial of service, and realistic group-radio conditions to future work."
