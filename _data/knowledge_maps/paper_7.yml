nodes:
  - id: paper-7
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "ALARM"
    summary: "A location-aided link-state routing protocol that combines group signatures, rotating pseudonyms, and temporary encryption keys to reduce identity and movement disclosure."
    source_anchor_ids: [anchor-paper-7-problem, anchor-paper-7-publication]
  - id: paper-7-question
    kind: question
    parent_id: paper-7
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Can nodes authenticate a mobile topology and route by location while remaining anonymous and difficult to track?"
    source_anchor_ids: [anchor-paper-7-problem]
  - id: paper-7-answer
    kind: contribution
    parent_id: paper-7
    order: 2
    epistemic_status: proposed_and_simulated
    title: "Central answer"
    summary: "Authenticate unlinkable per-slot location announcements with group signatures, derive a common topology snapshot, and address encrypted traffic to a location-bound temporary key and pseudonym."
    source_anchor_ids: [anchor-paper-7-protocol, anchor-paper-7-results]
  - id: paper-7-scope
    kind: scope
    parent_id: paper-7
    order: 3
    epistemic_status: explicitly_scoped
    title: "Environment and trust assumptions"
    summary: "Nodes know location and time, share a bounded radio range, move enough to create ambiguity, and obtain group credentials from an offline group manager; the analysis assumes a passive insider or active outsider."
    source_anchor_ids: [anchor-paper-7-assumptions, anchor-paper-7-security]
  - id: paper-7-protocol
    kind: protocol
    parent_id: paper-7
    order: 4
    epistemic_status: specified
    title: "Location Announcement Message protocol"
    summary: "Each slot, a node floods its location, timestamp, temporary public key, and group signature. Recipients verify and deduplicate LAMs, build a geographic connectivity graph, and use the signature as a one-slot pseudonym."
    source_anchor_ids: [anchor-paper-7-protocol]
  - id: paper-7-routing
    kind: component
    parent_id: paper-7-protocol
    order: 1
    epistemic_status: specified
    title: "Location-addressed delivery"
    summary: "A sender selects the current pseudonym at the destination location and encrypts under that LAM's temporary key, avoiding a stable identity in route establishment."
    source_anchor_ids: [anchor-paper-7-protocol]
  - id: paper-7-security
    kind: claim_group
    parent_id: paper-7
    order: 5
    epistemic_status: informally_argued
    title: "Security and privacy claims"
    summary: "Group-signature verification authenticates membership without naming the signer; timestamps resist replay, while randomized movement and fresh signatures are intended to frustrate linking across topology snapshots."
    source_anchor_ids: [anchor-paper-7-security]
  - id: paper-7-insider
    kind: limitation
    parent_id: paper-7-security
    order: 1
    epistemic_status: conditional
    title: "Active-insider boundary"
    summary: "Ordinary group signatures do not stop a malicious member from multiple-location Sybil announcements; self-distinguishing signatures or tamper-resistant location/signing hardware is required for that stronger threat."
    source_anchor_ids: [anchor-paper-7-protocol, anchor-paper-7-discussion]
  - id: paper-7-metric
    kind: metric
    parent_id: paper-7
    order: 6
    epistemic_status: defined
    title: "Average Node Privacy"
    summary: "ANP measures, across two topology snapshots, the average fraction of later nodes to which an earlier node can remain plausibly mapped; it ranges from complete traceability to full ambiguity."
    source_anchor_ids: [anchor-paper-7-metric]
  - id: paper-7-evidence
    kind: evidence_group
    parent_id: paper-7
    order: 7
    epistemic_status: simulation
    title: "Mobility simulations"
    summary: "Random-walk, random-waypoint, and reference-point group mobility experiments vary speed and evaluate ANP; privacy deteriorates when motion is slow, predictable, or preserves relative group positions."
    source_anchor_ids: [anchor-paper-7-results]
  - id: paper-7-boundaries
    kind: limitation_group
    parent_id: paper-7
    order: 8
    epistemic_status: material
    title: "Protocol boundaries"
    summary: "Jamming and DoS, physical observation, and strongly correlated movement are outside the claimed protection. Periodic network-wide LAM flooding costs bandwidth and power and reveals topology and network size."
    source_anchor_ids: [anchor-paper-7-security, anchor-paper-7-results, anchor-paper-7-discussion]
  - id: paper-7-artifacts
    kind: artifact
    parent_id: paper-7
    order: 9
    epistemic_status: paper_available_no_code
    title: "Artifacts"
    summary: "A fixed author copy is available locally; protocol code, group-signature integration, simulator configuration, and result data were not located."
    source_anchor_ids: [anchor-paper-7-results, anchor-paper-7-provenance]
  - id: paper-7-scrutiny
    kind: scrutiny
    parent_id: paper-7
    order: 10
    epistemic_status: peer_reviewed
    title: "Scrutiny"
    summary: "ALARM appeared at IEEE ICNP 2007. The paper provides an informal analysis and simulations, but no formal security proof or independent reproduction was located."
    source_anchor_ids: [anchor-paper-7-security, anchor-paper-7-publication]

