    epistemic_status: source_asserted
    title: "Central answer"
    summary: "Encryption probabilistically removes usable overhearing relationships and can reduce the minimum cut; the most damaging placement is at the source-side cut, while encryption among relays may retain the coding benefit under the model's connectivity conditions."
    source_anchor_ids: [anchor-paper-11-theorem-two, anchor-paper-11-implications]

