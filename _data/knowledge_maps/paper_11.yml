    kind: scope
    parent_id: paper-11
    order: 3
    epistemic_status: explicitly_scoped
    title: "Network and security scope"
    summary: "The paper studies single-source multicast on a quasi-random wireless graph with bidirectional unit-capacity links and probabilistic physical and encryption-group connectivity."
