nodes:
  - id: paper-31
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "Brief Announcement: Proactive Secret Sharing with a Dishonest Majority"
    summary: >-
      A three-page announcement of a proactive secret-sharing construction that uses additive encoding and verifiable polynomial sharing to exceed the passive honest-majority barrier while retaining bounded recovery and active-fault guarantees.
    source_anchor_ids: [anchor-paper-31-problem-results]

  - id: paper-31-question
    kind: question
    parent_id: paper-31
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      Can a mobile-adversary PSS scheme remain confidential when passive corruptions within one refresh period may include a dishonest majority, rather than fewer than half of the parties?
    source_anchor_ids: [anchor-paper-31-problem-results]

  - id: paper-31-answer
    kind: contribution
    parent_id: paper-31
    order: 2
    epistemic_status: source_asserted
    title: Central construction
    summary: >-
      Split the secret into random additive summands, verifiably share each summand with a polynomial from an increasing-degree family, and refresh or recover those polynomial shares without reconstructing the secret.
    source_anchor_ids: [anchor-paper-31-blueprint, anchor-paper-31-share-reconstruct]

  - id: paper-31-scope
    kind: scope
    parent_id: paper-31
    order: 3
    epistemic_status: explicitly_scoped
    title: Model and required environment
    summary: >-
      The protocol runs among n parties in synchronized epochs over a synchronous network with authenticated broadcast and pairwise private authenticated channels; honest parties erase old shares after refresh.
    source_anchor_ids: [anchor-paper-31-system-model]

  - id: paper-31-scope-mobile-adversary
    kind: threat_model
    parent_id: paper-31-scope
    order: 1
    epistemic_status: defined
    title: Mobile mixed adversary
    summary: >-
      The adversary may eventually compromise all parties across the system lifetime, but the stated passive, active, and recovery-dependent thresholds must hold within each refresh period.
    source_anchor_ids: [anchor-paper-31-problem-results, anchor-paper-31-system-model]

  - id: paper-31-scope-setup
    kind: assumption
    parent_id: paper-31-scope
    order: 2
    epistemic_status: assumed
    title: Communication and reset assumptions
    summary: >-
      Synchrony, a global clock, authenticated broadcast, private authenticated channels, restoration to a pristine state, and deletion of obsolete shares are environmental assumptions rather than guarantees constructed by this scheme.
    source_anchor_ids: [anchor-paper-31-system-model]

  - id: paper-31-scope-commitments
    kind: assumption
    parent_id: paper-31-scope
    order: 3
    epistemic_status: computational_assumption
    title: Verifiability assumption
    summary: >-
      Active-fault checking uses homomorphic commitments instantiated in the announcement by Feldman VSS, whose hiding/security properties rely on discrete-log hardness over the selected field group.
    source_anchor_ids: [anchor-paper-31-secret-sharing-model]

  - id: paper-31-construction
    kind: method
    parent_id: paper-31
    order: 4
    epistemic_status: specified
    title: Four-protocol PSS construction
    summary: >-
      DM-Share, DM-Reconstruct, DM-Refresh, and DM-Recover jointly implement sharing, reconstruction, proactive rerandomization, and replacement of shares lost by rebooted or faulty parties.
    source_anchor_ids: [anchor-paper-31-share-reconstruct, anchor-paper-31-refresh, anchor-paper-31-recovery]

  - id: paper-31-construction-encoding
    kind: method
    parent_id: paper-31-construction
    order: 1
    epistemic_status: specified
    title: Additive encoding with increasing degrees
    summary: >-
      DM-Share writes s as the sum of n random summands and verifiably shares the summands with polynomials whose degrees increase across the family; reducing the maximum degree reserves interpolation capacity for share recovery.
    source_anchor_ids: [anchor-paper-31-blueprint, anchor-paper-31-share-reconstruct]

  - id: paper-31-construction-refresh
    kind: protocol
    parent_id: paper-31-construction
    order: 2
    epistemic_status: specified
    title: DM-Refresh
    summary: >-
      Each party verifiably distributes a family of random refreshing polynomials whose constant terms sum to zero; adding their evaluations rerandomizes every local share while preserving the encoded secret, after which old shares are deleted.
    source_anchor_ids: [anchor-paper-31-refresh]

  - id: paper-31-construction-recover
    kind: protocol
    parent_id: paper-31-construction
    order: 3
    epistemic_status: specified
    title: DM-Recover
    summary: >-
      Non-recovering parties mask their current polynomial shares with random polynomials that vanish at the recovering party's point, allowing that party to interpolate only its replacement shares rather than the secret or current sharing polynomials.
    source_anchor_ids: [anchor-paper-31-recovery]

  - id: paper-31-claims
    kind: claim_group
    parent_id: paper-31
    order: 5
    epistemic_status: source_asserted
    title: Stated guarantees
    summary: >-
      The announcement states separate thresholds for passive corruption, active corruption, mixed corruption, lost-share recovery, and batched communication; these guarantees are not interchangeable.
    source_anchor_ids: [anchor-paper-31-problem-results, anchor-paper-31-limitations]

  - id: paper-31-claim-passive
    kind: claim
    parent_id: paper-31-claims
    order: 1
    epistemic_status: claimed_with_protocol_intuition
    title: Passive dishonest-majority confidentiality
    summary: >-
      Without lost-share recovery, the paper states confidentiality for t < n passive corruptions in a refresh period; with e simultaneous lost shares or faults, the stated passive threshold becomes t < n - e.
    source_anchor_ids: [anchor-paper-31-problem-results, anchor-paper-31-recovery, anchor-paper-31-limitations]

  - id: paper-31-claim-active-mixed
    kind: claim
    parent_id: paper-31-claims
    order: 2
    epistemic_status: claimed_non_robust
    title: Active and mixed corruption bounds
    summary: >-
      The non-robust construction states security for t < n/2 - e active corruptions and for mixed adversaries whose total may be a majority provided fewer than n/2 - e corruptions are active; detected cheating may cause abort.
    source_anchor_ids: [anchor-paper-31-problem-results, anchor-paper-31-limitations]

  - id: paper-31-claim-communication
    kind: claim
    parent_id: paper-31-claims
    order: 3
    epistemic_status: asymptotic_claim
    title: Communication cost
    summary: >-
      The announcement reports O(n^4) communication for one secret and O(n^3) communication when multiple secrets are batched; it leaves lower communication for dishonest-majority PSS open.
    source_anchor_ids: [anchor-paper-31-problem-results, anchor-paper-31-limitations]

  - id: paper-31-evidence
    kind: evidence_group
    parent_id: paper-31
    order: 6
    epistemic_status: bounded_by_brief_announcement
    title: Evidence and proof boundary
    summary: >-
      The three-page source specifies the model, encoding blueprint, and protocol mechanisms and gives security intuition, but it does not contain the full definitions, games, lemmas, or complete proofs of the corresponding SCN paper.
    source_anchor_ids: [anchor-paper-31-secret-sharing-model, anchor-paper-31-blueprint, anchor-paper-31-recovery]

  - id: paper-31-evidence-mechanism
    kind: evidence
    parent_id: paper-31-evidence
    order: 1
    epistemic_status: construction_inspected
    title: Mechanism-level support
    summary: >-
      The source explains why additive summands resist passive reconstruction, why zero-sum refresh polynomials preserve the secret, and why vanishing recovery masks reveal only the recovering party's replacement evaluations.
    source_anchor_ids: [anchor-paper-31-blueprint, anchor-paper-31-refresh, anchor-paper-31-recovery]

  - id: paper-31-boundaries
    kind: limitation_group
    parent_id: paper-31
    order: 7
    epistemic_status: material
    title: Limitations and open obligations
    summary: >-
      The active guarantee is non-robust, thresholds decrease with parallel recovery, the scheme assumes synchrony and secure erasure, and the brief leaves complete proofs and optimal communication outside its three pages.
    source_anchor_ids: [anchor-paper-31-system-model, anchor-paper-31-recovery, anchor-paper-31-limitations]

  - id: paper-31-boundary-open
    kind: limitation
    parent_id: paper-31-boundaries
    order: 1
    epistemic_status: open_problem
    title: Open communication and asynchrony questions
    summary: >-
      The authors ask whether batched communication can fall below O(n^3) and note that no construction in the represented work attains dishonest-majority security up to n - 1 over asynchronous networks.
    source_anchor_ids: [anchor-paper-31-limitations]

  - id: paper-31-resources
    kind: artifact_group
    parent_id: paper-31
    order: 8
    epistemic_status: publicly_available
    title: Publication resources
    summary: >-
      The complete brief announcement is checked into this site with recorded fixity, and the ACM DOI provides the official publication identity; no code or executable artifact is claimed by the paper.
    source_anchor_ids: [anchor-paper-31-problem-results, anchor-paper-31-publication]

  - id: paper-31-scrutiny
    kind: scrutiny
    parent_id: paper-31
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The construction appeared as a PODC brief announcement. That establishes venue exposure but is not equivalent to a full-paper proof audit, independent reproduction, or public review report.
    source_anchor_ids: [anchor-paper-31-publication]

  - id: paper-31-lineage
    kind: lineage
    parent_id: paper-31
    order: 10
    epistemic_status: documented
    title: Relation to the full construction
    summary: >-
      This announcement is the compressed PODC presentation of the dishonest-majority PSS direction; “Proactive Secret Sharing with a Dishonest Majority” by Shlomi Dolev, Karim Eldefrawy, Joshua Lampkins, Rafail Ostrovsky, and Moti Yung contains the extended construction and proof treatment and must be mapped independently.
    source_anchor_ids: [anchor-paper-31-problem-results, anchor-paper-31-limitations]

