editorial_summary: "This brief announcement gives the first proactive secret-sharing feasibility result that remains confidential even when passive corruptions form a dishonest majority. It supports nearly all parties being passively compromised under stated fault conditions, allows mixed passive and active adversaries, and reduces batched communication to cubic in the number of parties."

research_question: "Is proactive secret sharing feasible when passively corrupted parties may form a dishonest majority within a refresh period?"
central_answer: "The brief announcement reports a construction retaining confidentiality under nearly all passive corruptions subject to stated fault conditions, with treatment of mixed passive and active adversaries."

