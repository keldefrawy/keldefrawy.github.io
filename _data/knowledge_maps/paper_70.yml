nodes:
  - id: paper-70
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: Entanglement-based mutual quantum distance bounding
    summary: A pair of shared-key quantum protocols, culminating in a mutual construction that uses entanglement and timed rapid exchanges to let both endpoints estimate an upper bound on their separation.
    source_anchor_ids: [anchor-paper-70-problem]

  - id: paper-70-question
    kind: question
    parent_id: paper-70
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can one quantum execution provide authenticated distance evidence in both directions while avoiding reflection and relay weaknesses of simply composing earlier one-way protocols?
    source_anchor_ids: [anchor-paper-70-problem, anchor-paper-70-background]

  - id: paper-70-answer
    kind: contribution
    parent_id: paper-70
    order: 2
    epistemic_status: source_asserted
    title: Central answer
    summary: The proposed mutual exchange entangles the timing-sensitive responses of both parties and adds a commitment to prevent one side from adapting its hidden random value, allowing each side to time a response within one execution.
    source_anchor_ids: [anchor-paper-70-mutual, anchor-paper-70-security]

  - id: paper-70-model
    kind: model
    parent_id: paper-70
    order: 3
    epistemic_status: informally_defined
    title: Shared-key quantum distance-bounding setting
    summary: Parties share a long-term secret and derive per-session bit strings from a PRF and fresh nonces; they can prepare, transmit, and measure entangled quantum states while timing selected message legs.
    source_anchor_ids: [anchor-paper-70-one-way, anchor-paper-70-mutual]

  - id: paper-70-model-adversaries
    kind: threat_model
    parent_id: paper-70-model
    order: 1
    epistemic_status: informally_defined
    title: Fraud classes considered
    summary: The analysis treats distance fraud by a dishonest endpoint, mafia fraud by a relay, reflection, photon splitting, and terrorist fraud in which a legitimate prover helps an attacker without intending to reveal its long-term key.
    source_anchor_ids: [anchor-paper-70-background, anchor-paper-70-security]

  - id: paper-70-protocols
    kind: protocol
    parent_id: paper-70
    order: 4
    epistemic_status: specified
    title: Entanglement-based protocol family
    summary: The paper first gives a one-way primitive and then couples two timing directions in a mutual exchange rather than executing the primitive twice independently.
    source_anchor_ids: [anchor-paper-70-one-way, anchor-paper-70-mutual]

  - id: paper-70-protocol-one-way
    kind: protocol_component
    parent_id: paper-70-protocols
    order: 1
    epistemic_status: specified
    title: One-way entangled challenge
    summary: The verifier prepares entangled pairs, sends one half as the rapid challenge, keeps the other half, and checks the prover's measurement-dependent response against secret-derived bases while using round-trip time to bound distance.
    source_anchor_ids: [anchor-paper-70-one-way]

  - id: paper-70-protocol-mutual
    kind: protocol_component
    parent_id: paper-70-protocols
    order: 2
    epistemic_status: specified
    title: Mutual timed exchange
    summary: >-
      One party commits to a random mask r; the other sends entangled challenges; the first rapid response is masked by r; the challenger returns r in the reverse timing direction; and the commitment opening and check data allow both parties to validate the same execution.
    source_anchor_ids: [anchor-paper-70-mutual]

  - id: paper-70-protocol-efficiency
    kind: property
    parent_id: paper-70-protocols
    order: 3
    epistemic_status: analytically_derived
    title: Fewer rounds than two one-way runs
    summary: The source reports 25 percent fewer communication rounds and correspondingly less communication than sequentially running two one-way protocols.
    source_anchor_ids: [anchor-paper-70-mutual]

  - id: paper-70-results
    kind: claim_group
    parent_id: paper-70
    order: 5
    epistemic_status: informally_analyzed
    title: Security claims and calculations
    summary: The paper gives attack-specific probability calculations and qualitative arguments rather than one composable quantum-security theorem.
    source_anchor_ids: [anchor-paper-70-security]

  - id: paper-70-result-reflection
    kind: claim
    parent_id: paper-70-results
    order: 1
    epistemic_status: argued
    title: Reflection is detected
    summary: Entanglement correlations and distinct secret-derived strings are used to distinguish a reflected challenge from the response expected from a legitimate remote party.
    source_anchor_ids: [anchor-paper-70-security]

  - id: paper-70-result-distance
    kind: claim
    parent_id: paper-70-results
    order: 2
    epistemic_status: analytically_derived_under_model
    title: Distance-fraud probabilities
    summary: >-
      The one-way analysis gives success probability 2^(-HD(a,b)). In the mutual protocol the two dishonest-party cases are asymmetric: one endpoint can use unentangled states for a 2^(-HD(b,c)) strategy, while the other has the stated default bound 2^(-n).
    source_anchor_ids: [anchor-paper-70-security]

  - id: paper-70-result-mafia
    kind: claim
    parent_id: paper-70-results
    order: 3
    epistemic_status: analytically_derived_under_model
    title: Mafia-fraud bound
    summary: The relay analysis gives a per-n-bit success probability of (5/8)^n under the protocol's idealized state-preparation, measurement, and timing assumptions.
    source_anchor_ids: [anchor-paper-70-security]

  - id: paper-70-result-photon
    kind: claim
    parent_id: paper-70-results
    order: 4
    epistemic_status: argued
    title: Photon splitting gives no modeled advantage
    summary: Under the assumed source and measurement model, the paper argues that splitting photons does not improve the attacker beyond the analyzed mafia-fraud strategy.
    source_anchor_ids: [anchor-paper-70-security]

  - id: paper-70-evidence
    kind: evidence_group
    parent_id: paper-70
    order: 6
    epistemic_status: analytical_not_formal_or_empirical
    title: Evidence structure
    summary: The source provides explicit message flows, operation and round comparisons, and informal attack calculations. Feasibility is argued from similarity to QKD components, not shown by a prototype or experiment.
    source_anchor_ids: [anchor-paper-70-mutual, anchor-paper-70-security, anchor-paper-70-feasibility]

  - id: paper-70-boundaries
    kind: limitation_group
    parent_id: paper-70
    order: 7
    epistemic_status: explicitly_bounded
    title: Scope and open requirements
    summary: The work is a protocol proposal with idealized analysis; a complete quantum game-based proof, noisy-channel treatment, hardware implementation, and experimental distance measurements remain open.
    source_anchor_ids: [anchor-paper-70-security, anchor-paper-70-feasibility, anchor-paper-70-conclusion]

  - id: paper-70-boundary-terrorist
    kind: limitation
    parent_id: paper-70-boundaries
    order: 1
    epistemic_status: acknowledged_gap
    title: No terrorist-fraud resistance as presented
    summary: The current PRF-based response structure allows a legitimate prover to help an attacker in the modeled terrorist-fraud setting; the paper sketches a possible modification rather than proving resistance.
    source_anchor_ids: [anchor-paper-70-security]

  - id: paper-70-boundary-proof
    kind: limitation
    parent_id: paper-70-boundaries
    order: 2
    epistemic_status: not_formally_proved
    title: No unified formal security model
    summary: The probability arguments do not constitute a composable or machine-checked quantum proof covering concurrency, adaptive corruption, noise, device imperfections, and all fraud classes.
    source_anchor_ids: [anchor-paper-70-security, anchor-paper-70-conclusion]

  - id: paper-70-boundary-experiment
    kind: limitation
    parent_id: paper-70-boundaries
    order: 3
    epistemic_status: not_evaluated
    title: No prototype or measured distance bound
    summary: QKD hardware compatibility is a feasibility argument only; the paper does not report photon loss, detector error, clock resolution, processing delay, or field distance measurements.
    source_anchor_ids: [anchor-paper-70-feasibility, anchor-paper-70-conclusion]

  - id: paper-70-resources
    kind: artifact_group
    parent_id: paper-70
    order: 8
    epistemic_status: source_available
    title: Auditable resources
    summary: The complete arXiv manuscript is checked into this site with page count and SHA-256, and the official DOI establishes the published CSCML identity. No implementation artifact is claimed.
    source_anchor_ids: [anchor-paper-70-problem, anchor-paper-70-publication]

  - id: paper-70-scrutiny
    kind: scrutiny
    parent_id: paper-70
    order: 9
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: CSCML publication establishes venue review. No public formal proof audit, experimental reproduction, correction, or independent attack analysis was located.
    source_anchor_ids: [anchor-paper-70-publication]

  - id: paper-70-lineage
    kind: lineage
    parent_id: paper-70
    order: 10
    epistemic_status: documented
    title: Protocol lineage
    summary: The work extends one-way quantum distance-bounding approaches to mutual distance evidence and explicitly compares the single mutual execution with composing two one-way runs.
    source_anchor_ids: [anchor-paper-70-background, anchor-paper-70-one-way, anchor-paper-70-mutual]

