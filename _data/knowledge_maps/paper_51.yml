editorial_summary: "This paper formalizes reusable secret-sharing and proactive MPC constructions in EasyCrypt and proves concrete instantiations with machine assistance. A Why3-based extraction toolchain turns the verified specifications into executable code with modest overhead relative to manually written implementations."

research_question: "Can machine-checked secure-multiparty-computation specifications be converted into practical executable evaluators while preserving a high-assurance reasoning path?"
central_answer: "The paper reports EasyCrypt formalizations and proofs plus a Why3-based extraction toolchain that produces executable code with modest overhead."

