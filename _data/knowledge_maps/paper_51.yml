nodes:
  - id: paper-51
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: High-assurance MPC evaluator
    summary: A machine-checked modular security development and extraction toolchain for executable secret-sharing and proactive MPC components, paired with microbenchmarks and explicit TCB limits.
    source_anchor_ids: [anchor-paper-51-problem]
  - id: paper-51-question
    kind: question
    parent_id: paper-51
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: Can active/proactive multiparty protocols be proved end-to-end in EasyCrypt and converted into executable evaluators without abandoning modularity or practical performance?
    source_anchor_ids: [anchor-paper-51-problem]
  - id: paper-51-answer
    kind: contribution
    parent_id: paper-51
    order: 2
    epistemic_status: machine_checked_and_extracted
    title: Central answer
    summary: Prove generic security once at abstract interfaces, discharge concrete instantiation obligations, then translate executable operators to WhyML and use Why3 extraction to produce OCaml.
    source_anchor_ids: [anchor-paper-51-proof-overview, anchor-paper-51-extraction]
  - id: paper-51-model-node
    kind: threat_model
    parent_id: paper-51
    order: 3
    epistemic_status: formally_modeled
    title: Passive, static-active, and proactive adversaries
    summary: Real/ideal experiments expose corrupt, corruptInput, and abort oracles; proactive security allows a changing corrupted set but requires refresh and recovery before accumulated views become useful.
    source_anchor_ids: [anchor-paper-51-model, anchor-paper-51-mpc]
  - id: paper-51-assumptions
    kind: assumption
    parent_id: paper-51
    order: 4
    epistemic_status: explicit
    title: Cryptographic and execution assumptions
    summary: Active security uses Pedersen-style commitments and DDH; protocol operation assumes the represented communication model, while concrete execution trusts field/group arithmetic, randomness, and Reed-Solomon implementations.
    source_anchor_ids: [anchor-paper-51-problem, anchor-paper-51-sharing, anchor-paper-51-tcb]
  - id: paper-51-framework
    kind: formal_framework
    parent_id: paper-51
    order: 5
    epistemic_status: machine_checked
    title: Abstract reusable EasyCrypt framework
    summary: Approximately 2K lines define abstract secret-sharing and MPC interfaces; approximately 7K more instantiate them, including about 1K lines of protocol specifications.
    source_anchor_ids: [anchor-paper-51-proof-overview]
  - id: paper-51-sharing-node
    kind: scheme_group
    parent_id: paper-51-framework
    order: 1
    epistemic_status: machine_checked
    title: Secret-sharing hierarchy
    summary: The framework separates passive privacy, share integrity, and malicious/verifiable security, proving that commitments plus integrity-preserving sharing construct VSS.
    source_anchor_ids: [anchor-paper-51-sharing]
  - id: paper-51-mpc-node
    kind: protocol_group
    parent_id: paper-51-framework
    order: 2
    epistemic_status: machine_checked
    title: MPC functionality hierarchy
    summary: Deterministic/private protocols compute arithmetic, random protocols rerandomize shares, and proactive protocols recover corrupted parties into fresh states.
    source_anchor_ids: [anchor-paper-51-mpc]
  - id: paper-51-composition-node
    kind: theorem_group
    parent_id: paper-51-framework
    order: 3
    epistemic_status: machine_checked
    title: Sequential composition lemmas
    summary: Machine-checked lemmas establish malicious-after-malicious, random-after-malicious, and proactive-after-random security, allowing evaluator proofs to be assembled from subprotocol proofs.
    source_anchor_ids: [anchor-paper-51-composition]
  - id: paper-51-theorem-node
    kind: theorem
    parent_id: paper-51
    order: 6
    epistemic_status: machine_checked
    title: Evaluator reduction theorem
    summary: Theorem 1 upper-bounds an adversary's proactive distinguishing advantage against the evaluator by advantages against its VSS and proactive-MPC components, with efficient simulators/reductions.
    source_anchor_ids: [anchor-paper-51-theorem]
  - id: paper-51-instantiations
    kind: implementation_group
    parent_id: paper-51
    order: 7
    epistemic_status: formalized_and_extracted
    title: Concrete protocol instantiations
    summary: The development includes Shamir sharing, Pedersen commitments, VSS, additive/batch/gradual sharing, BGW-style addition and multiplication, and refresh/recover protocols.
    source_anchor_ids: [anchor-paper-51-sharing, anchor-paper-51-composition, anchor-paper-51-appendices]
  - id: paper-51-evaluator
    kind: protocol
    parent_id: paper-51-instantiations
    order: 1
    epistemic_status: machine_checked_and_extracted
    title: Arithmetic-circuit evaluator
    summary: Parties share private inputs, locally add, synchronize for multiplication and degree reduction, periodically refresh/recover, then reconstruct the output.
    source_anchor_ids: [anchor-paper-51-problem, anchor-paper-51-model]
  - id: paper-51-gradual
    kind: scheme
    parent_id: paper-51-instantiations
    order: 2
    epistemic_status: machine_checked_and_extracted
    title: Gradual dishonest-majority PSS
    summary: An additive-summand/batch-sharing construction from the earlier dishonest-majority PSS line is formalized and used as the extraction example; it is distinct from the honest-majority BGW MPC instantiation.
    source_anchor_ids: [anchor-paper-51-sharing, anchor-paper-51-extraction]
  - id: paper-51-extraction-node
    kind: toolchain
    parent_id: paper-51
    order: 8
    epistemic_status: implemented_with_unverified_translation
    title: EasyCrypt → WhyML → OCaml
    summary: A syntactic translator maps executable EasyCrypt operators into WhyML, after which Why3's verified extraction generates OCaml; only OCaml is evaluated, though the architecture could target other languages.
    source_anchor_ids: [anchor-paper-51-extraction]
  - id: paper-51-claims
    kind: claim_group
    parent_id: paper-51
    order: 9
    epistemic_status: mixed_formal_and_empirical
    title: Principal claims
    summary: The paper claims machine-checked modular security, first-of-kind active BGW verification/extraction, feasible executable performance, and reuse of the abstract framework.
    source_anchor_ids: [anchor-paper-51-problem, anchor-paper-51-theorem, anchor-paper-51-benchmarks]
  - id: paper-51-claim-security
    kind: claim
    parent_id: paper-51-claims
    order: 1
    epistemic_status: machine_checked_within_model
    title: Modular real/ideal security
    summary: EasyCrypt checks the reductions and composition claims for the modeled protocols and instantiations; guarantees remain conditional on model fidelity and trusted abstract components.
    source_anchor_ids: [anchor-paper-51-theorem, anchor-paper-51-composition]
  - id: paper-51-claim-executable
    kind: claim
    parent_id: paper-51-claims
    order: 2
    epistemic_status: high_assurance_not_fully_verified_end_to_end
    title: Extracted executable correspondence
    summary: Why3 extraction preserves the translated WhyML program, while the EasyCrypt-to-WhyML translator is intentionally simple but not itself proved correct; external libraries remain in the TCB.
    source_anchor_ids: [anchor-paper-51-extraction, anchor-paper-51-tcb]
  - id: paper-51-claim-performance
    kind: claim
    parent_id: paper-51-claims
    order: 3
    epistemic_status: microbenchmark_supported
    title: Feasible but non-optimized performance
    summary: Benchmarks cover 5, 9, and 15 parties and 128–1024-bit fields. Passive operations are fast; malicious multiplication/refresh/recovery grow sharply, reaching seconds for larger parameters.
    source_anchor_ids: [anchor-paper-51-implementation, anchor-paper-51-benchmarks]
  - id: paper-51-evidence
    kind: evidence_group
    parent_id: paper-51
    order: 10
    epistemic_status: machine_checked_proofs_code_and_benchmarks
    title: Evidence stack
    summary: EasyCrypt definitions/proofs, explicit theorem reductions, code excerpts, a polynomial library, protocol appendices, generated WhyML/OCaml examples, and 100-run median microbenchmarks provide complementary evidence.
    source_anchor_ids: [anchor-paper-51-theorem, anchor-paper-51-appendices, anchor-paper-51-extraction, anchor-paper-51-benchmarks]
  - id: paper-51-tcb-node
    kind: limitation
    parent_id: paper-51
    order: 11
    epistemic_status: explicit_trusted_base
    title: Trusted computing base
    summary: Finite-field and cyclic-group implementations (Zarith/CryptoKit), randomness, OpenSSL-generated parameters, an external Reed-Solomon decoder, OCaml toolchain, and unverified EasyCrypt-to-WhyML translation sit outside the machine-checked core.
    source_anchor_ids: [anchor-paper-51-tcb, anchor-paper-51-implementation]
  - id: paper-51-boundaries
    kind: limitation_group
    parent_id: paper-51
    order: 12
    epistemic_status: explicit
    title: Formal and evaluation boundaries
    summary: The proof is not UC; BGW active corruption is static rather than adaptive; network/broadcast semantics and low-level libraries are not fully verified; only OCaml and microbenchmarks are evaluated; optimized MPC frameworks are not compared directly.
    source_anchor_ids: [anchor-paper-51-limits]
  - id: paper-51-artifacts
    kind: artifact_group
    parent_id: paper-51
    order: 13
    epistemic_status: paper_and_archive_available
    title: Artifacts and reproducibility
    summary: Full author/ePrint versions, extensive code excerpts, and dependency URLs are public. This audit did not locate a version-pinned repository containing every EasyCrypt proof, translator, generated program, and benchmark harness.
    source_anchor_ids: [anchor-paper-51-eprint, anchor-paper-51-appendices]
  - id: paper-51-scrutiny
    kind: scrutiny
    parent_id: paper-51
    order: 14
    epistemic_status: top_venue_and_machine_checked
    title: External scrutiny
    summary: ACM CCS review and machine checking supply distinct scrutiny layers, but public review reports, independent proof reruns, and reproduction of extracted executables were not located.
    source_anchor_ids: [anchor-paper-51-publication, anchor-paper-51-eprint]
  - id: paper-51-lineage
    kind: lineage
    parent_id: paper-51
    order: 15
    epistemic_status: documented
    title: Proactive-security lineage and future direction
    summary: The work formalizes components from dishonest-majority PSS and BGW, then identifies adaptive adversaries, dynamic/asynchronous groups, UC security, SPDZ/GMW, verified libraries, and verified communication as follow-on obligations.
    source_anchor_ids: [anchor-paper-51-sharing, anchor-paper-51-limits]

