nodes:
  - id: paper-57
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published
    title: "On Regenerating Codes and Proactive Secret Sharing: Relationships and Implications"
    summary: >-
      A theory paper relating two self-repairing representations, deriving leakage implications and conditional translations, and defining generalized-decoding regenerating codes.
    source_anchor_ids: [anchor-paper-57-problem]

  - id: paper-57-question
    kind: question
    parent_id: paper-57
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: >-
      When do PSS recovery and regenerating-code repair represent the same mathematical capability, and what transfers across the two domains?
    source_anchor_ids: [anchor-paper-57-problem]

  - id: paper-57-answer
    kind: contribution
    parent_id: paper-57
    order: 2
    epistemic_status: theorem_supported
    title: Central answer
    summary: >-
      Match PSS sharing, reconstruction, recovery, and refresh to coding encode, decode, and repair; under additional linear-MDS conditions the mapping reverses, enabling repair-bandwidth insights and general adversary structures to cross domains.
    source_anchor_ids: [anchor-paper-57-equivalence, anchor-paper-57-grc]

  - id: paper-57-scope
    kind: scope
    parent_id: paper-57
    order: 3
    epistemic_status: defined
    title: Mathematical setting
    summary: >-
      The central comparison uses finite-field secret sharing, Shamir-based proactive protocols, Reed-Solomon repair, and regenerating-code parameters for storage per node, contacted helpers, and repair bandwidth.
    source_anchor_ids: [anchor-paper-57-models]

  - id: paper-57-leakage
    kind: threat_model
    parent_id: paper-57
    order: 4
    epistemic_status: defined
    title: Partial leakage across epochs
    summary: >-
      Nodes may leak whole field elements or collections of smaller-subfield elements. Static leakage repeats one linear view, while dynamic leakage can change transformations between refresh epochs, including through incomplete erasure of intermediate state.
    source_anchor_ids: [anchor-paper-57-leakage-model, anchor-paper-57-leakage-results]

  - id: paper-57-claim-static-leakage
    kind: claim
    parent_id: paper-57-leakage
    order: 1
    epistemic_status: proved_under_model
    title: Static partial leakage defeats a whole-share threshold
    summary: >-
      Proposition 1 quantifies how full-share and subfield leakage reduce the remaining Reed-Solomon repair information needed to reconstruct the secret, even when fewer than the nominal threshold of whole shares leak in an epoch.
    source_anchor_ids: [anchor-paper-57-leakage-results, anchor-paper-57-proofs]

  - id: paper-57-claim-dynamic-leakage
    kind: claim
    parent_id: paper-57-leakage
    order: 2
    epistemic_status: proved_under_strong_model
    title: Dynamic leakage accumulates across epochs
    summary: >-
      Proposition 2 gives an efficient adversary that gathers enough subfield information across epochs to reconstruct the secret when leakage functions vary and affected nodes store nonzero values; the paper labels this a strong but plausible implementation model.
    source_anchor_ids: [anchor-paper-57-leakage-results, anchor-paper-57-proofs]

  - id: paper-57-equivalence
    kind: claim_group
    parent_id: paper-57
    order: 5
    epistemic_status: proved_with_conditions
    title: Conditional PSS-RC correspondence
    summary: >-
      Two theorems preserve storage and repair parameters across translations, but the reverse direction requires a linear MDS regenerating code and the baseline forward encoding has a low rate unless linearity or batching is exploited.
    source_anchor_ids: [anchor-paper-57-equivalence]

  - id: paper-57-equivalence-forward
    kind: claim
    parent_id: paper-57-equivalence
    order: 1
    epistemic_status: proved
    title: PSS implies an erasure regenerating code
    summary: >-
      A (t,n) PSS storing alpha bits per node and recovering through d helpers sending beta bits yields an erasure regenerating code with n nodes, reconstruction dimension t plus 1, and the same storage and repair parameters.
    source_anchor_ids: [anchor-paper-57-equivalence, anchor-paper-57-proofs]

  - id: paper-57-equivalence-reverse
    kind: claim
    parent_id: paper-57-equivalence
    order: 2
    epistemic_status: proved_with_conditions
    title: Linear MDS RC implies PSS
    summary: >-
      Every specified linear MDS regenerating code with n plus 1 nodes and dimension k plus 1 yields a (k,n) PSS whose recovery contacts the same d helpers for beta bits each.
    source_anchor_ids: [anchor-paper-57-equivalence, anchor-paper-57-proofs]

  - id: paper-57-recovery
    kind: analytical_result
    parent_id: paper-57
    order: 6
    epistemic_status: corollary
    title: Subfield-based Shamir recovery
    summary: >-
      Combining the reverse translation with Guruswami-Wootters repair yields an alternative Shamir recovery that contacts n minus 1 nodes and receives smaller-subfield symbols, under the corollary's field-degree conditions and without leakage.
    source_anchor_ids: [anchor-paper-57-equivalence]

  - id: paper-57-grc
    kind: definition
    parent_id: paper-57
    order: 7
    epistemic_status: introduced
    title: Generalized-decoding regenerating code
    summary: >-
      GRC replaces one uniform threshold with monotone decoding sets and allowed error patterns, requiring Decode to correct every permitted error set and every erasure pattern leaving some decoding set intact.
    source_anchor_ids: [anchor-paper-57-grc]

  - id: paper-57-claim-grc
    kind: claim
    parent_id: paper-57-grc
    order: 1
    epistemic_status: existence_theorem
    title: Linear GRC existence for Q2 error structures
    summary: >-
      Theorem 3 maps a Q2 general adversary structure into a linear GRC over a finite field, while explicitly leaving parameter optimization and achievable rates open.
    source_anchor_ids: [anchor-paper-57-grc]

  - id: paper-57-evidence
    kind: evidence_group
    parent_id: paper-57
    order: 8
    epistemic_status: proof_documented
    title: Formal evidence
    summary: >-
      Definitions, propositions, parameter-preserving reductions, an existence theorem, and appendical proofs support the analysis. There is no prototype, benchmark, or deployed storage-system evaluation.
    source_anchor_ids: [anchor-paper-57-equivalence, anchor-paper-57-grc, anchor-paper-57-proofs]

  - id: paper-57-boundaries
    kind: limitation_group
    parent_id: paper-57
    order: 9
    epistemic_status: material
    title: Boundaries and open problems
    summary: >-
      The equivalence is conditional, the basic PSS-to-RC rate can be only 1/n, the dynamic leakage attack uses a strong model, and GRC is an unoptimized existence result. Efficient GRCs, generalized repair sets, dynamic groups, and verifiable RC remain future work.
    source_anchor_ids: [anchor-paper-57-leakage-results, anchor-paper-57-equivalence, anchor-paper-57-grc, anchor-paper-57-conclusion]

  - id: paper-57-resources
    kind: artifact_group
    parent_id: paper-57
    order: 10
    epistemic_status: full_text_available
    title: Publication resources
    summary: >-
      Archive and author-uploaded full texts expose the proofs, and the DOI identifies the SSS chapter. No code or data artifact is claimed.
    source_anchor_ids: [anchor-paper-57-problem, anchor-paper-57-publication]

  - id: paper-57-scrutiny
    kind: scrutiny
    parent_id: paper-57
    order: 11
    epistemic_status: venue_reviewed
    title: External scrutiny
    summary: >-
      The work appeared at SSS 2021. Public review reports and independent theorem checking are not represented.
    source_anchor_ids: [anchor-paper-57-publication]

  - id: paper-57-lineage
    kind: lineage
    parent_id: paper-57
    order: 12
    epistemic_status: documented
    title: Bridge between cryptography and coding theory
    summary: >-
      The paper imports repair-bandwidth methods into proactive sharing and exports general adversary structures into regenerating codes, framing a bidirectional research program rather than a deployed system.
    source_anchor_ids: [anchor-paper-57-problem, anchor-paper-57-conclusion]

