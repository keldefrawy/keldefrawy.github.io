nodes:
  - id: paper-12
    kind: paper
    parent_id:
    order: 1
    epistemic_status: published
    title: "Attacks on physical-layer identification"
    summary: "An experimental security study showing that radio fingerprints treated as device identities can be imitated with feature-level or whole-waveform replay."
    source_anchor_ids: [anchor-paper-12-question]

  - id: paper-12-question
    kind: question
    parent_id: paper-12
    order: 1
    epistemic_status: research_question
    title: "Research question"
    summary: "Do modulation and turn-on-transient fingerprints remain reliable identifiers when the transmitter is actively trying to impersonate an enrolled device?"
    source_anchor_ids: [anchor-paper-12-question, anchor-paper-12-model]

  - id: paper-12-answer
    kind: contribution
    parent_id: paper-12
    order: 2
    epistemic_status: experimentally_supported
    title: "Central answer"
    summary: "The tested modulation features are reproducible with high success, and even transient signals are replayable under controlled acquisition; channel-dependent capture makes the over-air transient attack more demanding, not categorically impossible."
    source_anchor_ids: [anchor-paper-12-modulation-results, anchor-paper-12-transient-results]

  - id: paper-12-scope
    kind: scope
    parent_id: paper-12
    order: 3
    epistemic_status: explicitly_scoped
    title: "System and adversary model"
    summary: "A fingerprinter stores reference fingerprints for enrolled devices and returns only accept or reject; the attacker's objective is to transmit frames classified as a target."
    source_anchor_ids: [anchor-paper-12-model]

  - id: paper-12-adversary-feature
    kind: threat_model
    parent_id: paper-12-scope
    order: 1
    epistemic_status: defined
    title: "Feature-replay attacker"
    summary: "The feature attacker knows the features, extraction, matching, and decision procedure and can modify relevant radio parameters before transmission."
    source_anchor_ids: [anchor-paper-12-model, anchor-paper-12-feature-replay]

  - id: paper-12-adversary-signal
    kind: threat_model
    parent_id: paper-12-scope
    order: 2
    epistemic_status: defined
    title: "Signal-replay attacker"
    summary: "The signal attacker records and retransmits a target waveform without needing the internal fingerprint definition, but success depends on acquisition and replay fidelity."
    source_anchor_ids: [anchor-paper-12-model, anchor-paper-12-signal-replay]

  - id: paper-12-method
    kind: method
    parent_id: paper-12
    order: 4
    epistemic_status: implemented
    title: "Attack implementation"
    summary: "The study manipulates three modulation features on software-defined radios and separately captures and retransmits complete RF frames with laboratory instrumentation."
    source_anchor_ids: [anchor-paper-12-feature-replay, anchor-paper-12-signal-replay]

  - id: paper-12-method-setup
    kind: implementation
    parent_id: paper-12-method
    order: 1
    epistemic_status: documented
    title: "Hardware and evaluation setup"
    summary: "Three USRPs act as genuine devices, another USRP as an attacker, an Agilent analyzer as fingerprinter, and a Tektronix AWG7000B as a high-fidelity replay attacker."
    source_anchor_ids: [anchor-paper-12-feature-replay, anchor-paper-12-signal-replay]

  - id: paper-12-evidence-modulation
    kind: empirical_evidence
    parent_id: paper-12
    order: 5
    epistemic_status: measured
    title: "Modulation-fingerprint results"
    summary: "With 80 frames per device, four-fold cross-validation, and threshold plus classifier tests, replaying frequency, I/Q-origin, and phase features achieved near-target distributions; reported 5-NN and SVM classification reached 100% in the tested cases."
    source_anchor_ids: [anchor-paper-12-modulation-results]

  - id: paper-12-evidence-signal
    kind: empirical_evidence
    parent_id: paper-12
    order: 6
    epistemic_status: measured
    title: "Whole-signal replay results"
    summary: "For modulation fingerprints, RF-replayed frames become nearly indistinguishable from genuine frames under the chosen similarity measure."
    source_anchor_ids: [anchor-paper-12-modulation-results]

  - id: paper-12-evidence-transient
    kind: empirical_evidence
    parent_id: paper-12
    order: 7
    epistemic_status: measured_with_boundary
    title: "Transient-fingerprint boundary"
    summary: "Transient waveforms from three Tmote Sky devices were reproduced accurately over a cable; attempts from a changed over-air location failed because the channel and antennas altered the captured signal."
    source_anchor_ids: [anchor-paper-12-transient-results]

  - id: paper-12-implication
    kind: implication
    parent_id: paper-12
    order: 8
    epistemic_status: source_interpretation
    title: "Security implication"
    summary: "Physical-layer fingerprints alone should not authorize access in adversarial settings; they require additional authentication or replay-detection measures."
    source_anchor_ids: [anchor-paper-12-limitations]

  - id: paper-12-limitations
    kind: limitation_group
    parent_id: paper-12
    order: 9
    epistemic_status: explicitly_reported
    title: "Limitations and transfer boundary"
    summary: "The device sample is small, equipment is specialized, and outcomes depend on feature choice, classifier, threshold, antenna, channel, and attacker placement; transfer to commodity Wi-Fi hardware was left for future work."
    source_anchor_ids: [anchor-paper-12-limitations]

  - id: paper-12-artifacts
    kind: artifact_group
    parent_id: paper-12
    order: 10
    epistemic_status: paper_and_measurements_described
    title: "Artifacts"
    summary: "The paper fully describes equipment, sample counts, features, and evaluation metrics, but this audit did not locate released waveforms, analysis code, or hardware-control scripts."
    source_anchor_ids: [anchor-paper-12-feature-replay, anchor-paper-12-modulation-results]

  - id: paper-12-scrutiny
    kind: scrutiny
    parent_id: paper-12
    order: 11
    epistemic_status: venue_reviewed
    title: "External scrutiny and reception"
    summary: "The work appeared at ACM WiSec and has a substantial ResearchGate citation trail; this map did not inspect each citing context or locate an independent experimental replication."
    source_anchor_ids: [anchor-paper-12-publication, anchor-paper-12-citations]

  - id: paper-12-lineage
    kind: lineage
    parent_id: paper-12
    order: 12
    epistemic_status: source_asserted_and_reception_supported
    title: "Research lineage"
    summary: "The paper reframes radio fingerprinting from a passive classification problem into an active-adversary authentication problem and supplies concrete attack semantics and measurements."
    source_anchor_ids: [anchor-paper-12-question, anchor-paper-12-citations]

