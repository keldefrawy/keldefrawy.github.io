editorial_summary: "This paper combines Bitcoin blockchain history with millions of candidate addresses collected from the dark web to quantify suspicious and malicious use over time. It develops mixing heuristics and finds that a small concentration of addresses accounts for most of the observed dark-web Bitcoin value."

research_question: "What longitudinal patterns of suspicious or malicious Bitcoin use can be inferred by linking blockchain history with addresses collected from dark-web sources?"
central_answer: "The paper reports combining blockchain history with millions of candidate addresses, applying mixing heuristics, and measuring concentration over time."

