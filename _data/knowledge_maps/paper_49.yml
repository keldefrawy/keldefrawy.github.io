nodes:
  - id: paper-49
    kind: paper
    parent_id: null
    order: 1
    epistemic_status: published_empirical_study
    title: Longitudinal Bitcoin misuse analysis
    summary: A blockchain/dark-web measurement study with a new CoinJoin heuristic and explicit caveats about observation, labels, and missing ground truth.
    source_anchor_ids: [anchor-paper-49-problem]
  - id: paper-49-question
    kind: question
    parent_id: paper-49
    order: 1
    epistemic_status: research_question
    title: Research question
    summary: How prevalent and behaviorally distinctive is suspicious Bitcoin activity visible on dark-web pages, after accounting for mixer-generated transaction graph noise?
    source_anchor_ids: [anchor-paper-49-problem]
  - id: paper-49-answer
    kind: contribution
    parent_id: paper-49
    order: 2
    epistemic_status: empirically_supported
    title: Central answer
    summary: Observed dark-web addresses are more active, more connected, and more likely to mix than random blockchain addresses, but the sample measures public crawl visibility rather than all misuse.
    source_anchor_ids: [anchor-paper-49-dark-results, anchor-paper-49-mixing-results, anchor-paper-49-comparison]
  - id: paper-49-data
    kind: dataset_group
    parent_id: paper-49
    order: 3
    epistemic_status: constructed_from_public_and_prior_data
    title: Joined longitudinal datasets
    summary: The analysis combines a nearly complete public blockchain window with candidate addresses extracted from an independently collected and labeled dark-web crawl.
    source_anchor_ids: [anchor-paper-49-blockchain, anchor-paper-49-darkweb]
  - id: paper-49-data-chain
    kind: dataset
    parent_id: paper-49-data
    order: 1
    epistemic_status: public_ledger_observation
    title: Bitcoin blockchain through May 2018
    summary: The study analyzes 397,301,155 unique active addresses and 316,386,663 transactions from genesis through May 2018, cross-checking aggregate counts against Blockchain.info.
    source_anchor_ids: [anchor-paper-49-blockchain]
  - id: paper-49-data-dark
    kind: dataset
    parent_id: paper-49-data
    order: 2
    epistemic_status: sampled_and_inherited_labels
    title: Dark-web address corpus
    summary: OnionCrawler ran twice daily from June 2016 to December 2017; checksum filtering reduces about 2.3 million candidates to 2,093,568 valid addresses, of which 47,697 carry selected suspicious/malicious tags.
    source_anchor_ids: [anchor-paper-49-darkweb, anchor-paper-49-dark-results]
  - id: paper-49-measurement-model
    kind: scope
    parent_id: paper-49
    order: 4
    epistemic_status: observational
    title: What is measured
    summary: An address inherits an onion page's labels, and activity is inferred from public transactions. This establishes associations and behaviors, not wallet ownership, intent, legal status, or causal effects.
    source_anchor_ids: [anchor-paper-49-darkweb, anchor-paper-49-limitations]
  - id: paper-49-algorithm
    kind: algorithm
    parent_id: paper-49
    order: 5
    epistemic_status: specified_and_executed
    title: CoinJoin identification heuristic
    summary: The algorithm detects repeated equal-valued outputs, checks participant/input consistency, then uses a fee-bounded depth-first subset search to assign inputs to participant outputs.
    source_anchor_ids: [anchor-paper-49-heuristic]
  - id: paper-49-algorithm-bound
    kind: algorithmic_limit
    parent_id: paper-49-algorithm
    order: 1
    epistemic_status: explicit_approximation
    title: NP-hard search and large-input shortcut
    summary: Subset allocation is NP-hard; transactions with over 17 inputs that pass the first filters are labeled CoinJoin without exhaustive search, creating an explicit false-positive/false-negative boundary.
    source_anchor_ids: [anchor-paper-49-heuristic, anchor-paper-49-mixing-results]
  - id: paper-49-graph
    kind: method
    parent_id: paper-49
    order: 6
    epistemic_status: specified
    title: Neighborhood analysis
    summary: Addresses are vertices and sender/receiver co-occurrence creates undirected edges; inferred CoinJoins are excluded from selected neighborhood calculations because mixer participants are not ordinary counterparties.
    source_anchor_ids: [anchor-paper-49-neighborhood]
  - id: paper-49-claims
    kind: claim_group
    parent_id: paper-49
    order: 7
    epistemic_status: descriptive_empirical
    title: Main quantitative findings
    summary: Findings describe the sampled windows and classification rules; they are not estimates of all illicit cryptocurrency use.
    source_anchor_ids: [anchor-paper-49-problem, anchor-paper-49-dark-results, anchor-paper-49-comparison]
  - id: paper-49-claim-trend
    kind: claim
    parent_id: paper-49-claims
    order: 1
    epistemic_status: observed_association
    title: Decline aligned with market takedowns
    summary: Monthly addresses seen on the dark web decline over the sample and show drops during known market-takedown periods; the paper does not claim the takedowns are the sole cause.
    source_anchor_ids: [anchor-paper-49-dark-results]
  - id: paper-49-claim-mixing
    kind: claim
    parent_id: paper-49-claims
    order: 2
    epistemic_status: heuristic_supported
    title: Higher observed CoinJoin participation
    summary: The heuristic marks 0.4% of all addresses but 2.3% of dark-web addresses as CoinJoin participants, approximately a fivefold difference.
    source_anchor_ids: [anchor-paper-49-mixing-results]
  - id: paper-49-claim-activity
    kind: claim
    parent_id: paper-49-claims
    order: 3
    epistemic_status: dataset_supported
    title: Higher connectivity and transaction volume
    summary: Dark-web addresses have much higher neighbor and activity distributions than the full chain, although public visibility and service/exchange addresses can strongly bias that comparison.
    source_anchor_ids: [anchor-paper-49-comparison]
  - id: paper-49-claim-concentration
    kind: claim
    parent_id: paper-49-claims
    order: 4
    epistemic_status: dataset_supported
    title: Concentrated associated value
    summary: Within the dark-web-associated set, 2,828 addresses account for 99% of held bitcoin; this does not mean those addresses are controlled by dark-web operators.
    source_anchor_ids: [anchor-paper-49-dark-results, anchor-paper-49-comparison]
  - id: paper-49-evidence
    kind: evidence_group
    parent_id: paper-49
    order: 8
    epistemic_status: large_scale_observational
    title: Evidence stack
    summary: Public-ledger data, twice-daily dark-web crawling, inherited and partially manually verified labels, address checksums, a specified heuristic, transaction graphs, descriptive statistics, and temporal comparisons support the findings.
    source_anchor_ids: [anchor-paper-49-blockchain, anchor-paper-49-darkweb, anchor-paper-49-heuristic, anchor-paper-49-comparison]
  - id: paper-49-boundaries
    kind: limitation_group
    parent_id: paper-49
    order: 9
    epistemic_status: explicit
    title: Validity limits
    summary: Crawl coverage is incomplete; labels come from prior page classification; address visibility favors popular services; ownership and ground truth are missing; mixer detection is heuristic; privacy coins and activity after the windows are outside scope.
    source_anchor_ids: [anchor-paper-49-limitations, anchor-paper-49-comparison, anchor-paper-49-future]
  - id: paper-49-artifacts
    kind: artifact_group
    parent_id: paper-49
    order: 10
    epistemic_status: partial
    title: Reproducibility resources
    summary: The paper provides pseudocode, date ranges, counts, tag lists, and methodology. This audit did not locate public code, the derived address/tag corpus, query outputs, or a fixed analysis environment.
    source_anchor_ids: [anchor-paper-49-darkweb, anchor-paper-49-heuristic]
  - id: paper-49-scrutiny
    kind: scrutiny
    parent_id: paper-49
    order: 11
    epistemic_status: venue_reviewed_and_irb_upstream
    title: External scrutiny
    summary: ACNS publication establishes venue review; the upstream crawl received SRI IRB approval. Neither is equivalent to independent statistical reproduction or label validation.
    source_anchor_ids: [anchor-paper-49-darkweb, anchor-paper-49-publication]
  - id: paper-49-lineage
    kind: lineage
    parent_id: paper-49
    order: 12
    epistemic_status: open_directions
    title: Follow-on analysis directions
    summary: The paper proposes extending the design across other cryptocurrencies, entity/geographic attribution sources, and synchronized cross-chain activity.
    source_anchor_ids: [anchor-paper-49-future]

