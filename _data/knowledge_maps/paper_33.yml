  - "swarm attestation"
  - "IoT"
  - "embedded systems"
editorial_summary: "The paper brings remote attestation from one embedded device to a mobile swarm by defining Quality of Swarm Attestation, a metric for how much integrity information a protocol reveals. It then designs two lightweight LISA protocols with different assurance and cost tradeoffs, analyzes their security, and validates them with prototypes and experiments."

research_question: "How can a verifier obtain useful integrity information about a mobile swarm while balancing assurance against communication and computation cost?"
central_answer: "The paper reports a Quality of Swarm Attestation metric and two lightweight LISA protocols occupying different assurance-cost points."

