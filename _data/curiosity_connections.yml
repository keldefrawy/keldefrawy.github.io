  machines:
    title: "Machines, Automation & Artificial Intelligence"
    map_title: "From Formal Reasoning to Machine-Checked Security"
    description: >-
      A compact lineage from Hilbert's formal program and Gödel's limits through programmable and
      universal machines, information, complexity, and symbolic AI, through SRI's parallel lines of
      intelligent assistants and machine-checked reasoning, to modern formal specification, model
      checking, and reliable AI—the machinery used to check protocols, algorithms, cryptography,
      mathematics, and systems.
    notes:
      - kind: scope
        label: What this map means by AI
        text: >-
          The emphasis is machine-assisted reasoning and reliable intelligent assistants rather than
          a comprehensive history of neural AI: represent a claim or goal mechanically, search or
          check the reasoning, and expose precisely what has and has not been verified.
      - kind: limits
        label: Automation has boundaries
        text: >-
          Gödel and Turing place fundamental limits on formal systems and computation. Mechanized
          verification raises assurance within an explicit model; it does not eliminate modeling
          assumptions or make every true statement automatically decidable.
      - kind: lineage
        label: Stanford–SRI verification school
        text: >-
          The compact line highlights Floyd's assertion method; Manna's synthesis and temporal-
          verification school; Green and Waldinger's logical program synthesis; Stanford LCF;
          SRI's PVS team; and the later bridge from formal reasoning to security protocols.
    people:
      - id: machines-hilbert
        label: David Hilbert
        relationship: influence
        status: Formalization and proof · no collaboration
        note: "Hilbert's program made axiomatization, formal proof, consistency, and mechanical reasoning central foundational questions."
      - id: machines-godel
        label: Kurt Gödel
        relationship: influence
        status: Limits of formal systems · no collaboration
        note: "Gödel's incompleteness results delimit what sufficiently expressive formal systems can prove about themselves."
      - id: machines-babbage-lovelace
        label: Charles Babbage & Ada Lovelace
        relationship: influence
        status: Programmable machinery · no collaboration
        note: "Babbage designed the Analytical Engine; Lovelace's Notes described a worked procedure and the machine's broader symbolic potential."
      - id: machines-turing
        label: Alan Turing
        relationship: influence
        status: Universal computation and machine intelligence · no collaboration
        note: "Turing formalized general computation and later framed machine intelligence through the imitation game."
      - id: machines-shannon
        label: Claude Shannon
        relationship: influence
        status: Switching, information, and machine search · no collaboration
        note: "Shannon connected Boolean logic to relay circuits, founded information theory, and developed early ideas for computer-chess search."
      - id: machines-von-neumann
        label: John von Neumann
        relationship: influence
        status: Stored-program architecture and automata · no collaboration
        note: "Von Neumann documented stored-program organization and studied automata, reliable computation, and self-reproducing machines."
      - id: machines-mccarthy
        label: John McCarthy
        relationship: influence
        status: Artificial intelligence, Lisp, and machine reasoning · no collaboration
        note: "McCarthy co-founded the named field of AI and made symbolic representation and machine deduction programmable through the Advice Taker and Lisp."
      - id: machines-nilsson
        label: Nils J. Nilsson
        relationship: influence
        status: SRI AI, Shakey, search, and planning · no collaboration
        note: >-
          Nilsson co-led SRI's Shakey project and helped develop foundational AI methods including
          heuristic search and STRIPS planning, connecting symbolic reasoning to an embodied agent.
      - id: machines-peter-neumann
        label: Peter G. Neumann
        relationship: influence
        status: Bell Labs → SRI · trustworthy systems and formal assurance · no coauthorship claim
        note: >-
          Neumann bridged Bell Labs and SRI through work on secure, reliable, survivable, and
          high-assurance systems. His place in this scene connects machine reasoning to the
          practical assurance of critical computing systems.
      - id: machines-karen-myers
        label: Karen Myers
        relationship: influence
        status: SRI AI Center · planning, agents, and human–machine collaboration · no coauthorship claim
        note: >-
          Myers leads SRI work on intelligent systems that collaborate with people, spanning
          multi-agent systems, automated planning and scheduling, intelligent assistants,
          knowledge management, and end-user automation.
      - id: machines-carolyn-talcott
        label: Carolyn Talcott
        relationship: influence
        status: SRI CSL · formal reasoning for computer, cyber-physical, and biological systems
        note: >-
          Talcott develops formal reasoning methods for complex computer and biological systems,
          including distributed cyber-physical agents, placing symbolic modeling and verification
          beside applied automation rather than treating them as separate traditions.
      - id: machines-gabriela-ciocarlie
        label: Gabriela F. Ciocarlie
        relationship: collaborator
        catalog_authors: [Gabriela F. Ciocarlie]
        status: Direct SRI collaborator · cyberanalytics, anomaly detection, and trustworthy AI
        note: >-
          Ciocarlie's SRI work spans automated cyberanalytics, anomaly detection, distributed alert
          correlation, formal analysis, and adversarial machine learning. The map distinguishes
          this applied trustworthy-AI bridge from foundational AI lineage.
      - id: machines-linda-briesemeister
        label: Linda Briesemeister
        relationship: collaborator
        catalog_authors: [Linda Briesemeister]
        status: Direct SRI collaborator · distributed algorithms, robots, and dependable automation
        note: >-
          Briesemeister applies distributed algorithms to mobile, robotic, wireless, and complex
          networked systems, including automated simulation, anomaly mitigation, and dependable
          information exchange.
      - id: machines-cook-levin
        label: Stephen Cook & Leonid Levin
        relationship: influence
        status: NP-completeness and feasible computation · no collaboration
        note: >-
          Cook and Levin independently established the foundational NP-completeness result. The
          unresolved P-versus-NP question asks, in part, whether efficiently checkable solutions are
          also efficiently findable.
      - id: machines-floyd
        label: Robert W. Floyd
        relationship: influence
        status: Assertions, invariants, and program verification · no collaboration
        note: >-
          Floyd's 1967 assertion method opened systematic program verification: logical invariants
          attached to program points reduce correctness to proof obligations and helped seed the
          later Floyd–Hoare tradition. Stanford's genealogy also places Manna in Floyd's doctoral line.
      - id: machines-manna
        label: Zohar Manna
        relationship: influence
        status: Program synthesis and temporal verification · no collaboration
        note: >-
          Manna worked with McCarthy at Stanford, developed foundational methods for program synthesis
          and software proof, collaborated with Richard Waldinger on deductive synthesis, advanced
          temporal verification, and led the Stanford Temporal Prover line.
      - id: machines-green-waldinger
        label: Cordell Green & Richard Waldinger
        relationship: influence
        status: Logical AI and deductive program synthesis · no collaboration
        note: >-
          Green's Stanford work showed how theorem proving could support planning and program
          synthesis in McCarthy's logical-AI school. Waldinger built the parallel Stanford–SRI bridge
          from automated deduction to program synthesis and verification, much of it with Manna.
      - id: machines-stanford-lcf
        label: Dana Scott & Robin Milner
        relationship: influence
        status: Stanford LCF proof checking · no collaboration
        note: >-
          Scott formulated the Logic for Computable Functions; at Stanford, Milner implemented LCF
          as an interactive machine proof checker. Its small trusted proof kernel became a
          foundational ancestor of later theorem-prover families including HOL and Isabelle.
      - id: machines-weyhrauch
        label: Richard Weyhrauch
        relationship: influence
        status: Stanford FOL and mechanized reasoning · no collaboration
        note: >-
          Weyhrauch developed Stanford's FOL interactive proof-checking environment and helped
          connect logical representation, theorem proving, and practical machine-assisted
          reasoning alongside the Stanford LCF line.
      - id: machines-boyer-moore
        label: Robert S. Boyer & J Strother Moore
        relationship: influence
        status: Automated theorem proving and verified algorithms · no collaboration
        note: >-
          Boyer and Moore developed the Boyer–Moore family of automated theorem provers for
          inductive reasoning and program verification; the same pair also created the fast
          Boyer–Moore string-search algorithm. Moore later co-developed ACL2 with Matt Kaufmann.
      - id: machines-pvs
        label: Natarajan Shankar, Sam Owre & John Rushby
        relationship: influence
        status: SRI PVS specification and verification · colleague lineage, not a coauthorship claim
        note: >-
          Shankar, Owre, and Rushby created the PVS line at SRI, integrating a specification
          language, proof checking, decision procedures, and model checking for algorithms,
          protocols, hardware, and dependable systems. Shankar had earlier been a Stanford
          Computer Science research associate.
      - id: machines-dutertre
        label: Bruno Dutertre
        relationship: influence
        status: Direct SRI colleague · Yices SMT solving and automated reasoning
        note: >-
          Dutertre developed the Yices satisfiability-modulo-theories solver at SRI, connecting
          practical automated reasoning and decision procedures to verification workflows. This
          card records a direct institutional-colleague connection, not a coauthorship claim.
      - id: machines-cheyer
        label: Adam Cheyer
        relationship: influence
        status: SRI OAA/CALO and Siri · institutional lineage, no collaboration
        note: >-
          Cheyer was a principal architect of SRI's Open Agent Architecture and CALO work and a
          cofounder of Siri, carrying SRI's agent and natural-language research into a widely used
          conversational assistant.
      - id: machines-abadi
        label: Martín Abadi
        relationship: influence
        status: Formal security and protocol logics · no collaboration
        note: >-
          Abadi's Stanford doctorate under Manna was on temporal theorem proving. His later work
          brought logic, process calculi, and formal semantics directly into authentication,
          cryptographic-protocol analysis, programming languages, and computer security.
      - id: machines-lincoln
        label: Patrick Lincoln
        relationship: influence
        status: Direct SRI colleague · formal methods, security, and fault tolerance
        note: >-
          Lincoln earned his Stanford doctorate in linear logic and built a long SRI line spanning
          formal verification, security protocols, privacy, fault tolerance, and
          dependable distributed systems. This card records a direct institutional-colleague
          connection, not a claim that every mapped paper was coauthored with him.
      - id: machines-lamport
        label: Leslie Lamport
        relationship: influence
        status: Formal specification of concurrent systems · no collaboration
        note: "Lamport developed formal modeling and verification methods, including TLA+, for reasoning about distributed and concurrent systems."
      - id: machines-sifakis
        label: Joseph Sifakis
        relationship: influence
        status: Model checking and embedded systems · no collaboration
        note: "Sifakis helped establish model checking as an effective technology for automatically verifying concurrent, real-time, and embedded systems."
      - id: machines-gene-tsudik
        label: Gene Tsudik
        relationship: collaborator
        catalog_authors: [Gene Tsudik]
        complete_catalog_coauthorship: true
        status: Direct collaborator · all 21 catalog paper records mapped
        note: >-
          Coauthor across twenty-one cataloged works spanning cooperative and confidential mobile
          networking; ALARM and PRISM anonymous routing; secure network coding; group distance
          bounding; web-fraud measurement; roots of trust, remote attestation, verified embedded
          security, and proofs of execution; and private anonymous bulletin boards.
      - id: machines-vitor-pereira
        label: Vitor Pereira
        relationship: collaborator
        catalog_authors: [Vitor Pereira]
        complete_catalog_coauthorship: true
        status: Direct collaborator · all 3 catalog publications mapped
        note: >-
          Coauthor on all three cataloged works: machine-checked MPC evaluation, machine-checked
          MPC-in-the-head zero knowledge, and verified parallel and memory-access optimizations for
          zero knowledge.
