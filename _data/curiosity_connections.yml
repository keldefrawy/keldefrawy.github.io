schema_version: "1.0"

evidence_note: >-
  These maps show conceptual connections, not claims of citation or direct
  intellectual influence. Dashed lineage links are deliberately broader than
  direct paper-topic links.

link_types:
  direct:
    label: Direct connection
    description: A well-established person-to-idea relationship or a work that centrally studies the linked idea.
  uses:
    label: Uses
    description: The work employs the linked idea or primitive as a component rather than its main contribution.
  lineage:
    label: Conceptual lineage
    description: A historical or conceptual bridge that does not assert citation or direct influence.

scenes:
  hotel:
    title: "Hilbert’s Margin Hotel"
    map_title: "From Foundations to Verified Cryptography"
    description: "How foundational questions about infinity, proof, computation, and machines reappear in modern cryptographic research."
    people:
      - id: hotel-hilbert
        label: David Hilbert
      - id: hotel-cantor
        label: Georg Cantor
      - id: hotel-godel
        label: Kurt Gödel
      - id: hotel-turing
        label: Alan Turing
      - id: hotel-von-neumann
        label: John von Neumann
    ideas:
      - id: hotel-infinity
        label: Infinity and set theory
      - id: hotel-formal-methods
        label: Formal systems and machine-checked proof
      - id: hotel-resource-bounds
        label: Resource-bounded computation
      - id: hotel-architecture
        label: Computer architecture
    papers:
      - id: hotel-paper-51
        publication_id: 51
        label: "#51 · Machine-checked MPC"
        title: "A High-Assurance Evaluator for Machine-Checked Secure Multiparty Computation"
        url: /knowledge/papers/paper-51/
        note: "Formalizes MPC in EasyCrypt and extracts executable code from verified specifications."
      - id: hotel-paper-58
        publication_id: 58
        label: "#58 · Machine-checked zero knowledge"
        title: "Machine-Checked ZKP for NP Relations: Formally Verified Security Proofs and Implementations of MPC-in-the-Head"
        url: /knowledge/papers/paper-58/
        note: "Machine-checks a general transformation from secure computation to zero-knowledge proofs."
      - id: hotel-paper-78
        publication_id: 78
        label: "#78 · Timed-protocol composition"
        title: "Composing Timed Cryptographic Protocols: Foundations and Applications"
        url: /knowledge/papers/paper-78/
        note: "Models residual complexity across adversarial depth and proves timed-protocol composition results."
      - id: hotel-paper-59
        publication_id: 59
        label: "#59 · F1 FHE accelerator"
        title: "F1: A Fast and Programmable Accelerator for Fully Homomorphic Encryption (Extended Version)"
        url: /knowledge/papers/paper-59/
        note: "Co-designs a programmable architecture and compiler for complete FHE programs."
    patents: []
    links:
      - from: hotel-cantor
        to: hotel-infinity
        type: direct
        label: founded modern set theory
      - from: hotel-hilbert
        to: hotel-infinity
        type: lineage
        label: the infinite-hotel thought experiment
      - from: hotel-hilbert
        to: hotel-formal-methods
        type: direct
        label: formalization and the decision problem
      - from: hotel-godel
        to: hotel-formal-methods
        type: direct
        label: limits of formal proof
      - from: hotel-turing
        to: hotel-formal-methods
        type: lineage
        label: mechanized reasoning
      - from: hotel-turing
        to: hotel-resource-bounds
        type: lineage
        label: models of computation
      - from: hotel-von-neumann
        to: hotel-architecture
        type: direct
        label: stored-program architecture
      - from: hotel-formal-methods
        to: hotel-paper-51
        type: direct
        label: verified MPC
      - from: hotel-formal-methods
        to: hotel-paper-58
        type: direct
        label: verified zero knowledge
      - from: hotel-resource-bounds
        to: hotel-paper-78
        type: direct
        label: depth-indexed residual complexity
      - from: hotel-architecture
        to: hotel-paper-59
        type: direct
        label: specialized cryptographic architecture

  tour:
    title: "The One-Bit Grand Tour"
    map_title: "From Capacity to Qubits"
    description: "A bit travels through information theory, public-key cryptography, and quantum computation."
    people:
      - id: tour-shannon
        label: Claude Shannon
      - id: tour-diffie-hellman
        label: Whitfield Diffie and Martin Hellman
      - id: tour-rsa
        label: Rivest, Shamir, and Adleman
      - id: tour-feynman
        label: Richard Feynman
      - id: tour-shor
        label: Peter Shor
    ideas:
      - id: tour-capacity-coding
        label: Channel capacity and coding
      - id: tour-key-exchange
        label: Public-key agreement
      - id: tour-public-key
        label: Public-key encryption
      - id: tour-timed-release
        label: Rivest–Shamir–Wagner time-lock puzzles
      - id: tour-quantum
        label: Quantum algorithms and protocols
      - id: tour-post-quantum
        label: Post-quantum cryptography
    papers:
      - id: tour-paper-11
        publication_id: 11
        label: "#11 · Encryption and channel capacity"
        title: "Link-Layer Encryption Effect on Achievable Capacity in Wireless Network Coding"
        url: /knowledge/papers/paper-11/
        note: "Directly studies how encryption changes achievable multicast capacity in wireless network coding."
      - id: tour-paper-22
        publication_id: 22
        label: "#22 · Network-coding throughput"
        title: "Neighborhood Watch: On Network Coding Throughput and Key Sharing"
        url: /knowledge/papers/paper-22/
        note: "Studies how link-key group size and assignment trade compromise exposure against wireless network-coding throughput."
      - id: tour-paper-57
        publication_id: 57
        label: "#57 · Regenerating codes and secret sharing"
        title: "On Regenerating Codes and Proactive Secret Sharing: Relationships and Implications"
        url: /knowledge/papers/paper-57/
        note: "Relates distributed-storage coding to proactive secret sharing and repair."
      - id: tour-paper-68
        publication_id: 68
        label: "#68 · Covert authenticated key exchange"
        title: "Short Concurrent Covert Authenticated Key Exchange (Short cAKE)"
        url: /knowledge/papers/paper-68/
        note: "Constructs a modern authenticated key-exchange protocol with covert, concurrent transcripts."
      - id: tour-paper-56
        publication_id: 56
        label: "#56 · Registration-based encryption"
        title: "Optimizing Registration Based Encryption"
        url: /knowledge/papers/paper-56/
        note: "Optimizes a public-key-encryption model that removes identity-based encryption's key escrow."
      - id: tour-paper-73
        publication_id: 73
        label: "#73 · Multi-party time-lock puzzles"
        title: "Multi-Party Time-Lock Puzzles: Quorum-Controlled Delays Without a Single Point of Failure"
        url: /knowledge/papers/paper-73/
        note: "Distributes control of delayed release across a quorum."
      - id: tour-paper-60
        publication_id: 60
        label: "#60 · Quantum optimization"
        title: "Quantum Optimization Heuristics with an Application to Knapsack Problems"
        url: /knowledge/papers/paper-60/
        note: "Develops and simulates shallow QAOA-style heuristics for constrained optimization."
      - id: tour-paper-70
        publication_id: 70
        label: "#70 · Quantum distance bounding"
        title: "Entanglement-Based Mutual Quantum Distance Bounding"
        url: /knowledge/papers/paper-70/
        note: "Uses entangled states in a mutual distance-bounding protocol."
      - id: tour-paper-77
        publication_id: 77
        label: "#77 · Post-quantum point obfuscation"
        title: "Towards Further Realizing Random Oracles: Post-Quantum Non-Malleable Point Obfuscation"
        url: /knowledge/papers/paper-77/
        status: Ongoing work
        note: "An ongoing post-quantum project; no public manuscript is currently linked."
    patents: []
