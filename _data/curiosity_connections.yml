  cipher:
    title: "The Great Cipher Relay"
    map_title: "A Century of Cryptographic Ideas"
    description: "A unified four-layer map from foundational cryptographic scientists through documented co-authors to ideas and selected papers, shared by the sidebar and full scientific knowledge map."
    notes:
      - kind: computation
        label: Computational foundation
        text: "Turing’s lasting role in cryptography is also foundational: efficient adversaries, reductions, and security experiments are modeled as algorithms, commonly using probabilistic Turing machines or equivalent circuits."
    people:
      - id: cipher-turing
        label: Alan Turing
        relationship: influence
        status: Intellectual foundation · no collaboration
        note: "Beyond cryptanalysis, Turing’s general model of computation underlies the efficient algorithm and adversary models used throughout computational-security proofs."
      - id: cipher-shannon
        label: Claude Shannon
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: cipher-diffie-hellman
        label: Whitfield Diffie and Martin Hellman
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: cipher-rsa
        label: Rivest, Shamir, and Adleman
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: cipher-goldwasser
        label: Shafi Goldwasser
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: cipher-micali
        label: Silvio Micali
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: cipher-miller
        label: Victor Miller
        relationship: influence
        status: Intellectual foundation · no collaboration
        note: "Miller independently proposed using elliptic-curve groups for public-key cryptography in 1985. His Miller algorithm also supplies a separate lineage to elliptic-curve pairings."
      - id: cipher-koblitz
        label: Neal Koblitz
        relationship: influence
        status: Intellectual foundation · no collaboration
        note: "Koblitz independently proposed using elliptic-curve groups for public-key cryptography in 1985, in parallel with Victor Miller."
      - id: cipher-gentry
        label: Craig Gentry
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: cipher-gene-tsudik
        label: Gene Tsudik
        relationship: collaborator
        catalog_authors: [Gene Tsudik]
        complete_catalog_coauthorship: true
        status: Direct collaborator · all 21 catalog paper records mapped
        note: >-
          Coauthor across twenty-one cataloged works spanning cooperative and confidential mobile
          networking; ALARM and PRISM anonymous routing; secure network coding; group distance
          bounding; web-fraud measurement; roots of trust, remote attestation, verified embedded
          security, and proofs of execution; and private anonymous bulletin boards.
      - id: cipher-moti-yung
        label: Moti Yung
        relationship: collaborator
        status: Direct collaborator · proactive and timed cryptography
        note: "Coauthor on proactive MPC and multi-party time-lock puzzles among a broader body of joint work."
      - id: cipher-rafail-ostrovsky
        label: Rafail Ostrovsky
        relationship: collaborator
        status: Direct collaborator · MPC and post-quantum security
        note: "Coauthor on proactive secure computation and a broader program spanning formal and post-quantum cryptography."
      - id: cipher-stanislaw-jarecki
        label: Stanisław Jarecki
        relationship: collaborator
        status: Direct collaborator · authenticated key exchange
        note: "Coauthor on short concurrent covert authenticated key exchange."
      - id: cipher-nigel-smart
        label: Nigel Smart
        relationship: collaborator
        status: Direct collaborator · public-key encryption
        note: "Coauthor on registration-based encryption."
      - id: cipher-tancrede-lepoint
        label: Tancrède Lepoint
        relationship: collaborator
        catalog_author_groups:
          - [Tancrede Lepoint, Tancrède Lepoint]
        status: Direct collaborator · 6 publications and 4 granted joint patents mapped
        note: >-
          Direct coauthor across proactive secret sharing and MPC, secure biometric re-enrollment,
          cryptographic access control, and blockchain cyber insurance. Dashed links to public-key,
          FHE, lattice, and post-quantum cryptography record his broader research expertise rather
          than claiming additional joint papers in those areas.
      - id: cipher-gabriela-ciocarlie
        label: Gabriela F. Ciocarlie
        relationship: collaborator
        catalog_authors: [Gabriela F. Ciocarlie]
        status: Direct SRI collaborator and co-inventor · blockchain security and privacy
        note: >-
          Direct coauthor on BlockCIS and co-inventor on Smart Privacy and Controlled Exposure on
          Blockchains. Broader blockchain-security and privacy connections are marked as lineage.
      - id: cipher-ben-terner
        label: Benjamin Terner
        relationship: collaborator
        status: Direct collaborator · 9 catalog publications
        note: "Coauthor across timed cryptography, consensus, maliciously secure MPC, concurrent group messaging, private bulletin boards, and the later PRISM messaging overlay."
      - id: cipher-nicholas-genise
        label: Nicholas Genise
        relationship: collaborator
        status: Direct collaborator · key exchange and FHE
        note: "Coauthor on covert authenticated key exchange, the F1 accelerator, and hardness results for switching between FHE schemes."
      - id: cipher-vitor-pereira
        label: Vitor Pereira
        relationship: collaborator
        catalog_authors: [Vitor Pereira]
        complete_catalog_coauthorship: true
        status: Direct collaborator · all 3 catalog publications mapped
        note: >-
          Coauthor on all three cataloged works: machine-checked MPC evaluation, machine-checked
          MPC-in-the-head zero knowledge, and verified parallel and memory-access optimizations for
          zero knowledge.
      - id: cipher-kelong-cong
        label: Kelong Cong
        relationship: collaborator
        status: Direct collaborator · public-key encryption, MPC, and messaging
        note: "Coauthor on registration-based encryption, maliciously secure decomposable MPC, and the key-lattice framework for concurrent group messaging."
      - id: cipher-claudia-diaz
        label: Claudia Díaz
        relationship: collaborator
        status: Direct collaborator · mixnet traffic analysis and metadata privacy
        note: "Direct coauthor on traffic analysis with partial visibility; broader anonymity and metadata-privacy links are marked as intellectual lineage."
      - id: cipher-jonathan-katz
        label: Jonathan Katz
        relationship: collaborator
        status: Direct collaborator · reusable fuzzy extractors
        note: "Direct coauthor on reusable fuzzy extractors from LWE; broader MPC and Byzantine-agreement connections are intellectual lineage."
      - id: science-cipher-peikert
