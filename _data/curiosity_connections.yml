  labs:
    title: "The R&D Labyrinth"
    map_title: "From American Research Laboratories to Secure Systems"
    description: >-
      A research lineage connecting Bell Labs and AT&T, formative IBM Research collaborations,
      HRL's ruby-laser tradition, and SRI International to the computing, formal-methods,
      cryptography, privacy, automation, and resilient-systems work that followed.
    notes:
      - kind: chronology
        label: The route through the laboratories
        text: >-
          The visual begins with Claude Shannon and Peter G. Neumann at Bell Labs, crosses the
          IBM/Bell/AT&T cryptography bridge around Juan Garay, Moti Yung, Gene Tsudik, and Stas
          Jarecki, refracts through HRL's ruby-laser motif, and continues through SRI formal
          methods, security, and cryptography to Karim. IBM is a collaboration lineage here, not
          an employment claim about Karim or Stas.
      - kind: relationship
        label: Institutional history is not coauthorship
        text: >-
          Historical laboratory figures and direct institutional colleagues are shown as context,
          not as coauthors. Peter G. Neumann is shown as a Bell Labs-to-SRI institutional and
          intellectual bridge. Juan Garay, Moti Yung, Gene Tsudik, Stas Jarecki, Ashish Gehani,
          Hassen Saïdi, Linda Briesemeister, Tim McCarthy, Christopher Peikert, Tancrède Lepoint,
          Gabriela F. Ciocarlie, and Vitor Pereira are separately marked as documented direct
          collaborators; placement does not assert employment at a named laboratory, and
          co-inventorship is stated only where a joint patent is listed.
    people:
      - id: labs-shannon
        label: Claude Shannon
        relationship: influence
        status: Bell Labs · information theory · no collaboration
        note: >-
          Shannon developed information theory at Bell Labs, establishing foundations for digital
          communication, coding, compression, cryptography, and the internet.
      - id: labs-thompson-ritchie
        label: Ken Thompson & Dennis Ritchie
        relationship: influence
        status: Bell Labs · UNIX and C · no collaboration
        note: >-
          Thompson and Ritchie created UNIX at Bell Labs; Ritchie's C language and their systems
          work became enduring foundations for networked and secure computing.
      - id: labs-maiman
        label: Theodore H. Maiman
        relationship: influence
        status: Hughes Research Laboratories (now HRL) · first working laser · no collaboration
        note: >-
          Maiman and his Hughes Research Laboratories team demonstrated the first working ruby
          laser in Malibu on May 16, 1960, an emblem of experimental industrial research.
      - id: labs-engelbart
        label: Douglas Engelbart
        relationship: influence
        status: SRI · interactive computing and ARPANET · no collaboration
        note: >-
          Engelbart led SRI's Augmentation Research Center, developed NLS and the computer mouse,
          presented the Mother of All Demos, and hosted ARPANET's second node.
      - id: labs-lamport
        label: Leslie Lamport
        relationship: influence
        status: SRI International (1977–1985) · distributed time, Byzantine agreement, and fault tolerance
        note: >-
          Lamport's SRI period produced foundational work on logical clocks, distributed systems,
          Byzantine agreement, and fault tolerance. This is an institutional and intellectual
          lineage connection, not a coauthorship claim.
      - id: labs-feinler
        label: Elizabeth “Jake” Feinler
        relationship: influence
        status: SRI · ARPANET Network Information Center · no collaboration
        note: >-
          Feinler led the SRI Network Information Center that organized ARPANET host information,
          directories, and RFC distribution as the network grew toward the modern internet.
      - id: labs-neumann
        label: Peter G. Neumann
        relationship: influence
        status: Bell Labs (1960–1970) → SRI CSL (1971–2026) · trustworthy systems and computing risks
        note: >-
          Neumann spent a decade at Bell Labs, including work on the Multics file system, before
          joining SRI's Computer Science Laboratory in 1971. His research on security, reliability,
          survivability, high assurance, formal methods, and computer-related risks bridged two
          stops in the laboratory journey until his death in 2026.
      - id: labs-juan-garay
        label: Juan A. Garay
        relationship: collaborator
        catalog_authors: [Juan Garay]
        status: Direct collaborator · IBM Watson → Bell Labs → AT&T Labs · 1 catalog publication
        note: >-
          Garay's research career directly bridges IBM T.J. Watson, Bell Labs, and AT&T
          Labs–Research. He coauthored the secure self-stabilizing computation work with Karim and
          Moti Yung, making him both an institutional and a documented collaboration bridge.
      - id: labs-moti-yung
        label: Moti Yung
        relationship: collaborator
        catalog_authors: [Moti Yung]
        status: Direct collaborator · IBM T.J. Watson lineage · 11 catalog publications
        note: >-
          Yung spent a formative period at IBM Research and directly coauthored eleven cataloged
          papers with Karim across proactive secret sharing, secure multiparty computation,
          self-stabilization, timed cryptography, and related foundations.
      - id: labs-gene-tsudik
        label: Gene Tsudik
        relationship: collaborator
        catalog_authors: [Gene Tsudik]
        complete_catalog_coauthorship: true
        status: Direct collaborator · IBM Zurich lineage · all 21 catalog paper records mapped
        note: >-
          Tsudik worked at IBM Zurich Research Laboratory before his UCI career and coauthored
          twenty-one cataloged works spanning cooperative and confidential mobile networking;
          ALARM and PRISM anonymous routing; secure network coding; group distance bounding;
          web-fraud measurement; remote attestation and verified embedded security; and private
          anonymous bulletin boards.
      - id: labs-vitor-pereira
        label: Vitor Pereira
        relationship: collaborator
        catalog_authors: [Vitor Pereira]
        complete_catalog_coauthorship: true
        status: Direct collaborator · all 3 catalog publications mapped
        note: >-
          Coauthor on all three cataloged works: machine-checked MPC evaluation, machine-checked
          MPC-in-the-head zero knowledge, and verified parallel and memory-access optimizations for
          zero knowledge.
      - id: labs-stas-jarecki
        label: Stanisław “Stas” Jarecki
        relationship: collaborator
        catalog_authors: [Stanislaw Jarecki]
        status: Direct graduate-school collaborator · 2 catalog publications · not IBM staff
        note: >-
          Jarecki directly coauthored Short cAKE and the private identity-based bulletin-board work
          with Karim. He is placed beside the IBM group as a formative cryptography collaborator,
          while the map explicitly avoids assigning him an IBM employment affiliation.
      - id: labs-shankar
        label: Natarajan Shankar
        relationship: influence
        status: Direct SRI colleague · PVS · not a coauthorship claim
        note: >-
          Shankar created the influential Prototype Verification System at SRI and developed
          machine-assisted methods spanning logic, programming, verification, and certification.
      - id: labs-lincoln
        label: Patrick Lincoln
        relationship: influence
        status: Direct SRI colleague · formal methods and security · not a coauthorship claim
        note: >-
          Lincoln led SRI research across formal methods, computer security and privacy,
          fault tolerance, distributed systems, and scalable survivable systems.
      - id: labs-dutertre
        label: Bruno Dutertre
        relationship: influence
        status: Direct SRI colleague · Yices and SMT solving · not a coauthorship claim
        note: >-
          Dutertre developed SRI's Yices SMT solver, connecting efficient decision procedures
          with automated theorem proving and hardware and software verification.
      - id: labs-rushby
        label: John Rushby
        relationship: influence
        status: Direct SRI colleague · PVS, formal methods, and dependable systems · no coauthorship claim
        note: >-
          Rushby's SRI work connects PVS, theorem proving, automated assurance, and the design of
          dependable and safety-critical systems. This is an institutional and intellectual link,
          not a claim of direct paper coauthorship.
      - id: labs-brent-waters
        label: Brent Waters
        relationship: influence
        status: SRI CSL alumnus (2005–2008) · attribute-based encryption · no coauthorship claim
        note: >-
          Waters' SRI work helped establish attribute-based encryption and advanced public-key
          cryptography. His SRI tenure predates Karim's; this card records institutional and
          intellectual lineage rather than collaboration.
      - id: labs-christopher-peikert
        label: Christopher Peikert
        relationship: collaborator
        catalog_author_groups:
          - [Chris Peikert, Christopher Peikert]
        status: SRI CSL alumnus (2006–2009) · later direct collaborator · all 2 publications mapped
        note: >-
          Peikert's SRI work advanced lattice-based cryptography. He later directly coauthored the
          F1 and CraterLake FHE-accelerator papers with Karim; those two publication links are
          mapped explicitly.
      - id: labs-lepoint
        label: Tancrède Lepoint
        relationship: collaborator
        catalog_author_groups:
          - [Tancrede Lepoint, Tancrède Lepoint]
        status: Direct collaborator · 6 publications and 4 granted joint patents mapped
        note: >-
          A direct coauthor on six papers spanning proactive secret sharing and MPC,
          cryptographically enforced access control, secure biometrics, and blockchain cyber
          insurance; also a co-inventor on four granted U.S. patents listed in this map. Broader
          lineage links record his public-key, FHE, lattice, and post-quantum work without treating
          those broader topics as additional coauthorship.
      - id: labs-gabriela-ciocarlie
        label: Gabriela F. Ciocarlie
        relationship: collaborator
        catalog_authors: [Gabriela F. Ciocarlie]
        status: Direct SRI collaborator and co-inventor · blockchain security and privacy
        note: >-
          A direct coauthor on BlockCIS and co-inventor on Smart Privacy and Controlled Exposure on
          Blockchains, connecting SRI work in privacy, distributed ledgers, and secure systems.
      - id: labs-ashish-gehani
        label: Ashish Gehani
        relationship: collaborator
        catalog_authors: [Ashish Gehani]
        status: Direct SRI collaborator · 1 catalog publication mapped · data provenance and cyber analytics
        note: >-
          A direct coauthor on the longitudinal Bitcoin-misuse analysis. Broader lineage records
          Gehani's SRI work on data provenance, digital forensics, trustworthy computing, software
          debloating, and cyber-threat detection without implying additional joint publications.
      - id: labs-hassen-saidi
        label: Hassen Saïdi
        relationship: collaborator
        catalog_authors: [Hassen Saïdi]
        status: Direct SRI collaborator · 1 publication and 1 granted joint patent mapped
        note: >-
          A direct coauthor and co-inventor on automated analysis and augmentation of legacy
          cryptographic executables. His broader SRI work spans computer-aided verification,
          formal methods, static analysis, malware analysis, and reverse engineering.
      - id: labs-linda-briesemeister
        label: Linda Briesemeister
        relationship: collaborator
        catalog_authors: [Linda Briesemeister]
        status: Direct SRI collaborator · 1 catalog publication mapped
        note: >-
          A direct coauthor on the later PRISM intrusion-resilient messaging overlay. Her broader
          SRI work includes distributed algorithms, mobile and ad hoc networks, malicious-code
          propagation, and collaborative network defense.
      - id: labs-tim-mccarthy
        label: Tim McCarthy
        relationship: collaborator
        catalog_authors: [Tim McCarthy]
        status: Direct SRI collaborator · 1 catalog publication mapped
        note: >-
          A direct coauthor on the later PRISM privacy-preserving, intrusion-resilient secure
          multiparty-computation-based messaging overlay.
