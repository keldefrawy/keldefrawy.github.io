schema_version: "1.3"

evidence_note: >-
  Historical and foundational scientists mark intellectual lineage only; Karim has
  not collaborated with them. People marked as direct collaborators are documented
  co-authors. Dashed lineage links are deliberately broader than direct paper-topic
  links, and foundation notes identify shared frameworks without treating them as
  each paper’s topic. This is a living, subjective, point-in-time knowledge map. It
  may contain unintentional omissions, and additional collaborators, influences,
  ideas, works, and connections will be reviewed and added as the map evolves.

link_types:
  direct:
    label: Direct research connection
    description: A well-established person-to-idea relationship or a work that centrally studies the linked idea.
  uses:
    label: Uses
    description: The work employs the linked idea or primitive as a component rather than its main contribution.
  lineage:
    label: Conceptual lineage
    description: A historical or conceptual bridge that does not assert citation or direct influence.
scenes:
  hotel:
    title: "Hilbert’s Margin Hotel"
    map_title: "From Foundations to Reliable Cryptographic Systems"
    description: "A condensed four-layer view: mathematical and computational foundations, documented co-authors, research ideas, and selected cryptographic and distributed-systems work."
    notes:
      - kind: mathematics
        label: Mathematical foundation
        text: "Modern set theory, founded by Cantor, supplies the standard language of sets, functions, relations, and mathematical structures used throughout cryptography. Hilbert’s axiomatic program made foundations and formal proof central questions."
      - kind: computation
        label: Computational foundation
        text: "Modern cryptography models adversaries and reductions as efficient algorithms, often probabilistic Turing machines or equivalent circuits; Turing’s model therefore underlies computational security proofs."
      - kind: systems
        label: Reliable-computation lineage
        text: "Von Neumann studied how reliable computation can emerge from unreliable components. Modern distributed fault tolerance, self-stabilization, resilience, and consensus are later developments along this conceptual thread—not fields he originated in their present form."
    people:
      - id: hotel-hilbert
        label: David Hilbert
        relationship: influence
        status: Intellectual foundation · no collaboration
        note: "Hilbert’s axiomatic program made mathematical foundations and formal proof central; Hilbert’s Hotel also illustrates countable infinity."
      - id: hotel-cantor
        label: Georg Cantor
        relationship: influence
        status: Intellectual foundation · no collaboration
        note: "Cantor founded modern set theory and made comparisons among infinite sets mathematically precise."
      - id: hotel-godel
        label: Kurt Gödel
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: hotel-turing
        label: Alan Turing
        relationship: influence
        status: Intellectual foundation · no collaboration
        note: "Turing’s general model of computation underlies modern definitions of algorithms and efficient adversaries, often through equivalent circuit or RAM models."
      - id: hotel-von-neumann
        label: John von Neumann
        relationship: influence
        status: Intellectual foundation · no collaboration
        note: "Von Neumann shaped stored-program architecture and studied how reliable computation can be built from unreliable components. This is a conceptual precursor to modern fault-tolerant and distributed systems, not a claim that he developed today’s consensus protocols."
      - id: science-hotel-danny-dolev
        label: Danny Dolev
        relationship: influence
        status: Senior influence · Byzantine agreement and fault tolerance
        note: "A foundational contributor to Byzantine agreement, fault-tolerant distributed algorithms, and self-stabilizing Byzantine agreement. The dashed path to Shlomi Dolev records intellectual influence, not collaboration or doctoral advising."
      - id: science-hotel-gilles-barthe
        label: Gilles Barthe
        relationship: influence
        status: Senior tool influence · EasyCrypt
        note: "Coauthor of the paper that introduced EasyCrypt and a leader of its development; the dashed path records the tool and proof-method lineage behind Vitor Pereira’s shared work."
      - id: science-hotel-benjamin-gregoire
        label: Benjamin Grégoire
        relationship: influence
        status: Senior tool influence · EasyCrypt
        note: "Coauthor of the paper that introduced EasyCrypt and one of its main implementors; the dashed path records proof-assistant and automation lineage."
      - id: hotel-vitor-pereira
        label: Vitor Pereira
        relationship: collaborator
        status: Direct collaborator · verified MPC and ZK
        note: "Coauthor on the machine-checked MPC evaluator and machine-checked MPC-in-the-head zero-knowledge work."
      - id: hotel-norrathep-rattanavipanon
        label: Norrathep Rattanavipanon
        relationship: collaborator
        status: Direct collaborator · verified attestation and execution
        note: "Coauthor on VRASED’s formally verified remote-attestation architecture and APEX’s verified proofs of execution."
      - id: hotel-ivan-nunes
        label: Ivan De Oliveira Nunes
        relationship: collaborator
        status: Direct collaborator · verified attestation and execution
        note: "Coauthor on VRASED’s formally verified remote-attestation architecture and APEX’s verified proofs of execution."
      - id: hotel-rafail-ostrovsky
        label: Rafail Ostrovsky
        relationship: collaborator
        status: Direct collaborator · proactive and resilient systems
        note: "Coauthor across proactive security, secure self-stabilization, resilient cloud infrastructure, and related secure-computation work."
      - id: hotel-moti-yung
        label: Moti Yung
        relationship: collaborator
        status: Direct collaborator · proactive, timed, and repair systems
        note: "Coauthor on proactive security, secure self-stabilization, distributed repair, and timed cryptography."
      - id: hotel-juan-garay
        label: Juan Garay
        relationship: collaborator
        status: Direct collaborator · secure self-stabilization
        note: "Coauthor on secure self-stabilizing computation."
      - id: science-hotel-shlomi-dolev
        label: Shlomi Dolev
        relationship: collaborator
        status: Direct collaborator · self-stabilization and proactive sharing
        note: "Coauthor on secure self-stabilizing computation and dishonest-majority proactive secret sharing."
      - id: hotel-fhe-collaborators
        label: Christopher Peikert and Srinivas Devadas
        relationship: collaborator
        catalog_author_groups:
          - [Chris Peikert]
          - [Srini Devadas, Srinivas Devadas]
        status: Direct collaborators · F1
        note: "Both are coauthors on the F1 fully homomorphic-encryption accelerator."
    ideas:
      - id: hotel-foundations
        label: Set theory and mathematical foundations
        status: Foundation beneath the mathematics
        foundation: true
        scope: all_work
        note: "Most mathematics used in cryptography can be formalized in axiomatic set theory; this is a foundational dependency, not a claim that the linked papers study set theory."
      - id: hotel-formal-methods
        label: Formal systems and machine-checked proof
      - id: hotel-verified-attestation
        label: Verified remote attestation and proofs of execution
        note: "Machine-checked architectures establish that a low-end remote device is in an expected state or executed specified software, even under full software compromise."
      - id: hotel-computational-security
        label: Turing machines and computational security
        status: Foundation for security proofs
        foundation: true
        note: "Cryptographic proofs model adversaries, simulators, and reductions as efficient probabilistic algorithms—commonly Turing machines or equivalent circuit models."
      - id: hotel-architecture
        label: Computer architecture
      - id: hotel-reliable-computation
        label: Reliable computation from unreliable components
        status: Von Neumann’s direct contribution
        foundation: true
        note: "Von Neumann analyzed redundancy and probabilistic methods for synthesizing reliable computation from unreliable logical components."
      - id: hotel-distributed-resilience
        label: Distributed systems, consensus, and recovery
        status: Later conceptual lineage
        foundation: true
        note: "Modern Byzantine consensus, self-stabilization, proactive recovery, and resilient infrastructure extend the reliable-computation problem into distributed settings."
      - id: science-hotel-byzantine-self-stabilization
        label: Byzantine-resilient self-stabilization
        status: Fault tolerance under transient and Byzantine faults
    papers:
      - id: hotel-paper-51
        publication_id: 51
        label: "#51 · Machine-checked MPC"
        title: "A High-Assurance Evaluator for Machine-Checked Secure Multiparty Computation"
        url: /knowledge/papers/paper-51/
        note: "Formalizes MPC in EasyCrypt and extracts executable code from verified specifications."
      - id: hotel-paper-58
        publication_id: 58
        label: "#58 · Machine-checked zero knowledge"
        title: "Machine-Checked ZKP for NP Relations: Formally Verified Security Proofs and Implementations of MPC-in-the-Head"
        url: /knowledge/papers/paper-58/
        note: "Machine-checks a general transformation from secure computation to zero-knowledge proofs."
      - id: hotel-paper-50
        publication_id: 50
        label: "#50 · VRASED verified attestation"
        title: "VRASED: A Verified Hardware/Software Co-Design for Remote Attestation"
        url: /knowledge/papers/paper-50/
        note: "Formally specifies and verifies a hardware/software remote-attestation architecture for low-end embedded devices."
      - id: hotel-paper-54
        publication_id: 54
        label: "#54 · APEX proofs of execution"
        title: "APEX: A Verified Architecture for Proofs of Execution on Remote Devices Under Full Software Compromise"
        url: /knowledge/papers/paper-54/
        note: "Extends verified embedded-device security from attesting state to proving that specified software executed and produced an authenticated result."
      - id: hotel-paper-78
        publication_id: 78
        label: "#78 · Timed-protocol composition"
        title: "Composing Timed Cryptographic Protocols: Foundations and Applications"
        url: /knowledge/papers/paper-78/
        note: "Models residual complexity across adversarial depth and proves timed-protocol composition results."
      - id: hotel-paper-59
        publication_id: 59
        label: "#59 · F1 FHE accelerator"
        title: "F1: A Fast and Programmable Accelerator for Fully Homomorphic Encryption (Extended Version)"
        url: /knowledge/papers/paper-59/
        note: "Co-designs a programmable architecture and compiler for complete FHE programs."
      - id: hotel-paper-36
        publication_id: 36
        label: "#36 · PODC secure self-stabilization"
        title: "Brief Announcement: Secure Self-Stabilizing Computation"
        url: /knowledge/papers/paper-36/
        note: "Defines distributed computation that autonomously recovers correctness, privacy, and integrity after transient compromise."
      - id: hotel-paper-25
        publication_id: 25
        label: "#25 · PODC proactive MPC"
        title: "How to Withstand Mobile Virus Attacks, Revisited"
        url: /knowledge/papers/paper-25/
        note: "Builds proactive MPC that remains secure while corruptions move among machines over time."
      - id: hotel-paper-31
        publication_id: 31
        label: "#31 · PODC dishonest-majority sharing"
        title: "Brief Announcement: Proactive Secret Sharing with a Dishonest Majority"
        url: /knowledge/papers/paper-31/
        note: "Shows proactive secret sharing can retain confidentiality under mobile and dishonest-majority corruption patterns."
      - id: hotel-paper-63
        publication_id: 63
        label: "#63 · Byzantine consensus"
        title: "How Byzantine Is a Send Corruption?"
        url: /knowledge/papers/paper-63/
        note: "Studies consensus under Byzantine, send, and receive faults and compares their power and resilience thresholds."
      - id: hotel-paper-29
        publication_id: 29
        label: "#29 · Byzantine-fault-tolerant SDN"
        title: "Byzantine Fault Tolerant Software-Defined Networking (SDN) Controllers"
        url: /knowledge/papers/paper-29/
        note: "Uses replicated state-machine controllers so an SDN control plane can survive malicious components."
      - id: hotel-paper-23
        publication_id: 23
        label: "#23 · Resilient cloud infrastructure"
        title: "An Architecture for a Resilient Cloud Computing Infrastructure"
        url: /knowledge/papers/paper-23/
        note: "Designs a self-healing cloud control plane that restores compromised nodes and maintains service under continuing corruption."
      - id: hotel-paper-57
        publication_id: 57
        label: "#57 · Distributed repair and refresh"
        title: "On Regenerating Codes and Proactive Secret Sharing: Relationships and Implications"
        url: /knowledge/papers/paper-57/
        note: "Connects distributed-storage repair with proactive secret refresh and recovery under mobile attacks."
