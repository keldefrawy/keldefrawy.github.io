        label: "#51 · Machine-checked MPC"
        title: "A High-Assurance Evaluator for Machine-Checked Secure Multiparty Computation"
        url: /knowledge/papers/paper-51/
        note: "Carries formal reasoning into machine-checked cryptographic implementations."
      - id: cipher-paper-11
        publication_id: 11
        label: "#11 · Encryption and capacity"
        title: "Link-Layer Encryption Effect on Achievable Capacity in Wireless Network Coding"
        url: /knowledge/papers/paper-11/
        note: "Studies the security-throughput tradeoff created by encryption in coded wireless networks."
      - id: cipher-paper-68
        publication_id: 68
        label: "#68 · Covert authenticated key exchange"
        title: "Short Concurrent Covert Authenticated Key Exchange (Short cAKE)"
        url: /knowledge/papers/paper-68/
        note: "Builds a concurrent authenticated key exchange using DDH-group and pairing-curve components."
      - id: cipher-paper-56
        publication_id: 56
        label: "#56 · Registration-based encryption"
        title: "Optimizing Registration Based Encryption"
        url: /knowledge/papers/paper-56/
        note: "A modern public-key-encryption construction focused on eliminating key escrow and reducing cost."
      - id: cipher-paper-73
        publication_id: 73
        label: "#73 · Multi-party time-lock puzzles"
        title: "Multi-Party Time-Lock Puzzles: Quorum-Controlled Delays Without a Single Point of Failure"
        url: /knowledge/papers/paper-73/
        note: "Extends timed release from a single committer to quorum-controlled generation."
      - id: cipher-paper-58
        publication_id: 58
        label: "#58 · Machine-checked zero knowledge"
        title: "Machine-Checked ZKP for NP Relations: Formally Verified Security Proofs and Implementations of MPC-in-the-Head"
        url: /knowledge/papers/paper-58/
        note: "Mechanizes a transformation from MPC to zero-knowledge proofs."
      - id: cipher-paper-44
        publication_id: 44
        label: "#44 · Proactive MPC"
        title: "Proactive Secure Multiparty Computation with a Dishonest Majority"
        url: /knowledge/papers/paper-44/
        note: "Studies secure computation against a mobile adversary that may control a dishonest majority over time."
      - id: cipher-paper-59
        publication_id: 59
        label: "#59 · F1 FHE accelerator"
        title: "F1: A Fast and Programmable Accelerator for Fully Homomorphic Encryption (Extended Version)"
        url: /knowledge/papers/paper-59/
        note: "Accelerates complete FHE programs with specialized hardware and compiler scheduling."
      - id: cipher-paper-65
        publication_id: 65
        label: "#65 · Hardness of FHE scheme switching"
        title: "On the Hardness of Scheme-Switching Between SIMD FHE Schemes"
        url: /knowledge/papers/paper-65/
        note: "Shows that broadly useful exact/approximate FHE switching would imply expensive bootstrapping capabilities."
    patents:
