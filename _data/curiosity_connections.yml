  tour:
    title: "The One-Bit Grand Tour"
    map_title: "From a Secret Bit to Qubits—and Back to Security"
    description: >-
      Follow one protected bit: Shannon defines secrecy and information; Diffie–Hellman and RSA
      make public-key protection possible; Gentry makes computation on encrypted data possible;
      Feynman and Shor show how quantum computation changes the assumptions; and post-quantum
      cryptography asks how to keep the bit secure afterward.
    notes:
      - kind: journey
        label: How to read the tour
        text: >-
          This is a conceptual journey, not a single citation chain: secrecy becomes public-key
          protection, then encrypted computation, then a quantum threat, and finally a post-quantum
          effort to preserve security.
    people:
      - id: tour-shannon
        label: Claude Shannon
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: tour-diffie-hellman
        label: Whitfield Diffie and Martin Hellman
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: tour-rsa
        label: Rivest, Shamir, and Adleman
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: tour-gentry
        label: Craig Gentry
        relationship: influence
        status: Fully homomorphic encryption · no collaboration
        note: "Gentry's FHE breakthrough made general computation on encrypted data possible without first revealing the protected bit."
      - id: tour-feynman
        label: Richard Feynman
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: tour-shor
        label: Peter Shor
        relationship: influence
        status: Intellectual foundation · no collaboration
      - id: tour-gene-tsudik
        label: Gene Tsudik
        relationship: collaborator
        status: Direct collaborator · encrypted network coding
        note: "Coauthor on the study of link-layer encryption and achievable wireless network-coding capacity; the complete collaborators map also shows ALARM, PRISM, distance bounding, messaging, and attestation."
      - id: tour-moti-yung
        label: Moti Yung
        relationship: collaborator
        status: Direct collaborator · coding, sharing, and timed release
        note: "Coauthor on regenerating codes and proactive secret sharing and on multi-party time-lock puzzles."
      - id: tour-ben-terner
        label: Benjamin Terner
        relationship: collaborator
        status: Direct collaborator · timed cryptography
        note: "Coauthor on multi-party time-lock puzzles and related work on timed cryptography."
      - id: tour-nicholas-genise
        label: Nicholas Genise
        relationship: collaborator
        status: Direct collaborator · coding, key exchange, and quantum algorithms
        note: "Coauthor on regenerating codes and proactive secret sharing, covert authenticated key exchange, and quantum optimization heuristics."
      - id: tour-stanislaw-jarecki
        label: Stanisław Jarecki
        relationship: collaborator
        status: Direct collaborator · authenticated key exchange
        note: "Coauthor on short concurrent covert authenticated key exchange."
      - id: tour-nigel-smart
        label: Nigel Smart
        relationship: collaborator
        status: Direct collaborator · public-key encryption
        note: "Coauthor on registration-based encryption."
      - id: tour-wim-van-dam
        label: Wim van Dam
        relationship: collaborator
        catalog_authors: [Wim van Dam]
        status: Direct collaborator · quantum optimization
        note: "Coauthor on quantum optimization heuristics for knapsack problems."
      - id: tour-quantum-distance-collaborators
        label: Aysajan Abidin and Dave Singelée
        relationship: collaborator
        catalog_authors: [Aysajan Abidin, Dave Singelée]
        catalog_match: all
        status: Direct collaborators · quantum distance bounding
        note: "Both are coauthors on entanglement-based mutual quantum distance bounding."
      - id: tour-rafail-ostrovsky
        label: Rafail Ostrovsky
        relationship: collaborator
        status: Direct collaborator · post-quantum obfuscation
        note: "Coauthor on post-quantum non-malleable point obfuscation."
    ideas:
      - id: tour-capacity-coding
        label: Channel capacity and coding
      - id: tour-key-exchange
        label: Public-key agreement
      - id: tour-public-key
        label: Public-key encryption
      - id: tour-encrypted-computation
        label: Computation while data remains encrypted
      - id: tour-timed-release
        label: Rivest–Shamir–Wagner time-lock puzzles
      - id: tour-quantum
        label: Quantum algorithms and protocols
      - id: tour-post-quantum
        label: Post-quantum cryptography
    papers:
      - id: tour-paper-11
        publication_id: 11
        label: "#11 · Encryption and channel capacity"
        title: "Link-Layer Encryption Effect on Achievable Capacity in Wireless Network Coding"
        url: /knowledge/papers/paper-11/
        note: "Directly studies how encryption changes achievable multicast capacity in wireless network coding."
      - id: tour-paper-22
        publication_id: 22
        label: "#22 · Network-coding throughput"
        title: "Neighborhood Watch: On Network Coding Throughput and Key Sharing"
        url: /knowledge/papers/paper-22/
        note: "Studies how link-key group size and assignment trade compromise exposure against wireless network-coding throughput."
      - id: tour-paper-57
        publication_id: 57
        label: "#57 · Regenerating codes and secret sharing"
        title: "On Regenerating Codes and Proactive Secret Sharing: Relationships and Implications"
        url: /knowledge/papers/paper-57/
        note: "Relates distributed-storage coding to proactive secret sharing and repair."
      - id: tour-paper-68
        publication_id: 68
        label: "#68 · Covert authenticated key exchange"
        title: "Short Concurrent Covert Authenticated Key Exchange (Short cAKE)"
        url: /knowledge/papers/paper-68/
        note: "Constructs a modern authenticated key-exchange protocol with covert, concurrent transcripts."
      - id: tour-paper-56
        publication_id: 56
        label: "#56 · Registration-based encryption"
        title: "Optimizing Registration Based Encryption"
        url: /knowledge/papers/paper-56/
        note: "Optimizes a public-key-encryption model that removes identity-based encryption's key escrow."
      - id: tour-paper-59
        publication_id: 59
        label: "#59 · F1 encrypted-computation accelerator"
        title: "F1: A Fast and Programmable Accelerator for Fully Homomorphic Encryption (Extended Version)"
        url: /knowledge/papers/paper-59/
        note: "Accelerates programmable computation on encrypted data."
      - id: tour-paper-64
        publication_id: 64
        label: "#64 · CraterLake unbounded encrypted computation"
        title: "CraterLake: A Hardware Accelerator for Efficient Unbounded Computation on Encrypted Data"
        url: /knowledge/papers/paper-64/
        note: "Builds hardware support for unbounded computation while data remains encrypted."
      - id: tour-paper-73
        publication_id: 73
        label: "#73 · Multi-party time-lock puzzles"
        title: "Multi-Party Time-Lock Puzzles: Quorum-Controlled Delays Without a Single Point of Failure"
        url: /knowledge/papers/paper-73/
        note: "Distributes control of delayed release across a quorum."
      - id: tour-paper-60
        publication_id: 60
        label: "#60 · Quantum optimization"
        title: "Quantum Optimization Heuristics with an Application to Knapsack Problems"
        url: /knowledge/papers/paper-60/
        note: "Develops and simulates shallow QAOA-style heuristics for constrained optimization."
      - id: tour-paper-70
        publication_id: 70
        label: "#70 · Quantum distance bounding"
        title: "Entanglement-Based Mutual Quantum Distance Bounding"
        url: /knowledge/papers/paper-70/
        note: "Uses entangled states in a mutual distance-bounding protocol."
      - id: tour-paper-77
        publication_id: 77
