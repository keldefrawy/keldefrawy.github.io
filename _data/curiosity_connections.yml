  tour:
    title: "The One-Bit Grand Tour"
    map_title: "From Capacity to Qubits"
    description: "A bit travels through information theory, public-key cryptography, and quantum computation."
    people:
      - id: tour-shannon
        label: Claude Shannon
      - id: tour-diffie-hellman
        label: Whitfield Diffie and Martin Hellman
      - id: tour-rsa
        label: Rivest, Shamir, and Adleman
      - id: tour-feynman
        label: Richard Feynman
