<aside class="sidebar-curiosity" data-sidebar-curiosity aria-label="Mathematical and cryptographic curiosities">
  <figure
    class="sidebar-curiosity__scene"
    data-curiosity-scene="hotel"
    aria-labelledby="curiosity-hotel-title"
    aria-describedby="curiosity-hotel-tagline curiosity-hotel-caption"
  >
    <div class="sidebar-curiosity__viewport">
      <img
        class="sidebar-curiosity__image"
        src="{{ '/assets/images/sidebar/hilbert-margin-hotel.webp' | relative_url }}"
        data-curiosity-frames="{{ '/assets/images/sidebar/hilbert-margin-hotel.webp' | relative_url }}|{{ '/assets/images/sidebar/hilbert-margin-hotel-frame-2.webp' | relative_url }}|{{ '/assets/images/sidebar/hilbert-margin-hotel-frame-3.webp' | relative_url }}|{{ '/assets/images/sidebar/hilbert-margin-hotel-frame-4.webp' | relative_url }}"
        alt="Hilbert welcomes Cantor, Gödel, Turing, von Neumann, and Karim as they shift rooms in an infinite hotel."
        width="460"
        height="853"
        loading="lazy"
        decoding="async"
      >
    </div>
    <figcaption class="sidebar-curiosity__content">
      <h2 class="sidebar-curiosity__title" id="curiosity-hotel-title">Hilbert’s Margin Hotel</h2>
      <p class="sidebar-curiosity__tagline" id="curiosity-hotel-tagline">Vacancies: ∞</p>
      <p class="sidebar-curiosity__caption" id="curiosity-hotel-caption">
        There is always room for one more idea.
      </p>
      <button class="sidebar-curiosity__replay" type="button" data-curiosity-replay>
        Make room
      </button>
    </figcaption>
    <p
      class="sidebar-curiosity__status"
      data-curiosity-status
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></p>
  </figure>

  <figure
    class="sidebar-curiosity__scene"
    data-curiosity-scene="tour"
    aria-labelledby="curiosity-tour-title"
    aria-describedby="curiosity-tour-tagline curiosity-tour-caption"
  >
    <div class="sidebar-curiosity__viewport">
      <img
        class="sidebar-curiosity__image"
        src="{{ '/assets/images/sidebar/one-bit-grand-tour.webp' | relative_url }}"
        data-curiosity-frames="{{ '/assets/images/sidebar/one-bit-grand-tour.webp' | relative_url }}|{{ '/assets/images/sidebar/one-bit-grand-tour-frame-2.webp' | relative_url }}|{{ '/assets/images/sidebar/one-bit-grand-tour-frame-3.webp' | relative_url }}|{{ '/assets/images/sidebar/one-bit-grand-tour-frame-4.webp' | relative_url }}"
        alt="A glowing bit travels from Shannon through Diffie, Hellman, Rivest, Shamir, Adleman, Feynman, Shor, and Karim, becoming a qubit."
        width="460"
        height="853"
        loading="lazy"
        decoding="async"
      >
    </div>
    <figcaption class="sidebar-curiosity__content">
      <h2 class="sidebar-curiosity__title" id="curiosity-tour-title">The One-Bit Grand Tour</h2>
      <p class="sidebar-curiosity__tagline" id="curiosity-tour-tagline">From entropy to qubits</p>
      <p class="sidebar-curiosity__caption" id="curiosity-tour-caption">
        Please allow 8–12 seconds for the history of computation.
      </p>
      <button class="sidebar-curiosity__replay" type="button" data-curiosity-replay>
        Send one bit
      </button>
    </figcaption>
    <p
      class="sidebar-curiosity__status"
      data-curiosity-status
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></p>
  </figure>

  <figure
    class="sidebar-curiosity__scene"
    data-curiosity-scene="cipher"
    aria-labelledby="curiosity-cipher-title"
    aria-describedby="curiosity-cipher-tagline curiosity-cipher-caption"
  >
    <div class="sidebar-curiosity__viewport">
      <img
        class="sidebar-curiosity__image"
        src="{{ '/assets/images/sidebar/great-cipher-relay.webp' | relative_url }}"
        data-curiosity-frames="{{ '/assets/images/sidebar/great-cipher-relay.webp' | relative_url }}|{{ '/assets/images/sidebar/great-cipher-relay-frame-2.webp' | relative_url }}|{{ '/assets/images/sidebar/great-cipher-relay-frame-3.webp' | relative_url }}|{{ '/assets/images/sidebar/great-cipher-relay-frame-4.webp' | relative_url }}"
        alt="A cryptographic relay carries a glowing ciphertext from Turing and Shannon through Diffie, Hellman, Rivest, Shamir, Adleman, Goldwasser, Micali, Miller, Gentry, and Karim."
        width="460"
        height="853"
        loading="lazy"
        decoding="async"
      >
    </div>
    <figcaption class="sidebar-curiosity__content">
      <h2 class="sidebar-curiosity__title" id="curiosity-cipher-title">The Great Cipher Relay</h2>
      <p class="sidebar-curiosity__tagline" id="curiosity-cipher-tagline">From Enigma to encrypted computation</p>
      <p class="sidebar-curiosity__caption" id="curiosity-cipher-caption">
        Nearly a century of cryptography, passed hand to hand—plaintext not included.
      </p>
      <button class="sidebar-curiosity__replay" type="button" data-curiosity-replay>
        Pass the ciphertext
      </button>
    </figcaption>
    <p
      class="sidebar-curiosity__status"
      data-curiosity-status
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></p>
  </figure>
</aside>
