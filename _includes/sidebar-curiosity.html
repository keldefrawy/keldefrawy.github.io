<aside class="sidebar-curiosity" data-sidebar-curiosity aria-label="Mathematical curiosities">
  <figure
    class="sidebar-curiosity__scene"
    data-curiosity-scene="hotel"
    aria-labelledby="curiosity-hotel-title"
    aria-describedby="curiosity-hotel-tagline curiosity-hotel-caption curiosity-hotel-cast"
  >
    <div class="sidebar-curiosity__viewport">
      <img
        class="sidebar-curiosity__image"
        src="{{ '/assets/images/sidebar/hilbert-margin-hotel.webp' | relative_url }}"
        data-curiosity-frames="{{ '/assets/images/sidebar/hilbert-margin-hotel.webp' | relative_url }}|{{ '/assets/images/sidebar/hilbert-margin-hotel-frame-2.webp' | relative_url }}|{{ '/assets/images/sidebar/hilbert-margin-hotel-frame-3.webp' | relative_url }}|{{ '/assets/images/sidebar/hilbert-margin-hotel-frame-4.webp' | relative_url }}"
        alt="Hilbert welcomes Cantor, Gödel, Turing, von Neumann, and Karim Eldefrawy as they shift rooms in an infinite hotel."
        width="460"
        height="853"
        loading="lazy"
        decoding="async"
      >
    </div>
    <figcaption class="sidebar-curiosity__content">
      <h2 class="sidebar-curiosity__title" id="curiosity-hotel-title">Hilbert’s Margin Hotel</h2>
      <p class="sidebar-curiosity__tagline" id="curiosity-hotel-tagline">Vacancies: ∞</p>
      <p class="sidebar-curiosity__cast" id="curiosity-hotel-cast">
        <span class="sidebar-curiosity__cast-label">Featuring:</span>
        Hilbert, Cantor, Gödel, Turing, von Neumann, and Karim Eldefrawy
      </p>
      <p class="sidebar-curiosity__caption" id="curiosity-hotel-caption">
        There is always room for one more idea.
      </p>
      <button class="sidebar-curiosity__replay" type="button" data-curiosity-replay>
        Make room
      </button>
    </figcaption>
  </figure>

  <figure
    class="sidebar-curiosity__scene"
    data-curiosity-scene="tour"
    aria-labelledby="curiosity-tour-title"
    aria-describedby="curiosity-tour-tagline curiosity-tour-caption curiosity-tour-cast"
    hidden
  >
    <div class="sidebar-curiosity__viewport">
      <img
        class="sidebar-curiosity__image"
        src="{{ '/assets/images/sidebar/one-bit-grand-tour.webp' | relative_url }}"
        data-curiosity-frames="{{ '/assets/images/sidebar/one-bit-grand-tour.webp' | relative_url }}|{{ '/assets/images/sidebar/one-bit-grand-tour-frame-2.webp' | relative_url }}|{{ '/assets/images/sidebar/one-bit-grand-tour-frame-3.webp' | relative_url }}|{{ '/assets/images/sidebar/one-bit-grand-tour-frame-4.webp' | relative_url }}"
        alt="A glowing bit travels from Shannon through Diffie, Hellman, Rivest, Shamir, Adleman, Feynman, Shor, and Karim Eldefrawy, becoming a qubit."
        width="460"
        height="853"
        loading="lazy"
        decoding="async"
      >
    </div>
    <figcaption class="sidebar-curiosity__content">
      <h2 class="sidebar-curiosity__title" id="curiosity-tour-title">The One-Bit Grand Tour</h2>
      <p class="sidebar-curiosity__tagline" id="curiosity-tour-tagline">From entropy to qubits</p>
      <p class="sidebar-curiosity__cast" id="curiosity-tour-cast">
        <span class="sidebar-curiosity__cast-label">Featuring:</span>
        Shannon, Diffie, Hellman, Rivest, Shamir, Adleman, Feynman, Shor, and Karim Eldefrawy
      </p>
      <p class="sidebar-curiosity__caption" id="curiosity-tour-caption">
        Please allow 8–12 seconds for the history of computation.
      </p>
      <button class="sidebar-curiosity__replay" type="button" data-curiosity-replay>
        Send one bit
      </button>
    </figcaption>
  </figure>

  <p
    class="sidebar-curiosity__status"
    data-curiosity-status
    role="status"
    aria-live="polite"
    aria-atomic="true"
  ></p>
</aside>
