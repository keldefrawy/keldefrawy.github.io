<details class="arcade-settings" data-arcade-setting-panel>
  <summary>
    <span>Arcade presentation settings</span>
    <small data-arcade-setting-summary>Paper Lab · system preferences</small>
  </summary>
  <form class="arcade-settings__form" data-arcade-setting-form autocomplete="off">
    <p class="arcade-settings__intro">
      These local presentation and accessibility preferences never change game rules, random draws, replay
      actions, scores, or cryptographic claims.
    </p>
    <div class="arcade-settings__grid">
      <label for="arcade-setting-theme">
        Visual theme
        <select id="arcade-setting-theme" data-arcade-setting-theme>
          <option value="paper-lab">Paper Lab</option>
          <option value="classic-cabinet">Classic Cabinet</option>
        </select>
      </label>
      <label for="arcade-setting-motion">
        Motion
        <select id="arcade-setting-motion" data-arcade-setting-motion>
          <option value="system">Follow system</option>
          <option value="full">Standard motion</option>
          <option value="reduced">Reduced motion</option>
        </select>
      </label>
      <label for="arcade-setting-contrast">
        Contrast
        <select id="arcade-setting-contrast" data-arcade-setting-contrast>
          <option value="system">Follow system</option>
          <option value="standard">Standard contrast</option>
          <option value="high">High contrast</option>
        </select>
      </label>
      <label for="arcade-setting-text-size">
        Text size
        <select id="arcade-setting-text-size" data-arcade-setting-text-size>
          <option value="standard">Standard</option>
          <option value="large">Large</option>
          <option value="extra-large">Extra large</option>
        </select>
      </label>
      <label for="arcade-setting-timing">
        Timing assistance
        <select id="arcade-setting-timing" data-arcade-setting-timing>
          <option value="standard">Standard real-time</option>
          <option value="relaxed">Relaxed start in step mode</option>
          <option value="untimed">Untimed start in step mode</option>
        </select>
      </label>
      <label for="arcade-setting-sound">
        Sound
        <select id="arcade-setting-sound" data-arcade-setting-sound>
          <option value="off">Off</option>
          <option value="on">On after interaction</option>
        </select>
      </label>
      <label class="arcade-settings__volume" for="arcade-setting-volume">
        Volume
        <span>
          <input id="arcade-setting-volume" type="range" min="0" max="1" step="0.05" value="0.5" data-arcade-setting-volume>
          <output for="arcade-setting-volume" data-arcade-setting-volume-output>50%</output>
        </span>
      </label>
    </div>
    <div class="arcade-settings__actions">
      <button type="button" data-arcade-setting-reset>Reset presentation settings</button>
      <p data-arcade-setting-status role="status" aria-live="polite" aria-atomic="true">
        Settings use Paper Lab and follow system accessibility preferences.
      </p>
    </div>
  </form>
</details>
