<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 200" role="img" aria-labelledby="research-ribbon-title research-ribbon-desc">
  <title id="research-ribbon-title">Research themes</title>
  <desc id="research-ribbon-desc">A blue ribbon connects publications and patents with a secure distributed research network and a paper receiving incoming citations.</desc>
  <defs>
    <linearGradient id="ribbon-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0550ae"/>
      <stop offset="0.48" stop-color="#1677d2"/>
      <stop offset="1" stop-color="#0b4ba0"/>
    </linearGradient>
    <linearGradient id="icon-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#dceeff"/>
    </linearGradient>
    <pattern id="binary-pattern" width="76" height="46" patternUnits="userSpaceOnUse">
      <g fill="#73b8f2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" opacity="0.18">
        <text x="8" y="13">1</text><text x="31" y="31">0</text><text x="57" y="18">1</text>
        <text x="13" y="41">0</text><text x="65" y="43">1</text>
      </g>
    </pattern>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#173f70" flood-opacity="0.13"/>
    </filter>
    <marker id="citation-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L8 4 L0 8 Z" fill="#075bb8"/>
    </marker>
  </defs>

  <rect width="2200" height="200" fill="#fff"/>
  <rect width="2200" height="200" fill="url(#binary-pattern)"/>

  <path d="M0 111 C170 111 218 117 322 109 C445 99 518 94 636 108 C756 123 809 129 928 112 C1052 94 1137 96 1255 113 C1372 130 1441 127 1562 108 C1692 88 1776 90 1892 107 C2015 125 2085 119 2200 110 L2200 132 C2074 141 2011 145 1885 128 C1768 112 1696 110 1572 128 C1447 147 1363 147 1245 130 C1129 113 1054 113 936 131 C810 149 737 142 626 127 C512 112 445 117 329 128 C212 139 139 132 0 132 Z" fill="url(#ribbon-gradient)" opacity="0.94"/>
  <path d="M0 111 C170 111 218 117 322 109 C445 99 518 94 636 108 C756 123 809 129 928 112 C1052 94 1137 96 1255 113 C1372 130 1441 127 1562 108 C1692 88 1776 90 1892 107 C2015 125 2085 119 2200 110" fill="none" stroke="#58a8ea" stroke-width="4" opacity="0.72"/>

  <!-- Publications: book and secure-computing laptop. -->
  <g transform="translate(400 72)" fill="none" stroke="#075bb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-shadow)">
    <path d="M-76 5 Q-40 -10 -4 10 V61 Q-39 43 -76 53 Z" fill="url(#icon-fill)"/>
    <path d="M76 5 Q40 -10 4 10 V61 Q39 43 76 53 Z" fill="url(#icon-fill)"/>
    <path d="M0 10 V64"/>
    <path d="M-66 18 Q-39 10 -14 21 M-66 30 Q-39 22 -14 33 M66 18 Q39 10 14 21 M66 30 Q39 22 14 33" stroke-width="3" opacity="0.62"/>
    <g transform="translate(0 -41)">
      <rect x="-43" y="-21" width="86" height="50" rx="7" fill="#fff"/>
      <path d="M-53 36 H53 L43 45 H-43 Z" fill="#dceeff"/>
      <path d="M-26 5 H-6 M6 5 H26 M0 -11 V20 M-18 -4 L0 8 L18 -4" stroke-width="3"/>
      <circle cx="0" cy="8" r="4" fill="#075bb8" stroke="none"/>
    </g>
  </g>

  <!-- Patents: documents, key, and shield. -->
  <g transform="translate(858 73)" fill="none" stroke="#075bb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-shadow)">
    <rect x="-64" y="-5" width="96" height="72" rx="8" fill="#cfe8ff" opacity="0.8"/>
    <rect x="-49" y="-18" width="96" height="72" rx="8" fill="#e8f5ff"/>
    <rect x="-34" y="-31" width="96" height="72" rx="8" fill="#fff"/>
    <path d="M-15 -9 H39 M-15 5 H33 M-15 19 H22" stroke-width="3" opacity="0.66"/>
    <g transform="translate(-30 -51)">
      <circle r="20" fill="url(#icon-fill)"/>
      <circle r="7"/>
      <path d="M7 0 H40 M28 0 V10 M37 0 V7"/>
    </g>
    <path d="M65 -58 L92 -47 V-24 C92 -5 80 8 65 15 C50 8 38 -5 38 -24 V-47 Z" fill="url(#icon-fill)"/>
    <path d="M55 -23 L63 -15 L78 -34"/>
  </g>

  <!-- Research projects: lattice, distributed network, and secure lock. -->
  <g transform="translate(1334 72)" fill="none" stroke="#075bb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-shadow)">
    <g transform="translate(43 -43)" stroke-width="3" opacity="0.58">
      <path d="M-42 -13 H42 M-42 2 H42 M-42 17 H42 M-28 -25 V25 M0 -25 V25 M28 -25 V25"/>
      <g fill="#1677d2" stroke="#fff" stroke-width="2">
        <circle cx="-28" cy="-13" r="4.5"/><circle cx="0" cy="-13" r="4.5"/><circle cx="28" cy="-13" r="4.5"/>
        <circle cx="-28" cy="2" r="4.5"/><circle cx="0" cy="2" r="4.5"/><circle cx="28" cy="2" r="4.5"/>
        <circle cx="-28" cy="17" r="4.5"/><circle cx="0" cy="17" r="4.5"/><circle cx="28" cy="17" r="4.5"/>
      </g>
    </g>
    <g opacity="0.9">
      <path d="M-88 -15 L-49 -47 L-7 -25 L38 -46 L86 -11 M-88 -15 L-63 39 L-18 52 L39 42 L86 -11 M-49 -47 L-18 52 M-7 -25 L39 42 M38 -46 L-18 52" stroke-width="3"/>
      <g fill="#e8f5ff" stroke-width="3">
        <circle cx="-88" cy="-15" r="9"/><circle cx="-49" cy="-47" r="9"/><circle cx="-7" cy="-25" r="9"/>
        <circle cx="38" cy="-46" r="9"/><circle cx="86" cy="-11" r="9"/><circle cx="-63" cy="39" r="9"/>
        <circle cx="-18" cy="52" r="9"/><circle cx="39" cy="42" r="9"/>
      </g>
    </g>
    <g transform="translate(4 -8)">
      <rect x="-35" y="-10" width="70" height="58" rx="9" fill="#fff"/>
      <path d="M-21 -10 V-25 C-21 -43 -12 -53 0 -53 C12 -53 21 -43 21 -25 V-10" fill="url(#icon-fill)"/>
      <circle cy="14" r="7" fill="#075bb8" stroke="none"/>
      <path d="M0 20 V31"/>
    </g>
  </g>

  <!-- Citations: papers in an incoming citation graph and an active writing pen. -->
  <g transform="translate(1800 72)" fill="none" stroke="#075bb8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-shadow)">
    <g stroke-width="3" opacity="0.9">
      <path d="M-75 -29 C-57 -28 -52 -21 -39 -14" marker-end="url(#citation-arrow)"/>
      <path d="M-74 40 C-54 39 -49 27 -38 17" marker-end="url(#citation-arrow)"/>
      <path d="M73 -34 C56 -34 49 -25 39 -18" marker-end="url(#citation-arrow)"/>
      <path d="M73 41 C55 40 48 29 39 20" marker-end="url(#citation-arrow)"/>
      <path d="M-75 -29 C-57 -7 -57 21 -74 40 M73 -34 C91 -10 91 20 73 41" opacity="0.48"/>
      <g fill="#e8f5ff">
        <g transform="translate(-94 -48)"><rect width="38" height="43" rx="5"/><path d="M8 13 H29 M8 22 H26 M8 31 H22"/></g>
        <g transform="translate(-94 21)"><rect width="38" height="43" rx="5"/><path d="M8 13 H29 M8 22 H25 M8 31 H21"/></g>
        <g transform="translate(56 -53)"><rect width="38" height="43" rx="5"/><path d="M8 13 H29 M8 22 H26 M8 31 H22"/></g>
        <g transform="translate(56 19)"><rect width="38" height="43" rx="5"/><path d="M8 13 H29 M8 22 H25 M8 31 H21"/></g>
      </g>
    </g>
    <g>
      <path d="M-38 -52 H20 L39 -33 V57 H-38 Z" fill="#fff"/>
      <path d="M20 -52 V-33 H39" fill="#dceeff"/>
      <path d="M-24 -25 H24 M-24 -10 H24 M-24 5 H14 M-24 20 H4" stroke-width="3" opacity="0.66"/>
      <path d="M-17 28 Q-8 22 0 27 Q8 32 16 24" stroke-width="3" opacity="0.72"/>
    </g>
    <g transform="translate(30 6) rotate(-38)">
      <path d="M-7 -4 H50 L62 4 L50 12 H-7 Z" fill="#cfe8ff"/>
      <path d="M-7 -4 L-22 4 L-7 12 Z" fill="#fff"/>
      <path d="M-22 4 H-14"/>
      <path d="M43 -4 V12" stroke-width="3"/>
    </g>
  </g>
</svg>
